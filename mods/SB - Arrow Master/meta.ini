nexusDescription="[font=Georgia]\n<br />\n<br />[center][color=#f1c232][size=6]SB Arrow Master[/size][/color][/center]\n<br />[center][color=#dd7e6b][size=2]Requires: xOBSE  v22.3.1 or higher | [url=https://www.nexusmods.com/oblivion/mods/50144]LINK[/url] (Optional)[/size][/color][/center]\n<br />[center][color=#dd7e6b][size=1] [url=https://github.com/llde/xOBSE/releases/latest](xOBSE - Github Page)[/url][/size][/color][/center]\n<br />\n<br />\n<br />[center][b][u][color=#b6d7a8][size=5]Master Your Marksman Gameplay.[/size][/color][/u][/b][/center]\n<br />\n<br />\n<br />\n<br />[size=4][color=#d8d8d8]   ﻿[/color][color=#b6d7a8]1. Auto-Equip Arrows:[/color][/size]\n<br />\n<br />[size=3]    ﻿   ﻿- [/size][color=#f1c232][size=3]Auto-Equip[/size][/color][size=3] arrows when bow is equipped, remove arrows when bow is removed.[/size]\n<br />[size=3]    ﻿   ﻿- Most recent equipped arrow gets priority.[/size]\n<br />[size=3]    ﻿   ﻿- Otherwise arrows are selected based on damage, and then by arrow count if damage is tied.[/size]\n<br />[size=3]    ﻿   ﻿- Enchanted arrows can be included or excluded from selection, or selected as a last resort when no alternatives are found.[/size]\n<br />\n<br />[size=4]   \n<br />   ﻿﻿[/size][color=#b6d7a8][size=4]2. Bound Arrows for Bound Bows:[/size][/color] \n<br />\n<br />[size=3]    ﻿   ﻿- Infinite [/size][color=#f1c232][size=3]Bound Arrows[/size][/color][size=3] are added to Player or NPCs while Bound Bow is equipped.[/size]\n<br />[size=3]    ﻿   ﻿- Bound Arrows will vanish when unequipped, loosed, or on hit.[/size]\n<br />[size=3]    ﻿   ﻿- Bound Arrows cannot be sold, dropped, or stored in containers.[/size]\n<br />[size=3]    ﻿   ﻿- Bound Arrow damage is 11 by default. This can be changed via the ini or LINK menu.[/size]\n<br />\n<br />[size=4] ﻿   ﻿\n<br />   ﻿[/size][color=#b6d7a8][size=4]3. Denock Arrows:[/size][/color]\n<br />\n<br />[size=3]    ﻿   ﻿- Drawn arrows can now be [/size][color=#f1c232][size=3]\"Denocked\" [/size][/color][size=3][size=3] (using xOBSE event listeners) [/size]and returned to the quiver without being shot.[/size]\n<br />[size=3]    ﻿   ﻿- Denock-Key can be set via the ini or LINK menu (default: R key).[/size]\n<br />[size=3]    ﻿   ﻿- Denock-Animation can also be set via the ini or LINK menu.[/size]\n<br />\n<br />[size=4] ﻿\n<br />   [/size][color=#b6d7a8][size=4]4. Misc. Arrow Settings:[/size][/color]\n<br />\n<br />[size=3]    ﻿   ﻿Adjust specific arrow based settings on the fly using the LINK menu:[/size]\n<br />[size=3]    ﻿   ﻿- Arrow Inventory Chance: Percentage chance of recovering arrows from fallen enemies[/size]\n<br />[size=3]    ﻿   ﻿- Arrow Age Max: Time in seconds for loose arrows to remain in the game world.[/size]\n<br />[size=3]    ﻿   ﻿- Arrow Max Ref Count: amount of loose arrows that can exist in the game world at once.\n<br />[/size]\n<br />\n<br />\n<br />[center][color=#dd7e6b][i]* Arrows in this game are Weird. I believe this to be the most stable implementation of these features on the Nexus, and it involves effective workarounds for many vanilla bugs that have plagued mods attempting to include these features in the past. However; Please let me know if any unusual behavior occurs so that I can fix it.\n<br />[/i][/color][/center]\n<br />\n<br />[center][color=#d8d8d8][size=4]Thanks to [/size][/color][color=#d8d8d8][size=4][url=https://www.nexusmods.com/oblivion/users/1006768]Maskar[/url] for creating [url=https://www.nexusmods.com/oblivion/mods/50144]LINK.[/url]\n<br />[/size]\n<br />[/color][/center]\n<br />[center][color=#dd7e6b][size=4]Thanks to the xOBSE team.﻿[/size][/color][/center]\n<br />\n<br />\n<br />[/font]"
