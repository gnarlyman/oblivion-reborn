nexusDescription="[b][u]Features:[/u][/b]\n<br />\n<br />[list]\n<br />[*]Cleaned of all ITMs, dirty, wild and stats edits. Removed all non-hair/eyes/facegen related edits by using [url=https://www.nexusmods.com/skyrim/mods/49373]Automation Tools[/url]﻿. Removed 3 wild edits in NPCs in the original plugin (0001D9D8, 000234B7, &amp; 00034E7E). No other mod author has cleaned these, as far as I am aware.\n<br />[/list]\n<br />[list]\n<br />[*]Moved NPC edits to a separate plugin, to be deactivated and imported into the bashed patch for maximum compatibility with all other mods.\n<br />[/list]\n<br />[list]\n<br />[*]Can choose between either OCOv2 hairstyles or vanilla hairstyles (vanilla hairstyles look great when combined with [url=https://www.nexusmods.com/oblivion/mods/49351]Oblivion Upscaled Textures (OUT)[/url]).\n<br />[/list]\n<br />[list]\n<br />[*]Fully integrated the following mods into this mod (you no longer need to use these mods with Oblivion Character Overhaul - Advanced Edition):\n<br />[/list]\n<br />[list=1]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/48557]Oblivion Character Overhaul V2 - DLC Faces[/url] (version 1.4)\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/51972]OCOv2 - Elven NPCs Eyes Fix Filter Patch[/url] (version 1.3)\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/52041]OCOv2 Nord and Redguard Eyes Fix[/url] (version 1.0)\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/51976]Properly Named Eyes for OCOv2[/url] (version 1.3)\n<br />[*]No mods other than the above four mods were integrated into Advanced Edition (mainly because I have full control over most of the above mods and they have no more updates needed for them, as well as being open permission mods).\n<br />[/list]\n<br />[list]\n<br />[*]Carried forward the Unofficial Oblivion Patch's Race Description change in High Elf record 00019204.\n<br />[/list]\n<br />[list]\n<br />[*]Female Dremora from the original mod are kept present still. If for whatever reason you don't want female Dremora, it's as simple as removing the Actors.ACBS bash tag from Oblivion_Character_Overhaul_Faces.esp. The female Dremora changes won't get imported from this plugin into the bashed patch then.\n<br />[/list]\n<br />[list]\n<br />[*]The Vanilla Hairs file keeps the original OCOv2 hair changes done to the NPCs [url=https://en.uesp.net/wiki/Shivering:Adeo]Adeo[/url] and [url=https://en.uesp.net/wiki/Shivering:Grakedrig_Ulfri]Grakedrig Ulfri[/url]. This file has no other edits to hairstyles and hair lengths.\n<br />[/list]\n<br />[list]\n<br />[*]Made it so that you can still use the OCOv2 Hairstyles in the Vanilla Hairstyles file for the player character only, provided that you use the bashed patch tweak 'Tweak Races -&gt; Races Have All Hairs' to enable them.\n<br />[/list]\n<br />[list]\n<br />[*]Removed Order eyes from all races so that Wrye Bash's NPC Checker bashed patch patcher doesn't assign the Order eyes to any NPCs with no eyes set. The existing few NPCs with Order eyes in the vanilla game have been given different eyes instead too.\n<br />[/list]\n<br />Download and install only one main file on this mod page, choosing either OCOv2 Hairstyles or Vanilla Hairstyles, based on your personal preference.\n<br />\n<br />Requires the meshes and textures from [url=https://www.nexusmods.com/oblivion/mods/44676]Oblivion Character Overhaul version 2﻿[/url]﻿ (but use my replacer ESP instead of the original mod's ESP).\n<br />\n<br />Requires [url=https://www.nexusmods.com/oblivion/mods/22368]Wrye Bash[/url]. I only support the latest version of Wrye Bash. Don't use CBash on older versions as it's redundant now and highly broken. Don't complain if it does not work on older Wrye Bash versions; just upgrade to the latest.\n<br />\n<br />[b][u]Oblivion_Character_Overhaul.esp[/u][/b]\n<br />\n<br />The core mod and replacer ESP. Contains only Eyes and Race edits, and optionally Hair edits. Does not contain any NPC edits.\n<br />\n<br />[b][u]Oblivion_Character_Overhaul_Faces.esp[/u][/b]\n<br />\n<br />This filter patch modifies NPC's eyes, face and hair. Do not activate it, instead you must keep it deactivated at all times and import it into your bashed patch in Wrye Bash. This allows for greater compatibility with other mods, ensuring that only the eyes, face and hair changes are imported from it, and nothing else. Ideally, you should load this plugin in the slot that comes immediately after Oblivion_Character_Overhaul.esp. If for whatever reason you don't want any NPC edits, then you don't have to install this plugin.\n<br />\n<br />[b][u]F.A.Q.[/u][/b]\n<br />\n<br />Q. Does this mod make [url=https://www.nexusmods.com/oblivion/mods/51121]Oblivion Character Overhaul Compatibility Edition - OCO CE[/url] and [url=https://www.nexusmods.com/oblivion/mods/51324]Oblivion Character Overhaul Cleaned - OCO Cleaned[/url] obsolete?\n<br />A. Yes, this mod makes both of those mods obsolete (as in, you don't need either of them with Advanced Edition). Advanced Edition has all of the same features as both of those mods.\n<br />\n<br />Q. Is [url=https://www.nexusmods.com/oblivion/mods/51971]Improved NPC Faces for OCOv2[/url] still necessary, or is it incorporated into this mod?\n<br />A. I did not edit the facegen at all from nuska's original ESP. Improved NPC Faces for OCOv2 is not integrated into this mod at all. So yes, you should still use Improved NPC Faces for OCOv2 with this mod, if you want to and like that mod. [url=https://www.nexusmods.com/oblivion/mods/52405]Oblivion Character Overhaul v2 - DLC Addon[/url] is also not integrated into Advanced Edition, but is fully compatible with it (just load OCOv2 - DLC Addon.esp after Oblivion_Character_Overhaul_Faces.esp).\n<br />\n<br />Q. I only have Shivering Isles and Knights of the Nine, but not the other smaller official DLCs. Can I still use this mod?\n<br />A. Oblivion_Character_Overhaul_Faces.esp is a filter patch, which means that you don't need all of its masters, provided that you are using a Wrye Bash bashed patch. So yes, you can still use this mod without having the smaller official DLCs.\n<br />\n<br />Q. Is [url=https://www.nexusmods.com/oblivion/mods/49988]OCOv2 - Bashed Patch Eyes Fix[/url] still necessary, or is it incorporated into this mod?\n<br />A. OCOv2 - Bashed Patch Eyes Fix is no longer needed when using Wrye Bash 311 or greater, and it has been removed from Advanced Edition version 1.5.\n<br />\n<br />[u][b]Recommended mods to also use[/b][/u]\n<br />\n<br />[url=https://www.nexusmods.com/oblivion/mods/51971]Improved NPC Faces for OCOv2[/url] and [url=https://www.nexusmods.com/oblivion/mods/52405]Oblivion Character Overhaul v2 - DLC Addon[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/53005]OCO Face Updater - Fixes Normal and Age Maps on Load[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45859]Seamless - OCOv2[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/52052]Unused OCOv2 Eyes and DLC Characters Incorporated[/url]\n<br />﻿[url=https://www.moddb.com/mods/vkvii-oblivion-skin-argonian]VKVII Oblivion Skin Argonian[/url]\n<br />[url=https://www.moddb.com/mods/vkvii-oblivion-skin-khajiit]VKVII Oblivion Skin Khajiit[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/52498]Voices for Female Dremora NPCs[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/51511]Warpaints scars and face markings for OCO2[/url]\n<br />\n<br />Check out my [url=https://www.nexusmods.com/oblivion/mods/49898]Oblivion Comprehensive Modding Guide[/url]'s 'Character' section for more recommended OCOv2-related mods.\n<br />\n<br />Also check out [url=https://www.nexusmods.com/oblivion/mods/51379]OCOv2 - Filter Patch for Mods[/url], which is also needed alongside Advanced Edition to fix the appearance of NPCs in various mods."
