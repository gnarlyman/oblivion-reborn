nexusDescription="Most commonly asked questions and their answers:\r\n[line]\r\n1. Q: [b][color=#ff0000]The weapons are too strong, can\\'t you make them less powerful?[/color][/b]\r\nA: No, but you can yourself with the new ingame menu (v371+). Just type \\\"startquest AEWMenu\\\" into the console (close the console again) and chose the power of all the scripted enchantments yourself (Hithlain/Ithildin/Bladeweaver/Gwilith and all weapons starting with \\'Ayleid\\').\r\n\r\n2. Q: Where can I buy the sabres?\r\nA: I added a map to the screenshots. It\\'s west of Cheydinhal, north of the Barren Cave. \r\n[b][color=#ff0000]You have to have the official Oblivion patch (1.2x) installed to be able to see the cottage![/color][/b]\r\n\r\n3. Q: Where can I find the armor and are there more items than just the gloves and the coat?\r\nA: The armor can be found on the cupboard in the same cottage where you can buy the sabres (see Q1). It only consists of the gloves and the coat.\r\n\r\n4. Q: Why does he sell nothing/only x sabres? Where is the rest?\r\nA: His sell list is based on a leveled list which means for each material you have to reach a certain level (see below for exact level requirements). There is also a certain randomness to his sell list. He will never sell all sabres at once, wait a few days for his wares to restock/change.\r\n[b][color=#ff0000]And he only sells during daytime (around 7am to 7pm)![/color][/b]\r\n\r\n5. Q: Why does he not sell offhand weapons?\r\nA: There are no dedicated offhand weapons. You can buy a normal mainhand weapon and switch it to the offhand using the Swap Active Weapon spell you automatically get when you buy or pick up one of my weapons. Only the following weapons can be swapped to be used in the offhand: knives, short sabres and the high level scimitars.\r\n\r\n\r\n\r\nNew in this version:\r\n[line]\r\n3.75:\r\n- Removed the scripted +10 blade skill buff on the Bladeweaver. Instead I added a spell that significantly buffs the player\\'s speed, blade and block when a critical hit occurs. Applies to the Bladeweaver and Gwilith.\r\n\r\n3.74:\r\n- Cleaned up some scripts.\r\n- Removed the ability to slay all \\'evil\\' from the damage scripts. Elite-Weapons (Bladeweaver, Warden, Ranger etc.) may now only slay Daedra when they strike critically. The Bladeweaver and Gwilith are untouched by this change.\r\n\r\nNew in 3.71:\r\n- Ingame Menu to set the strength of the scripted enchantments. Open the console and type \\\"startquest AEWMenu\\\" to get the ingame menu (note: you have to close the console for the menu to appear).\r\n\r\nNew in 3.70:\r\n- Bows now come either enchanted or unenchanted as well. They use the same simple (i.e. critical hits, but no instant kill) damage enchantments as the blades. \r\n- The longblades that can be found in the various ruins are now unique. They are recognizable by the \\'fine\\' prefix and as the prefix \r\nsays they are a bit more durable, a bit faster and deal slightly more damage than their more crude counterparts. They are not enchanted however because I think most people still like to enchant them themselves. \r\n- The Ceremonial Bows are now only called Lonbows due to name length reasons ;).\r\n\r\nNew in 3.65:\r\n- Added a few textures for the (low level) scimitars, or more precisely for their scabbards. In the previous version they all shared one texture, namely the black one.\r\n- Fixed an issue with the Ranger Warblade pointing to the wrong .nif file (thanks to Cru for reporting this!)\r\n\r\n3.62:\r\n- Fixed a bug in the scripts where the Courtblades would not be removed from the players inventory correctly when using the swap spell, thanks to pharzuph from the official forums!\r\n- Refined the arrows slightly. They should now be more glossy and the arrowhead has been revamped and got a better texture with a small engraving. I hope you like it. \r\n\r\n\r\nSabre versions sorted by damage value/size:\r\n[line]\r\n- 2-handed Longblades\r\n- 1-/2-handed Warblades\r\n- 1-handed Scimitars (+offhand)\r\n\r\n- 2-handed Long Sabres\r\n- 1-/2-handed Courtblades\r\n- 1-/2-handed Sabres\r\n- 1-/2-handed Scimitars\r\n- 1-handed Short Sabres (+offhand)\r\n- 1-handed Knives (+offhand)\r\n\r\n\r\n[b]Note: There are no offhand versions for sale. You have to buy a \\'normal\\' version and swap it to the offhand using the new spell \\'Swap Active Weapon\\'. If the auto-unequip script doesn\\'t work after you swapped a weapon this way, simply un- and reequip the offhand once.[/b]\r\n\r\n\r\nBow versions sorted by damage value:\r\n[line]\r\nWarbow   - slowest and strongest\r\nLongbow  - slower but stronger\r\nBow        - normal speed and damage\r\nShortbow - fastest but weakest\r\n\r\n\r\nHigh-Level material sets sorted by damage value/level:\r\n[line]\r\n- Royal:  level 35+  ivory/gold\r\n- Blademaster:  level 33+  black/silver\r\n- Bladeweaver:  level 31+  black/silver\r\n- Ranger:  level 29+  green/greensilver\r\n- Guardian:  level 27+  blue/silver\r\n- Warden:  level 25+  wood/gold\r\n\r\n+ Enchanted versions, all levels +5\r\n+ Unique Warblade \\'Gwilith\\' and Unique Longblade \\'Bladeweaver\\' \r\n\r\n\r\nRegular material sets sorted by damage value:\r\n[line]\r\n- Royal:  level 30+   ivory/gold\r\n- Ebony: level 25+   black/silver\r\n- Cloud:  level 20+   blue/silver\r\n- Tree:    level 15+  redish wood/gold\r\n- White:  level 10+   white/(greenish) gold\r\n- Elm:     level 5+    elmwood/black \r\n\r\n+ Enchanted versions, all level requirements +5\r\n+ two unique long sabres \\'Hithlain\\' and \\'Ithildin\\' with subtle glowing runeblades and special scripted enchantment\r\n\r\n\r\nThey do not replace existing weapons so the mod should be compatible with pretty much everything. Only if someone else modified the Ayleid Ruins I used as well it may happen that you won\\'t find anything there... depending on which mod has priority.\r\n\r\n\r\nInstallation: \r\n[line]\r\n- Extract the contents of the .zip/.rar/.7z file into your Oblivion/Data folder\r\n- Enable the modfile \\\"Adonnays Elven Weaponry\\\" in your Oblivion Launcher -> Data Files"
