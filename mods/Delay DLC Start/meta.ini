nexusDescription="SUMMARY:\n<br />Another mod to delay DLCs from starting. This one uses configurable conditions in an ini file to determine when each DLC quest starts.\n<br />\n<br />\n<br />REQUIREMENTS:\n<br />- Shivering Isles.\n<br />- Knights.esp\n<br />- DLCBattlehornCastle.esp\n<br />- DLCFrostcrag.esp\n<br />- DLCHorseArmor.esp\n<br />- DLCMehrunesRazor.esp\n<br />- DLCOrrery.esp\n<br />- DLCThievesDen.esp\n<br />- DLCVileLair.esp\n<br />- At least OBSE 16.0\n<br />- DLCThievesDen - Unofficial Patch - SSSB.esp. (A no-SSSB version excludes this patch.)\n<br />- DLCMehrunesRazor - Unofficial Patch.esp. (A no-UOP and SSSB version excludes this and the SSSB patch.)\n<br />\n<br />(UOP = Unofficial Oblivion Patch, SSSB = Sigil Stone Sound Bug optional Thieves Den DLC plugin).\n<br />\n<br />\n<br />DESCRIPTION:\n<br />- IMPORTANT: Use only with a new game!\n<br />- Yet another mod to delay the start of the DLCs. I figure more choices are better.\n<br />- This one starts the DLC quests based on conditions you can configure in an INI file. If any value is out of the acceptable range, you get a warning so you can fix it before continuing.\n<br />- Be sure to back up your INI file or document your preferences in case you reinstall this mod.\n<br />- The way you choose to play your character matters.\n<br />- Map markers are not added to the map until the DLC starts. Fast travel is disabled until you discover the location.\n<br />- For the three skill-based settings (sum of fighter, magic, and stealth skills), there is no maximum value in case you use a mod that increases their maximum from 100.\n<br />- The processing starts once you are in an exterior location.\n<br />\n<br />How each DLC is started (default values shown):\n<br />1) Shivering Isles\n<br />   1.1) Player level &gt;= 20\n<br />   1.2) Player is in the Bravil worldspace (can choose to ignore location check)\n<br />   1.3) Also starts if the player finds the Strange Door on their own.\n<br />   (If the location check is skipped, it starts in one day once the other conditions are met.)\n<br />\n<br />2) Knights of the Nine\n<br />   2.1) Player level &gt;= 15\n<br />   2.2) Player's (Fame - Infamy) &gt;= 15\n<br />   2.3) Player is not in the vicinity of Anvil and not in prison (can choose to skip this).\n<br />\n<br />3) Battlehorn Castle (Fighters Stronghold)\n<br />   3.1) Player's Fighters Guild rank &gt;= 3 (Swordsman)\n<br />   3.2) Sum of player's seven combat skills &gt;= 200\n<br />   3.3) Player is in the Chorrol worldspace (can choose to ignore location check)\n<br />   3.4) Also starts if the player finds castle and attackers.\n<br />\n<br />4) Frostcrag Spire (Wizard's Tower)\n<br />   4.1) Player's Mages Guild rank &gt;= 3 (Evoker)\n<br />   4.2) Sum of player's seven magic skills &gt;= 200\n<br />   4.3) Player is in the Bruma worldspace (can choose to ignore location check)\n<br />\n<br />5) Thieves Den (Black Flag Ship)\n<br />   5.1) Player's Thieves Guild rank &gt;= 3 (Prowler)\n<br />   5.2) Sum of player's seven stealth skills &gt;= 200\n<br />   5.3) Player is in the Anvil worldspace (can choose to ignore location check)\n<br />   5.4) If the door is enabled and player finds Black Flag ship area.\n<br />\n<br />6) Vile Lair (Deepscorn Hollow)\n<br />   6.1) Player's Dark Brotherhood rank &gt;= 3 (Assassin) OR\n<br />   6.2) Player has been a vampire for at least 7 days\n<br />   AND\n<br />   6.3) Player's Infamy &gt;= 10\n<br />   6.4) Player is in the Leyawiin worldspace (set choose to ignore location check)\n<br />\n<br />7) Horse Armor Pack\n<br />   7.1) Player's level &gt;= 4\n<br />   7.2) Player has at least 2000 gold\n<br />   7.3) Player's fame &gt;= 4\n<br />   7.4) Player is in the IC Talos Plaza District (can choose to ignore location check)\n<br />\n<br />8) Mehrunes Razor\n<br />   8.1) Player's level &gt;= 10\n<br />   8.2) Player's infamy &gt;= 10\n<br />   8.3) Player is in the IC Elven Gardens District (can choose to ignore location check)\n<br />   8.4) Also starts if the player finds Sundercliff Watch and enters.\n<br />\n<br />9) Orrery\n<br />   9.1) Player's Mages Guild &gt;= 1 (Apprentice)\n<br />   9.2) Distance to Bothiel &lt;= 200 (can choose to ignore distance check)\n<br />   9.3) If distance check is off, then Player must be in the Arcane University.\n<br />\n<br />OTHER CHANGES:\n<br />- Battlehorn Castle: more descriptive log entries; the maid cannot be a follower; clarified purchasing requirements; adjusted quest markers.\n<br />- Mehrunes Razor: more descriptive log entries.\n<br />- Horse Armor: standardized naming convention for armored horses. All end in \"(Armored).\"\n<br />\n<br />\n<br />INSTALLATION:\n<br />- Extract one of the plugins to the Data folder:\n<br />1) If you have both of the Unofficial patches above installed, use Delay DLC Start.esp.\n<br />2) If you have the Mehrunes Razor patch installed but not SSSB, use Delay DLC Start - no SSSB.esp.\n<br />3) If you have neither of the Unofficial patches above installed, use Delay DLC Start - no UOP and SSSB.esp.\n<br />\n<br />Updating from V1.0 or V1.1 to V1.2:\n<br />- Overwrite the esp and continue. Remember to back up your INI settings before updating.\n<br />- Extract the Ini folder to the Data folder (the ini file is in the Ini folder).\n<br />- The processing will proceed once in an exterior location.\n<br />\n<br />\n<br />COMPATIBILITY:\n<br />- May conflict with other mods that affect DLC quests. If in doubt, check with TES4Edit and look for conflicts. Of course, feel free to make compatibility patches.\n<br />- V1.0 and V1.1 conflict with mods that skipped the tutorial quest and didn't set MQ01 stage 100. V1.2 fixed that issue. If you continue using V1.0 or V1.1 and the DLCs don't start when they should, use the console mode to enter \"SetStage MQ01 100\" without the quotes.\n<br />- Both versions include UOP/UOMP 3.5.7 fixes.\n<br />\n<br />\n<br />LOAD ORDER:\n<br />- Load after the Unofficial Oblivion Patch mods listed above.\n<br />- Load AFTER mods that edit the DLC quests, since they may restore the \"Start Game Enabled\" flag.\n<br />- Change the load order or your preference in case of a minor conflict. Otherwise, I recommend a patch so both mods function as you desire.\n<br />\n<br />\n<br />CHANGE LOG:\n<br />V1.0 = Initial release.\n<br />V1.1 = Minor tweaks; no change to the ini file.\n<br />V1.2 = Changed the mod starting condition to be more generic. Included a feedback message the mod is active.\n<br />\n<br />\n<br />CREDITS:\n<br />Bethesda, for making Oblivion.\n<br />ShadeMe, for the Construction Set Extender.\n<br />ElminsterAU and the xEdit Team, for TES4Edit.\n<br />OBSE team.\n<br />Unofficial Oblivion Patch team.\n<br />Maedroth for identifying an issue with some skip tutorial mods."
