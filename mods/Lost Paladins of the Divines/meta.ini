nexusDescription="[color=#ffdf3e][b]BE SURE TO DOWNLOAD THE ARMOR AND WEAPONS REPLACER MODELS FOR LPOTD. YOU WONT REGRET IT! YOU CAN FIND IT HERE:[/b][/color] \r\n\r\n[b]http://www.tesnexus.com/downloads/file.php?id=31063 [/b] \r\n\r\n[color=#ffdf3e][b]Name:[/b][/color] Lost Paladins of the Divines\r\n[color=#ffdf3e][b]Version:[/b][/color] 1.0\r\n[color=#ffdf3e][b]Date:[/b][/color] 04/20/2007\r\n[color=#ffdf3e][b]Category:[/b][/color] Weapons and Armor\r\n[color=#ffdf3e][b]Requirements:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=15579]7-Zip[/url], [url=http://www.tesnexus.com/downloads/file.php?id=11366]Official Oblivion Patch 1.2.0214[/url] or [url=http://www.tesnexus.com/downloads/file.php?id=11364]higher[/url]\r\n[color=#ffdf3e][b]Recommended:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=2097]Oblivion Mod Manager[/url], [url=http://obliviondownloads.com/StoreCatalog_ProductView.aspx?ProductId=2]Official DLCHorseArmor[/url]\r\n[color=#ffdf3e][b]Authors:[/b][/color] [url=http://www.tesnexus.com/downloads/author.php?id=103363]Jerros[/url], [url=http://www.tesnexus.com/downloads/author.php?id=128909]LHammonds[/url]\r\n[color=#ffdf3e][b]Source:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=10505]TESNexus[/url]\r\n[color=#ffdf3e][b]Music Add-on:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=10485]TESNexus[/url]\r\n[color=#ffdf3e][b]RELz Thread #4:[/b][/color] [url=http://www.bethsoft.com/bgsforums/index.php?showtopic=1024500]The Elder Scrolls Forum RELz[/url]\r\n[color=#ffdf3e][b]RELz Thread #3:[/b][/color] [url=http://www.bethsoft.com/bgsforums/index.php?showtopic=779442]The Elder Scrolls Forum RELz[/url]\r\n[color=#ffdf3e][b]RELz Thread #2:[/b][/color] Purged\r\n[color=#ffdf3e][b]RELz Thread #1:[/b][/color] Purged\r\n[color=#ffdf3e][b]File Mirror #1:[/b][/color] [url=http://planetelderscrolls.gamespy.com/View.php?view=OblivionMods.Detail&id=2772]Planet Elder Scrolls[/url]\r\n[color=#ffdf3e][b]File Mirror #2:[/b][/color] [url=http://www.elricm.com/mods.php?mod=3777]Elric Melnibone[/url]\r\n[color=#ffdf3e][b]File Mirror #3:[/b][/color] [url=http://obliviet.com/modules.php?name=Downloads&d_op=viewdownloaddetails&lid=2474&ttitle=_Lost_Paladins_of_the_Divines_OMOD_Ready]Obliviet.com[/url]\r\n[color=#ffdf3e][b]File Mirror #4:[/b][/color] [url=http://tes.ag.ru/oblivion/mods/armor.shtml]tes.ag.ru[/url] (Russian)\r\n[color=#ffdf3e][b]File Mirror #5:[/b][/color] RapidShare ([url=http://rapidshare.com/files/56831256/Lost_Paladins_of_the_Divines_1.0_OMOD.zip]OMOD[/url] or [url=http://rapidshare.com/files/56828298/Lost_Paladins_of_the_Divines_1.0_OMOD-Ready.7z]OMOD-Ready Archive[/url])\r\n\r\n[b]WARNING[/b]: Playing this mod may scare children and unstable adults. Side effects include, but are not limited to, being scared of the dark and looking over one\\'s shoulder.\r\n\r\n[color=#ffdf3e][b][u]Description[/u][/b][/color]\r\nThis mod adds custom armor, weapons, a unique stallion, re-textured steel horse armor (if you have the official DLCHorseArmor mod), historical book with a map and 4 unique types of creatures that guard the legendary equipment. For more details, purchase and read the book called \\\"Lost Paladin of the Divines.\\\"\r\n\r\nPaladins Rejoice!\r\n\r\n[color=#ffdf3e][b][u]Location[/u][/b][/color]\r\nThe book called \\\"Lost Paladin of the Divines\\\" can be purchased at the First Edition in the Market District of Imperial City.\r\nOnce you obtain the unique equipment called Heaven\\'s Wrath and Heaven\\'s Fury, you will be able to buy lesser non-enchanted replicas at The Best Defense and A Fighting Chance.\r\n\r\n[color=#ffdf3e][b][u]Details[/u][/b][/color]\r\nIf you defeat the final guardian, you will be rewarded with a Paladin\\'s Stallion as a gift from the Divines.\r\n\r\nIf you defeat the final guardian and have no infamy points, you will be able to open the Crypt of Vralen Averos and will be presented with a series of questions to customize the Heaven\\'s Wrath Armor set.\r\n\r\nThis 2nd reward is an enchanted heavy armor set called Heaven\\'s Wrath and includes:\r\n- Heaven\\'s Wrath Helmet (Open or Closed is your decision)\r\n- Heaven\\'s Wrath Cape\r\n- Heaven\\'s Wrath Cuirass (Male and Female)\r\n- Heaven\\'s Wrath Gauntlets\r\n- Heaven\\'s Wrath Greaves\r\n- Heaven\\'s Wrath Boots\r\n- Heaven\\'s Wall (Heavy Shield)\r\n- Heaven\\'s Glory (Longsword - With or without golden-colored flames that give off light)\r\n- Heaven\\'s Messenger (Claymore)\r\n- Vralen\\'s Journal Note (clue to the location of Heaven\\'s Fury light armor set)\r\n- A vendor at the Best Defense in the Imperial City will craft and sell a replica set of the heavy armor.\r\n- A vendor at a Fighting Chance in the Imperial City will craft and sell a replica set of the swords.\r\n- A vendor at the Divine Elegance in the Imperial City will craft and sell replica capes.\r\n\r\nIf you read Vralen\\'s Note titled \\\"Heaven\\'s Fury Note,\\\" you should be able to figure out the location of his original and light armor set called Heaven\\'s Fury.  Once you find the ruin described in the note, it\\'s just a matter of time searching for the chest called \\\"Chest of Vralen Averos\\\" which includes:\r\n- Heaven\\'s Fury Helmet (Open or Closed is your decision)\r\n- Heaven\\'s Fury Cuirass (Male and Female)\r\n- Heaven\\'s Fury Gauntlets\r\n- Heaven\\'s Fury Greaves\r\n- Heaven\\'s Fury Boots\r\n- Heaven\\'s Gate (Light Shield)\r\n- A vendor at the Best Defense in the Imperial City will craft and sell a replica set of the light armor.\r\n\r\nOther items include:\r\n- Official DLCHorseArmor texture replacer for the Steel Armor.\r\n- Several colored crystal ball lamps located in the same ruins of Heaven\\'s Wrath.\r\n- Valuable and rare collector portraits of Vralen Averos and Galandra Laora.\r\n- Four levels of Werewolf creatures that act as guardians for the armor.  Each breed is visually different and leave behind new and varied ingredients. The deeper you go into the ruin, the more difficult they become.\r\n\r\nThe unique weapons found during the quest are equivalent to Daedric weapons.\r\nThe Replica weapons found in vendor shops are equivalent to Elven weapons.\r\nHeaven\\'s Wrath armor is equivalent to heavy Daedric armor.\r\nHeaven\\'s Wrath replica armor is equivalent to heavy Orcish armor.\r\nHeaven\\'s Fury armor is equivalent to light Glass armor.\r\nHeaven\\'s Fury replica armor is equivalent to light Mithril armor.\r\n\r\n[color=#ffdf3e][b][u]Install[/u][/b][/color]\r\nPlease see the Readme file for details.\r\n\r\n[color=#ffdf3e][b][u]Incompatibility[/u][/b][/color]\r\nNone known.  Most everything are newly created items added to Oblivion.  There were two leveled necromancers that were removed from the ruin in order to preserve the atmosphere.\r\n\r\n[color=#ffdf3e][b][u]Known Issues or Bugs[/u][/b][/color]\r\n - Closed-Faced helmet may have clipping issues with beast races depending on length of snout.  This can be minimized or even eliminated if you use the supplied EGM helmet files as described in the install section.\r\n - To get the best result out of the Reflective Armor, enable HDR and install the official 1.2.0214 patch to enable the best reflection effects.\r\n - To obtain the armor, you need 0 infamy. Due to popular demand, this will be relaxed a little in the next version. See RELz thread for details.\r\n - This mod changes the color of light spells from a default of green to gold which is used with the flame sword light effect. Future versions will undo this change in favor of a more compatible design.\r\n\r\n[color=#ffdf3e][b][u]History[/u][/b][/color]\r\n1.0, 2007/04/20 - Initial Release.\r\n\r\n[color=#ffdf3e][b][u]Future[/u][/b][/color]\r\nVersion 1.1 - Add new quest for the Armor of [url=http://i228.photobucket.com/albums/ee11/Conan_Lon/Oblivion/Lost%20Paladins/WIP/LPotD_Justice_00.jpg]Divine Justice[/url].\r\nVersion 1.2 - Add new quest for the Armor of [url=http://i228.photobucket.com/albums/ee11/Conan_Lon/Oblivion/Lost%20Paladins/WIP/LPotD_Vengeance_00.jpg]Blessed Vengeance[/url].\r\nVersion 1.3 - Add new quest for the Armor of [url=http://i228.photobucket.com/albums/ee11/Conan_Lon/Oblivion/Lost%20Paladins/WIP/LPotD_Retribution_00.jpg]Holy Retribution[/url].\r\nVersion 1.4 - Add new quest for the Armor that has no name.\r\n\r\n[color=#ffdf3e][b][u]Contact[/u][/b][/color]\r\nYou can find us on the official Elder Scrolls forums as \\'[url=http://www.bethsoft.com/bgsforums/index.php?showuser=7957]Jerros[/url]\\' and \\'[url=http://www.bethsoft.com/bgsforums/index.php?showuser=259214]Conan_Lon[/url]\\'\r\nYou can find us on TESNexus as \\'[url=http://thenexusforums.com/index.php?showuser=103363]Jerros[/url]\\' and \\'[url=http://thenexusforums.com/index.php?showuser=128909]LHammonds[/url]\\'\r\n\r\n[color=#ffdf3e][b][u]Credits[/u][/b][/color]\r\nThanks to [color=#33ff33]Bethesda[/color] creating Oblivion, the meshes, construction kit and forums.\r\nThanks to [color=#33ff33]X-files[/color] for allowing use his wonderful GOW design as a base design for this armor.\r\nThanks to [color=#33ff33]Bui[/color] for the female heavy cuirass mesh that features a closed neckline.\r\nThanks to [color=#33ff33]Lazarus[/color] for use of meshes from his awesome Oblvion Warcry mod and the specialized custom heavy helmet for this mod.\r\nThanks to [color=#33ff33]An Untaken Name [/color]for his wonderful Eagle shield mesh.\r\nThanks to [color=#33ff33]EuGENIUS[/color] for the help (Wrath/Fury shield mesh modifications) and suggestions.\r\nThanks to [color=#33ff33]jcarl904[/color] for the werewolf suit and customizing it by making it a single piece suit.\r\nThanks to [color=#33ff33]VagabondAngel[/color] for the technique for reflective metal.\r\nThanks to [color=#33ff33]TeamFF[/color] for the alternate meshes for Fantasy Figures and Robert\\'s Male Body.\r\nThanks to [color=#33ff33]Phitt[/color] for the customized troll with horns.\r\nThanks to [color=#33ff33]AlienSlof[/color] for the stallion.\r\nThanks to [color=#33ff33]mystikhybrid[/color] for the Saddlebag Accessories.\r\nThanks to [color=#33ff33]Someone1074[/color] for the Capes and Cloaks mod.\r\nThanks to [color=#33ff33]The Munchkin Lord[/color] for use of the script to add light to weapons.\r\nThanks to [color=#33ff33]TomBrightblade[/color] for the Polish translation.\r\nThanks to [color=#33ff33]DJ_Kovrik[/color], [color=#33ff33]e-Note[/color], [color=#33ff33]Santera[/color], [color=#33ff33]Tigral[/color] for the Russian translation.\r\nThanks to [color=#33ff33]Bulwyf[/color] for the German translation.\r\nThanks to [color=#33ff33]Sigfried[/color] for the Italian translation.\r\nThanks to [color=#33ff33]Pizz[/color] for the Japanese translation.\r\nThanks to [color=#33ff33]Kerlyenaï[/color] for the French translation.\r\nThanks to [color=#33ff33]Lazaro[/color] for the Spanish translation.\r\nThanks to [color=#33ff33]Joel Huenink[/color] for the Beards SDK resource.\r\nThanks to [color=#33ff33]Walko[/color] for the Arnulf face. Arnulf was the starting point for creating Vralen\\'s image.\r\nThanks to [color=#33ff33]TESNexus.com[/color] for the a one-stop-shop resource for authors and players.\r\nThanks to [color=#33ff33]A Pop Can[/color], [color=#33ff33]DIE75[/color], [color=#33ff33]xzibition[/color], [color=#33ff33]aberneth[/color], [color=#33ff33]JCarl904[/color] and [color=#33ff33]JadedWarlord[/color] for their valuable feedback during the BETA test.\r\n\r\n[color=#ffdf3e][b][u]Tools Used[/u][/b][/color]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=15579]7-Zip[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=11367]TES Construction Set[/url]\r\n[url=http://lhammonds.game-host.org/obmm/tools_readme_generator1.asp]Readme Generator[/url]\r\n[url=http://www.paintshoppro.com]Paint Shop Pro[/url]\r\n[url=http://www.adobe.com/products/photoshop/]Photoshop[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=2097]Oblivion Mod Manager[/url]\r\n[url=http://niftools.sourceforge.net/wiki/NifSkope]NIFSkope[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=8698]DDS Converter[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=8489]TES4Files[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=2114]TESsnip[/url]\r\n[url=http://nch.com.au/wavepad/index.html]WavePad[/url]\r\n\r\n[color=#ffdf3e][b][u]Licensing/Legal[/u][/b][/color]\r\nYou can do whatever you want with this mod but all we ask in return is that you give us credit if you distribute any part of this mod. We would also like to know what mods are including this work.\r\n\r\n[color=#ffdf3e][b][u]Frequently Asked Questions[/u][/b][/color]\r\n\r\nQuestion: I can\\'t find the book for sale at the vendor shop.\r\nAnswer: Don\\'t forget to enable the .ESP plugin.  Oblivion 1.0 will also not allow this mod to work.  The absolute minimum version is Oblivion 1.1.511.\r\n\r\nQuestion: I can\\'t see any map in the book.\r\nAnswer: You didn\\'t install the \\\"textures\\\" folder during installation. Re-install and make sure you place all files in the correct locations.\r\n\r\nQuestion: When I drop the book on the ground, I get a big exclamation mark.\r\nAnswer: You didn\\'t install the \\\"meshes\\\" folder during installation. Re-install and make sure you place all files in the correct locations.\r\n\r\nQuestion: I can\\'t find the Heaven\\'s Wrath armor.\r\nAnswer: The map in the book has two labels: Bravil and Mythical Area. You know Bravil is a city. I wonder what the other one is. Map tip: [color=#0000ff]BLUE[/color] = [color=#0000ff]WATER[/color].  Also, compare the world map to the map in the book and match it up such as counting the bends in the water on the book map.\r\n\r\nQuestion: I can\\'t find the Heaven\\'s Fury armor.\r\nAnswer: Everything you need is in the note. 1. Name of the ruin. 2. Walking instructions that should allow you to pinpoint the location on the map even if you\\'ve never been there before. 3. Location of the chest inside the ruin (you will have to hunt for it)\r\n\r\nQuestion: What level do I have to be for this mod?\r\nAnswer: This mod does not impose a level restriction in the normal Oblivion way. You can attempt the quest at any time but the difficult was geared towards giving a Level 20 character a tough time. This level was chosen since this armor is the opposite of Daedric which only starts showing up at level 20.\r\n\r\nQuestion: I do not like the armor enchantments.  How can I fix or remove them?\r\nAnswer: See [url=http://thenexusforums.com/index.php?s=&showtopic=34343&view=findpost&p=245079]this post[/url] for details on 5 options available to you.\r\n\r\nQuestion: How will the new infamy check work in the next version?\r\nAnswer: See [url=http://thenexusforums.com/index.php?s=&showtopic=34343&view=findpost&p=245079]this post[/url] for details. We will use the complex method.\r\n\r\nQuestion: How can I remove the golden light FX modification before you\\'re next release?\r\nAnswer: Follow the steps in [url=http://thenexusforums.com/index.php?s=&showtopic=34343&view=findpost&p=245079]this post[/url].\r\n\r\nQuestion: What\\'s the difference between the OMOD-Ready and OMOD file?\r\nAnswer: See [url=http://thenexusforums.com/index.php?s=&showtopic=34343&view=findpost&p=245079]this post[/url] for details.\r\n\r\nQuestion: Why can I not add armor to the Paladin\\'s Stallion?\r\nAnswer: Bethesda\\'s DLCHorseArmor mod only works with vanilla horses and simply gives a generic error message about lack of ownership.  Modding for any DLCs are legally tricky and at best a nightmare to support so we decided to give DLCHorseArmor uses a steel armor re-texture to match the set for any of the vanilla horses.\r\n\r\nQuestion: I cannot open the crypt because I have ## amount of infamy and it asks that I repent.  How can I remove my infamy?\r\nAnswer: There are several options available.  See [url=http://thenexusforums.com/index.php?s=&showtopic=34343&view=findpost&p=245079]this post[/url] for details.\r\n\r\nQuestion: What bonuses do I get if I use the Paladin Race in version 1.0?\r\nAnswer: Please do not use the Paladin race. It is an exact copy of the Imperial race. The primary purpose was to add a beard for the visage of Vralen Averos. I simply forgot to delete the race before releasing it. Version 1.1 will not have that race and if your character depends on that race, you will not be able to upgrade.\r\n\r\nQuestion: When is the next release?\r\nAnswer: When it\\'s done."
