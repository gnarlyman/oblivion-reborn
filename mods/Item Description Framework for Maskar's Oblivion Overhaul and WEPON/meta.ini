nexusDescription="[size=3]Flavor text is always nice to read, and Extended UI finally allows you to hover over items and get lore information worthy of Dark Souls item descriptions. This simple text file adds now descriptions to items that come to Maskar's Oblivion Overhaul. Another text file adds same to mithril and orcish weapons brought by Weapon Expansion Pack for Oblivion Nthusiasts [/size][size=3]. Not all items contain description, but will be slowly added in the future.[/size]\n<br />\n<br />\n<br />[u][size=4][color=#93c47d][b]FEATURES[/b][/color][/size][/u]\n<br />[u][size=4][color=#93c47d][b]\n<br />[/b][/color][/size][/u][size=3]New flavor text to read.[/size]\n<br />\n<br />[u][size=4][color=#93c47d][b]INSTALLATION\n<br />\n<br />[/b][/color][/size][/u][size=3]Drop the contents of this folder into your Oblivion data directory.[/size]\n<br />[color=#93c47d][b]\n<br />[/b][/color][u][size=4][color=#93c47d][b]REQUIREMENTS[/b][/color]\n<br />[/size][/u]\n<br />[list]\n<br />[*][size=3][url=https://www.nexusmods.com/oblivion/mods/50135]Extended UI[/url]﻿ - for Item Descriptions feature[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/oblivion/mods/42780]Maskar's Oblivion Overhaul[/url]﻿ - for said items[/size]\n<br />[*][size=3][size=3][url=https://www.nexusmods.com/oblivion/mods/35560]Weapon Expansion Pack for Oblivion Nthusiasts[/url]﻿ [/size]- for said items\n<br />[/size]\n<br />[/list]"
