nexusDescription="Description\n<br />===========\n<br />Places map markers at all Wayshrines across Cyrodiil. They are not marked on your map, you will have to find them on your own, but after discovering one, you can now Fast-Travel to them.\n<br />Based on Mezlo's \"Wayshrine Map Markers\" mod.\n<br />\n<br />What is different to the original version?\n<br />The original version had you spawn on-top of the wayshrines, the markers have now been moved to places a little bit outside of them on the ground and a sorft-of dirty edit concerning an oblivion gate has been cleaned.\n<br />\n<br />Credits\n<br />=======\n<br />Mixxa77 - Doomstone and Runestone Map Markers.\n<br />Mezlo - Wayshrine Map Markers - [url=https://www.nexusmods.com/oblivion/mods/10638]https://www.nexusmods.com/oblivion/mods/10638[/url]\n<br />\n<br />Other credits as stated on the page of the original mod.\n<br />\n<br />Tools Used\n<br />==========\n<br />TES Construction Set\n<br />Construction Set Extender - https://www.nexusmods.com/oblivion/mods/36370\n<br />Egg Translator - http://www.ei-der-zeit.com/forum/filebase/index.php?entry/325-egg-translator/\n<br />7Zip - https://www.7-zip.org/\n<br />TES4Gecko - https://www.nexusmods.com/oblivion/mods/8665\n<br />TES4Edit - https://www.nexusmods.com/oblivion/mods/11536\n<br />GIMP - https://www.gimp.org/\n<br />paint.NET - https://www.getpaint.net/\n<br />\n<br />Permissions\n<br />===========\n<br />Please refer to the permissions drop-down box above."
