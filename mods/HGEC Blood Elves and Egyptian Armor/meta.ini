nexusDescription="[b][u]**UPDATE**[/u]\n<br />[/b]As of version 3.0, I have completed reshaped the cuirasses of all costumes to be much slimmer and more form fitting. \n<br />I think most will consider this a big improvement in their designs.\n<br />\n<br />[b]Description:[/b]\n<br />This is an HGEC conversion of [url=https://www.nexusmods.com/oblivion/mods/11880]Blood Elves and Egyptian armors for Exnems Body by Plipo[/url], originally by  [url=https://www.nexusmods.com/oblivion/users/436309]Plipo[/url]. \n<br />The upper body is C cup and the lower body is LL size.\n<br />\n<br />In addition to the Blood Elves armor's original design, I have also included an alternate remodeled design by me. \n<br />The Blood Elves armor was the reason why I downloaded [url=https://www.nexusmods.com/oblivion/users/436309]Plipo[/url]'s original in the first place, but upon seeing it in my own game, \n<br />I felt that it wasn't reaching its full potential visually.\n<br />Other than the fact that it needed to be converted to HGEC in order to match my game, the costume's silhouette also needed some improvement and rebalancing.\n<br />I removed the metal elements from the neck collar, replaced the shoulders with the Golden Saint's from [url=https://www.nexusmods.com/oblivion/mods/45241]Vanilla Gear Redux[/url] by [url=https://www.nexusmods.com/oblivion/users/2125204]ElAlquimista[/url], \n<br />and replaced the boots with a slightly remodeled version of the Golden Saint's from [url=https://www.nexusmods.com/oblivion/mods/41048]FLY_SIguardarmor_remodel_replacer_for_HGEC_with_BBB[/url] by [url=https://www.nexusmods.com/users/1090935]yuravica[/url].\n<br />The collar and the skirt were also lengthened. \n<br />With this alternate, remodeled Blood Elves design, I believe the costume has truly reached a new level.\n<br />\n<br />I have also replaced the boots of the original Blood Elves design with slimmer Golden Saint boots taken from [url=https://www.nexusmods.com/oblivion/mods/45241]Vanilla Gear Redux[/url].\n<br />\n<br />The gloves have been separated from the cuirass of the Blood Elves armor, \n<br />just like how the Egyptian gloves are separate from their matching cuirass in Plipo's original version.\n<br />\n<br />Besides converting it to HGEC, I did not change any elements of the design of the Egyptian armor.\n<br />\n<br />Both armors now use vanilla Elven armor icons and world models. They aren't custom icons and models, but something is better than nothing.\n<br />\n<br />This was my first Blender project. I reshaped the clothing by hand to fit to the HGEC body. \n<br />It took many hours, but I learned a lot in the process. I assume that this was the only way to accomplish this task?\n<br />[b]\n<br />Requirements:\n<br />[/b]1. The original [url=https://www.nexusmods.com/oblivion/mods/11880]Blood Elves and Egyptian armors for Exnems Body by Plipo[/url] must be installed beforehand, otherwise, \n<br />     there will be no textures and some missing meshes. \n<br />     The original .esp, however, must be deleted, as a new .esp is required in order to use the separated Blood Elves gloves and cuirass.\n<br />2. [url=https://www.nexusmods.com/oblivion/mods/15802]HG EyeCandy Body[/url] or the flesh textures might not display correctly.\n<br />\n<br />[b]Installation:\n<br />[/b]1. Download [url=https://www.nexusmods.com/oblivion/mods/11880]Blood Elves and Egyptian armors for Exnems Body by Plipo[/url]\n<br />2. Delete the original .esp and install the remaining files.\n<br />3. Download either \"HGEC Remodeled Blood Elves and Egyptian Armor 3.0\", if you want my alternate redesigned Blood Elves armor,   ﻿\n<br />    or \"HGEC Original Blood Elves and Egyptian Armor 3.0\",  if you prefer the original design. \n<br />    [u]PICK ONLY ONE OF THE DOWNLOADS.[/u]\n<br />    Both downloads also contain the HGEC converted Egyptian armor.\n<br />4. Unzip the file, drop the folder titled \"data\" in your Oblivion directory, and confirm any messages asking to overwrite any files.\n<br />\n<br />[b]Special Thanks:[/b]\n<br />1. [url=https://www.nexusmods.com/oblivion/users/436309]Plipo[/url] for creating the original versions of these costumes\n<br />2. Abovewolf and Exnem for creating the Rosana armor and sorceress armor, respectively. \n<br />    [url=https://www.nexusmods.com/oblivion/users/436309]Plipo[/url]'s original costumes were created using assets from these mods."
