nexusDescription="[b][size=6]Mercer's Ingredient Effect Overhaul:[/size][/b]\n<br />\n<br />\n<br />[youtube]54BlXx-B-p4[/youtube]\n<br />\n<br />\n<br />[b][size=2][size=4][u]Requires:[/u] [/size]\n<br />[/size][/b]\n<br />Shivering Isles\n<br />COBL : https://www.nexusmods.com/oblivion/mods/21104  (You only really need the textures, meshes and the cobl main.esm ) \n<br />   ﻿    Alternate site for COBL : http://www.theassimilationlab.com/forums/files/file/951-cobl/  \n<br />\n<br />\n<br />[u][b][size=2][size=4]Description:[/size]\n<br />[/size][/b][/u]\n<br />This mod re-balances the ingredient effects of all ingredients from Oblivion, Shivering Isles and COBL.\n<br />The main purpose of this mod is to re-balance the ingredient effects so that the game-play for us alchemists is improved. \n<br />It does this by having there be a direct relationship between the rarity of an ingredient and the strength/usefulness of the effects inherent to that ingredient, massively improving the ability to make more complex potions and poisons and and by reducing a few exploits. \n<br />\n<br />\n<br />[u][b][size=2][size=4]The story behind the mod:[/size]\n<br />[/size][/b][/u]\n<br />The mod began many years ago after I had stumbled upon the mod Pestilent Afflictions. Pestilent Afflictions (which I highly recommend) makes diseases worse in a very interesting way and I saw the need for improving the diseases feature of Oblivion. However, I quickly realized that the mod was practically irrelevant since all I had to do to avoid even the worst of diseases was to take a bite out of the fairly common mandrake root since it has Cure Disease as 1st effect. \n<br />To amend this folly I removed the Cure Disease effect from mandrake root and from a few other ingredients. It helped a lot and I was happy for a while getting riddled with diseases which now required a bit of more to cure.\n<br />After a while I returned to the CS to edit a few more things that I felt was an exploit or for other reasons needed changing. \n<br />For instance, I always felt it was too easy to create poisons by using Sacred Lotus Seeds which is abundant in several places. \n<br />It was also too easy to create Restore Health potions since Fly Amanita Cap has this effect and the Imperial City is full of them. \n<br />Precisely because it was too easy to very quickly create a lot of potions and poisons, it began feeling like a chore to do it and I decided to change this.\n<br />I began reducing the strength of the ingredients that I felt was too abundant and also began testing effects that were normally only used in spells, but never seen in ingredients. \n<br />After much testing of all the magical effects and many revisions I have ended up with this mod. I never thought to release this mod to the public when I first began with my small fixes many years ago, as from the very beginning it was built completely on my own preferences. But over the years it has grown from just a few fixes into a comprehensive overhaul and I realized it would be silly not to release it even if it doesn't cater to everyone's taste.\n<br />It is still undergoing development but I believe I have finally found the core group of effects I want to use thus I named this version 1.0.\n<br />\n<br />\n<br />\n<br />[size=4][u][b]Overall schemes and changes:[/b][/u][/size]\n<br />\n<br />[font=Comic Sans MS][size=3]\n<br />[font=Comic Sans MS][size=3]Effect distribution compared to the vanilla game:[/size][/font]\n<br />[/size][/font]In the vanilla game the way the Fortify Attribute effects are assigned to ingredients is in an odd and irregular way. For example:\n<br />Fortify Speed exists in 2 ingredients while the Fortify Strength effect exists in 6 ingredients. Furthermore only 1 effect of each Fortify Attribute exists as 1st and 2nd effect which means you are required to be a Journeyman alchemist before you can start making Fortify Attribute potions.\n<br />There are similar uneven effect distributions for Restore Attribute, Resist Fire/Frost/Shock &amp; Fire Shield/Frost Shield/Shock Shield.\n<br />With my mod all effects are balanced out so there is the same amount of effects within each group of effects. \n<br />Consequently the amount of different potions you can now readily make have increased thus making alchemy much more interesting and fun.[font=Comic Sans MS][size=3]\n<br />\n<br />\n<br />Effect rarity compared to the vanilla game:[/size][/font]\n<br />With this mod common ingredients such as Monkshood Root Pulp, from the Monkshood plant of which there are 4631, will have 4 effects that are all weak. While rare ingredients like the very rare Elf Cup Cap of which their are only 110, will have 4 strong/rare effects.\n<br />These are just 2 examples that reflects the overall changes I've made to ingredients and this is a wide-ranging change from the vanilla game. \n<br />For instance, the extremely rare Emetic Russula Cap (12 mushrooms exists) has the following effects from 1st through 4th effect in the vanilla game: \n<br />Restore Agility, Shield, Damage Personality, Damage Endurance.\n<br />While the very common Green Stain Cup Cap (4292 plants exists) has the following effects from 1st through 4th: \n<br />Restore Fatigue, Damage Speed, Reflect Damage, Damage Health.\n<br />It seems to me that for such a rare mushroom you would had hoped for a bit more alchemical punch when finally coming across one of these on your travels. It is just as strange to me to find one of the strongest effects (Reflect Damage) in connection with on one of the most common ingredients in the game. \n<br />I have consequently re-balanced all ingredients to gradually have stronger or rare effects as they get rarer. \n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]From Novice to Expert...[/size][/font]\n<br />Furthermore, the 1st effect for all common and some uncommon ingredients is now weak (e.g. Burden, Resist Poison &amp; Damage Magicka). \n<br />I did this because I don't want the free power provided by the Alchemy skill unless I actually pick the skill as a Major Skill. Despite loving the Alchemy feature of Oblivion I sometimes play characters who don't touch alchemy and this change makes a huge difference as I won't be tempted to make potions since they are all weak anyway.\n<br />I'm using a very slow levelling method and I think that each mastery level as an alchemist (and in fact each skill mastery of all skills) should feel distinct, which is why I've purposefully made each mastery level of Alchemy feel different. Below is a short description of what to expect as you level up Alchemy. \n<br />\n<br />The 1st effect for uncommon and rare ingredients does not follow the rule of always having weak effects since they are not in abundance and therefore cannot be abused anyway. Almost all ingredients have fairly weak effects as 1st effect though some rare and uncommon have relatively potent effects as 1st.\n<br />\n<br />The 2nd effect:\n<br />Here the most commonly used effects appears (e.g. Restore Health, Restore Magicka &amp; Damage Health). Almost all effects can appear as 2nd effect but the most potent ones are rare.\n<br />Some effects can be considered very strong when having high alchemy skill so these effects are best suited for 1st and 2nd effects for the sake of balance.\n<br />You'll mainly see these effects as 2nd effect. Examples: Chameleon &amp; Detect Life.\n<br />\n<br />The 3rd effect:\n<br />All the effects can appear here and the potent effects (e.g. Reflect Damage, Reflect Spell, Resist Magic) are quite common here at least for the uncommon and rare ingredients. \n<br />Certain effects with high base cost will be very weak at low alchemy skill so these are not as suited for 1st and 2nd effect. These effects will mainly be seen as 3rd and 4th effect. Examples: Resist Magic &amp; Reflect Spell.\n<br />\n<br />The 4th effect: \n<br />Similar to the 3 effect but some common ingredient can have fairly potent effects. The uncommon and rare ingredients will usually have very potent effects as the 4th effect.\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]Alembic usage (and my own thoughts):[/size][/font]\n<br />In vanilla Oblivion the ingredients often have both poisonous and non-poisonous effects in them. It seems very random how they have been mixed together and I think it has to do with the alembic which reduces negative effects in potions. I think Bethesda simply decided to have the ingredients very \"mixed\" in this way so the alembic could be put to use. This leads to many ingredients being inefficient in the sense that many effects mostly just clutter up the ingredients. \n<br />My method of adjusting the effects to the ingredients is more efficient since the uncommon and rare ingredients always yield worthwhile effects. This is also the reason why you can make more complex potions and poisons with this mod.\n<br />However with my mod the primary usage of the alembic is reduced since most ingredients are heavily pushed towards either poisonous or non-poisonous. Recall though that the alembic has a secondary usage: Increasing the strength of poisons. [url=http://www.uesp.net/wiki/Oblivion:Alchemy#Master_Equations]Source[/url].\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]Making more complex potions and poisons:[/size][/font]\n<br />Since more effects are grouped together in some of the more rare ingredients it is possible to create very complex potions and poisons not possible with vanilla ingredients. Potions and poisons with up to 7 effects can now be brewed. Check the image section for examples.\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]Food ingredients:[/size][/font]\n<br />Since I've been an avid user over the years of hunger mods (mods that require the Player Character to occasionally eat,) I've changed nearly all food ingredients to now have weak effects (and reduced prices). This change means I do not feel I need to save them for alchemy use, I can just eat all the foods I come across without worry.\n<br />A second reason for this change is that I do not feel that common vegetables and such should be involved with strong magical potions. It seems more appropriate to use rare flowers, stinky mushrooms and gnarly old roots for that type of magic.\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]Alchemy shops:[/size][/font]\n<br />The availability of the lore ingredients from COBL in this mod, parallels that of COBL's approach. Quote from COBL''s web site: \n<br />Ingredients are added to specific shops, rather than to standard leveled lists. Generally, you'll find Morrowind ingredients in Cheydinhal, Solstheim ingredients and foods in Bruma, Daggerfall ingredients in Chorrol and Anvil. In addition, Sinderion and All Things Alchemical have stocks in Skingrad. Also in the Imperial City, a few of the eating establishments stock Daggerfall or Morrowind food, and The Main Ingredient has a good collection. For non-ingredient items (metals and ores) a few blacksmiths stock several items.\n<br />\n<br />I really like how this reflect the different regions trade impact on Cyrodiil, however I've changed course concerning COBL's amount and rarity of the ingredients.\n<br />With COBL you get stacks of 10 &amp; 20 and such for each ingredient and they are all equally rare. But I like a bit of variety, so now ingredients will appear in numbers varying for the most common ingredients from 0 to around 20 and for the most rare ingredients from 0 to around 3. I have tried to make each visit to an alchemy shop (including the same one) enticing by randomizing what it has to offer for every respawn.\n<br />COBL contains moldy and spoiled ingredients but doesn't add them to the game world. I've added them to lower class leveled lists.\n<br />A word of warning for the Alchemy enthusiast; The Main Ingredient in the Imperial City boasts by far the largest selection of ingredients you will ever find and you might just pass out over shear glee (or brain overload) when you drop by for a look-see.\n<br />\n<br />Almost all of the Morrowind ingredients have no flora that you can find and pick the ingredients from, so most of the time you'll only see the ingredient in the inventory. This is unfortunate since the ingredients looks very good in my opinion.\n<br />To remedy this every alchemy shop has a few ingredients on display. Check the image section for examples of this.\n<br />\n<br />Notice that many COBL ingredients have been updated by kaizit. Look at the comparison images.\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]A few words on the alchemical effects added by this mod which explains why I included them:[/size][/font]\n<br />\n<br />Weakness to Poison increase the Magnitude of all subsequent poisons used. Try using a  Weakness to Poison poison and follow up with some Damage Fatigue poisons and you will soon watch your enemy grovel at your feet.\n<br />Poisons with effects such as Silence and Paralyze have their Duration extended instead of Magnitude, since they have no Magnitude.\n<br />\n<br />Have your mage deliver a poison soaked dagger thrust with a Weakness to Magic/Fire/Frost/Shock poison and follow up with a barrage of spells for increased damage.\n<br />\n<br />Fortify Blade, Fortify Blunt, Fortify Marksman potions gives only a small bonus at low Alchemy skill but at high skill they provide strong damage amplification and you might even want to use an uncapper mod to get bonuses when passing 100 in skill.\n<br />\n<br />Fortify Heavy Armor &amp; Fortify Light Armor potions not only provide higher Armor Rating but also increase your Spell Effectiveness. Handy for a Spellsword or Battlemage.\n<br />\n<br />Fortify Athletics, Fortify Acrobatics &amp; Fortify Sneak potions all helps getting around.\n<br />\n<br />Drain Blade &amp; Drain Blunt poisons weakens weapon wielding foes but the effects are not terribly strong, although in a long fight against a tough Ringleader it might make all the difference. To compensate for the lesser strength of this effect, ingredients with these effects always has other poison effects as well.\n<br />\n<br />Is a Will-o-the-Wisp blocking your path? Use a Spell Absorption and/or  Resist Magic potion and face that magical menace.\n<br />\n<br />The above mentioned effects are the effect additions that I have found to be most usable as potions and poisons. All other effects are either too weak to have any real impact or they are buggy.\n<br />\n<br />Although overall my balance changes removes what I see as exploits and therefore makes Alchemy harder, this mod still allows for the making of even stronger and more varied potions and poisons then in the vanilla game as long as you can collect the rare ingredients required. \n<br />\n<br />\n<br />[b]Extra features:[/b]\n<br />\n<br />[font=Comic Sans MS][size=3]New [/size][/font][size=3][font=Comic Sans MS]ingredients added:[/font][/size] \n<br />Many fungi and roots have been added as well as other miscellaneous ingredients. 40 new ingredients added in total. \n<br />Check out the image section.\n<br />\n<br />[font=Comic Sans MS][size=3]Pitcher plant and [/size][size=3]Lily of the Valley:  [/size] [/font]\n<br />The pitcher plants are now harvestable and produces the ingredient Pitcher Plant Sap.\n<br />Lily of the Valley plants in the vanilla game produces Tiger Lily Nectar but with this mod it produces Lily of the Valley Seeds since the plants are different.\n<br />\n<br />[size=3][font=Comic Sans MS]COBL ingredients updated: [/font][/size]\n<br />47 upgraded COBL ingredients. The brand new meshes and textures are made by Kaizit who you might know from the his mod awesome mod Kaizits Animated Ingredients.\n<br />Three of the new ingredients are animated. Check the new video for the 3 animated ones and before and after pictures for the rest.\n<br />These new models are currently only available here and I want to yet again thank Kaizit for them. They look amazing.\n<br />\n<br />\n<br />\n<br />[size=4][u][b]Optional patches &amp; Load Order:[/b][/u][/size]\n<br />\n<br />This mod comes with a required core esp file and a number of optional patches to make ingredients from other mods conform to my system.\n<br />I might create other patches in the future as I add new mods to my load order, if they add a lot of ingredients.\n<br />Load the patches after the mod they are patching. Additional notes:\n<br />\n<br />[i]MercerIngredientsCore.esp[/i]  -&gt; Contains all the ingredient changes and adds the ingredients to the alchemy shops. Use 'Stats' and 'Invent' Bash tag if using Wrye Bash. This is the only plugin you're required to install the rest of the plugins are optional.\n<br />\n<br />[i]MercerIngredientsReducedAlchemistInventories.esp[/i] -&gt; This plugin simply reduces the clutter in the alchemist inventories. Use if you think there\n<br />are too many vegetables and such \"boring\" ingredients in their inventories.\n<br />\n<br />[i]MercerCoblOrePatch.esp[/i] -&gt; This plugin changes the looks of the COBL ores as seen in the game-world. Bugfix for COBL ores.\n<br />\n<br />[i]MercerIngredientsOOO.esp[/i]  -&gt; Rebalances most ingredients from OOO and the gem prices to keep the same price as the core mod. Use 'Stats' Bash tag if using Wrye Bash.\n<br />\n<br />[i]MercerIngredientsMMM.esp[/i]  -&gt; Rebalances most ingredients from MMM. Use 'Stats' and ´Invent.Add´ Bash tag if using Wrye Bash.\n<br />\n<br />[i]MercerIngredientsBC.esp[/i]  -&gt; Rebalances ingredients from Better Cities. Use 'Stats' Bash tag if using Wrye Bash. (Only needed for BC prior to 5.5.0)\n<br />\n<br />[i]Skyrim Ingredients.esp[/i] is a replacer plugin which means you need to get the original mod from here \n<br />https://www.nexusmods.com/oblivion/mods/41348 install the BSA then replace the plugin from that mod with my patch plugin.\n<br />My replacer patch differ from the original mod in the following ways:\n<br />1. Increased the number of shops selling non-food Skyrim ingredients from 3 to all the alchemy shops. Since my mod already makes all the Morrowind ingredients available across all of Cyrodiil I think it should be the same for Skyrim ingredients. Note that there are always more Skyrim ingredients available in Bruma then any other city due to its proximity to Skyrim. Food ingredients however are sold the same places as in the original.\n<br />2. Balanced out the ingredients in 3 groups: Common, uncommon and rare with varying chance of them being available in shops as in Skyrim.\n<br />3. The quantity of each ingredient available is determined by their rarity. The quantities are also more randomized for both food and non-food ingredients so that you don't always get the same size stack of ingredients.\n<br />4. Weight and price changes. Generally the ingredients weigh less but the prices are somewhat the same.\n<br />5. The ingredient effect balancing stays close to lore and overall you'll find the stronger effects associated with the rarer ingredients.\n<br />6. To reduce mod conflicts I have removed changes to the 9 NPCs who carried 1 random Skyrim ingredient since my mod already features finding caches of ingredients in dungeons and other places.\n<br />\n<br />Load order:\n<br />\n<br />MercerIngredientsCore loads after Cobl Glue.esp\n<br />MercerIngredientsMerged loads after Cobl Glue.esp\n<br />MercerIngredientsMMM loads after all your other MMM esp's and is the only patch which additionally requires cobl.esm\n<br />MercerIngredientsQarlsHarvestAddon load after Qarls Harvest Addon            \n<br />﻿   ﻿Notice that Qarls Harvest Addon requires Qarls Harvest.\n<br />   ﻿Qarls mods: https://www.nexusmods.com/oblivion/mods/8113 &amp; https://www.nexusmods.com/oblivion/mods/8285\n<br />\n<br />\n<br />Note that when adding MercerIngredientsCore (or MercerIngredientsMerged) to an existing game, the alchemy shops won't sell the lore ingredients until you have waited for the shops to respawn their inventory. Just wait 3 days and all alchemy shops will start selling the lore ingredients.\n<br />\n<br />Release thread at the Bethsoft forums for an extra chart, easier reading &amp; the version history: \n<br />http://forums.bethsoft.com/topic/1466403-relz-mercers-ingredient-effect-overhaul/\n<br />\n<br />\n<br />[size=3][font=Comic Sans MS]Mods which goes well with the mod (aesthetically):[/font][b]\n<br />[/b][/size]I found that the ingredients looks more interesting in the inventory if using custom magic effect spell icons compared to the regular ones. I use the icons from [url=https://www.nexusmods.com/oblivion/mods/5170]Spell Icon Replace 1 Final[/url] which are also part of the legacy version of [url=https://www.nexusmods.com/oblivion/mods/12466]Supreme Magicka Update (v 0.90b)[/url]﻿.\n<br />\n<br />\n<br />[font=Comic Sans MS][size=3]Credits:[/size][/font]\n<br />\n<br />- Bethesda for the game and the CS.\n<br />- Team COBL.\n<br />- mhahn123 and sinHHHans for the 15 new ingredients/florae added in v 1.51 that I never could have made my self.\n<br />- Kaizit for the 47 new meshes and textures which updates the COBL ingredients.\n<br />- morerunes for the meshes and textures used for my Mammoth Bone Marrow, Minotaur tongue, Gargoyle Ear, Giant's Eye. \n<br />- jbvw for the 3 potions.\n<br />- dreamed1 for letting me make a replacer plugin patch for Skyrim Ingredients for Oblivion.\n<br />- All the modders and contributors at the official Elder Scroll Forums who in my opinion makes Oblivion the best game in the world.\n<br />\n<br />Enjoy!"
