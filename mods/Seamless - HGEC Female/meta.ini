nexusDescription="[center][u][color=#ffff00][i][size=4][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621298719.png[/img]\n<br />[/size][/i][/color][/u][url=http://www.nexusmods.com/oblivion/mods/22368/?][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621211650.png[/img][/url][url=http://www.nexusmods.com/oblivion/mods/37596/?][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621211687.png[/img][/url][/center]\n<br />\n<br />[color=#ff0000][b]Wrye Bash[/b][/color] - It's a requirement because it's the best... And I don't know how to make OBMM or NMM scripts...\n<br />\n<br />[color=#ff0000][b]BBB Enabled Skeleton[/b][/color] - You need it for Better Bouncing Boobs, which some of these mods come with by default. Don't be [color=#ffff00]\"That Guy\"[/color] and complain about boobs stretching to infinity; these skeletons are better in every way and useful for more things than just BBB.\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][i][b]Installation Instructions[/b][/i][/size][/color][/u][b]\n<br />[/b]The rule of thumb is, download and install the original mods first, unless instructed otherwise. The packages downloadable from here don't contain everything -- it only contains files that were modified. For example, if there was no skin exposed at the seams [neck, wrist, waist, ankle] because they were covered by armor pieces or clothing items, it wasn't changed, thus not included in these packages. Likewise, no ESP or textures were modified, thus not included. After you've installed the original mods, overwrite them with the changes contained in the packages found here. [color=#00ffff][u]Think of it as installing the same thing twice. Install the originals first, the seamless versions last.[/u][/color]\n<br />\n<br />[b][color=#ff0000][u]FOR Oblivion Character Overhaul Users[/u][/color][/b]: [color=#00ffff]Install[/color] [url=https://www.nexusmods.com/oblivion/mods/45859]Seamless - OCOv2 Edition[/url] [color=#00ffff]first[/color] before [color=#00ffff] doing the following steps -[/color]\n<br />\n<br />[b][color=#ff0000][u]STEP 1[/u][/color][/b]: [color=#00ffff]Install Base EVE HGEC[/color] (EVE Project)\n<br />[b]1.[/b] Install the Original [url=http://www.nexusmods.com/oblivion/mods/24078/]EVE HGEC[/url] and updates, satisfying all its requirements.\n<br />[b]2.[/b] Install the Original [url=http://www.nexusmods.com/oblivion/mods/24078/]EVE HGEC Replacers[/url] for any mods you may have installed, such as OOO(v1.36+), MMM, Frans, etc. These replacers are found below the main EVE HGEC file as \"OPTIONAL FILES\".\n<br />[b]3.[/b] Download the appropriate files from this mod's download section and install by overwriting the files from the above originals.\n<br />\n<br />[b][color=#ff0000][u]STEP 2[/u][/color][/b]: [color=#00ffff]Better Bouncing Boobs [BBB] - [color=#ffff00]Optional[/color], but I put it in the \"Updates\" section so it's easier to find[/color] \n<br />Installing BBB is optional. There are so many body combinations and authors for HGEC BBB that I had to concentrate on the ones that are most complete.\n<br />[list][*][url=http://www.nexusmods.com/oblivion/mods/43106]10 EVE HGEC Stock Replacer C-Cup BBB - 43106[/url] : C-Cup, Clothes Only (wtftesnexus)\n<br />[*][url=http://www.nexusmods.com/oblivion/mods/34324]10 EVE HGEC Stock Replacer E-Cup BBB - 34324[/url] : E-Cup, Clothes and Armors (Saaya)\n<br />[*][url=http://www.nexusmods.com/oblivion/mods/45791]15 SpicyFox Vanilla Armor Addon and Replacer - 45791[/url] : C-Cup &amp; E-Cup, Armors Only (hidemaro)\n<br />[*][url=http://www.nexusmods.com/oblivion/mods/24194]20 HGEC More Revealing Standard Armor E-Cup - 24194[/url] : E-Cup, Armors Only, No BBB (duddly01)\n<br />[*][url=http://www.nexusmods.com/oblivion/mods/34164]25 HGEC More Revealing Standard Armor E-Cup BBB - 34164[/url] : E-Cup, BBB conversion of 24194 (Saaya)\n<br />[/list]\n<br />[b]1.[/b] Choose and install the original BBB mods you want from the above list.\n<br />[b]2.[/b] Download the [color=#ffff00]\"all-in-one\"[/color] BBB package in this mod's download section.\n<br />[b]3.[/b] The all-in-one BBB package is a BAIN Archive with subpackages appearing exactly like the list above upto and including the numbers. Install by overwriting the old files with the new ones.\n<br />\n<br />[i]* More extra seamless body options available at [url=https://www.nexusmods.com/oblivion/mods/45868]SetBody Reloaded[/url]﻿.[/i]\n<br />\n<br />\n<br />[color=#ffff00][size=4][u][i][b]Credits[/b][/i][/u][/size][/color]\n<br />Special Thanks to Kromgar (aka gerra6) - [url=http://kgtools.org/]KGTools[/url]\n<br />movomo - [url=https://www.nexusmods.com/oblivion/mods/45868]Seammender Templates[/url]\n<br />\n<br />[color=#ff0000][b][u]Original Replacers[/u][/b][/color]\n<br />EVE Project - EVE HGEC\n<br />duddly01\n<br />hidemaro\n<br />Saaya\n<br />wtftesnexus\n<br />\n<br />Sigurd Stormhand - OOO 1.35 fix\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][b][i]Licensing[/i][/b][/size][/color][/u]\n<br />You may use and redistribute freely as long as credit is given and you have permission from the original authors."
