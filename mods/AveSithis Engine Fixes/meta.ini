nexusDescription="AveSithis Engine Fixes is an OBSE plugins that fix some issues inside the game engine.\n<br />\n<br />Bug Fixes included:\n<br />[list]\n<br />[*]Fix Crash when referencing  XML Prefabs using Normal slashes \"/\" instead of backslash \"&#92;\" when packed inside a BSA.  This allow to pack DarnUI XML, as they would crash without this fix.\n<br />[*]Fixed Water bugs that can occur when the special material \"Lava\" is used inside a mesh to render a water surface outside the cell water plane. \n<br />[*]Fixed a crash Calling SetLevel on actors equipping a bow\n<br />[*]Prevent disabling of the Reflection Shader when  using MSAA with a non Nvidia GPU\n<br />[*]Prevent disabling of MSAA when bAllowScreenshot is enabled\n<br />[/list]\n<br />Other Patches included:\n<br />[list]\n<br />[*]Zlib Update. It replace the ZLIB function in the game with functions from a modern version of ZLIB. Initial test seems to suggest lower loading times, but more tests are necessary to see if it's truly useful or not. Disabled by default, require a CPU with SSE2 instructions\n<br />[/list]\n<br />Last 2 bug fixes where already fixed in Oblivion Reloaded some times ago. However as they are pure and stable fixes, and doesn't require nor aren't required by OR changes,  I thought  that I should offer these stand alone. These changes will be removed from OR 11, however version of OR that still include these (like E3 or Combined or previous version of official Oblivion Reloaded) will remain totally compatible with this plugin.\n<br />\n<br />Installation:\n<br />Extract the archive into the Oblivion/Data or install with a mod manager\n<br />\n<br />Enabling ZLib update:\n<br />Open the AveSithisEngineFixes.ini in Oblivion&#92;Data&#92;OBSE&#92;Plugins and change UpdateZlib=0 to UpdateZlib=1\n<br />\n<br />Thanks:\n<br />Yinsolaya and slowpard, for having made me aware of a reproducer of the Water bug, helped with the investigation and tested the fix.\n<br />Arthmoor for creating the mod which helped to isolate the issue\n<br />WallSoGB for the idea of zlib update (for NV)"
