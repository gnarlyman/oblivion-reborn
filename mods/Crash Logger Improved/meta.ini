nexusDescription="[color=#9fc5e8][size=6][b]Yvile's Cobb's Crash Logger Improved\n<br />[/b][/size]\n<br />[size=4][url=https://github.com/googlepox/tes4-crash-logger]Source[/url][/size]\n<br />\n<br />[size=4]Fork of [url=https://www.nexusmods.com/newvegas/mods/82540]Yvile's fork[/url] of [url=https://www.nexusmods.com/oblivion/mods/48503]Cobb's Crash Logger[/url] that reimplements some of Yvile's features to provide a far more readable crash log for Oblivion. [b]CrashLogger.log[/b] in the root Oblivion folder (next to Oblivion.exe) [b]AND [/b]inside the new (v1.4.0) Crash Logs folder will now have more information like specific game objects, forms, and classes loaded at the time of the crash in addition to relevant modules and memory information.\n<br />[/size]\n<br />[b][size=5]Known Issues[/size]\n<br />[/b][size=4] - The game may show an error message when crashing, although the log will still print normally. Currently debugging this but it poses no functional issue at this time.[/size]\n<br />\n<br />[/color][size=4][color=#9fc5e8][b]Credits\n<br />[/b]Bethesda for Oblivion\n<br />llde and the xOBSE team for xOBSE\n<br />DavidJCobb for the original [url=https://www.nexusmods.com/oblivion/mods/48503]Crash Logger[/url]\n<br />yvileapsis for their fork of [/color][url=https://www.nexusmods.com/newvegas/mods/82540][color=#9fc5e8]Crash Logger[/color][/url][/size]"
