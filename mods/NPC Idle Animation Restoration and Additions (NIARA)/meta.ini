nexusDescription="Description\n<br />===========\n<br />Lighter than most other mods that dabble with this, due to working solely with the game's Idle Animation tree. No scripts, spells or tokens.\n<br />\n<br />Compatibility\n<br />=============\n<br />[size=4]🗹[/size] [color=#00ff00]Idle Dialogues[/color] =&gt; Original and migck's fixed version. ([url=https://www.nexusmods.com/oblivion/mods/42658]Link[/url])\n<br />[size=4]🗹[/size] [color=#00ff00]New Eating Animations[/color] =&gt; Compatible. ([url=https://www.nexusmods.com/oblivion/mods/39487]Link[/url])\n<br />\n<br />[color=#ffff00]Kaizits new animations for NPC and player[/color] =&gt; Difficult to test in full, but may be compatible. ([url=https://www.nexusmods.com/oblivion/mods/45197]Link[/url])\n<br />\n<br />🛇 [color=#ff0000]Talk with your hands[/color] =&gt; Similar functionality included. ([url=https://www.nexusmods.com/oblivion/mods/14669]Link[/url])\n<br />🛇 [color=#ff0000]Dialogue Idles[/color] =&gt; Similar functionality included. ([url=https://www.nexusmods.com/oblivion/mods/45892]Link[/url])\n<br />🛇 [color=#ff0000]Personality Idles[/color] =&gt; Similar functionality included. ([url=https://www.nexusmods.com/oblivion/mods/30829]Link[/url])\n<br />\n<br />Installation\n<br />============\n<br />Every Mod Manager for Oblivion should be able to handle this, manual install is of course possible too.\n<br />\n<br />Credits\n<br />=======\n<br />Mixxa77 - NPC Idle Animation Restoration and Additions.\n<br />kaizit / stesha - Kaizits new animations for NPC and player - [url=https://www.nexusmods.com/oblivion/mods/45197]https://www.nexusmods.com/oblivion/mods/45197[/url]\n<br />Bethesda - Oblivion.\n<br />You - For being you.\n<br />\n<br />Tools Used\n<br />==========\n<br />TES Construction Set\n<br />Construction Set Extender - https://www.nexusmods.com/oblivion/mods/36370\n<br />Egg Translator - http://www.ei-der-zeit.com/forum/filebase/index.php?entry/325-egg-translator/\n<br />7Zip - https://www.7-zip.org/\n<br />TES4Gecko - https://www.nexusmods.com/oblivion/mods/8665\n<br />TES4Edit - https://www.nexusmods.com/oblivion/mods/11536\n<br />GIMP - https://www.gimp.org/\n<br />paint.NET - https://www.getpaint.net/\n<br />TES name generator - https://modding-openmw.com/name-generator/\n<br />\n<br />Permissions\n<br />===========\n<br />Please refer to the drop-down box above."
