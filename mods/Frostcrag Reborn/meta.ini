nexusDescription="READ This page for instructions and the stickied comments or have your comment deleted.  If you have an issue, ask kindly for help, and I or some other kind stranger will potentially answer you.  Engage in rudeness, unkind or passive aggressive behavior, or any form of condescending attitude towards me and have yourself blocked from my mods page.   I didn't put 6000 hours into a mod and give it out for free only to be rewarded with rudeness from some stranger that was never taught manners and now believes the world owes them something.  If this message isn't for you, you'll know because you won't be insulted.  If you're insulted, this message was for you.  \n<br />[b]\n<br />Constructive criticism, respectful requests, and bug reports all welcome.[/b]\n<br />\n<br />\n<br />[b]STARTING THE FIRST QUEST and getting the key and Deed:\n<br />==============================================================[/b]\n<br />If you're using LINK and SM DLC Refurb you can customize the level requirements to starting this quest.  If you don't use those the level requirement defaults to basically 0 and you can start the quest by merely joining the Mages Guild and Sleeping a couple hours.  When you awake you will receive the key and deed.\n<br />\n<br />\n<br />\n<br />[b]REQUIREMENTS:=================================================[/b]\n<br />Check the requirement's tab.  This new release has some added needs due to some improvements on the Avalonian Race.  If you haven't yet, try out the Race on a new playthrough and let me know what you think.  \n<br />\n<br />[b]\n<br />RECOMMENDED MODS:=============================================\n<br />[/b]Oblivion Character Overhaul 2 :  No need to look at ugly characters anymore and my characters were designed using this.  Not required but highly recommended. \n<br />\n<br />\n<br />[b]INSTALLATION:=================================================\n<br />[/b]\n<br />[u][b]VERY IMPORTANT NOTE[/b][/u]: This requires Cobl, but unfortunately I realized belatedly that the Cobl installer no longer recognizes the latest version of Frostcrag reborn and therefor installs the vanilla frostcrag esp.  If using MO2 this is an easy fix.  Find the optional esp dialogue by right-clicking the cobl mod, select information then de-select the item interchange for frostcrag, and enable the one for frostcrag reborn. \n<br />\n<br />I recommend a fresh start.  A clean save should work ok as long as it doesn't wreck your save and you can wait the full week to reset all variables.  I've had trouble in the past trying to get this to work so sometimes I'm unsure. Please let me know in the comments if this works for you.\n<br />\n<br />\n<br />1. Install all requirements, read carefully.  You only need 1 Body for females and 1 for males and 1 Skeleton mod.\n<br />2. V 4.1: This is the De-Isolated version out of the box meaning it won't overwrite your DLCfrostcrag.esp.  If using an older version you will want to backup this file first.\n<br />3. Download the Mod.  4.1 is ready to go using MO2 or probably Vortex.  \n<br />4. Using the downloaded Archive either, (A) Install with MO2 ( B ) Install with Vortex or (C) Manually extract the files into your Data Directory\n<br />5. The COBL patch comes included. load that after the DLCfrostcragReborn.esp. \n<br />6. Run your wrye bash.\n<br />7. Play the game with your brand new home installed.\n<br />\n<br />\n<br />[b]Incompatibility\n<br />============================================================[/b]\n<br />This is built using the de-isolated version and doesn’t overwrite your DLCFrostrag.esp.  I've also included all fixes from the Unofficial Frostcrag Patch that made sense.  Don't use that with any 4.1+ version of frostcrag reborn as its not needed and it can cause some conflicts. \n<br />\n<br />The vast majority of the mod is fairly self contained within the Frostcrag area and as such should be compatible with almost everything. Use Wrye bash and everything should work out fine. I use a lot of mods, they all seem to work if this one is near to the end of the load order. Other mods messing around with Frostcrag or areas around Frostcrag will obviously not work too well, but you might get lucky, but other than that, use at your own risk.\n<br />\n<br />\n<br />[b]Tweaking for Improved Visuals: =================================================[/b]\n<br />Using BethINI under View Distance manually type in to set Object/Item Fade to at least 60 preferably 80 so you can see things from greater distance. Set Actor Fade high as well if you want to see enemies further away.  I use 80 for all three settings, but Object/Item are most important.  Set Light Fade to 20-30000. This is needed for Most Areas in Avalon to get the full intended effect.  If this crushes your machine recommended action is to upgrade your potato, or set it lower if you must.  Just kidding, but Play with the settings until you get a good balance.  Avalon has been upgraded a ton visually and it pushes my modern machine a little bit especially once you’ve activated everything. \n<br /> \n<br />[b]Tweakinglight sources:[/b] To get the most out of this mod, specifically while in Avalon, I'd suggest you tweak the Oblivion.ini, so that\n<br />lights and light sources are visible from a larger distance. As far as I know, the following parameter are important for that\n<br />(though there might be others as well!)\n<br />\n<br />fLightLOD2=7000.0000\n<br />fLightLOD1=1000.0000\n<br />fSpecularLOD2=7300.0000\n<br />fSpecularLOD1=7000.0000 \n<br />\n<br />==============================================================\n<br />[b]VWD/LOD FIX:[/b]\n<br />Use TES4LodGen and Mod Lod Togglers to get the VWD to work correctly. \n<br />==============================================================\n<br />\n<br />\n<br />[b]\n<br />PRE INSTALL NOTES: [/b]\n<br />[b]==============================================================[/b]\n<br />Frostcrag Reborn is meant to be a definitive all-encompassing overhaul of Frostcrag. Thus, If you have already begun to play through another version of frostcrag, be it the original or otherwise, you need to make a 'clean save' before installing Frostcrag Reborn.  \n<br />\n<br />\n<br />[b]Upgrade\n<br />============================================================[/b]\n<br />Upgrading to this version should be done by completely moving out of frostcrag\n<br />and creating a save away from Frostcrag. Now deactivate the mod, and then make\n<br />a new save without frostcrag activated. Now Install the new version, and start\n<br />Frostcrag over from the beginning. I apologize for any hassle, but too much was\n<br />changed, and this is the best way to upgrade and it might be best to start with\n<br />a new game entirely.\n<br /> \n<br />\n<br /> [b]CLEAN SAVE:[/b]\n<br />A Clean save is a save which has no Frostcrag version installed at the time of the save. Do this by momentarily deactivating any version of frostcrag, waiting in-game a week and then making a save. This will reset the furniture quest and all variables having to do with frostcrag, thus you will need to re-buy that stuff if you have already bought it.[b]\n<br />[/b] \n<br /> \n<br />[b][u]\n<br />Thanks and Credits:[/u]\n<br />[/b]If I miss anyone in these credits and yousee your work included in my mod, please contact me so I can give proper\n<br />credit. No man can truly go it alone, and I used a lot of resources and help to\n<br />make this mod possible, in the process I may have forgotten exactly what or\n<br />where I used something, so I apologize in advance if this is the case.\n<br />[b]\n<br />Added for the 4.0 series:[/b]\n<br />\n<br />[b][u]MUSIC:[/u][/b]\n<br />All credit for the amazing music included in the music edition goes to[b] Scott Buckley [/b]from [b]free-stock-music.com \n<br />https://www.patreon.com/musicbyscottbuckley\n<br />[/b] Way better than I expected and its truly awesome that its free to use with credit.  Check out his stuff over there and join his patreon to help him out. Too few good artists in this genre.  Incredible and perfect fit for modding.\n<br />\n<br />[u]\n<br />Resources:[/u]\n<br />Thanks to Jgreybear for his Ayleid Royals resource.\n<br />Thanks to Jgreybear for the AyleidBuilding block resource\n<br />Thanks to zotman12 for the Athena Armor I liked for Tonilla’s outfit.\n<br />Thanks to Unrealrogue for the DynastyArmor I re-textured for the Empresses Battle Gear.\n<br />Thanks to strotis for the Ayleid furniture, clutter, and bath resources.\n<br />\n<br />Thanks to Bethesda for creating Oblivion.\n<br />A big thanks to [b]Ginharbringer[/b] for CastleSky with Avalon\n<br />Thanks to Jon Satriani for the Telvanni Resource tileset.\n<br />Thanks to MEO for the Ayleid textures\n<br />Thanks to Madcat221, RDjeke, with special thanks to Sotobrastos for the\n<br />Ayleid Meteoric Weapons Resource\n<br />thanks to chjoko15 for the Anvil of Repairing Resource\n<br />Thanks to Exilehunter and Trystane for the Ingredient Sorter Resource, I\n<br />probably could code it myself, but seriously thats a TON of work!\n<br />Thanks go out to Wrye and associates for Cobl and their easy to implement\n<br />Sorter\n<br />Thanks go out to HawkleyFox for allowing me to package his very powerful\n<br />Enhanced Music &amp; ControlPlugin for OBSE\n<br />Thanks go out to The whole OBSE team for keeping oblivion Alive and Thriving.\n<br />Thanks to PJ of Pjs spell's fame, I loved his Telvanni lift, herein you will\n<br />find my improved version, but kudos to him for showing the way.\n<br />\n<br />Thanks to modders everywhere who spend countless hours improving second rate\n<br />games for free and saving the butts of game programmers and level designers.\n<br />(tied down by economics and excessive deadlines)\n<br />Thanks to Nexus.com for the a one-stop-shop resource for authors and\n<br />players.\n<br />Thanks to LHammonds for the Readme Generator this file was based on.\n<br />Thanks to God for creating us all.\n<br />\n<br />\n<br />\n<br />Revision History\n<br />===================================================================================\n<br />[b]Version 4.0.2:[/b]\n<br />A bunch of things added.  Including adding compatibility with the Unofficial patches. General fixes, better ending/s to the quest etc.  Still a Beta Release, but its getting pretty close. \n<br />\n<br />Added support for the SM plugin Refurbished.  If you don't use that the script still works, but the level requirement is defaulted at 0.  You just need to join the mages guild.   If it doesn't fire right away, rest or wait and the script should run giving you the key and the deed.  If you want to use the level requirments, you need the SM DLC plugin refurbished and you can also use the OBSE with LINK to change the level requirements using the in game menu. \n<br />\n<br />If you used the previous Alpha versions I highly recommend a clean install.  Not a new game.  Just a clean install with a week long wait to clean the save.  Then start the Frostcrag Quest over again.  I'm not sure what will happen if you just install this over the top of the old versions.  It might be fine, it might not.  There were a lot of things changed over a long period of time with me starting new characters to test things so I'm not sure what happens.  You can try it and if things get messed up just go through with a clean save instead to fix it.  Please let me know how that goes if you try it.\n<br />\n<br />\n<br />[b]4.0 Alpha[/b]\n<br />Used a lot of new resources from Strotis, Jgreybear, and\n<br />pufthemajicdragon.  Many thanks to those guys for the Modder’s resources!  They look awesome and this update wouldn't be possible without them.  In particular I used the JGayleid armors and royal armors, ayleid furniture from stroti and the Jacuzzi hottub from Puf. I integrated these into the levelled lists and utilized many of the resources as part of a massive overhaul of Avalon.  Everything at minimum got a retexture, and huge sections of the main structures were redesigned using these great\n<br />resources.\n<br />\n<br />Added a pretty big overhaul to the final boss fight.  It’s still being worked on to get the kinks out, but its playable as of 4.0a with many different outcomes possible.  Its no longer just a fight by default, you can choose to how you want to proceed.  Added voiced lines and created a new character: The empress Tyras, and her emperor Tyran. Also Fixed a few annoyances and added some pretty cool convenience\n<br />things like an elevator in certain areas that you can now use to get out of Avalon quickly.  \n<br />\n<br />You can now play as a fully working Avalonian High Elf race.  This is by no means required to finish the Quest, but it does change how the final boss fight plays out a little, which may be expanded even further in future versions.  I think its a pretty cool race to play as, with some nice perks and some other drawbacks.  Strong for mage characters. \n<br />\n<br />Still working on balancing the mod.  This adventure is meant for pretty high levelled characters that want to supercharge\n<br />the end game.  I recommend some other mods to increase the challenge if you get all the goodies this mod has to\n<br />offer, it can be a bit overpowering so I’m working on balancing the rewards for\n<br />the effort. I added a number of quest markers to the Avalon quest to help with figuring out\n<br />where to go.  I also added much more lore and storyline to complete the full picture of what has transpired for those\n<br />interested. \n<br />\n<br />\n<br />\n<br />\n<br />[b]================================================================================================================[/b]\n<br />[b]DEPRECATED INFO for Historical Purposes:[/b]\n<br />\n<br />[b]\n<br />AUTHORS NOTE 2023:[/b]\n<br />I lied.  I guess I felt like fixing things up and polishing it after-all.  I'm sure there might be a few loose ends this time around as well, but I think I've already added some pretty cool stuff.  The quest doesn't have to end a specific way, and you are encouraged to think things through and play the ending of the Avalon quest in your style.  Right now the ending is mostly done, but its going to see more improvements as I work through to the full release.  Its playable how it is, but needs some more polish to get it how I want it.  I'm tyring to figure out the balance of all the rewards, which are significant, without making it game breaking.  Keep in mind that this is meant for a high level character 30+ and as such the rewards are meant to augment an already powerful character.  I've toned down some of the rewards and added a few more, but the new ones come with a bite for balance.  Let me know in the comments your thoughts.  \n<br />\n<br />\n<br />[b]AUTHORS NOTE 2009:[/b]\n<br />I have officially ended my Oblivion Modding career. It is a true cliche that artists never complete their works, and such is the case with Frostcrag. There are many things left undone, or done poorly that I would change. Unfortunately my life has taken me down different paths of game design (expect to see more of my works in different venues) consequently those ideas will now never be implemented.\n<br />\n<br />Because of that I am now Opening this MOD to the world as An OPEN SOURCE under GPLv3 production, please see the license for using this in your own creations.  In short, you can use this, but you can't close source it if you do.  You agree that everyone can use your work going forward, to pay it forward.  You can't get stingy and say no one else can use your work after you have already benefited from using so many others work.  Besides, thats just a shitty thing to do. \n<br />\n<br />If you create a fix or a new version please credit me for the work I did, and add a link to your download page to my TesNexus page so they can find the original should they desire. Obviously this is based on the honor system, so it relies on the new authors integrity to give credit where credit is due, but also upon the users to keep new authors honest should it be found they are claiming credit where they shouldn't.\n<br />\n<br />Final Request: Please with all due haste would some aspiring mod author add a new and functioning mage's guild house by re-populating the 'Student's Quarters\" and adding NPC's etc... to be activated at the end of the avalon quest... This is the top most request of users I receive so you will have a built in audience. If you just create a patch, I will advertise it heavily on this description page so you get more users.\n<br />\n<br />Indefiance\n<br />\n<br />\n<br />\n<br />A new Video Showcasing v 3.0.5 has been uploaded to frostcragreborn.com\n<br />If your still not convinced about downloading the mod, go check it out. http://frostcragreborn.com/videos.html\n<br />\n<br />For those of you who were waiting for the full release to try out v3.0 Here is a brief Introduction. V 3.0 has improved interiors for the player, and some re-organization from the 2.2 release. I improved some tower interiors such as the waterfall to be a little more FPS friendly and re-organized the storage. The Jewel of v 3.0 is the addition of a massive quest. v 3.0 Incorporates a quest that has taken me the better part of year to build. From player reports it is one of the best quests to grace the oblivion Modding scene. I certainly have tried my best to make it so. Up to 8 hours of gameplay, mulitple massive levels to explore, new stories to uncover and incredible treasure to win. This quest has the most unique Oblivion Interior levels to ever grace your computer screen. I proudly present the culmination of the Frostcrag Reborn Experience. This is the Big One my friends. I hope you enjoy playing it as much as I enjoyed creating it. Thanks for all the support, and a special Shout-out to Willi Wiper who has been a Tremendous help and actually has taken an active role since the beta release to help make this mod as good as it has turned out to be. Thanks Willi.\n<br />\n<br />v3.0.5 to 3.0.6\n<br />Only a few minor bug fixes and other small concerns were changed, It shouldn't have any problem updating. Use the patch download from frostcragreborn.com for updating. New Users need to download the other files as indicated. I did add one resource for the Daedric Lava Whiskey which has been re-done by Russader back on the Nexus forums.\n<br />\n<br />COBL specifics:\n<br />If you have been using COBL you need to use the new COBL specific .esp as well as your DLCfrostcrag.esp . Load the FrostcragCobl esp after the DLCfrostcrag.esp and keep them both relatively low in your load order, and you shouldn't encounter any issues. If you have already bought the upgrades then follow these directions to enable the new cobl Stuff;\n<br />1) If you had already bought the library upgrade, go to the middle round table near the bookshelfs, click it in the console, then enter \"disable\" and without exiting the console enter \"enable\". All what is there will disappear with \"disable\" command (don't panic!) and then reappear with \"enable\" command, together with the Cobl stuff.\n<br />2) If you had already bought the bedroom upgrade, go to the bed and do exactly the same.\n<br />\n<br />V 3.0.4 to v 3.0.5\n<br />Corrected Resource for stairs at Avalon Gate. Added Levelled Lists to most encounters. Lessened chance of receiving too much easy loot. Fixed Rastieri's Soul Gem so it can't be used till after it has served its real purpose. Fixed Novice Alchemy Station so it provides a 'Novice' Buff. Added Quest Icons to important quests. Changed Orb of Intelligence to only work outside of inventory. Deleted Unused Items, levelled some of the creatures health to be more reasonable at higher levels. Moved some items in the Alchemy lab to be more accessible. Fixed typos and bad grammar in Journals and such. Deleted enhancements for the Eternal Guardian Sword since there were just too many goodies to be found already. Deleted Ladder from Library, it was always just for looks anyway. Fixed Thomas AI (I think) so that he no longer just chills in his room for days at a time, but he will chill in his room if the cold embrace is activated. Willi Wiper Added AI Path Nodes to a number of levels for me, and I added some improvements to pathnodes around Avalon as well as some areas in Nalonwyn and the Student Quarters. Added around 10 new NPC Avalon Civilians for variety in the Leveled Lists so your not always seeing the same faces over and over, and put leveled lists in all their inventory so that will be randomized as well. Added some different visual effects that take place after the main part of the new quest is completed, added a Lot more spawn points around Avalon to make it more challenging, and increased the Level of the civilians to make them a bit tougher. Some minor fixes just about everywhere.\n<br />\n<br />\n<br />V 3.0.3 to v 3.0.4:\n<br />Added Resources: Added Matching 1 handed Overlord sword (1 mesh and 3 textures), Brighter more visible waterfall mesh so that I can use 30% less stacked meshes to get the effect I wanted resulting in an increased FPS while viewing the waterfall; A fixed version of the Painting in Living area that so that it displays texture correctly.\n<br />\n<br />ESP Changes: Added some corrected AI pathing to most of the Frostcrag cells for those of you who use partners. Corrected Thomas AI so that he doesn't sit on his butt all day long for no good reason. He actually sweeps now since the AI package is pointing to the correct broom. Minor Edits to the Avalon Citizens so that they no longer cast that stupid paralyze spell, as well as making them a bit more frightening to look at. Some minor Overlapping mesh corrections in Lor Anteriori and Avalon Anteriori. Deleted Azani blackheart material from Telan Highcourt (oops!). Gave Telan a unique set of Armor and a unique Sword which is a less powerful two-handed version of the Overlord sword. Corrected blank spellname used by the Overlord ring. Made Tyras an even tougher SOB since it sounds like he was too easy for some people, you have a gauranteed death awaiting if you don't have his ring on hand, and a you will probably die anyway even with the ring, multiple times. This is purposeful since I don't want low-level characters to get his Armor, you have to kill a god before you can wear god armor. Let me know if he is too difficult even for Higher level characters to beat(40+).\n<br />\n<br />\n<br />List of BugFixes v 3.0.2 OpenBeta from Original Beta:\n<br />V 3.0.2 is a Multiple Bug Fix Release, added more quest markers, collision issues, Missing VWD LOD, reported bugs etc. I also added a small questline with Bandits attacking tower if you don't leave it protected. Afterall the tower is rather conspicuous. Upgrading to this may require a clean save from all previous v.3xx. Will definitely require a clean save if your upgrading from any v2.XX versions.\n<br />\n<br />\n<br />List of Changes: v 3.0 OpenBeta from 2.2\n<br />Frostcrag Additions:\n<br />*Complete Retexture of Frostcrag Exterior and Interior, I think you will like it as much as I do.\n<br />*Thomas has a schedule and offers Services, Yay!\n<br />*Re-Organized storage areas to be more centralized.\n<br />*Added a useful Smithy that increases your Armorer ability while in use, much like the alchemy station. (just activate the anvil)\n<br />\n<br />Quest Additions:\n<br />*Multiple massive underground levels and tunnels with much to be done and much to see\n<br />*Added storyline and depth to accommodate the new quest lines\n<br />*Extensive additions to both quest lines and a complete re-do of Thomas Quest line...it has been incorporated into a much larger and grander quest, Thomas is just a regular dude now, but have no fear the quests are much better for it. Total quest time may exceed 4 hours+ of game play I would guess.\n<br />* Some well earned rewards, like the Mana Well being capable of use everday instead of just sunday after completing Quests.\n<br />-A unique set of Ayleid armor (this will be one heck of a reward, but I don't recommend even attempting it till a pretty high level, possibly 35 and above)\n<br />-All sorts of Ayleid weaponry (again your going to earn this stuff and most likely die in the attempt a few times)\n<br />\n<br />Bugfixes and annoyances removed\n<br />*Deleted Giant Potion (still too buggy after a lot of tinkering)\n<br />*Player requests small and large added\n<br />-like a waterfall switch\n<br />-like a quieter waterfall overall\n<br />-like a harder villain to defeat\n<br />-I can't even remember all the little things I have changed and improved, you'll just have to see for yourself.\n<br />\n<br />\n<br />List of Changes: v 2.2 from 1.3 (OLD VERSION)\n<br />\n<br />*VWD from all cities where it's possible to see frostcrag peak. This includes parts of the IC, Cheydinhal, Bruma, and of Course Tamriel. Thats right, you can see it while inside the city walls.\n<br />*Alchemy Room with Ingredient sorter (SI and Normal) plus some surprises\n<br />* Room I call the Well of Mana: must be seen and used to be believed. Fun and Intriguing.\n<br />*Overhauled Living Quarters with a Five-story tall Fountain/waterfall just for the hell of it\n<br />*New Out-building (was once the promising start of a new chapter of the mage's guild)\n<br />*Dragon Pad for akatosh mount\n<br />*Improved battles, bosses and sub-quests.\n<br />*Spells, weapons, armor, storyline added.\n<br />*Auto-stacking book shelves.\n<br />*Improved lighting in key areas\n<br />*Fixed scripting Issues\n<br />*Added Auto-updater function for those updating from v 2.1 (please make a backup anyway)\n<br />*Minor improvements everywhere"
