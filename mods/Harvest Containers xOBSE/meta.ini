nexusDescription="[center][color=#fff2cc][size=6][b]Harvest Containers xOBSE[/b][/size][/color]\n<br />[size=3][color=#999999]Requirements:\n<br />[url=https://github.com/llde/xOBSE/releases]xOBSE[/url]﻿﻿[/color][/size][/center]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Description[/b][/size][/color]\n<br />\n<br />[size=3]This is a complete reimplementation of [url=https://www.nexusmods.com/oblivion/mods/3979]Harvest Containers[/url] using drastically reduced scripting thanks to xOBSE and without editing any objects. That means this mod is much more compatible, stable, and performance-friendly than the original, whilst maintaining the same functionality*. Some aspects, such as player ownership detection, have also been improved.\n<br />\n<br />For those that don't know, the [url=https://www.nexusmods.com/oblivion/mods/3979]Harvest Containers[/url] makes it so that opening a container plays an animation to show the container opening.\n<br />\n<br />You do not need the original mod; everything is included.\n<br />\n<br />The original mod was very performance intensive. It edited every affected container object in the game to add a script, which included elements that ran every single frame. Yes, that means every single frame for every single affected object, which is a lot if you consider the number of containers in the game. In addition, each script stored additional data, which means there would be lots of additional data floating around and rife for save corruption. This new implementation uses xOBSE scripting to reimplement the same functionality using a couple of event scripts instead.\n<br />\n<br />Will I do [url=https://www.nexusmods.com/oblivion/mods/2037]Harvest Flora[/url]? Yes, the scripts are already included, but the permissions to redistribute the original assets are closed, so I had to comment out the functionality before I released this mod. If I get permission, I will re-include it. I have, however, left in the feature that stops Harrada and Spiddal Sticks from attacking when harvested.\n<br />\n<br />[i]* Some minor changes:[/i]\n<br />[spoiler]\n<br />[/size][list=1]\n<br />[*][size=3]The flopping sacks from Harvest Containers are not included as this feature made permanent changes to object placement and also looked a bit out of place in my opinion.[/size]\n<br />[*][size=3]The hanging corpses have been removed. They would just change colour in the original mod, which was a bit odd.[/size]\n<br />[*][size=3]The lights and mist when opening Ayleid containers are not included. This feature used the PlaceAtMe function, so contributed to save bloat.[/size]\n<br />\n<br />[/list][size=3][/spoiler][/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Installation[/b][/size][/color]\n<br />\n<br />[size=3]This mod requires the [url=https://github.com/llde/xOBSE/releases]xOBSE[/url]﻿ version 22.6 of greater.[/size]\n<br />\n<br />[size=3]Standard installation procedure: install with your mod manager of choice and activate. I recommend [url=https://www.nexusmods.com/skyrimspecialedition/mods/6194]Mod Organizer 2[/url].[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Uninstallation[/b][/size][/color]\n<br />\n<br />[size=3]This mod can be uninstalled at any time and will have no permanent effects on your game. Just uncheck the file in your mod manager or delete the files.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Compatibility[/b][/size][/color]\n<br />\n<br />[size=3]This mod is incompatible with the original [url=https://www.nexusmods.com/oblivion/mods/3979]Harvest Containers[/url] and any other mods that contains it, which means that [url=https://www.nexusmods.com/oblivion/mods/46199]Obscuro's Oblivion Overhaul[/url] is also incompatible. Since this mod does not edit any vanilla objects, and is therefore compatible with almost everything, there is no reason for OOO to include Harvest Containers anymore. This is also one of the reasons why OOO is notorious for save-bloat. If I can get permission to edit OOO, I will remove the feature.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]My Mods[/b][/size][/color]\n<br />\n<br />[b][size=3][color=#ffd966]I spend a lot of time creating and supporting my mods, so any donations are gratefully received.[/color][/size][/b]\n<br />\n<br />[b][center][size=4][url=https://www.nexusmods.com/oblivion/users/13822205/?tb=mods&amp;pUp=1]Click Here to See All of My Mods[/url][/size][/center][/b]\n<br />\n<br />[line]"
