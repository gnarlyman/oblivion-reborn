nexusDescription="[u][color=#ffff00][i][size=4]\n<br />[/size][/i][/color][/u][center][u][color=#ffff00][i][size=4][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621298719.png[/img]\n<br />[/size][/i][/color][/u][url=http://www.nexusmods.com/oblivion/mods/591/?][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621211650.png[/img][/url][url=http://www.nexusmods.com/oblivion/mods/37596/?][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621211687.png[/img][/url][/center]\n<br />\n<br />[color=#ff0000][b]Wrye Bash[/b][/color] - It's a requirement because it's the best... And I don't know how to make OBMM or NMM scripts...\n<br />\n<br />[color=#ff0000][b]BBB Enabled Skeleton[/b][/color] - Despite males not needing this, you [b][color=#ffff00][i]will[/i][/color][/b] end up installing it at some point. Don't be [color=#ffff00]\"That Guy\"[/color] and complain about boobs stretching to infinity; these skeletons are better in every way and useful for more things than just BBB.\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][i][b]Installation Instructions[/b][/i][/size][/color][/u][b]\n<br />[/b][b][b]1.[/b][/b] Despite my praise and admiration of Robert's Males, you must first [b][color=#ffff00]UNINSTALL[/color][/b] [url=http://www.nexusmods.com/oblivion/mods/40532/]RobertMaleBodiesReplacerV52 [/url][[color=#ffff00]RMv52[/color]].[b]\n<br />\n<br />[b]2.[/b][/b] After you've uninstalled [color=#ffff00]RMv52[/color], download and install the[i] \"[color=#ffff00]SE- Robert Male v5.2 CORE[/color]\" [/i] package in the download section. Follow the instructions in the modified Wrye Bash Wizard carefully. The modified WizBAIN follows the same sequence as the original's minus a few steps that would be redundant or cause problems. [i]If you use Oblivion Character Overhaul, make sure you don't have a file called \"[color=#ffff00]MaleBodyReplacerV5.esp[/color]\" in your Oblivion/Data folder. If you have it, delete it.[/i]\n<br />\n<br />[size=2][b][color=#ff0000][u]OPTIONAL EXTRAS[/u][/color][/b]: [color=#00ffff]Install Robert Male v5.2 Replacers for Mods [color=#ffff00]- Optional[/color][/color][/size]\n<br />Legacy mods such as OOO, MMM, Frans, etc, came with [url=http://www.nexusmods.com/oblivion/mods/14942/?]Robert Male v4[/url] compatibility meshes, but they weren't updated to v5. Therefore I updated all the meshes where appropriate (skin exposed at seams) and also molded their shapes to be more like v5 Muscular Body. So there are two versions -- one is the [color=#ffff00]MOLDED[/color] version; and the other has meshes modified only when skin was exposed at the seams. There may be some clipping issues with the MOLDED version so be aware, I haven't tested them extensively.\n<br />[b]\n<br />1.[/b] Download and install the original mods, the locations are here:\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/25309]Artifacts[/url]﻿\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/18417]ARMA[/url]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/40190]Frans[/url]\n<br />[*]MMM﻿ (I don't know where the full MMM package is anymore)\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/46199]OOO[/url]\n<br />[/list]\n<br />[b]2.[/b] The original mods you've installed contain armor for vanilla male and female bodies. Now download and install the replacer for Robert bodies here:\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/25309]Artifacts[/url]﻿ - follow the link and go to the optional files section\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/18417]ARMA[/url] - follow the link and go to the optional files section\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/15097]Frans[/url]﻿ \n<br />[*][url=https://www.nexusmods.com/oblivion/mods/15096]MMM[/url]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/14984]OOO[/url]﻿ \n<br />[/list][b]\n<br />3.[/b] Step-2 installed the armors for Robert bodies but they will still have neckseams. Now download the [color=#ffff00]\"all-in-one\"[/color] add-on package in this mod's download section. Install by overwriting the old files with the new ones.[i]\n<br />[/i][i]\n<br />* More extra seamless body options available at [url=https://www.nexusmods.com/oblivion/mods/45868]SetBody Reloaded[/url].[/i]\n<br />\n<br />\n<br />[color=#ffff00][size=4][u][i][b]Credits[/b][/i][/u][/size][/color]\n<br />Special Thanks to Kromgar (aka gerra6) - [url=http://kgtools.org/]KGTools[/url]\n<br />Special Thanks to Robert2 - [url=http://www.nexusmods.com/oblivion/mods/40532/]Robert Male v5.2[/url] CORE\n<br />movomo - [url=https://www.nexusmods.com/oblivion/mods/45868]Seammender Templates[/url]\n<br />\n<br />[b][color=#ff0000][u]Original Replacers[/u][/color][/b]\n<br />Trollf\n<br />Corepc\n<br />TeamArma\n<br />Sen-chan\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][b][i]Licensing[/i][/b][/size][/color][/u]\n<br />You may use, modify, and redistribute freely, as long as credit is given."
