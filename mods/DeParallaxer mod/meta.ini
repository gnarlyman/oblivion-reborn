nexusDescription="This mod removes the parallax/displacement shader from about 500 different .nif files used in Oblivion.  It replaces it with the standard diffuse shader that nearly everything else in the game uses.\r\n\r\nWhy?  Performance!  On my machine, I gain an average of 5 FPS when playing in areas that use parallax shading with this modification.  Also, movement in parallax-disabled areas now seems smoother to me.  However, the tradeoff is that these surfaces now appear very flat, and lose a bit of their previous shiny-ness.  But, this is the nature of performance tweaking.  Also undoing hard work by Bethesda... Sorry guys.\r\n\r\n- Updated in 1.1:  some rocks and stuff I missed in 1.0, and a whole slew of interior and exterior architecture from bravil, bruma, and chorrol!  Some pieces here and there from the fortruins set, and the ubitiquous rock wall, and more!\r\n150 new pieces in all.\r\n\r\nThis release should be the final one. yippee!\r\n\r\n7-zip will be needed to unpack this mod."
