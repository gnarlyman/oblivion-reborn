nexusDescription="[b]Description:\n<br />\n<br />[/b]If OOO enhanced and Oblivion Content Restoration Project are installed together, Ri'Zakar's essential status and inventory doesn't change during the FG quest The Hist.  This patch combines the reference script for the FG quest Infiltration, making Ri'Zakar non essential and having the correct key spawn once he is killed.  This patch also allows for the Quest reward from OOO enhanced to be received as well.\n<br />\n<br />[b]Requirements:\n<br />\n<br />[/b][url=https://www.nexusmods.com/oblivion/mods/47187]OOO Enhanced\n<br />[/url]﻿\n<br />[url=https://www.nexusmods.com/oblivion/mods/45909]Oblivion Content Restoration Project\n<br />\n<br />[/url][b]Warning:\n<br />\n<br />[/b]This must be installed before starting the 2nd to last FG quest Infiltration, if you dont the script does not run and Ri'Zakar stays essential and inventory doesnt change."
