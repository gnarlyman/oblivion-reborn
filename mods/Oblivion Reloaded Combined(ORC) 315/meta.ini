nexusDescription="So meet new Oblivion Reloaded Combined(ORC), its compiled from different OR sources, also with some my code changes for better functionality and new features.\n<br />\n<br />Instalation:\n<br />- Like other OBSE plugin.\n<br />\n<br />Features.\n<br />- Just look in game, see options description in ORC menu (Ctrl C or F10).\n<br />\n<br />\n<br />Changelog for[b] ORC versions(1.6- 3.0)[/b]:\n<br />[spoiler]\n<br />Changelog:\n<br />New in version(1.6)\n<br />- fixes for lava LOD shader (this also fixes vanilla bug when player come from oblivion)\n<br />- config for Weapon speed feature+ new options for each weapon type\n<br />- simple precipitations for potato PC\n<br />- AMD fixes (shaders bugs)\n<br />- experimental CS patch (optional)\n<br />- fixed bug that can hung game in main menu sometimes\n<br />- add better depth buffer fix from llde\n<br />- most options in Oblivion.ini are forced only in LM mode\n<br />- make quicksave-quickload safer for data\n<br />- some speedup on Nvidia cards (in theory) when no injector used (like ENB, SweetFX)\n<br />\n<br />New in version(1.7)\n<br />- better underwater look\n<br />- fix alpha check for shadows\n<br />- less aggressive FPS CAP\n<br />- culling settings for any location type (better FPS)\n<br />- fix for some broken options in ORC's menu\n<br />- remove OBSE plugins checker (no Mario joke)\n<br />\n<br />New in version(1.7.1)\n<br />- removed some experimental stuff\n<br />- removed rendercut feature (not need it anymore)\n<br />- add culling for shadows\n<br />- fixed all CTD provoked by culling (I hope)\n<br />- fixed bug with distant shadows on skin\n<br />- small code optimisations\n<br />- shadows tweaks (better fps)\n<br />- faster water reflections culling\n<br />- fixed some options in ORC's menu\n<br />\n<br />\n<br />New in version(1.7.2)\n<br />-fixed bug with distance land, when new game started\n<br />-add command GetDistancePlayer, will work for refs in parent worldspaces (I use it for map markers)\n<br />-fixed water bugs\n<br />-better underwater effect\n<br />-fixed bug with Helms\n<br />-fixed bug with water reflections\n<br />-fixed some small bugs in shader logic\n<br />-add more info for menu options\n<br />-LM version detected automatically, no option needed\n<br />-removed useless heapmodes\n<br />-removed inertia patch for standard game\n<br />-moonlight phase lumination now can be configured from ORC's menu\n<br />-now weathers dumpfile cleaned on every game start\n<br />\n<br />New in version(1.7.3)\n<br />-better optimiseed shadows\n<br />-new menu for Equipment mode\n<br />-fixed DXVKPatch\n<br />-additional option for shadows on leaves\n<br />-some fixes from OR E3\n<br />-add LODCut option to [PotatoPC]\n<br />-fixed far LOD cutting by default\n<br />-fixed some AMD bugs\n<br />\n<br />New in version(1.7.4)\n<br />-removed RayCast for culling\n<br />-faster culling LOD for exteriors\n<br />-fixed AMD bugs...\n<br />-add briteness option for Nighteye shader\n<br />-add SimpleWater option for PotatoPC\n<br />-add SimplePrecipitation new mode (2) for PotatoPC, enables vanilla rain\n<br />-add NoLODfog option for PotatoPC\n<br />-some small fixes\n<br />-add BennyHill mode in Develop section (usefull for stability test)\n<br />\n<br />New in version (1.7.5)\n<br />-fixed skin shader over light.\n<br />-fixed bug with water and rain\n<br />-add skin shaders for interior\n<br />-add moonrays with moon phase support\n<br />-add \"ORSetFakeCamera\" command for scripts\n<br />-fix Camera transition from dialog menu when player is on horse\n<br />\n<br />New in version (1.7.6)\n<br />-fix bug with LOD fog from 1.7.5\n<br />-option NoZshaking for Fake 1st camera mode\n<br />-some optimisations for LM\n<br />-fix motion blur for fake 1st camera\n<br />-other small fixes\n<br />-practicaly no settings override for standart game (only bDoHighDynamicRange and bDoCanopyShadowPass)\n<br />-add BennyHill theme for BennyHill mode, have fun)\n<br />\n<br />New in version (1.7.7)\n<br />-add missed shaders for water render (fixes bug with water render on some GPUs)\n<br />-camera fixes and some new options\n<br />-add modes for test message (usefull for moders)\n<br />-rewrite custom FoV logic\n<br />-add options for dialog menu FoV and zoom in-out speed (works when custom FoV ON)\n<br />-add ref and time reading for LM version\n<br />\n<br />New in version (1.7.8)\n<br />- smart camera for dialog mode (only when FoV &gt; 0)\n<br />- fix bugs with some shaders (lighting windows, light flickering in caves)\n<br />- new better Heapmode №1\n<br />\n<br />New in version (1.8.0)\n<br />- fixed old OR bug with shadows, godrays \"jumping\" and (sky color flickering in ORC) when player change cell\n<br />- remove some useless code\n<br />- add some new modes for test message\n<br />- better quality shadows (credit to Mcstfuerson, take some code from E3 version)\n<br />- configurable SMAA\n<br />- fixes for AMD users\n<br />- fixes for skin shaders\n<br />- fixes for hair shaders\n<br />- universal CTD free heap mode\n<br />- borderless window mode (optional)\n<br />\n<br />New in version (1.9.0)\n<br />-DELETED (Fake 1st camera, dodge,shield on back)\n<br />- simpler shaders type.\n<br />- better game performance.\n<br />- new purge algorythm.\n<br />- speed tweaks for shadows.\n<br />- dynamic lights (new)\n<br />- INT-EXT weather sync (new)\n<br />- better terrain LOD shader\n<br />- HDR + MSAA\n<br />- new Sleeping mode logic\n<br />- lot of AMD fixes\n<br />- better Culling logic\n<br />- Terrain blending fixes\n<br />- Water type smarter check\n<br />- Screenshots everywhere\n<br />- Fixes for saves look\n<br />- Better ORC menu\n<br />- Shadows for interiors with weather\n<br />- Snow-rain as separate effects\n<br />- Fixes for Fog effect\n<br />- FOV fixes\n<br />- ORC(1.8.0) related CTD fix\n<br />- add more description for options\n<br />- AMD fixes\n<br />- code optimisations\n<br />-fixed AI bug from v1.8.0\n<br />-Vanilla fog is back\n<br />-Loading speedup\n<br />\n<br />New in version (1.9.2)\n<br />- HDR + MSAA fixes\n<br />- new mode for sharpening.\n<br />- new mode for critical sections.\n<br />- fixed water bugs.\n<br />- fixed CTD (grass).\n<br />- minor menu fixes\n<br />\n<br />New in version (1.9.3)\n<br />- Culling fixes\n<br />- Fixes for Oblivion weather when Moonlight option is active\n<br />- Fixed bug for dintance sliders\n<br />- Removed player rotation in interiors\n<br />- NEW Inertia feature (for power attack with 2 hand weapon) NPC &amp; Player\n<br />- NEW Detection fixes (fix some NPC stupidness) NOT COMPATIBLE WITH SDR\n<br />\n<br />New in version (1.9.4)\n<br />- Weather Sync dungeon support and fixes\n<br />- New Jump patch feature\n<br />- New Interior object generator\n<br />- Fixed wanilla bug (waterplanes not working when interior has no water)\n<br />- other small bugs fixes\n<br />\n<br />ORC.esp needed for Interior object generator, also have examples of using ORC features.\n<br />Locations: Imperial dungeon- starting cell, Imperial Market- Slash 'N Smash shop\n<br />\n<br />\n<br />New in version (2.1.0)\n<br />- Removed object genarator, detection fixes.\n<br />- DoF effect change for simple blur with better logic (no fps drop)\n<br />- New Specular effect for precipitations\n<br />- New interior shadows (big thanks to [b]Mcstfuerson[/b])\n<br />- New Interior specular shadows (big thanks to [b]Mcstfuerson[/b])\n<br />- New Leaf shadef (can configure leaf shaking now)\n<br />- New Heap modes\n<br />- New features and options for shaders development\n<br />- better TerrainLOD shader\n<br />- better motion blur shader\n<br />- add third shadowmap for exterior shadows (better quality for close shadows)\n<br />- shadows optimization (performance tweaks)\n<br />- better menu profiling and location checks\n<br />- fixed vanilla water bug when shader not works on mesh surfaces\n<br />- Alternative camera for 1st person (like EC, but switch to vanilla when player in combat)\n<br />- minor bugfixes for culling\n<br />- \"fix\" for player rotation\n<br />- other small patches\n<br />\n<br />\n<br />New in version (3.0.0)\n<br />- speedup for shaders calculations (most calculations moved from render pass)\n<br />- lot of shadows fixes\n<br />- [color=#ff0000]New[/color] TAA antialiasing effecct (big thanks to [b]Mcstfuerson![/b])\n<br />- Better injectors compatibility (ENB, SweetFX, etc)\n<br />- [color=#ff0000]New[/color] DistantBlur effect, no fps drop\n<br />- Much faster and stable ORC menu with location info\n<br />- New LODCutting based on location and region (FPS Boost)\n<br />- Fixed Grass bugs from prev. versions\n<br />- Deleted HDR+MSAA patches - bugs.\n<br />- [color=#f9cb9c]Deleted[/color] DoF effect - useless, FPS drops\n<br />- [color=#f9cb9c]Deleted[/color] Fog effect - useless, bugs\n<br />- [color=#f9cb9c]Deleted[/color] Sharpening effect- useless\n<br />- Rewrited memory cleaning\n<br />- Add option for disabling ORC menu and dev tools (speedup)\n<br />\n<br />New in version (3.1.0)\n<br />- Faster grass placement in Grassmode(fix lags)\n<br />- Grassmode option moves to \"Patches\"\n<br />-  Fix for terrain shader (fix reflections when 9x9 grid used)\n<br />- Small speedup for interior shadows render\n<br />- Big speedup for exterior shadows render\n<br />- [color=#ff0000]CRAZY[/color] shadows render speedup in heavy locations like forest\n<br />- Fix for shadows settings reads (connected to timescale)\n<br />- Better DXVK detection method\n<br />- Other small fixes\n<br />- Add Grassmode 5x5 for 9x9\n<br />- Add Grassmode 3x3 (like Vanilla)\n<br />- Update Smartmode for grass grids\n<br />\n<br />[/spoiler]\n<br />\n<br />Please donate if you like this Unofficial ORC version - [url=https://www.paypal.com/donate/?hosted_button_id=PUUSGKMP5663W]PayPal[/url]\n<br />\n<br />Credits to:\n<br />-[b]Alenet[/b], sourcecode author and great programmer.\n<br />-[b]Llde[/b] for OR fixes.\n<br />-[b]Mcstfuerson[/b] for shadow patches and new features.\n<br />-[b]IStewieAI[/b] for tips and tweaks.\n<br />-[b]Evilmax[/b] for help with heap managers and tests.\n<br />-[b]cOJzZ[/b] for player diagonal movement idea.\n<br />-[b]Scanti[/b] for vampires tweaks.\n<br />-[b]Skyranger[/b] for OSR development.\n<br />-[b]Ershin[/b] for Oblivion FOV tweak\n<br />-[b]Saebel[/b] for SDR detecton hook\n<br />-[b]Wiepman, Davitto94[/b] for builds testing.\n<br />-[b]Nooonemusteverknow[/b] for shaders tweaks and adaptation.\n<br />-[b]Dispensation[/b] for tests and AMD bugs track\n<br />-[b]Yinsolaya[/b] for description spelling checking and tests"
