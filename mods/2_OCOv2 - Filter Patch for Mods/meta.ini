nexusDescription="This is a patch for [url=https://www.nexusmods.com/oblivion/mods/44676]Oblivion Character Overhaul version 2[/url] and popular mods, to make the added NPC's eyes, faces and hair look better. See the requirements tab for the full list of supported mods. The faces of the NPCs from these mods are now no longer very ugly, deformed and demented looking.\n<br />\n<br />This mod has the Filter bash tag applied to it, so even if you only use one of these mods, you can still import it into your bashed patch in Wrye Bash. [b]OCOv2 - Filter Patch for Mods.esp must keep the NoMerge bash tag on it to work properly. Otherwise, NPCs will appear naked, or there may be a crash on startup if this bash tag is removed.[/b]\n<br />\n<br />Version 1.6 onwards of this mod uses a script to assign new OCOv2 eyes to all NPCs in the filter patch (meaning that all high elves and wood elves have OCOv2's elf eyes now, instead of having vanilla human eyes). Some images were taken before this change and while I was using [url=https://www.nexusmods.com/oblivion/mods/47765]J17's OCO and Hair Conversions[/url].\n<br />\n<br />Version 1.8 onwards of this mod merges [url=https://www.nexusmods.com/oblivion/users/90469748]DEEJMASTER333[/url]'s many OCOv2 patches into the main file filter plugin (you no longer need his OCOv2 patches for any mods when using this filter patch). This was the merge that I did together with OCOv2 - Filter Patch for Mods.esp:\n<br />\n<br />[spoiler]Allied Oblivion Gate Patrols OCOv2 Patch full.esp\n<br />Chapels of Cyrodiil OCOv2 Patch.esp\n<br />Chorrol Hinterland - OCOv2 Patch.esp\n<br />Chorrol Hinterland BC Version - OCOv2 Patch.esp\n<br />Crowded Cities Cyrodiil Redone - OCOv2 Patch.esp\n<br />Extra NPCs OCOv2 Patch.esp\n<br />IceWaterfrontTunnel - OCO Patch.esp\n<br />ImpeREAL Unique Forts - OCOv2 Patch.esp\n<br />Imperial Palace Improvement - OCOv2 Patch.esp\n<br />Isolated Village OCOv2 Patch.esp\n<br />MTC Expanded Villages Updated - OCOv2 Patch.esp\n<br />Shivering Isles Travelers - OCOv2 Patch.esp\n<br />Sutch Village OCOv2 Patch.esp\n<br />Travelers of Cyrodiil OCOv2 Patch.esp[/spoiler]\n<br />You need to use [url=https://www.nexusmods.com/site/mods/591]Wrye Bash[/url] to use this mod. It is a filter patch. You need to deactivate and import it into your bashed patch in Wrye Bash for it to work, otherwise you will get an error that masters are missing.\n<br />\n<br />Also check out [url=https://www.nexusmods.com/oblivion/mods/52010]Oblivion Character Overhaul - Advanced Edition[/url]."
