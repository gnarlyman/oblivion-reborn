nexusDescription="The beggars' inconsistent voices is probably one the most notorious and hilarious audio mistakes in gaming history. But, did you know the issue did NOT affect Oblivion on the Xbox 360? That's right. The Xbox 360 version of Oblivion is actually an earlier build, with quite a few differences lurking in-game and in the files, but this is the main one. In fact, it was only last year I myself realised this, even though I'd spent years playing Oblivion on my Xbox, before I even had Oblivion on PC! But now, with this mod, the inconsistent crotchety beggar voices are gone for good, and now you'll never have any mid-dialogue voice changes ever again, hooray!\n<br />[b]\n<br />[size=3]What the mod does:[/size][/b]\n<br />\n<br />Replaces the male and female imperial beggar dialogue, with the original versions from the Xbox 360 version of the game.\n<br />\n<br />Just extract the files to your Oblivion/Data directory, click yes to overwrite anything, if prompted, and you'll be good to go! :D\n<br />\n<br />NOTE:\n<br />Not using the provided esp file will result in some vanilla beggar dialogue returning during the quest Untaxing The Poor. You have been warned.\n<br />\n<br />[credit to elevenlabs for 3 new lines of dialogue in 2023 version]\n<br />\n<br />[size=5][u]Check out my other main Oblivion mods![/u][/size]\n<br />\n<br />[size=4][url=http://www.nexusmods.com/oblivion/mods/47191/?][i]Cyrodiil Re-Loaded[/i][/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/52028][i]Voiced Vile Lair DLC Overhaul (with Rowley Eardwulf Follower)[/i][/url][/size]\n<br />[size=4][i][url=https://www.nexusmods.com/oblivion/mods/46243][size=4][i]Realistic Player Dialogue Overhaul[/i][/size][/url]﻿\n<br />[/i][/size][url=https://www.nexusmods.com/oblivion/mods/52953][size=4][i]Immersive Character and Dialogue Expansion[/i][/size][/url]"
