nexusDescription="[center][size=5]EngineBugFixes[/size][/center]\n<br />\n<br />\n<br />Description\n<br />===========\n<br />\n<br />EngineBugFixes is an OBSE plugin containing bug fixes for the Oblivion game engine.\n<br />It distinguishes two types of engine modifications:\n<br />\n<br />1) Fix    Fixes something that probably everyone would consider a bug.\n<br />2) Patch    Changes something that may or may not be considered a bug but which I felt could be improved.\n<br />\n<br />See below for a current list of fixes/patches.\n<br />Detailed information about each fix/patch can be found in the readme file.\n<br />All fixes and patches can be enabled/disabled separately to ensure maximum compatibility with other OBSE plugins.\n<br />\n<br />\n<br />Install\n<br />=======\n<br />1) Extract the files to a temporary location.\n<br />2) Copy the files in the Data folder to (install folder)&#92;Oblivion&#92;Data&#92;\n<br />\n<br />\n<br />Uninstall\n<br />=========\n<br />1) Delete the files/folders associated with the mod.\n<br />\n<br />\n<br />Usage\n<br />=====\n<br />To enable a particular fix or patch set its value in the INI file to 1. To disable, set the value to 0.\n<br />\n<br />\n<br />Source Code\n<br />===========\n<br />The included source code (separate download) gives you an overview of the locations in the engine that will be patched\n<br />as well as a general insight into the patches themselves.\n<br />However, it is currently NOT possible to compile the plugin from the code as it is missing the project that recreates\n<br />the game engine classes and maps functions to memory addresses.\n<br />This project is HUGE and currently not for share (not in a sharable state anyway...).\n<br />\n<br />\n<br />Patch List\n<br />==========\n<br />\n<br />Fixes\n<br />-----\n<br />1) InitRendererFix (v1.0)\n<br />Fixes a small bug in the renderer initialization code which prevents the game from properly showing an error message box\n<br />when you try to start the game with an unsupported screen resolution specified in the INI file.\n<br />\n<br />2) SpeedTreeLoadFix (v1.0)\n<br />Fixes missing thread safety in the SpeedTree loading code which causes random CTDs in the wilderness.\n<br />\n<br />3) ShadowCameraFix (v1.0)\n<br />Fixes the shadow &amp; self shadow code using outdated camera data when evaluating whether an actor's shadow should be rendered or not.\n<br />\n<br />4) CreatureLightingFix (v1.0)\n<br />Fixes GetLightAmount always returning 0 for certain creature types (which affects detection handling).\n<br />\n<br />5) WeaponCollisionFix (v1.0)\n<br />Fixes 'floating weapons' problem with some non-standard skeleton NIFs.\n<br />\n<br />6) SexChangeFix (v1.0)\n<br />Fixes CTD in 'SexChange' script command when used on an actor who currently has a 3D object.\n<br />\n<br />7) GetAlarmedFix (v1.0)\n<br />Fixes CTD in 'GetAlarmed' script command when used on an actor who does not have an AI package.\n<br />\n<br />8) CellDistanceFix (v1.0)\n<br />Fixes a small bug in the calculation of an actor's distance to a specific (exterior) cell. This affects path finding and cell scans.\n<br />\n<br />9) FollowerDoubleFaceFix (v1.0)(v2.2)\n<br />Fixes the well-known double face/helmet bug when using fast travel with followers.\n<br />\n<br />10) ShutdownCTDFix (v1.0)(v1.7)\n<br />This is now a collection fix for various problems that may cause CTD when quitting the game. Check readme file for details.\n<br />NOTE: The collection currently fixes some but not (yet) all reasons for CTD on shutdown.\n<br />\n<br />11) DeathItemFix (v1.0)\n<br />Fixes a small bug and memory leak in the function that resolves death items.\n<br />The bug only occurs when the specified leveled list produces more than one item (which doesn't happen very often).\n<br />\n<br />12) DropItemFix (v1.0)\n<br />Fixes CTD when the game tries to add player character ownership to a dropped item with no extra data list.\n<br />\n<br />13) LoadCreatedBaseObjectsFix (v1.0)\n<br />This is NOT an engine bug fix but rather an OBSE bug fix which hopefully will become obsolete in the future.\n<br />Fixes form IDs in created base objects not getting resolved properly after changing the load order.\n<br />\n<br />14) PlayerDeathCameraFix (v1.1)(v1.3)(v2.0)\n<br />Prevents the camera getting stuck on ground level after using the Resurrect command on the player.\n<br />Additionally, the LoadGame menu timer is reset so the menu does not pop up immediately the second time the player dies.\n<br />\n<br />15) UseItemAtPackageFix (v1.2)(v1.3)\n<br />Fixes UseItemAt AI packages not working properly with certain objects types or only working the first time.\n<br />\n<br />16) Cell3x3LocalMapIconsFix (v1.2)\n<br />Fixes icons/markers not showing on local map if an exterior cell with certain map grid x/y coordinates is defined or modified in a non-master file.\n<br />\n<br />17) CellChangeCollidedArrows3DFix (v1.3)\n<br />Fixes arrows stuck in the player ending up as a clump on the ground when moving to a cell that is not loaded.\n<br />\n<br />18) ScriptPackageFix (v1.3)\n<br />Fixes some problems related to the AddScriptPackage/RemoveScriptPackage script commands. Check the readme file for details.\n<br />\n<br />19) HUDInfoQualityIconFix (v1.3)\n<br />Fixes HUD icon for the quality of apparatus type objects not getting shown because of a bug in the code.\n<br />\n<br />20) CreatureBipedObjectEquipFix (v1.4)(v1.7)\n<br />Fixes creature's 3D getting duplicated every time the EquipItem script command is used on it with a clothing or armor (except shields) object.\n<br />\n<br />21) DialogueWaitFix (v1.4)\n<br />Fixes Dialogue AI package between two NPCs occasionally getting stuck in the Wait procedure.\n<br />\n<br />22) ExteriorCellTempObjectsLoadFix (v1.4)\n<br />Fixes cell temporary objects not getting loaded if the defining mod is a master file and not loaded with the same mod index as it had in the editor.\n<br />\n<br />23) BuyItemFromContainerFix (v1.5)(v2.1)\n<br />Fixes a bug which prevents NPCs from buying food, etc. from containers owned by merchants. This bug can occasionally lead to CTD.\n<br />\n<br />24) DialogMenuEmptyTopicsFix (v1.5)\n<br />Fixes dialog menu topic list staying invisible if dialogue was started while menus were hidden.\n<br />\n<br />25) LoadCellTempDataFix (v1.5)(v2.2)\n<br />Fixes modified exterior cells failing to load if an object moved into the cell while the cell was not loaded.\n<br />\n<br />26) RunScriptLineFix (v1.5)\n<br />Fixes an OBSE bug which affects script commands 'RunScriptLine' and 'RunBatchScript'.\n<br />\n<br />27) SpellPurchaseCrashFix (v1.6)\n<br />Fixes CTD when buying the last spell from a vendor's spell list using the arrow keys on the keyboard.\n<br />\n<br />28) GlobalAnimTimerFix (v1.6)\n<br />Regularly resets the global animation timer to avoid problems with non-actor animations after long playing times.\n<br />This bug is widely known as the 'A-Bomb' bug.\n<br />\n<br />29) AIPackageScheduleEvaluationFix (v1.6)\n<br />Fixes broken AI package schedule evaluation for schedules crossing midnight and schedule durations &gt; 24 hours.\n<br />Check the readme file for details and limitations of the new evaluation function.\n<br />\n<br />30) AcquireWeaponNoAmmoFix (v1.7)\n<br />Fixes a (rare) bug causing actors in combat to get stuck in the Acquire maneuver if the combat AI chooses ranged melee strategy\n<br />but the actor currently does not have ammo equipped.\n<br />\n<br />31) BloodDecalMemLeakFix (v1.7)\n<br />Fixes a severe memory leak in blood decal generation code if ini setting 'bDecalsOnSkinnedGeometry' is set to 0.\n<br />\n<br />32) BowAndTorch3DFix (v1.7)\n<br />Fixes CTD caused by torch 3D accidently getting attached to the back weapon node in some cases if an actor has both a bow and a torch. \n<br />\n<br />33) PickupItemOwnershipFix (v1.7)\n<br />Fixes two bugs related to picking up dropped ingredient items.\n<br />\n<br />34) SummonAILocationTargetFix (v1.8)\n<br />Fixes a bug in summoned creature AI package initialization that prevents setting of the package's location target.\n<br />\n<br />35) VerboseMessagesFix (v1.8)\n<br />A collection fix for bugs related to the 'Verbose' console command.\n<br />\n<br />36) UIMessageFix (v1.8)\n<br />Fixes notice message queue getting stuck if an empty message gets queued. Also fixes a bug related to the subtitle display timer.\n<br />\n<br />37) CrimeGoldRemovalFix (v1.8)\n<br />Fixes NPC bounty not getting removed after paying and/or when actor is resurrected.\n<br />\n<br />38) ActivateDoorWhileInvisibleFix (v1.8)\n<br />Prevents player getting stuck after activating a load door while Invisibility actor value is not 0.\n<br />\n<br />39) ActorWithoutProcessCTDFix (v1.9)\n<br />A collection fix for CTD caused by some script commands when called on an actor who currently doesn't have an AI process assigned.\n<br />\n<br />40) BoundItemEvaluationFix (v1.9)\n<br />Fixes potential issues with equipped bound weapons during equipment evaluation.\n<br />\n<br />41) CanHaveFlamesFix (v1.9)\n<br />Prevents CTD in script command 'CanHaveFlames' when used on a ref that has no 3D.\n<br />\n<br />42) HighProcessTeleportFix (v1.9)\n<br />Fixes actors occasionally failing to pass through load doors if both the current and the destination cell are loaded.\n<br />\n<br />43) MagicCastFailureSoundFix (v1.9)\n<br />Fixes player cast failure sounds not being played anymore after cell purging and similar cleanup actions.\n<br />\n<br />44) PackageStartEquipmentFix (v1.9)\n<br />Fixes NPC AI package evaluation not checking the Unequip Armor + Unequip Weapons flags on the new package when the package changes.\n<br />\n<br />45) SoundEffectsFix (v1.9)\n<br />Fixes 3D sound effects in the current cell not playing anymore after closing a menu.\n<br />\n<br />46) StaffEnchantmentCastTypeFix (v1.9)\n<br />Prevents the enchantment menu from treating staffs as regular weapons and creating enchantment effects that use the Touch effect range\n<br />instead of the Target range (which is the correct effect range for staffs).\n<br />\n<br />47) UnloadedObjectReferencesFix (v1.9)\n<br />Fixes a bug in the code that unregisters unloaded objects from all other objects that may be referencing them. The bug prevents an\n<br />unloaded object from getting properly unregistered in two places in the player character instance, which causes save game bloat +\n<br />possibly CTD.\n<br />\n<br />48) WeaponSwitchFix (v1.9)(v2.0)\n<br />Fixes creatures with bow and melee weapon switching to hand-to-hand instead of melee weapon when the player gets too close for ranged weapons.\n<br />\n<br />49) CellChangedRefMemLeakFix (v2.0)\n<br />Fixes memory leak and possible CTD at shutdown if specific references that moved from their original cell are loaded from a saved game. \n<br />\n<br />50) ObjectPaletteFix (v2.0)\n<br />Fixes Gamebryo AV object palette (a structure to quickly lookup mesh parts in an object's 3D by name) containing pointers to deleted objects\n<br />after an actor unequips an item, which causes CTD if such an object is accessed later.\n<br />\n<br />51) SavedHavokDataFix (v2.0)(v2.2)\n<br />Fixes two problems related to saving and loading havok (rag-doll) data.\n<br />\n<br />52) CombatBuffSpellSelectionFix (v2.1)\n<br />Fixes wrong classification of Absorb Magicka spell (instead of Spell Absorption) as a buff spell during NPC combat spell selection.\n<br />\n<br />53) HaggleDispositionFix (v2.1)\n<br />Fixes game not using merchant's disposition towards the player for calculating item prices when the player wants to sell something.\n<br />\n<br />54) RemoveExcessDeadFix (v2.1)\n<br />Prevents respawning actors from staying permanently disabled after getting removed by the game's 'Remove Excess Dead'\n<br />routine (which attempts to preserve performance in a complex scene by selectively disabling dead actors).\n<br />\n<br />55) SleepCastLoopFix (v2.1)\n<br />Prevent NPCs from getting stuck in a casting animation loop when they try to restore their own health while attempting to use a bed or bedroll.\n<br />\n<br />56) SneakPowerAttackFix (v2.1)\n<br />Fixes normal sneak attack animation getting replaced with the power attack animation when the player's Acrobatics skill is 50 or higher.\n<br />\n<br />57) BackgroundCellLoadFix (v2.2)\n<br />Fixes two bugs related to background loading of exterior cells, affecting overall stability and performance.\n<br />\n<br />58) InventoryFix (v2.2)\n<br />A collection fix for problems related to containers and actor inventories. See readme for details.\n<br />\n<br />\n<br />Patches\n<br />-------\n<br />1) SmallBushBillboadPatch (v1.0)\n<br />Lowers the threshold size for distant LOD tree billboards from 200x350 to 10x10. Distant LOD for smaller bushes will become visible.\n<br />\n<br />2) EvaluateEquipmentPatch (v1.0)(v1.8)\n<br />Modifies the evaluation hierarchy for equipment slots so that items using multiple slots only get selected by the highest slot in\n<br />the hierarchy. Please refer to the readme file for detailed information about what this patch does as well as potential side effects.\n<br />\n<br />3) CombatBlockPatch (v1.3)\n<br />Modifies blocking behavior to prevent NPCs from blocking even though nobody is hitting them.\n<br />\n<br />4) FloraOwnershipPatch (v1.4)\n<br />Changes flora harvesting so that harvesting owned plants is considered a crime.\n<br />\n<br />5) HavokMovedDataLoadPatch (v1.4)(v2.0)\n<br />Deprecated. Removed and replaced by the SavedHavokDataFix in v2.0. \n<br />\n<br />6) TerrainLODLoadPatch (v1.4)\n<br />Allows LOD mesh and texture files to be named in an alternative, load order independent way to avoid LOD problems with world\n<br />spaces defined in master files. For a more detailed explanation please refer to the readme file.\n<br />\n<br />7) DialogConditionsEvalPatch (v1.7)\n<br />Prevents unexpected behavior in dialog topic item condition evaluation when the topic item's parent quest's condition list ends\n<br />with a condition that has the OR flag set.\n<br />\n<br />8) PluginLoadErrorMessageBoxPatch (v1.7)\n<br />Shows a message box when the game CTDs on startup because of a missing master file. The message tells you the name of the plugin\n<br />that caused the CTD and the master file that is missing.\n<br />\n<br />9) SleepWearPatch (v1.9)\n<br />Unifies the sleep wear behavior for NPCs when they enter a bed. See readme file for details.\n<br />This patch is disabled in the default ini file and must be enabled by the user before it can be used.\n<br />\n<br />10) AIPackageNeverRunFlagPatch (v2.2)\n<br />Allows reviving AI packages which have been tagged by the game with the 'Never Run' flag because their package target died or was deleted.\n<br />\n<br />11) ParentCellUpdatePatch\n<br />Prevents the game from saving movement data (position/rotation/etc.) for every persistent object in exterior cells on load.\n<br />\n<br />\n<br />Credits\n<br />=======\n<br />Thanks to the OBSE team for the Oblivion Script Extender.\n<br />Thanks to Bethesda for creating Oblivion.\n<br />Thanks to TESNexus.com for the a one-stop-shop resource for authors and players.\n<br />Thanks to LHammonds for the Readme Generator this file was based on.\n<br />Thanks to Gruftikus for adding support for the TerrainLODLoadPatch in tes4ll.\n<br />Thanks to everyone who helped with debugging and testing.\n<br />\n<br />\n<br />Legal\n<br />=====\n<br />This mod is provided as \"is\".\n<br />The author is not responsible for any damage done to your save game, game installation\n<br />or even your computer (though such an event happening is highly unlikely).\n<br />Use at your own risk."
