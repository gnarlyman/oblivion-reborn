nexusDescription="[center][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621298719.png[/img]\n<br />[url=http://www.nexusmods.com/oblivion/mods/44676/?][img]https://staticdelivery.nexusmods.com/images/101/2766128-1621211599.png[/img][/url][/center]\n<br />[u][color=#ffff00][i][size=4][b]Description[/b][/size][/i][/color][/u]\n<br />Nuska's Oblivion Character Overhaul is great. No more potato heads, but OCO still has those immersion breaking neckseams. This mod removes the neckseams that have plagued Oblivion and OCO for so long.\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][i][b]Installation Instructions[/b][/i][/size][/color][/u][b]\n<br />[/b][b]1.[/b] Install Nuska's [url=http://www.nexusmods.com/oblivion/mods/44676/?]Oblivion Character Overhaul v2[/url], satisfying all its dependencies.\n<br />[b]2.[/b] If you have Robert Male installed, [color=#ffff00]uninstall[/color] it, completely, all of it. A seamless version will be installed for you.\n<br />[b]3.[/b] Install the \"[b][color=#00ffff]SR- OCOv2 44676[/color][/b]\" package from this mod's MAIN file section.\n<br />[b]4.[/b] Activate Oblivion_Character_Overhaul.esp and the EVE plugins.\n<br />\n<br />Note: The MAIN package contains all stock armors and clothes for vanilla Oblivion + DLC (including Shivering Isles). The body shapes installed are:\n<br />[list]\n<br />[*][size=2]Robert Male v5.2 Muscular[/size]\n<br />[*][size=2]HGEC EVE C-Cup Upperbody + Normal Lowerbody (non-BBB)[/size]\n<br />[/list]\n<br />[b][u][color=#00ffff]If you want to customize your body type, textures, etc... Follow the links below:[/color][/u][/b]\n<br />Male: [url=https://www.nexusmods.com/oblivion/mods/45864]Seamless - Robert Male[/url]\n<br />Female: [url=https://www.nexusmods.com/oblivion/mods/45858]Seamless - HGEC Female[/url] \n<br />Beast Races: [url=http://www.nexusmods.com/oblivion/mods/46578/?]Seamless - Khats &amp; Args[/url], whiskers, tails, and more!!!\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][i][b]Incompatibilities[/b][/i][/size][/color][/u][b][color=#ffff00]\n<br />[/color][/b]Gameplay wise, there shouldn't be any incompatibilities, but some things will cause neckseams, such as:[size=2]\n<br />[/size][size=2][size=2][color=#00ffff]\n<br />NPC Tex Tweak[/color][/size][/size]: Unless you've setup your NPCs exactly like Nuska's, don't use [url=http://www.nexusmods.com/oblivion/mods/13640/]NPC Tex Tweak[/url]. It will cause neckseams.[size=2][size=2][color=#00ffff]\n<br />Self-Shadowing[/color]: Self-Shadows draw a line between the head and body.[/size]\n<br />[/size][size=2][size=2][color=#00ffff]Third party Age-Maps[/color]: That add wrinkles, tattoos, facial scars, etc, that isn't overwritten by the textures here.\n<br />[size=2][size=2][color=#00ffff]ini Settings[/color]: \"[color=#ffff00]bFaceGenTexturing=0[/color]\" in Oblivion.ini will create neckseams. Make sure \"[color=#ffff00]bFaceGenTexturing=1[/color]\".[/size][/size][/size][/size]\n<br />\n<br />\n<br />[color=#ffff00][size=4][u][i][b]Credits[/b][/i][/u][/size][/color]\n<br />Special thanks to Kromgar (aka gerra6) - [url=http://kgtools.org/]KGTools[/url]\n<br />\n<br />Scanti - egtpacker\n<br />the_philanthropy - Optimized Facegen Files\n<br />Luchaire - body.egt\n<br />CapsAdmin - headhuman.egt\n<br />\n<br />Nuska - Head Meshes, Textures\n<br />Robert2 - Male Textures\n<br />nivea - Male Argonian Textures\n<br />ShadyTradesman - Female Argonian Face Textures\n<br />TheNathanParable (SailorTaurus) - Male Khajiit Textures\n<br />\n<br />\n<br />[u][color=#ffff00][size=4][b][i]Licensing[/i][/b][/size][/color][/u]\n<br />You may use and redistribute freely as long as credit is given and you have permission from all the above contributors."
