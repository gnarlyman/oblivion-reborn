nexusDescription="[center][color=#ffff00][b][size=4]==============================[/size]\n<br />[size=6]OOO Shivering Isles[/size]\n<br />by Kobal, Zamir, and others\n<br />[size=4]==============================[/size][/b][/color][/center]\n<br />You may know that [url=https://www.nexusmods.com/oblivion/mods/46199]OOO[/url] always has been incomplete: The SI expansion has never been included and no other comparable overhaul of it exists. This mod aims to become just that, and compliment OOO as well as possible.\n<br /> \n<br />That means the Isles have now proper expansion character. You better get out of your apprenticeship before you attempt to set a foot there, and to actually finish the main questline, that is probably not enough. Come well prepared and bring enough survivability to deal with the forces of madness.\n<br />\n<br />The mod changes just about everything in the Isles, so I won't mention every single detail, but see below for the list of the most notable changes.\n<br />\n<br />[b]Requires [url=https://www.nexusmods.com/oblivion/mods/37952]Oblivion Script Extender[/url]. Does NOT require OOO.[/b]\n<br />\n<br />\n<br />[color=#ffff00][size=4][b][u]Features[/u][/b][/size][/color]\n<br /> \n<br />* Completely remade balance and leveling system of items, creatures and NPCs.\n<br />\n<br />* Greatly increased encounter variance with new creatures who may also fight each other. Stronger enemies may spawn at lower level, and vice versa.\n<br />\n<br />* Many new items, including random and hand placed uniques.\n<br />\n<br />* Amber and Madness sets were expanded and fixed; mostly for weaponry, which is now complete and doesn't lack any weapon type found in the sets from vanilla Oblivion. The weaponry of Golden Saints and Dark Seducers was expanded too.\n<br />\n<br />* All amber and madness weapons, magical or not, will do 30% extra damage vs ordered enemies, but they get healed by their own weapons.\n<br />\n<br />* All clothing and armors that were present in vanilla SI but weren't available can be now obtained as you make your progress through SI's main questline. You can find them in Sheogorath's Palace, among other trophies from your journey.\n<br />\n<br />* You can now turn Vitharn Keep into your personal estate, and get your own smith in there to forge weapons and armor from Obelisk Shards, found on e.g. bodies of the Knights of Order.\n<br />\n<br />* All areas that were inaccessible during the main quest will become available and free to explore once you complete it. This includes also Pinnacle Rock and Brellach (the strongholds of Aureal and Mazken).\n<br />\n<br />* After completing the main quest, you will be able to summon portals to take you from and into Shivering Isles (based on Wrye Shivering).\n<br />\n<br />* Rank specific equipment for Zealots and Heretics.\n<br />\n<br />* Aureals and Mazkens have a much better appearance now (no more ugly faces) and their disposition towards you will be updating properly as you make your progress through SI's main questline.\n<br />\n<br />* Since Shivering Isles features a Knight of the Thorn with a unique shield, a unique model was given to that faction's shield and armor. This is one of the very few changes made to non-SI content.\n<br />\n<br />* The other non-SI change is that the Whom Gods Annoy quest was given an alternate solution for if you talk to Rosentia Gallenus after having already completed the SI questline.\n<br />\n<br />* Your luck affects your chance to find crafting ingredients.\n<br />\n<br />* Various quests were tweaked to be less annoying. For example, Taxonomy of Obsession now provides you with information on which ingredients you're missing. Also, the Hill of Suicides quest is now marked; talk to Erver Devani in Deepwallow to start it.\n<br />\n<br />* Removed automatic popup of the quest.\n<br />\n<br />* Weapons have OMOBS stats.\n<br /> \n<br />\n<br />[b][u][color=#ffff00][size=4]Requirements[/size][/color][/u][/b]\n<br />\n<br />The mod does not technically require OOO, it is just designed in a similar way. Only OBSE is required.\n<br /> \n<br />\n<br />[b][color=#ffff00][size=4][u]Incompatibilities[/u][/size][/color][/b]\n<br />\n<br />Incompatibilities with other mods that change original SI content are very likely. That includes other [url=http://www.nexusmods.com/oblivion/mods/12249/?]FCOM[/url] parts. Best stick to OOO and possibly my add-ons and/or [url=http://www.nexusmods.com/oblivion/mods/42780/?]Maskar's[/url], and maybe some house/graphic mods.\n<br />\n<br />SI part of [url=http://www.nexusmods.com/oblivion/mods/12466/?]Supreme Magicka[/url] can be left out, it conflicts somewhat and does nothing substantial otherwise.\n<br />\n<br />[url=http://www.nexusmods.com/oblivion/mods/38204/?]Really Textured Normal Maps[/url] has some incompatible files (currently known: golden saint helmet).\n<br />\n<br />[url=https://www.nexusmods.com/oblivion/mods/50087]Niben Bay Camp[/url] is incompatible since OOOSI already comes with its own camp on the island.\n<br />\n<br />The mod changes the SI races, thus if you run the game in another language, characters of these races will be mute, unless you edit the mod yourself and change the name of the races back to your own language.\n<br />\n<br />\n<br />[b][color=#ffff00][size=4][u]Load order[/u][/size][/color][/b]\n<br />\n<br />To avoid conflicts, make sure the mod is loaded after:\n<br />\n<br />- [url=https://www.nexusmods.com/oblivion/mods/46199]Oscuro's Oblivion Overhaul[/url]\n<br />- [url=https://www.nexusmods.com/oblivion/mods/11474]SM plugin refurbish[/url]\n<br />- [url=https://www.nexusmods.com/oblivion/mods/35560]Weapon Expansion Pack for Oblivion Nthusiasts[/url]\n<br />- [url=https://www.nexusmods.com/oblivion/mods/2037]Harvest Flora[/url]\n<br />- [url=http://www.nexusmods.com/oblivion/mods/30279/?]Shivering Isles Root System[/url][url=https://www.nexusmods.com/oblivion/mods/18305]\n<br />[/url]- [url=https://www.nexusmods.com/oblivion/mods/50223]SB Weapon Drop Fix\n<br />[/url]- [url=https://www.nexusmods.com/oblivion/mods/45909]Oblivion Content Restoration Project[/url]﻿﻿\n<br />- My other add-ons\n<br /> \n<br />\n<br />[u][b][color=#ffff00][size=4]Uninstallation[/size][/color][/b][/u]\n<br /> \n<br /> First and foremost, DO NOT REMOVE THE MOD'S FILES YET. This mod messes a bit with some objects from vanilla SI, so before you can remove the files, you must do something in-game in order to prevent odd errors from occurring.\n<br />\n<br />1. Load your save.\n<br />\n<br />2. If you're standing in Xedilian, Brellach, Pinnacle Rock or Vitharn, go somewhere else. If you wish to be certain about standing someplace safe, it's best to go to Cyrodiil.\n<br />\n<br />3. Once you're away from those places, type in the console \"setstage OOOSEUninstall 1\". Wait for a few seconds and do what the pop-up message tells you to do.\n<br />\n<br />4. Once you've done it, wait until a confirmation message appears, and then save the game.\n<br />\n<br />5. Now you can safely remove the mod's files.\n<br />\n<br />\n<br />[color=#ffff00][size=4][b][u]Other mods to check out[/u][/b][/size][/color]\n<br />\n<br />[size=3][url=https://www.nexusmods.com/oblivion/mods/45249]Balanced Magic[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45380]Creature Addons For OOO[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45308]Duke Patrick's Combat Archery Patch[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/46028]Equipment Addon For OOO[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/47177]OOO Extended[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45447]Secret City Entrances[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45254]Unleveled Quest Rewards[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/45314]Vanilla Combat Enhanced[/url][/size]"
