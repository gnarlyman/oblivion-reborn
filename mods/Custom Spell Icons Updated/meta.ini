nexusDescription="[center][heading][u][b][size=6]Custom Spell Icons Updated[/size][/b][/u][/center]\n<br />\n<br />REQUIRES [url=http://obse.silverlock.org/]OBSE[/url]\n<br />REQUIRES the dll from either [url=http://oblivion.nexusmods.com/mods/31981]OBME[/url], or from [url=http://oblivion.nexusmods.com/mods/26196]Custom Spell Icons[/url], but not both at the same time!\n<br />The [url=http://oblivion.nexusmods.com/mods/32200]MenuQue[/url] plugin is needed for the custom icon menu addon in the spell menu.\n<br />[/heading]\n<br />\n<br />[size=3]As you might know, the OBSE plugins for the [url=http://oblivion.nexusmods.com/mods/26196]Custom Spell Icons[/url] and Oblivion Magic Extender mods are incompatible with each other: trying to use them both will cause a CTD.\n<br />A shame, since both offer very interesting functionality and it's too bad users have to choose one or the other.\n<br />This mod will try to make up for the loss of CSI to OBME users, by trying to replicate the main features of CSI using OBME functions... as good as OBME can anyways. If you prefer to continue using the CSI dll to avoid other issues derived from OBME, you'll also find this mod offers nice updates to it as well.\n<br />\n<br />CSI provides functions to set, override (if previously set) and clear the spell icon displayed by a spell. OBME unfortunately cannot exactly do this. What it can do, however, is setting the icons for each specific effect in a spell.\n<br />This mod tries to take advantage of that, assuming that the icon displayed by the spell in the regular game is that of the strongest magic effect in it. It also provides some script improvements over the regular CSI implementation... and some drawbacks.\n<br />\n<br />So, first, the bad when using OBME:[/size][list][*][size=3]Due to what seems like a bug in OBME, changing the effect icon of a spell's effect can set that effect's cost to -1, sometimes affecting the entire magicka cost of the spell. This has been kind obscure for me to debug, so I don't really know very well how it works.[/size]\n<br />[*][size=3]You are changing one of the spell's effect icon, not the icon displayed by the whole spell. This leads to some weirdness when the individual effects are displayed in the active effects HUD, since the changed effects will stick out from the rest.[/size]\n<br />[/list][size=3]But there are also some improvements:[/size][list][*][size=3]It seems manually assigned icons didn't persist between game sessions in regular CSI, despite in theory the CSI dll did allow that. In this version's implementation, manually assigned icons should always persist between sessions unless you manually remove them.[/size]\n<br />[*][size=3]The custom [url=http://oblivion.nexusmods.com/mods/32200]MenuQue[/url] icon menu has been [font=Comic Sans MS][u][i][b]BRUTALLY IMPROVED[/b][/i][/u][/font] by moving its operation to a menu event handler, much more performance efficient and always reacts instantly to player clicks. It also can't be scrolled upwards or downwards indefinitely now. Pressing the PgDown or PgUp keys when clicking the up or down arrow will advance a full column of icons, while pressing the Home or End keys will take you to the beginning or end of the list. MOST IMPORTANT, you can define yourself which icons it will show, and how many columns they will be displayed in, from 1 to 11. It's as good as it sounds.[/size]\n<br />[*][size=3]Unlike the fixed ini files that were loaded in regular CSI, here you can define which ini files you load in the main CustomSpellIcons.ini file, allowing more customization. Files to be loaded are now grouped under 'Data&#92;Ini&#92;CSI'. Also a few errors in the default ini files were fixed, and some additions made.[/size]\n<br />[/list][size=3]Installation is pretty much the same as with regular CSI, but again note that ini files have been moved to 'Data&#92;Ini&#92;CSI'. You can edit them and merge any changes you had made to the regular CSI files, or even create your own and define them to be loaded in the main CustomSpellIcons.ini\n<br />Operation in game is the same as regular CSI: you assign icons to your active spell or remove them with the keys defined in CustomSpellIcons.ini, and the spell icon menu is available if [url=http://oblivion.nexusmods.com/mods/32200]MenuQue[/url] is installed.\n<br />\n<br />I take no credit for the mod as the idea and work for the original CSI mod is from statttis, so all recognition goes to him and the collaborators who made that mod's resources. Drop him an endorsement and a kudos if you haven't.\n<br />Enjoy.[/size]"
