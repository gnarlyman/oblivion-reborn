nexusDescription="Description\r\nI have made all the basic weapons in the game from a club to Daedric offhand these can be bought from vendors. They act as shields unless you have DMC stylish I highly recommend this mod because you will be able to attack with the offhand weapons as well as the regular ones. All of these items are leveled so you wont get overpowering weapons. This is my first mod so if you see any bugs or have any good ideas to improve it contact me. Use this mod freely. The blades offhand weapon can be found in the armory at cloud ruler temple i also put all of the rusty weapons next to them in a chest called old weapons. \r\n\r\nInstallation \r\nNormal \r\nCopy esp, meshes and textures to oblivion data folder and then activate the esp in data files.\r\n\r\nOMOD \r\nRequires oblivion mod manager click create then add archive then create OMOD in OBMM or if you download the OMOD version open the archive and double click the OMOD then activate in OBMM.\r\n\r\nUninstall\r\nNormal\r\nDelete all data files and esp.\r\n\r\nOMOD\r\nDeactivate the OMOD and/or delete.\r\n\r\nCredits \r\nOblivion team for original meshes and textures.\r\n\r\nOther mods present in images\r\nHGEC body\r\nDMC stylish\r\nCultist Robes\r\nCute Elves\r\nAssassins Creed Armor\r\n\r\nExtra \r\nIf you would like to check out all the weapons without having to buy them go to testing hall i have placed a chest in there with all the offhand weapons.\r\n\r\nFuture Plans \r\nAdding these items to hostile npcs in dungeons and Daedra.\r\nAdding unique offhand versions into quest rewards.\r\nMaking enchanted offhand versions for higher level Loot.\r\n\r\nOffhand weapons\r\n\r\nAkaviri Katana\r\nClub\r\nDaedric Dagger\r\nDaedric Longsword\r\nDaedric Mace\r\nDaedric Shortsword\r\nDaedric War Axe\r\nDwarven Dagger\r\nDwarven Longsword\r\nDwarven Mace\r\nDwarven Shortsword\r\nDwarven War Axe\r\nEbony Dagger\r\nEbony Longsword \r\nEbony Mace \r\nEbony Shortsword\r\nEbony War Axe\r\nElven Dagger \r\nElven Longsword \r\nElven Mace\r\nElven Shortsword\r\nElven War Axe\r\nGlass Dagger \r\nGlass Longsword\r\nGlass Mace \r\nGlass Shortsword\r\nGlass War Axe\r\nFine Steel Dagger \r\nFine Steel Longsword\r\nFine Steel Mace\r\nFine Steel Shortsword\r\nFine Steel War Axe \r\nSteel Dagger \r\nSteel Longsword\r\nSteel Mace\r\nSteel Shortsword\r\nSteel War Axe\r\nIron Dagger \r\nIron Longsword\r\nIron Mace\r\nIron Shortsword\r\nIron War Axe \r\nRusty Iron Dagger \r\nRusty Iron Longsword\r\nRusty Iron Mace\r\nRusty Iron Shortsword\r\nRusty Iron War Axe\r\nFine Iron Dagger \r\nFine Iron Longsword\r\nFine Iron Mace\r\nFine Iron Shortsword\r\nFine Iron War Axe\r\nSilver Dagger \r\nSilver Longsword\r\nSilver Mace\r\nSilver Shortsword\r\nSilver War Axe\r\n\r\nTo anyone who experience any inconveniences with the rusty weapons and blades weapons in the cloud ruler temple i let you know that they will not be there in the next version and you will find them on creatures.\r\n\r\n\r\n\r\n\r\n"
