nexusDescription="[b][center][color=#bf9000][size=6]Description[/size][/color][/center][/b]Original LINK is great. It do what it meant to do, and do it pretty damn good. But there's no limit to perfection, is there? This mod is a modified version of LINK (many thanks to Maskar for open permissions). It extends original LINK's functionality, while preserving full backward compatibility for mods designed to work with original LINK (if it works with LINK, it will work with LINK++ as well). \n<br />[img]https://staticdelivery.nexusmods.com/mods/101/images/53352/53352-1694303451-1920702679.png[/img]\n<br />So what this mod exactly extends? First and the most important - it allows a new way of defining mod configuration entries for LINK's menu through xOBSE event handlers. This approach gives you the following benefits:\n<br />[list]\n<br />[*]You have full control of when configuration of your mod becomes available. Original LINK's approach allows you to configure any mod at any time (even while in main menu and the game is not even started yet!). This may break your mod's logic if it doesn't expects to be configured in uninitialized state. With LINK++ only you decide when your mod can and can't be configured. You may even temporary disable your mod's configuration if it performs some heavy initialization/update and shouldn't be disturbed while doing this.\n<br />[*]Original LINK also provides no guarantees that your OnSettingsUpdated event handler will be invoked (you may configure your mod before handler is set), LINK++ guarantees that (if you define one, of course).\n<br />[*]It removes the implicit and allows greater flexibility. Unlike in original LINK that derives mod's .cfg and .ini paths from mod's file name, with LINK++ you can explicitly define path to .cfg file and paths to mod's .ini files (yes, you can now define multiple or even none .ini files for your mod).\n<br />[*]You can now define multiple configuration entries for one mod. This is a very useful at least in 2 scenarios: 1 - if you have really-REALLY big mod that is technically one .esp file, but it is modular in it's nature and have waaaay too many configurations to fit in one menu (yes, I'm looking at you, MOO). 2 - you want to be able to merge your mod with other mods (that may also possibly support LINK) and still be able to configure them all with LINK.  \n<br />[*]One mod can now define configuration entries for other mods. This is very useful for adding LINK++ support for some ancient legacy mods that no one care to update anymore (see [b][url=https://www.nexusmods.com/oblivion/mods/53354]Configuration Items Begone[/url]﻿[/b] for example). \n<br />[*]Mod can optionally define its display name that will be shown in LINK++'s menu as well as description and version that will show on mouse over.\n<br />[*]You can now define custom icon for your mod that will be displayed in mods list menu! It's also configurable, you can disable custom icons if you want.\n<br />[*]Solves problem with duplicated menu entries if you have .esm and .esp files with the same name.\n<br />[*]Allows to add some custom pre-processing before mod config menu will be opened.\n<br />[/list]\n<br />[b][center][size=4]Other features:[/size][/center][/b][list]\n<br />[*]Added new type of setting: action button. It's a button that will run its callback when pressed. Useful for doing stuff like previewing sounds, showing some mod's info, opening book with the guide to your mod, etc, the possibilities are limited only by your imagination. Also useful for porting old mods with complex custom configuration menus to LINK++. Demo:\n<br />[spoiler][img]https://staticdelivery.nexusmods.com/mods/101/images/53352/53352-1694304128-1339981690.png[/img][/spoiler][*]You can now specify conditions that must met in order for configuration to be displayed. Conditions will be updated on every setting change. This, for example, can be useful if some configuration becomes irrelevant when other configuration is enabled, or if some configuration is only relevant when you have certain mod installed, etc. Demo: \n<br />[spoiler][img]https://staticdelivery.nexusmods.com/mods/101/images/53352/53352-1695053885-1355593638.gif[/img]﻿[/spoiler][*]Pressing \"Return\" button in mod's configuration menu will now return you to mods list menu (with previous slider position preservation) instead of escape menu. This behavior is configurable.\n<br />[*]Changed some default LINK's settings, now mods are sorted by names and only configurable mods are shown in mods list menu. This makes LINK++ a bit more MCM-esque.\n<br />[*]Added simple and straightforward API for invoking LINK++ menus from scripts. This can be useful for integrating LINK++ menus directly in your UI mod. Here is an example how [url=https://www.nexusmods.com/oblivion/users/2917605]Slowpard[/url]﻿ used it in his \"[url=https://www.nexusmods.com/oblivion/mods/53328]Progress tracker[/url]﻿\" mod: \n<br />[spoiler]   [img]https://staticdelivery.nexusmods.com/mods/101/images/53352/53352-1695055881-1603482842.gif[/img]﻿[/spoiler][*]Doesn't store any redundant data in save file.\n<br />[*]Improved code, fixed some potential bugs. Added more validation, now it's a bit harder to misuse LINK.\n<br />[*]Add logging to many places with different level, you can configure log level in .ini file or LINK++ menu for troubleshooting.\n<br />[/list]\n<br />[b][center][color=#bf9000][size=6]Installation[/size][/color][/center][/b]\n<br />Install all requirements first (see them in [b]\"Requirements\"[/b] section). Download archive, install it with your favorite mod manager as you would install any other mod.\n<br />[center]﻿[/center][center][b][color=#bf9000][size=6]Update[/size][/color][/b]﻿[/center]Unlike original LINK, LINK++ [b]DOES NOT[/b] supports updating from previous versions without clean save (and it's generally a bad idea to update mods this way). If you want to update to a new version or upgrade from original LINK:\n<br />[list]\n<br />[*]If you have ConScribe installed, export your current settings. They will reset to defaults after you'll uninstall LINK/LINK++.\n<br />[*]Uninstall the previously installed version.\n<br />[*]Make a clean save. \n<br />[*]Install a new version.\n<br />[*]If you've exported your settings previously, import them.\n<br />[/list]\n<br />[center]﻿[/center][center][color=#bf9000][size=6][b]Compatibility[/b][/size][/color][/center]Basically the same as for original LINK: might be incompatible with mods that alters escape menu (although, I'm not aware of any besides original LINK). \n<br />\n<br />[list]\n<br />[*]Currently automatically supports the following UI mods: [url=https://www.nexusmods.com/oblivion/mods/10763]DarNified UI[/url], [url=https://www.nexusmods.com/oblivion/mods/11280]DarkUI'd DarN[/url], [url=https://www.nexusmods.com/oblivion/mods/48662]Dark Transparent UI[/url] and [url=https://www.nexusmods.com/oblivion/mods/48577]NorthernUI[/url]. Other UI mods should probably use vanilla menu, but it's not guaranteed, since it's hard to precisely determine what UI mod you have installed. \n<br />[*]Incompatible with original LINK. If you want to upgrade from LINK to LINK++, uninstall LINK and make a clean save first.\n<br />[/list]\n<br />[size=6][center][b][color=#bf9000]Future plans[/color][/b][/center][/size][list]\n<br />[*]Add new setting type for strings with input text field.\n<br />[*]Add new setting type for numbers with input text field.\n<br />[*]Add new setting type for key combinations.\n<br />[*]Make it possible to disable key setting.\n<br />[*]Add new setting type for all types of arrays.\n<br />[*]Add new setting type for colors that would allow you to select [b]RGB[/b] value with slider and preview it in real time.\n<br />[*]Show which settings are and which are not exportable/importable. \n<br />[*]Add possibility to add handler for action button setting import/export.\n<br />[*]Implement import/export profile system.\n<br />[*]Implement import/export for each module separately.\n<br />[*]Make it possible for vanilla modules to use some of LINK++ features (custom icons, custom display name, custom description, limited action buttons).\n<br />[*]Improve cfg_setting_title displaying (make it possible for more characters to display). \n<br />[*]Optimize stuff a lil bit.\n<br />[/list]\n<br />[center][color=#bf9000][size=6][b]Permissions[/b][/size][/color][/center]\n<br />I don't care about permissions, and I also believe this fixation on permissions is a huge setback for the entire modding community. You can do whatever you want with this mod. Don't forget that some assets of this mod belongs to [url=https://www.nexusmods.com/oblivion/users/1006768]Maskar[/url] though, so if you would like to create LINK#, don't forget to credit him.\n<br />\n<br />\n<br />[b][color=#bf9000][size=6][center]Credits﻿﻿[/center][/size][/color][/b][list]\n<br />[*]OBSE team and [url=https://www.nexusmods.com/users/1902248]llde[/url]﻿ in particular for maintaining xOBSE.\n<br />[*][url=https://www.nexusmods.com/oblivion/users/1006768]Maskar[/url]﻿ for original LINK that inspired this mod and from which this mod uses all assets and more than half of its scripts.\n<br />[/list]"
