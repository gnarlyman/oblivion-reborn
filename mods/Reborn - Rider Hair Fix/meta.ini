notes=Clears LNAM (hair length) on the 17 vanilla mounted Imperial Legion rider NPCs (000700C0-000700CD + 0018BA86/88/89). Hypothesis: non-zero LNAM triggers per-NPC hair allocation via Oblivion's LFM/IOManager hazard-pointer protocol; for these quest-flagged NPCs the allocation races on free during BSTaskThread actor 3D-load (sub_4328B0+0x5A, sub_433BC0+0x191, etc. UAFs). Setting LNAM to 0 makes the engine use race-default hair length (cached, no per-NPC alloc), removing the LFM stress for these NPCs. Visual cost: imperceptible (race-default hair length on already-helmeted patrols). Built by D:/Modlists/Reborn/research/build_rider_hair_fix.py 2026-05-05.
