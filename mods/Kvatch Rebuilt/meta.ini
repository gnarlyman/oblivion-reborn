nexusDescription="[center][font=Georgia][size=6][u]KVATCH REBUILT[/u]\n<br />[/size][size=5]A HOPE RENEWED[/size]\n<br />[/font][/center][font=Georgia]\n<br />\n<br />[size=5]DESCRIPTION[/size][size=3]\n<br />Rebuild Kvatch through a series of quests spanning several weeks of building and adventuring. Become the new count(ess) or help the rightful heir find his way back to the throne. Get your own statue in the city and fight in the arena to become the new champion!\n<br />\n<br />Uncover the dark secrets of old Kvatch! Fight through large dungeons and solve various puzzles. Two unique boss fights and fantastic locations to explore!\n<br />\n<br />Experience Kvatch before the Oblivion invasion. Are the fires still lit, is the emperor still alive? Then Kvatch stands as the magnificent city that it is![/size]\n<br />\n<br />\n<br />[size=4][b]Key Features:[/b][/size]\n<br />[/font][list][*][font=Georgia][size=3]Rebuild Kvatch through a series of quests.[/size][/font]\n<br />[*][font=Georgia][size=3]Become Count(ess) of Kvatch or place the rightful heir on the throne![/size][/font]\n<br />[*][font=Georgia][size=3]Become the new champion of the rebuilt Kvatch Arena.[/size][/font]\n<br />[*][font=Georgia][size=3]Venture deep below Kvatch to uncover dark secrets of a time long gone.[/size][/font]\n<br />[*][font=Georgia][size=3]Experience Kvatch before the Oblivion invasion.[/size][/font]\n<br />[*][font=Georgia][size=3](WIP) New, highly detailed companion with a compelling story.[/size][/font]\n<br />[*][font=Georgia][size=3]Voice over for (almost) all characters.[/size][/font]\n<br />[/list][font=Georgia]\n<br />[size=4][b]What will version 3.0 bring?[/b][/size]\n<br />[size=3]The city before the invasion will be highly detailed, filled with all the old characters and a whole slew of new ones. Visit Jiub as he writes his book, listen to a less insane Ilav, and pray with Martin in the chapel. We are designing the city with a new vision; not to match the cities of vanilla Oblivion, but rather to meet the standards of mods like Better Cities. We will make the pre-invasion city in this spirit, as well as update the rebuilt city with this vision in mind.\n<br />\n<br />Along with that we are improving performance and fixing all the bugs we can.\n<br />[/size][/font][size=3]\n<br />[/size][font=Georgia]\n<br />[size=5]INSTALLATION[/size]\n<br />[b][size=4]Vortex (recommended)[/size][/b]\n<br />[size=3]Use the [b]Mod Manager Download[/b] button. Install and enable the mod.[/size]\n<br />\n<br />[b][size=4]Wrye Bash BAIN[/size][/b]\n<br />[size=3]Drop the archive into your Oblivion ModsBash Installers folder, then install and enable as usual.[/size]\n<br />\n<br />[b][size=4]Manual[/size][/b]\n<br />[size=3]Extract [i]Kvatch Rebuilt.esp [/i]and [i]Kvatch Rebuilt.bsa[/i] from the archive to your Data folder. Activate the mod using whatever mod manager tool suits you.\n<br />\n<br />[/size]\n<br />[size=3]As soon as you start playing you should see a message in the upper left corner telling you that Kvatch Rebuilt is being initialised. If no such message appears you have not intalled the mod correctly or your missing certain requirements (OBSE or Shivering Isles).[/size]\n<br />\n<br />\n<br />[size=5]UNINSTALLATION[/size]\n<br />[size=3]Due to the way Kvatch Rebuilt is incorporated into the vanilla game it is never recommended to uninstall it mid-game. However, if you absolutely must do that, follow the uninstallation method as described below to possibly avoid the most game-breaking issues:[/size][size=3]\n<br />[/size][/font][list=1]\n<br />[*][font=Georgia][size=3][size=3]Go to an interior cell away from Kvatch, open up the console and enter [[size=3]SetStage KRUninstall 10[/size]][/size][size=3].   [/size][/size][/font]\n<br />[*][size=3][font=Georgia][size=3]Wait 10 seconds.[/size][/font][/size]\n<br />[*][font=Georgia][size=3] Save and exit, then deactivate 'Kvatch Rebuilt.esp'. [/size][/font]\n<br />[*][font=Georgia][size=3]Start the game and load the save you just made, then save again.[/size][/font]\n<br />[*][font=Georgia][size=3]Delete 'Kvatch Rebuilt.esp' and 'Kvatch Rebuilt.bsa'.[/size][/font]\n<br />[*][font=Georgia][size=3]Load the save you just made and pray to the nine that everything works.[/size][/font]\n<br />[/list][font=Georgia][size=3]\n<br />[/size][/font][font=Georgia][size=3]If you are starting a new game you can uninstall like normal without this procedure.\n<br />\n<br />[/size][/font][font=Georgia]\n<br />[size=5]COMPATIBILITY &amp; [size=5]PATCHES[/size][/size]\n<br />[/font][list][*][font=Georgia][size=3][b][color=#cc0000]Other Kvatch Mods:[/color][/b] Kvatch Rebuilt is presumed incompatible with any other mod that changes Kvatch.[/size][/font]\n<br />[*][font=Georgia][size=3][b][color=#f1c232]Oblivion Character Overhaul:[/color][/b] AI and dialogue of vanilla characters does not function properly (﻿[/size][size=3][size=3][url=https://www.nexusmods.com/oblivion/mods/46249/]Patch[/url] | load OCO before Kvatch Rebuilt)[/size].[/size][/font]\n<br />[*][font=Georgia][size=3][color=#6aa84f][b]OOO/Francesco/FCOM/Warcry/WAC/Creature Diversity:[/b][/color] Fully compatible, must load before Kvatch Rebuilt.[/size][/font]\n<br />[*][font=Georgia][size=3][b][color=#f1c232]Weather - All Natural:[/color][/b] [size=3][size=3]Kvatch Rebuilt's weather system causes issues with the weather in All Natural[/size][/size] ([size=3][url=http://www.nexusmods.com/oblivion/mods/18305/?]Patch[/url][/size]).[/size][/font]\n<br />[*][font=Georgia][size=3][color=#f1c232][b]Unique Landscape - Cheydinhal Falls:[/b][/color] Important Quest-Objects buried underground, as well as land tears[size=3] ([url=http://www.nexusmods.com/oblivion/mods/13834/?]Patch[/url]﻿)[/size].[/size][/font]\n<br />[*][font=Georgia][size=3][color=#cc0000][b]Oblivifall:[/b][/color] Landscape issues. Kvatch chapel does not have the visual/sound modifications introduced by Oblivifall.[/size][/font]\n<br />[*][font=Georgia][size=3][b][color=#6aa84f]Oblivion XP:[/color] [/b]Support for Oblivion XP is integrated into Kvatch Rebuilt (Oblivion XP version 4.3+).[/size][/font]\n<br />[*][font=Georgia][size=3][color=#f1c232][b]The living and the dead:[/b][/color] Conflict in some locations.[/size][/font]\n<br />[*][font=Georgia][size=3][color=#f1c232][b]ShadeMe/ShadeMe enhanced:[/b][/color] Possible CTD when playing the Underground part of Kvatch Rebuilt. Disabling during that part of the mod and enabling again after is a possible fix.[/size][/font]\n<br />[/list][list][*][font=Georgia][size=3][b][color=#f1c232]Open Cities:[/color][/b] AI issues in Skingrad, landscape issues in Anvil ([url=http://www.nexusmods.com/oblivion/mods/32925/?]Patch[/url]).[/size][/font]\n<br />[*][font=Georgia][size=3][b][color=#f1c232]Leyawiin Woodland[/color][/b]: Kvatch Cobblestone Roads turn Grass Green. [/size][/font]\n<br />[/list][font=Georgia]\n<br />\n<br />[size=5]TRANSLATIONS[/size]\n<br />[/font][list][*][font=Georgia][size=3][url=http://www.confrerie-des-traducteurs.fr/oblivion/mods/cyrodiil/villes_et_villages/reconstruction_de_kvatch.php]French[/url] (3.0RC3) - by Arcenild, Sita, and Oaristys[/size][/font]\n<br />[*][font=Georgia][size=3][url=http://www.nexusmods.com/oblivion/mods/47596/?]Spanish[/url] (3.0RC3) - by Joe1984 ace[/size][/font]\n<br />[/list][font=Georgia]\n<br />\n<br />[size=5]QUEST START[/size]\n<br />[size=3]The mod itself kicks in from the moment you start the game, with a message in the upper left corner telling you that Kvatch Rebuilt is being initialized. If the Amulet of Kings has not yet been delivered to Jauffre, the city will be restored to how it would look before the Daedra attack. As soon as you deliver the amulet the attack will commence as usual. [size=3] Once the quest 'The Battle for Castle Kvatch' is complete the Kvatch camp will be dismantled and its people will start moving into the city, and in about two weeks a messenger will come looking for you.[/size][/size]\n<br />\n<br />\n<br />[size=5]SUPPORT[/size]\n<br />[/font][list]\n<br />[*][font=Georgia][size=3]Kvatch still looks burnt from the distance even after it's been rebuilt. This can be resolved by updating the LOD through TES4LodGen.[/size][/font]\n<br />[*][font=Georgia][size=3]The ground is still burnt around the city even after it's been rebuilt. This is due to a limitation in the game engine. This can be resolved by loading the \"No More Burned Ground\" patch after 'Kvatch Rebuilt.esp'. [/size][/font]\n<br />[*][font=Georgia][size=3]It is advisable to load Kvatch Rebuilt after OOO/FCOM and (Open-) Better Cities.[/size][/font]\n<br />[*][font=Georgia][size=3]If you are updating from an old version of Kvatch Rebuilt (prior to 3.0) you must start a new game, as the old versions can not be directly updated. Also make sure to delete 'Kvatch Rebuilt.esm' if it is present in your Data folder.[/size][/font]\n<br />[*][font=Georgia][size=3]To disable quest markers type [Set KRGlobal.QMarkOff 1] in the console.[/size][/font]\n<br />[*][font=Georgia][size=3]The Pre-Invasion city is still a work in progress. Hopefully it will be fully developed for the finished release of 3.0.[/size][/font]\n<br />[/list][center][font=Georgia]﻿\n<br />[/font][/center][center][font=Georgia][size=5]\n<br />[/size][/font][font=Georgia]\n<br />﻿﻿[url=https://discord.gg/YaecPTR][img width=374,height=93]https://staticdelivery.nexusmods.com/images/101/423040-1541626518.png[/img][/url]﻿[/font][/center]"
