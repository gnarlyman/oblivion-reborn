nexusDescription="[color=green]UFF Unrepentant Archer (A.k.a. Wood Bows & Leather Armors)[/color]\r\nOriginal Mod by Brash\r\nUFF version by Luchaire\r\n2 May 2008\r\n\r\n[b][color=red]REQUIREMENTS:[/color][/b]\r\nFantasy Figures Female Body Replacer:\r\nhttp://www.bethsoft.com/bgsforums/index.php?showtopic=816205\r\n\r\n\r\n[b]SUMMARY[/b]\r\n=======\r\n\r\nThis adds Fantasy Figures versions of female armors found in Brash\\'s Unrepetant Archer mod (a.k.a. \\\"Wood Bows and Leather Armors\\\"). No other changes have been made to the mod in any way. All original details still apply. Note that the original mod, as released by Brash, is technically still in beta state and thus subject to upgrade or modification by Brash (significant changes are unlikely, however, as it works fine as it is). Should that happen, I will update this mod to match.\r\n\r\nNaturally, there are male versions of all outfits as well!\r\n\r\n\r\n[b]DETAILS[/b]\r\n=======\r\n\r\nThis mod adds a number of leather type armors and 11 new bows to the game. All of them are in use (and for sale) by a group of archers who have a camp to the west of Weye. (Brash noted that she may move this camp, but for now, there it is!)\r\n\r\nThe archers will sell items they are modelling, and Marissa the head fletcher sells everything (it seems less confusing \r\nunderstanding what items look like, if you can buy direct from the vendor modelling it).\r\n\r\nIt also adds fletching components for making your own arrows (these, too, can be had from the archers in the camp).\r\n\r\nBrash\\'s forum thread for discussion of the mod:\r\nhttp://www.bethsoft.com/bgsforums/index.php?showtopic=647083\r\n\r\n\r\n[b]Install[/b]\r\n=======\r\n1. Extract files to \\\\Oblivion\\\\Data\\\\\r\n2. Start Oblivion Launcher, click \\'Data Files\\', place a checkmark beside the UFF_Unrepentant_Archer.esp file\r\n\r\n\r\n[b]Uninstall[/b]\r\n=========\r\n1. Start Oblivion Launcher, click Data Files, uncheck the .esp file(s).\r\n2. Delete the files/folders associated with the mod.\r\n\r\nOblivion\\\\Data\\\\UFF_Unrepentant_Archer.esp\r\nOblivion\\\\Data\\\\meshes\\\\UnrepentantArcher\r\nOblivion\\\\Data\\\\textures\\\\UnrepentantArcher\r\nOblivion\\\\Data\\\\textures\\\\menus\\\\icons\\\\UnrepentantArcher\r\n\r\n[b]Known Issues[/b]\r\n============\r\n(per Brash)\r\n\r\n1. The various archers who are practicing shooting in the background, sometimes switch to shooting each other when they\\'ve been distracted. Nobody seems to get mad or hurt, and I kinda give up on fixing this, hopefully it won\\'t seem too odd.\r\n\r\n2. The \\\"court leathers\\\" just have a token texture in now for boots/gloves, doesn\\'t match the cuirass/greaves yet and I will work on this so they match.\r\n\r\n3. I still need to finetune some item stats so that the lowcost items have the lowest ststas, and highend expensive \r\nitems have the best stats, right now some are probably out of sync still.\r\n\r\n4. There is a \\\"cheat\\\" for people who want items without paying, this seemed the easiest way to manage it: the middle archery target is actually a locked container with a missing key, if you select it in console and type unlock you can have free access to all of the items.\r\n\r\n5. Right now there is no extra dialogue in, and I am not sure whether anyone cares. I\\'m a half decent writer and have done dialogue in Morrowind, but for some reason I just go \\\"bleh\\\" when I think about starting any. There won\\'t be any voice acting anyway so I am not sure if just the standard generic \\\"hello how are you\\\" greetings are fine, or if people really want more background and immersion in some unique dialogue.\r\n\r\n[b]Also, this mod will conflict with others which expand the Weye area westward (such as Weye_TICS).[/b]\r\n\r\n\r\n[b]Contact[/b]\r\n=======\r\nYou can find me on the official Elder Scrolls forums or CanadianIce forums as Luchaire, or email me at Luchaire@gmail.com\r\n\r\n\r\n[b]Credits[/b]\r\n=======\r\nThanks to Brash for the original Unrepentant Archer mod.\r\nThanks to JClyde for making uncooperative meshes fit and then fixing them, and then fixing them again.\r\nThanks to acidrain for the TFF_Wearable_Pants, which provided one of the meshes for this.\r\nCredit also goes to Nico and Someone1014 for original components of this mod.\r\nIf there are other credits due that I don\\'t know about - let me know and I will amend this!\r\n\r\n\r\n[b]Licensing/Legal[/b]\r\n===============\r\nThis mod may not be modified or redistributed without permission - All rights to this mod remain Brash\\'s and any permission inquiries should be directed to her. Modified for Fantasy Figures by permission."
