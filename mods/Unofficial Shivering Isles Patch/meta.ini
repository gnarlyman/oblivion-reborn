nexusDescription="This mod is a joint effort to fix the vast amount of bugs currently existing in the Shivering Isles expansion pack for Oblivion v1.2.0416. If you're experiencing a bug with Shivering Isles and it's not fixed by our mod please by all means report the bug to us in as much detail as possible so we can try to fix it! Also if you find any: levitating trees or rocks, see-through or fall-through walls/objects or other stuff out of place, please let either of us know in the official forums' thread. To get the exact location, use the console commands [b]sdt 0[/b] and then [b]tdt[/b], click the item, note the Cell (not PC Cell) and form ID value (the eight hexadecimal digits at the top, ie 00123ABC) and indicate what's out of place. You can use [b]tdt[/b] again to toggle the debug display off. Thank you and we hope you have a better Shivering Isles experience!\n<br />\n<br />[b]Warning: Only use the Unofficial Shivering Isles Patch with the version of Oblivion is was created for! Using it on an older version than v1.2.0416 of Oblivion may cause bugs or things not to be fixed that were advertised as such![/b]\n<br />\n<br />Please report any new bugs on our project bug tracker at [url=https://afktrack.afkmods.com/index.php?a=issues&amp;project=36]AFK Mods[/url]﻿\n<br />\n<br />[b][u]Known Issues, Incompatibilities and Notes\n<br />[/u][/b]\n<br />-None currently known.\n<br />\n<br />[b][u]FAQ (Frequently Asked Questions)[/u][/b]\n<br />\n<br />[b]Q:[/b] Do I still need the Unofficial Oblivion Patch?\n<br />[b]A:[/b] Yes, the Unofficial Shivering Isles Patch only fixes things added by the Shivering Isles expansion.\n<br />\n<br />[b]Q:[/b] Will this conflict with OOO/MMM/Fran's/FCOM etc.? Is it alright to use together?\n<br />[b]A:[/b] Yes the Unofficial Shivering Isles Patch does conflict but nothing that is known to cause problems, other than not receiving some of the advertised fixes from USIP; always load USIP before any other mod and you'll be fine. If you're using Fran's (MOBS or non-MOBS) a Fran's version of the USIP is available [url=https://www.nexusmods.com/oblivion/mods/17621]here[/url]. If you're using FCOM also install the \"Frans Optional Leveled Quests-SI Only.esp\" available from the same location. There's also an FCOM-only version there without the Fran's Amber/Madness overhaul.\n<br />\n<br />[b]Q:[/b] I see so many red conflict with the Unofficial Shivering Isles Patch and other mods!!! Will my game explode?!?\n<br />[b]A:[/b] Nope! The file date of Unofficial Shivering Isles Patch.esp was set way back to the year 2002 so it will load first then your other plugins, in other words if something conflicts with USIP that plugin will override USIP's changes. [b]Note:[/b] since USIP's changes are overridden some fixes might not work.\n<br />\n<br />[b]Q:[/b]Unofficial Shivering Isles Patch.esp shows conflicts with Unofficial Oblivion Patch.esp! How come?\n<br />[b]A:[/b] There are a few scripts that the UOP fixes that needed even more updating when Shivering Isles came along. For example, the UOP fixes a bug with the scripting for the Gray Cowl of Nocturnal, but Shivering Isles added another bug to it because of the split between normal and Shivering Isles bounties, so the same script needs to be in both. As long as Unofficial Oblivion Patch.esp loads before Unofficial Shivering Isles Patch.esp there should be no problems; any required fixes from the UOP will be in the USIP if they would be overridden.\n<br />\n<br />[b]Q:[/b] Unofficial Shivering Isles Patch.esp is loading before Oblivion.esm!!! Won't my game get screwed up?\n<br />[b]A:[/b] No, Oblivion loads ESM files (like Oblivion.esm) from oldest to newest first before loading ESP files (like Unofficial Shivering Isles Patch.esp) from oldest to newest.\n<br />\n<br />[b]Q:[/b] Will I have to start a new game for the Unofficial Shivering Isles Patch to work?\n<br />[b]A:[/b] Nope, the fixes were made to work on both new and existing games through some very minor changes (position of some objects) will only work in a new game or if you haven't visited that area in the game yet, really not worth restarting over.\n<br />\n<br />[b]Q:[/b] Can I use the Unofficial Shivering Isles Patch with the German version of Oblivion or other languages?\n<br />[b]A:[/b] It should work fine but we can't test it also some things will appear in English instead of your game's language.\n<br />\n<br />[b]Q:[/b] So I have an older version of the Unofficial Shivering Isles Patch, should I uninstall it first before upgrading or just upgrade over the top?\n<br />[b]A:[/b] Best to uninstall first though it isn't needed.\n<br />\n<br />[b]Q:[/b] Do I need to use previous versions of the Unofficial Shivering Isles Patch to get all the fixes?\n<br />[b]A:[/b] Nope, latest version includes all previous fixes.\n<br />\n<br />[b]Q:[/b] So I've installed the Unofficial Shivering Isles Patch but it still shows as v1.2.0416 in Oblivion, what's wrong?\n<br />[b]A:[/b]  Nothing is wrong! The Unofficial Shivering Isles Patch is a collection of fixes in the form of a ESP along with fixes in other files (NIF etc..) The Unofficial Shivering Isles Patch does not touch ANY Oblivion files on a default installation. If you want to see what version of the Unofficial Shivering Isles Patch you are running then open the menu with [b]startquest usip[/b] in the console while playing, or open up the Oblivion Launcher, click Data Files and then find and click the Unofficial Shivering Isles Patch.esp.\n<br />\n<br />[b]Q:[/b] The reference ID bug (FBomb) was fixed in Oblivion v1.2.0416... so why don't you remove your fix for it then? I don't like useless clutter!\n<br />[b]A:[/b] Even though the game was improved so reference ID's can be reused again it didn't actually fix the real bug, and that was a strange interaction between AI packages and scripts controlling the AI packages. Even with Oblivion v1.2.0416 those few guard scripts are still bugged and generating thousands of reference ID's every few seconds (won't cause the game to behave strangely like before though) draining CPU power for a pointless activity, the fix will remain in the Unofficial Shivering Isles Patch until Bethesda actually fixes it.\n<br />\n<br />[b]Q:[/b] I'm getting NO GREETING when I talk to NPC's, whats wrong?\n<br />[b]A:[/b] Majority of the time this is caused by using mods or console commands that move you between Tamriel and Shivering Isles like Mark and Recall etc, simply use the official gateway to the Shivering Isles and this will stop the problem from occurring and also correct it if you are already afflicted with it. [b]Note:[/b] Some NPC's in Shivering Isles aren't meant to be talked to and thus when talked to you get NO GREETING, we've already fixed quite a few of these if you happen to find anymore please let us know.\n<br />\n<br />[b]Q:[/b] My game crashes when attacking Sheogorath, not meant to crash is it??\n<br />[b]A:[/b] While quite humorous it isn't meant to crash. User Interface (UI) mods have been known to cause this problem, either remove them or upgrade them to a version that supports Shivering Isles.\n<br />\n<br />[url=https://www.afkmods.com/Unofficial%20Shivering%20Isles%20Patch%20Version%20History.html]Complete changelog can be found here[/url] and is also installed with the USIP.\n<br />[url=https://www.afkmods.com/index.php?/topic/4244-relz-unofficial-shivering-isles-patch-usip/]Official USIP forum thread[/url].\n<br />\n<br />[b][u]Thanks\n<br />[/u][/b]\n<br />[b]The NIFSkope Team[/b] - big thanks for this awesome tool that allowed us to fix many problems with the NIFs in Oblivion\n<br />[b]The TES4Gecko Team[/b] - for this essential utility for working with ESP's and ESM's\n<br />[b]Elminster AU/EU[/b] - for TES4View/Edit, another essential utility for working with ESP's and ESM's\n<br />[b]Tru021[/b] - for auditing and fixing thousands of errors in [b]528[/b] cells of Shivering Isles!\n<br />[b]mmmpld[/b] - for fixing Sheogorath's beard, the gap in the Madness cuirass and fixing the clipping on the three female Finery dresses\n<br />[b]Wormheart[/b] - for Havoking the chains of the Sacellum cathedral lamps\n<br />[b]AlienSlof[/b] - for beta-testing the USIP and for the installer logo's texture\n<br />[b]Fonger[/b] - for beta-testing the USIP\n<br />[b]Sialivi[/b] - for reporting a phenomenal multitude of bugs, especially mesh errors and great beta-testing feedback\n<br />[b]Gothic251[/b] - for reporting a multitude of bugs\n<br />[b]Khalim[/b] - for reporting a multitude of bugs and great beta-testing feedback\n<br />[b]Dewshine[/b] - for making the Fran's/FCOM MOBS/non-MOBS versions of the USIP (and so quickly!)\n<br />\n<br />And finally a big thanks to everyone else who reported bugs or sent in bugged gamesaves!"
