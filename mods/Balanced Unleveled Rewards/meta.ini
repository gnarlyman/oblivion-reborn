nexusDescription="[center][color=#fff2cc][size=6][b]Balanced Unleveled Rewards[/b][/size][/color]\n<br />[size=3][color=#999999]Requirements:\n<br />None[/color][/size][/center]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Introduction[/b][/size][/color]\n<br />\n<br />[size=3]A common point of annoyance with Oblivion is that a large number of unique quest rewards have leveled stats, which are set at the level you obtain the item. This incentivises meta-gaming the level at which you complete certain quests to ensure you get the best reward. Several mods exist that address this issue, but none of them really hit the level of balance I prefer—so I made my own.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Description[/b][/size][/color]\n<br />\n<br />[size=3]This mod unlevels all leveled items and spells, fixing their stats and enchantments at a single level. What makes this mod unique is that it doesn't fix all items at their maximum levels, rather some items are fixed at lower levels appropriate to their appearance, how easy they are to obtain, and with consideration for their balance against other items found in generic loot. In this way, Oblivion's leveled artefacts are treated in a similar manner to those found in Skyrim.[/size]\n<br />\n<br />[size=3]As is my characteristic style, this mod comprehensively covers ALL leveled items from the base game and all DLC, even ones that are often missed by other similar mods.[/size]\n<br />\n<br />[size=3]The balance of this mod was very much made with my lightweight vanilla 'overhaul' [url=https://www.nexusmods.com/oblivion/mods/50237]Ascension[/url] in mind, but is also perfectly playable without it. Mainly this refers to the fact that Ascension makes higher tier loot rarer, meaning that items like Glass and Ebony are considered more 'special' and Daedric items are more scarce—my balancing of item stats here also reflects this.[/size]\n<br />\n<br />[size=3]I also recommend [url=https://www.nexusmods.com/oblivion/mods/49194]Balanced Creature Stats[/url] and [url=https://www.nexusmods.com/oblivion/mods/50094]Balanced NPC Level Cap[/url] as good compliments to this mod.[/size]\n<br />\n<br />[size=4][b][u]Full List of Item Changes\n<br />[/u][/b][/size]\n<br />[size=3][spoiler]____________________________________________________________________________________________________\n<br />\n<br />This file lists the changes made to leveled items.\n<br />\n<br />There are two aspects that are affected by an item's level: stats (e.g. health or damage), and enchantments.\n<br />\n<br />For each item, changes to stats and enchantments are noted in brackets [].\n<br />\n<br />If no change to stats or enchantments are mentioned, then that aspect of the item was not leveled in the original game, e.g. many items have static stats, but leveled enchantments.\n<br />\n<br />If item stats are affected, the new stats of the item are listed, except in cases where multiple items are noted under a common heading (e.g. Armor of the Crusader). If an item's enchantment is affected, the new effects of the enchantment are listed.\n<br />\n<br />For the most part, all item stats and enchantment affects were determined by locking the item's traits at one of he vanilla game levels. If a soul level (e.g. Grand) is noted next to an enchantment effect, it indicates the magnitude of the equivalent enchanted item found in generic loot, which ranges from Petty to Grand. A full list of these items can be found at the following links:\n<br />\n<br />UESP Generic Magic Apparel | https://en.uesp.net/wiki/Oblivion:Generic_Magic_Apparel\n<br />UESP Generic Magic Weapons | https://en.uesp.net/wiki/Oblivion:Generic_Magic_Weapons\n<br />\n<br />____________________________________________________________________________________________________\n<br />\n<br />[==========[AMMO]==========]\n<br />\n<br />Bone Arrows:\n<br />   [Damage locked at 10 (Silver-equivalent), was previously 8-15.]\n<br />\n<br />Gatekeeper Bone Arrows:\n<br />   [Damage locked at 14 (Ebony-equivalent), was previously 9-16.]\n<br />\n<br />Grummite Arrows:\n<br />   [All arrow variants have been given unique names rather than all having the same name; damage now ranges from 8-12 rather than 9-13.]\n<br />____________________________________________________________________________________________________\n<br />\n<br />\n<br />[==========[ARMOUR]==========]\n<br />\n<br />Apron of Adriotness:\n<br />   [Locked stats at level 5 (similar to Leather Cuirass).]\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Weight: 7.5\n<br />   Health: 200\n<br />   Armor: 6.25\n<br />   Fortify Agility 10pts (Grand)\n<br />   Fortify Intelligence 10pts (Grand)\n<br />\n<br />Armor of the Crusader:\n<br />   [Locked all stats at level 16 (Ebony/Elven Armor equivalent).]\n<br />   [Locked all enchantments at level 16.]\n<br />\n<br />Ayleid Crown of Lindai:\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Fortify Alteration 15pts (&gt;Grand)\n<br />   Fortify Illusion 15pts (&gt;Grand)\n<br />   Resist Magic 35% (&gt;Grand)\n<br />\n<br />Ayleid Crown of Nenalata: locked enchantment at level 25.\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Fortify Alteration 15pts (&gt;Grand)\n<br />   Fortify Conjuration 15pts (&gt;Grand)\n<br />   Reflect Spell 25% (&gt;Grand)\n<br />\n<br />Bloodworm Helm:\n<br />   [Locked enchantment at level 20.]\n<br />   Fortify Conjuration 10pts (Grand)\n<br />\n<br />Boots of Bloody Bounding:\n<br />   [Locked enchantment at level 15.]\n<br />   Fortify Acrobatics 10pts (Grand)\n<br />   Fortify Blade 10pts (Grand)\n<br />\n<br />Count Cirion's Helmet:\n<br />   [Locked stats at level 23 (maximum level) (equivalent to Perfect Madness Helmet).]\n<br />   [Locked enchantment at level 23 (equivalent to Grand for both effects).]\n<br />   Weight: 12.4\n<br />   Health: 1450\n<br />   Armor: 8\n<br />   Fortify Block 10pts\n<br />   Fortify Heavy Armor 10pts\n<br />\n<br />Dark Seducer Armor:\n<br />   [Locked at level 15 (equivalent to Elven Armor).]\n<br />\n<br />Diadem of Euphoria:\n<br />   [Locked enchantment at level 20.]\n<br />   Fortify Magicka 30pts (Grand)\n<br />   Fortify Speechcraft 20pts (Lesser-Common)\n<br />   Resist Magic 10% (&gt;Grand)\n<br />\n<br />Escutcheon of Chorrol:\n<br />   [Locked stats at level 25 (maximum level) (between Ebony and Daedric shields).]\n<br />   [Locked enchantment at level 1.]\n<br />   Weight: 36\n<br />   Health: 1500\n<br />   Armor: 22.5\n<br />   Fortify Endurance 5pts (Petty)\n<br />   Reflect Damage 10% (Grand)\n<br />\n<br />Golden Saint Armor:\n<br />   [Locked at level 15 (equivalent to Ebony Armor).]\n<br />\n<br />Kvatch Cuirass:\n<br />   [Locked enchantment at level 15.]\n<br />   Fortify Endurance 5pts (Petty)\n<br />   Fortify Strength 5pts (Petty)\n<br />\n<br />Lord Kelvyn's Bulwark:\n<br />   [Locked stats at level 15 (slightly below Ebony Shield, but with greater health and lesser weight).]\n<br />   [Locked enchantment at level 15.]\n<br />   Weight: 17\n<br />   Health: 950\n<br />   Armor: 17.5\n<br />   Fortify Endurance 6pts (Petty)\n<br />   Fortify Health 30pts (Grand)\n<br />   Fortify Block 11pts (~Grand)\n<br />\n<br />Morag Tong Set (Boots, Cuirass, Gloves, Greaves):\n<br />   [Locked stats at level 1 (Leather-equivalent, to match the items' appearances).]\n<br />   [Locked enchantment at level 15 (approximately equivalent to Grand-level generic enchantments).]\n<br />\n<br />Raiment of the Crimson Scar:\n<br />   [Locked stats at level 15 (approximately two tiers above Shrouded Armor — Mithril-equivalent as opposed to Leather).]\n<br />   [Locked enchantment at level 10.]\n<br />   Weight: 22\n<br />   Health: 550\n<br />   Armor: 21\n<br />   Fortify Agility 7pts (Lesser)\n<br />   Fortify Speed 7pts (Lesser)\n<br />   Fortify Sneak 10pts (Grand)\n<br />   Fortify Marksman 10pts (Grand)\n<br />   Fortify