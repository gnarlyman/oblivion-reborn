nd)\n<br />   Resist Magic 15% (Grand)\n<br />\n<br />Robe of the Apprentice:\n<br />   [Locked enchantment at level 10 (maximum level).]\n<br />   Fortify Willpower 6pts (Petty)\n<br />\n<br />Robe of the Conjurer:\n<br />   [Locked enchantment at level 20.]\n<br />   Fortify Intelligence 6pts (Petty)\n<br />   Fortify Willpower 6pts (Petty)\n<br />   Fortify Conjuration 8pts (Common)\n<br />   Fortify Destruction 8pts (Common)\n<br />\n<br />Spelldrinker Amulet:\n<br />   [Locked enchantment at level 20.]\n<br />   Spell Absorption 20pts (Grand)\n<br />\n<br />Spellturn Cloak:\n<br />   [Locked enchantment at level 20 (maximum level).]\n<br />   Reflect Spell 15% (Common)\n<br />   Resist Magic 15% (Grand)\n<br />   Spell Absorption 15 pts (Common)\n<br />\n<br />Talisman of Abetment:\n<br />   [Locked enchantment at level 15.]\n<br />   Detect Life 50pts (Lesser-Common)\n<br />   Feather 45pts (Lesser)\n<br />   Water Breathing\n<br />\n<br />Weatherward Circlet:\n<br />   [Locked enchantment at level 10.]\n<br />   Resist Fire 20% (Common)\n<br />   Resist Frost 20% (Common)\n<br />____________________________________________________________________________________________________\n<br />\n<br />[==========[WEAPONS]==========]\n<br />\n<br />Blade of Woe:\n<br />   [Locked enchantment at level 25; decreased enchantment cost to 100; decreased enchantment charge to 6000 (these changes make the weapon more usable, as previously the enchantment cost 893 charge per strike, and the weapon had 26790 total, making it very difficult to recharge).]\n<br />   Demoralize up to level 8 for 5 secs\n<br />   Damage Willpower 30pts\n<br />   Damage Health 30pts\n<br />   Damage Magicka 30pts\n<br />\n<br />Blackwater Blade:\n<br />   [Locked stats at level 10 (equivalent to Dwarven Longsword, but with greater health).]\n<br />   [Locked enchantment at level 5.]\n<br />   Weight: 32\n<br />   Health: 350\n<br />   Damage: 16\n<br />   Absorb Fatigue 20pts 3sec\n<br />\n<br />Bur