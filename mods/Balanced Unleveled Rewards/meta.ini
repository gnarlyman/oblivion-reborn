h greater weight).]\n<br />   [Locked enchantment at level 11.]\n<br />   Weight: 48\n<br />   Health: 672\n<br />   Damage: 24\n<br />   Drain Speed 20pts for 20sec\n<br />   Fire Damage 20pts\n<br />\n<br />Hatred's Soul:\n<br />   [Locked stats at level 11; increased weight from 12 to 22 (equivalent to Daedric Bow, but with greater health).]\n<br />   [Locked enchantment at level 11.]\n<br />   Weight: 22\n<br />   Health: 500\n<br />   Damage: 20\n<br />   Drain Speed 20pts for 20sec\n<br />   Fire Damage 20pts\n<br />\n<br />Mage's Staff of...:\n<br />   [Locked all enchantments at level 15 (maximum level) (approximately similar to the Greater generic staves in most instances, but with additional uses).]\n<br />\n<br />Mankar Camoran's Staff:\n<br />   [Locked enchantment at level 18 (maximum level).]\n<br />\n<br />Mehrunes Razor:\n<br />   [Locked stats at level 20 (maximum level) (same damage as Daedric Dagger, with greater health and lesser weight.]\n<br />   [Locked enchantment at level 20 (maximum level).]\n<br />   Weight: 9\n<br />   Health: 1200\n<br />   Value: 6365\n<br />   Damage: 19\n<br />   Disintegrate Armor 15pts for 7 secs\n<br />   Daedric Banishing on Strike\n<br />\n<br />Mishaxhi's Cleaver:\n<br />   [Locked enchantment at level 20 (maximum level).]\n<br />   Disintegrate Armor 80pts\n<br />\n<br />Nerveshatter:\n<br />   [Locked stats at level 30 (maximum level).]\n<br />   [Locked enchantment at level 15.]\n<br />   Weight: 80\n<br />   Health: 810\n<br />   Damage: 29\n<br />   Shock Damage 15pts\n<br />   Weakness to Shock 30%\n<br />\n<br />Northwind:\n<br />   [Locked enchantment at level 20 (maximum level).]\n<br />   Frost Damage 20pts\n<br />\n<br />Rockshatter:\n<br />   [Locked stats at level 10 (equivalent to Dwarven Mace).]\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Weight: 27\n<br />   Health: 320\n<br />   Damage: 16\n<br />   Shock Damage 20pts\n<br />   Weakness to Shock 35% for 20sec\n<br />\n<br />Shadowhunt:\n<br />   [Locked enchantment at level 20.]\n<br />   Damage Health 15pts\n<br />   Damage Magicka 15pts\n<br />   Turn Undead up to level 22\n<br />   Weakness to Poison 15%\n<br />\n<br />Shadowrend:\n<br />   [Locked stats at level 30 (maximum level).]\n<br />   [Locked enchantment at level 20.]\n<br />   Weight: 52/54\n<br />   Health: 1000\n<br />   Damage: 28\n<br />   Damage Health 20pts\n<br />   Weakness to Magic 15% for 30 secs\n<br />\n<br />Staff of Indarys:\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Damage Strength 10pts on Target\n<br />   Shock Damage 70pts on Target\n<br />\n<br />Staff of Nenalata:\n<br />   [Locked enchantment at level 25 (maximum level).]\n<br />   Drain Willpower 10 pts on Target\n<br />   Dispel 50pts on Target\n<br />\n<br />Sufferthorn:\n<br />   [Locked enchantment at level 15.]\n<br />   Damage Health 20pts\n<br />   Drain Strength 10pts\n<br />\n<br />Sword of Jyggalag:\n<br />   [Locked stats at level 18 (maximum level).]\n<br />   Weight: 58\n<br />   Health: 800\n<br />   Damage: 24\n<br />\n<br />Syndel's (Syndelius') Boltcaster:\n<br />   [Locked at level 10.]\n<br />   Shock Damage 35pts in 10ft on Target\n<br />\n<br />Thornblade:\n<br />   [Locked stats at level 20 (equivalent to Ebony Longsword, but with greater health).]\n<br />   [Locked enchantment at level 20.]\n<br />   Weight: 44\n<br />   Health: 605\n<br />   Damage: 22\n<br />   Disintegrate Armor 100pts\n<br />\n<br />Umaril's Sword:\n<br />   [Locked stats at level 21 (equivalent to Ebony Claymore, but with greater health and greater weight).]\n<br />   [Locked enchantment at level 21.]\n<br />   Weight: \n<br />   Health: 350\n<br />   Damage: 16\n<br />   Shock Damage 14pts\n<br />   Damage Fatigue 11pts\n<br />\n<br />Weapons of the Crusader:\n<br />   [Locked all stats at level 17 (slghtly better stats than Ebony weapons).]\n<br />   [Locked all enchantments at level 17.]\n<br />\n<br />Witsplinter:\n<br />   [Locked stats at level 10 (similar to Elven Dagger, but with greater health).]\n<br />   [Locked enchantment at level 20.]\n<br />   Weight: 7\n<br />   Health: 310\n<br />   Damage: 13\n<br />   Damage Magicka 30pts\n<br />   Drain Intelligence 10pts for 20sec\n<br />____________________________________________________________________________________________________[/spoiler][/size]\n<br />\n<br />[size=4][b][u]Leveled Spells[/u][/b][/size]\n<br />\n<br />[size=3]There are four leveled spells in the game:[/size]\n<br />[list]\n<br />[*][size=3]Finger of the Mountain[/size]\n<br />[*][size=3]Wizard's Fury[/size]\n<br />[*][size=3]Essence Drain (bestowed by Bloodworm Helm)[/size]\n<br />[*][size=3]Dragon Breath (bestowed by Dragonsword of Lainlyn from the Fighter's Stronghold DLC)[/size]\n<br />[/list]\n<br />[size=3]These are treated differently to leveled items. Rather than having fixed stats, they will now level up with you, i.e. the lower leveled spells will be removed and swapped with the higher level ones when you pass the level requirement. The two spells bestowed by items will only be swapped if you unequip and re-equip the item.[/size]\n<br />\n<br />[size=4][b][u]Sigil Stones[/u][/b][/size]\n<br />\n<br />[size=3]As of yet, Sigil Stones are unchanged from the vanilla game, so their effects are still determined by your level when you obtain them. This is less of an issue to other leveled items since there are a large number of Oblivion Gates, so you are likely to still have the opportunity to obtain new Sigil Stones at any point in your adventure (i.e. they're much more like generic loot than other leveled rewards). I don't fully agree with fixing the stats of Sigil Stones or leveling them up like I've done with spells. I'll likely come up with another solution in future.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Installation[/b][/size][/color]\n<br />\n<br />[size=3]Standard installation procedure: add the file to your data folder and check in the game launcher or your mod manager of choice.\n<br />\n<br />There are two main file downloads:\n<br />[list]\n<br />[*][size=3]The [u][b]Individual Plugins[/b][/u] file contains three separate plugins for the base game + Shivering Isles, Knights of the Nine, and all other official DLC.[/size]\n<br />[*]The [b][u]All-In-One[/u][/b] file contains a single file that is a merge of all of the above. This file also has the Filter bash tag, so you can actually use it with any combination of DLCs if you just create a bashed patch. This makes the individual files redundant.\n<br />[/list]\n<br />You should load this low down in your load order, after any other mods that affect leveled items. Rebuild your bashed patch if necessary.\n<br />You can also install this mod at any level, and will immediately see its effect on any items you've already obtained. This is because I have not changed the items received when completing a quest; rather, I have fixed the stats of all versions of the item to be the same. For example, all versions of the Boots of Bloody Bounding now have stats equivalent to the level 15 version, so if you have previously got the item at level 5 you will not be able to tell the difference. This also means you can uninstall the mod at any time and return to your vanilla item level.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Uninstallation[/b][/size][/color]\n<br />\n<br />[size=3]Just uncheck the mod. Uninstalling this mod will have no permanent effects on your save game.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Compatibility[/b][/size][/color]\n<br />\n<br />[size=3]All relevant conflicting changes from the [url=https://www.nexusmods.com/oblivion/mods/5296]Unofficial Oblivion Patch[/url] are already included in this mod. [url=https://www.nexusmods.com/oblivion/mods/5296]Unofficial Oblivion Patch[/url] is highly recommended as it fixes some errors with leveled item enchantments, which are not included here.\n<br />\n<br />This mod edits a lot of item stats, and should be loaded after any other mod that also edits leveled items. Any conflicts can likely be resolved by a bashed patch, and the relevant bash tags are already included.\n<br />\n<br />This mod includes a fair number of intentional ITM records. Do not clean them.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]Feedback[/b][/size][/color]\n<br />\n<br />[size=3]Feel free to give me feedback on whether certain items need shifting up or down in level.[/size]\n<br />\n<br />[line]\n<br />[color=#fff2cc][size=5][b]My Mods[/b][/size][/color]\n<br />\n<br />[b][size=3][color=#ffd966]I spend a lot of time creating and supporting my mods, so any donations are gratefully received.[/color][/size][/b]\n<br />\n<br />[b][center][size=4][url=https://www.nexusmods.com/oblivion/users/13822205/?tb=mods&amp;pUp=1]Click Here to See All of My Mods[/url][/size][/center][/b]\n<br />\n<br />[line]"
