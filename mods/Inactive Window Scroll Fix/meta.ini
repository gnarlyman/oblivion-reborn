nexusDescription="[b][size=4]This is a port of the [url=https://www.nexusmods.com/fallout3/mods/24878]Fallout 3 version[/url] made by [url=https://www.nexusmods.com/fallout3/users/21932009]dekart811[/url], which itself is[/size][/b][b][size=4] a port of the [url=https://www.nexusmods.com/newvegas/mods/68968]New Vegas version[/url] made by [url=https://www.nexusmods.com/newvegas/users/4205199]luluco250[/url], all credits go to them[/size][/b].\n<br />\n<br />Fixes the problematic behavior of mouse scrolling not being fully captured by the game, which results in scrolling other applications in other windows due to Windows 10's inactive window scroll feature.\n<br />\n<br />This is more noticeable with multi-monitor setups, for example, when scrolling through a menu, you might notice your browser on another screen scrolls as well.\n<br />\n<br />This is because the mouse cursor seems to not actually be restricted to the window. It's obvious why this was never a problem before Windows 10, but now it needs fixing. ?\n<br />\n<br />This uses the [font=Courier New]ClipCursor()[/font] function of the Win32 API to restrict the mouse to the game window's boundaries, only letting go when it loses focus (such as alt-tabbing).\n<br />\n<br />This has also been tested with ReShade and thus [i]should[/i] be compatible with other overlays as well. ?\n<br />\n<br />For source code and building instructions, go here: [url=https://github.com/ashemedai/obl_clipcursor]https://github.com/ashemedai/obl_clipcursor[/url]"
