nexusDescription="[b][color=#ffd966][size=6]Av Latta Magicka - Sun Magic Additions\n<br />[/size][/color][/b][color=#ffd966]\n<br />[size=4]After playing Skyrim for some time and being upset that Oblivion lacks the offensive Restoration spells that Dawnguard added, I decided to implement them myself. This mod adds 12 new spells with a new Magic Effect called Sun Damage that deals offensive Restoration damage to undead.\n<br />\n<br />[b]Requirements\n<br />[/b][url=https://www.nexusmods.com/oblivion/mods/49096]Av Latta Magicka[/url]﻿ and all of ALM's requirements\n<br />\n<br />[b]Details\n<br />[/b]Sun Damage (entirely separate from Vampire's sun damage) is a Restoration effect and deals offensive damage to undead enemies only. If you are a Master in Restoration (100 Restoration or more) the spells will deal damage to non-undead targets.\n<br />\n<br />The added spells are as follows:\n<br />\n<br />[list]\n<br />[*][b][size=4]Novice[/size][/b]\n<br />[*][size=4]   [b]﻿Sunfire - [/b]5 damage for 4 seconds (Target)[/size]\n<br />[*][size=4]   [b]Radiant Aura - [/b]1 damage in a 5 foot radius for 30 seconds (Touch)[/size]\n<br />[*][color=#ffd966][size=4][b]Apprentice[/b][/size][/color]\n<br />[*][color=#ffd966][size=4]   ﻿[b]Solar Flare - [/b]9 damage for 5 seconds (Target)[/size][/color]\n<br />[*][color=#ffd966][size=4]   [b]Searing Touch -[/b] 10 damage for 6 seconds (Touch)[/size][/color]\n<br />[*][color=#ffd966][size=4][b]Journeyman[/b][/size][/color]\n<br />[*][color=#ffd966][size=4]   [b]﻿Eclipse - [/b]10 damage for 10 seconds (Target)[/size][/color]\n<br />[*][color=#ffd966][size=4]   [b]Dawn's Light - [/b]5 damage ina  5 foot radius for 30 seconds (Touch)[/size][/color]\n<br />[*][color=#ffd966][size=4][b]Expert[/b][/size][/color]\n<br />[*][color=#ffd966][size=4]   ﻿[b]Daybreak - [/b]10 damage in a 15 foot radius for 10 seconds (Target)[/size][/color]\n<br />[*][color=#ffd966][size=4]   [b]Solar Flare - [/b]10 damage in a 20 foot radius for 10 seconds (Touch)[/size][/color]\n<br />[*][b]Master[/b]\n<br />[*]   [b]﻿Stellar Core - [/b]25 damage in a 15 foot radius for 10 seconds (Target)\n<br />[*]   ﻿[b]Stendarr's Aura - [/b]25 damage in a 10 foot radius for 30 seconds (Touch)\n<br />[*]   ﻿[b]Supernova - [/b]30 damage in a 25 foot radius for 10 seconds (Target)\n<br />[*]   ﻿[b]Divine Radiance - [/b]30 damage in a 20 foot radius for 30 seconds (Touch)\n<br />[/list]\n<br />The spells are distributed similarly to ALM's spells and can be bought from various Restoration spell vendors. Scrolls and Spell Tomes are also added into ALM's leveled lists to find in the world. \n<br />\n<br />[b]Credits[/b]\n<br />Bethesda for Oblivion\n<br />JRoush for OBME and AddActorValues\n<br />qwertyasdfgh for Av Latta Magicka[/size][/color]"
