nexusDescription="[b][center][font=Times New Roman][size=6]\n<br />OSCURO'S OBLIVION OVERHAUL[/size][/font][/center][/b]\n<br />\n<br />\n<br />Since Arkngt no longer plays Oblivion and wanted someone to take over maintenance of OOO, I volunteered. This is the \"final and I really mean it this time\" version. The description here wil be short and sweet, because OOO now has a [url=https://en.uesp.net/wiki/Oblivion_Mod:Oscuro%27s_Oblivion_Overhaul]wiki[/url]﻿ (thanks to UESP for hosting it). And yes, I know the Places section is missing - I'll get around to adding it soon.\n<br />\n<br />Kobal has made a few add-ons that help to bring OOO up-to-date (these are separate from the base OOO found here):\n<br /> \n<br />[list]\n<br />[*][size=2][url=http://www.nexusmods.com/oblivion/mods/46508/]OOO Shivering Isles[/url] - brings OOO to the Isles![/size]\n<br />[/list][list]\n<br />[*][size=2][url=http://www.nexusmods.com/oblivion/mods/46028/?]Equipment Add-On for OOO[/url] [/size]\n<br />[*][size=2][url=http://www.nexusmods.com/oblivion/mods/45380/]Creature Add-on[/url][/size]\n<br />[/list][size=2]            -OR-\n<br />[/size][list]\n<br />[*][size=2][url=http://www.nexusmods.com/oblivion/mods/47177/?]OOO Extended[/url] ([i]see note below[/i]) - combines the Equipment and Creature Addons and adds additional balancing changes not found in the individual versions.[/size]\n<br />[/list]\n<br />If you're looking for a real challenge, try out [url=https://www.nexusmods.com/oblivion/mods/47187]OOO Enhanced[/url], by Saldron 613. He's done a huge amount of work for the 6.0 update, including enhancing a lot of OOO's quests and factions. It also includes all of the content from OOO Extended. The \"easy\" version of OOOE is roughly equivalent to baseline OOO, so if you want to try it without the difficulty increase, go with that one.\n<br />\n<br />\n<br />[b][font=Times New Roman][size=4]About:[/size][/font][/b]\n<br />[b]=======[/b]\n<br />Oscuro's Oblivion Overhaul is an overhaul mod for TES IV: Oblivion. It aims to make Oblivion a much more interesting, challenging, realistic, and dangerous place, and also offers great rewards for the daring adventurer, regardless of your level.\n<br />\n<br />You must be prepared to cast aside your previous notions about Cyrodiil. The world no longer revolves around you, the player. Do not expect to be able to beat every monster or NPC you meet. Previously familiar areas may now be much more dangerous and you will frequently be forced to retreat from enemies who are too powerful to beat until you are stronger. You will probably die a lot more often now. However, if you have the ingenuity, skill, and luck to survive the odds stacked against you then you will be justly rewarded for your bravery!\n<br />\n<br />If you feel overwhelmed by the difficulty when you first start out in this dangerous new world, do not be discouraged. Be cautious at first. Upgrade your poor gear as often as possible. If you find yourself facing overwhelming odds, run away and return later when you are more powerful to reap revenge on your foes. If necessary, seek help from the guards and legion patrols along the roads. You will slowly begin to build your strength and eventually learn to crush your puny foes with ease!\n<br />\n<br />\n<br />[size=4][b]Installation:\n<br />[/b][/size][b]=============[/b]\n<br />==Which Files to Download==\n<br />[list]\n<br />[*]Download both files under the \"MAIN FILES\" section\n<br />[*]If you run the full COBL package download the \"Cobl Tweaks - OOO-FCOM\" file under \"OPTIONAL FILES\"\n<br />[*]If you want to bring OOO's balancing to KotN, download \"OOO-KotN\" under \"OPTIONAL FILES\"\n<br />[*]If you run the light version of OOO ([i]old and not available here[/i]), grab \"OOO Addons\" under \"OPTIONAL FILES\"\n<br />[*]If you run \"UL Panther River\", \"Bane's Guild United\", \"OOO Extended\" or the OOO Creature/Equipment Addons, grab the \"OOO Misc Files\" under \"OPTIONAL FILES\"\n<br />[*]If you have an old version of the BSA ([i]not available here[/i]), grab \"OOO Missing Files\" under \"OPTIONAL FILES\"\n<br />[/list][list]\n<br />[*]If you run the RealitySpectre's Better Potions download the \"RealitySpectre's Better Potions for OOO\" file under \"OPTIONAL FILES\"\n<br />[/list][u]\n<br />A Note About the Misc Files:[/u]\n<br />   ﻿Recent changes to OOO require mods that depend on the cell edits to be updated as FormIDs have changed.  \"OOO Misc Files\" under \"OPTIONAL FILES\" updates some of the more popular mods that require this change.  This includes updated versions of the OOO Equipment Addon, the Creature Addon and OOO Extended (with and without RealSwords), Bane's Guild United, Unique Landscapes Panther River,m and Hemingwey's Capes for OOO and FCOM.\n<br />   ﻿The version of OOO Extended in the \"OOO Misc Files\" may be broken. All that has been done to it is making it compatible with OOO's recent FormID edits.  This version has been tested to be free of bugs reported in the comments section, such as those with Inebriation and Shadows in a Struggle for Power.  Make sure you're using the one downloaded from this entry, NOT the original, before reporting issues.\n<br />\n<br />==Manual Install==\n<br />[list]\n<br />[*]Extract this archive to any folder and then copy the contents to Oblivion's Data folder.\n<br />[*] Start Oblivion Launcher, click Data Files, and enable the Oscuro's Oblivion Overhaul.esp/esm files.\n<br />[/list]\n<br />==OBMM Install==\n<br />[list]\n<br />[*]Extract the archive to any other folder.\n<br />[*]Copy the extracted archive to \"&lt;Install Path&gt;&#92;Oblivion&#92;OBMM&#92;Mods&#92;\"\n<br />[*] Start Oblivion Mod Manager\n<br />[*]Click the Create button\n<br />[*]Click the Add Archive button, navigate to the archive and select it, then click the Yes button.\n<br />[*]Click the Create OMOD button, wait until it finishes, then click the Ok button\n<br />[*]Activating the Mod\n<br />[*]Start Oblivion Mod Manager\n<br />[*]Double-click the name of the mod in the right-hand side of the OBMM screen, once installed the mod icon will turn blue\n<br />[/list]\n<br />==BAIN Install==\n<br />[list]\n<br />[*]Copy the entire archive into your \"Oblivion Mods&#92;Bash Installers&#92;\" folder.\n<br />[*]In Wrye Bash Installers tab, highlight the new archive.\n<br />[*]Check any sub-folders, ESP/ESM as required.\n<br />[*]Right click the archive name and select \"Install\".\n<br />[*]In Wrye Bash Mods tab, check the ESP/ESM and rebuild Bashed patch. (Also highly recommended to run BOSS first).\n<br />[/list]\n<br />\n<br />Thanks!\n<br />=======\n<br />Team Alpha\n<br />dev_akm - Project Leader\n<br />Corepc - Help with everything\n<br />Showler and Shikishima - Improved scripts, bug fixes, beta testing, forum support.\n<br />Shadowborn - Improved scripts, bug fixes, Dragonborn quest, LoD fix, beta testing and a whole lot more.\n<br />daemondarque - Beta tester, armour mesh improvements, forum support.\n<br />Sen-Chan – Massive assistance and support with armor meshes\n<br />Arkngt - Extensive beta testing, enormous support with the forum threads.\n<br />Malonn - overhauling the container scripts and DLT system, and testing.\n<br />....and many others that have been involved over the years.\n<br />And of course a huge thanks to Sotobrastos (Oscuro) for his wonderful creation"
