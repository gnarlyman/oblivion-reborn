nexusDescription="Name: Maskar's Oblivion Overhaul\n<br />Version: 5.0.5\n<br />Date: 24/11/2025\n<br />Language: English\n<br />Category: Overhaul\n<br />Requirements: [url=http://obse.silverlock.org]Oblivion Script Extender[/url] (OBSE), [url=https://www.nexusmods.com/oblivion/mods/32200]MenuQue - OBSE Plugin[/url]\n<br />Recommended: [url=http://www.nexusmods.com/oblivion/mods/10763]DarNified UI[/url], [url=http://www.nexusmods.com/oblivion/mods/2097]Oblivion Mod Manager[/url] (OBMM)\n<br />Author: Maskar\n<br />Source: [url=http://www.nexusmods.com/oblivion/mods/42780]http://www.nexusmods.com/oblivion/mods/42780[/url]\n<br />[line]\n<br />[b]Description[/b]\n<br />\n<br />This is an overhaul mod, improving many aspects of the game, while maintaining the overall feel of the game and ensuring compatibility with most other mods. All features are configurable through OMOD installation and/or editing the ini file. Please read the included pdf readme for more details.\n<br />\n<br />For a quick overview check out this [url=https://www.youtube.com/watch?v=x9lXHYV5q8w]youtube video[/url] by Cheesehole/Valde.\n<br />\n<br />Please note this mod comes in 3 game difficulties (normal, advanced and expert), which can be changed by editing the ini file (MOO.ini_game_difficulty). By default game difficulty is set to advanced, which is balanced for most players. Casual and new players should pick the normal difficulty, while the expert difficulty is for those wanting a real challenge.\n<br />\n<br />[b]Compatibility and requirements[/b]\n<br />\n<br />No files will be replaced by installing this addon. It however requires [url=http://obse.silverlock.org]OBSE[/url] (version [color=yellow]21[/color] or higher) and [url=https://www.nexusmods.com/oblivion/mods/32200]MenuQue[/url] (version [color=yellow]16b[/color] or higher) to function properly.\n<br />\n<br />This mod does not alter any game data (leveled lists, creatures, etc.) directly, but only makes changes through OBSE scripts. Because of this it should be fully compatible with most mods. Load order is not important.\n<br />\n<br />[b]What's new?[/b]\n<br />\n<br />In this update (v5.0) MOO now by default uses a dynamic level scaling system. This means that game content (npcs, creatures, loot, locks, merchant items, etc.) is no longer affected by the player character's level. Instead difficulty is based on the distance to a city, which in turn is based on the strength of the Imperial Legion. A new tax system has been added, where the Empire is able to collect taxes from the cities in Cyrodiil, to pay for the upkeep and training of the Imperial Legion.\n<br />\n<br />Another big part of this update is the addition of an extensive werewolf system. This includes the ability for the player character to become a werewolf (there are 5 types), a totem system (much like the gems in Path of Exile), Bloodmoon events, werewolf hunters, companion werewolves, etc.\n<br />\n<br />This update also includes a number of smaller additions, like corrupted items, new backpack meshes/textures and the ability for the player character to turn into a bat when being a vampire. Have a look at the changelog below for a full list of changes.\n<br />\n<br />[b]Install[/b]\n<br />\n<br />[list]\n<br />[*]Extract the files to a temporary location[/*]\n<br />[*]Copy files to (install folder)&#92;Oblivion&#92;Data&#92;[/*]\n<br />[*]Start Oblivion Launcher, click 'Data Files', place a checkmark beside the .esp file[/*]\n<br />[*]Optionally edit the .ini file to customize it to your preferences[/*]\n<br />[/list]\n<br />[color=yellow]Note: If this mod is installed with Wrye Bash this mod needs to be loaded AFTER the bashed patch![/color]\n<br />\n<br />[b]Uninstall[/b]\n<br />\n<br />[list]\n<br />[*]Start Oblivion Launcher, click Data Files, uncheck the .esp file[/*]\n<br />[*]Delete the Maskar's Oblivion Overhaul files in the Data folder[/*]\n<br />[/list]\n<br />[b]History[/b]\n<br />\n<br />[i]Version 5.0.5 (24/11/2025)[/i]\n<br />[list]\n<br />[*]Fixed issue where imperial legion with less than 750 strength would increase game difficulty more than intended[/*]\n<br />[*]Added new menu to show info topic for adventurers and companions when using NorthernUI[/*]\n<br />[*]Fixed uncommon issue where amount of gold of a merchant could be higher than intended[/*]\n<br />[*]Fixed issue where containers might not re-lock after cell reset[/*]\n<br />[*]Added hide amulet check for non-cuirass equipment (like Boots of the Unburdened) to avoid blocking backpacks[/*]\n<br />[/list]\n<br />[i]Version 5.0.4 (24/10/2025)[/i]\n<br />[list]\n<br />[*]Added ability to bash locks using hand to hand power attacks[/*]\n<br />[*]Added ability for MOO to automatically re-configure MOO npcs when another overhaul is detected[/*]\n<br />[*]Added mapmarkers ini file[/*]\n<br />[*]Added ability to place deeds near owned locations defined in mapmarker ini file[/*]\n<br />[*]Added a delay between Bloodmoon events of at least 21 days[/*]\n<br />[*]Added ability for the Imperial Legion to add the specific location of a werewolf pack to a werewolf notice[/*]\n<br />[*]Increased priority of werewolf invasions on notice boards[/*]\n<br />[*]Updated Bloodmoon weather[/*]\n<br />[*]Fixed issue where not always all items were added to treasure chests[/*]\n<br />[*]Fixed issue where lock bashing with weapons was not working as intended[/*]\n<br />[*]Added support for \"Maskar's Unarmored Skill\" to do additional damage to locks[/*]\n<br />[*]Added tent mapmarker of \"Camping\" to mapmarkers ini file[/*]\n<br />[*]Added \"Weather - All Natural\" to compatibility ini file[/*]\n<br />[/list]\n<br />[i]Version 5.0.3 (5/9/2025)[/i]\n<br />[list]\n<br />[*]Improved ability for adventurers to flee from cities when in werewolf form[/*]\n<br />[*]Disabled infected adventurers when using normal difficulty (can still have werewolf gene)[/*]\n<br />[*]Disabled guards saying \"You should have paid the fine!\" when fighting a werewolf[/*]\n<br />[*]Added message to warn player when trying to upgrade MOO from an older version[/*]\n<br />[*]Fixed issue where changing race would remove effect when starting game with werewolf disease[/*]\n<br />[*]Updated pdf readme[/*]\n<br />[/list]\n<br />[i]Version 5.0.2 (27/8/2025)[/i]\n<br />[list]\n<br />[*]Updated werewolves to use 2k textures[/*]\n<br />[*]Added option to start game with a werewolf disease (enable in ini file)[/*]\n<br />[*]Added support for more werewolf appearances[/*]\n<br />[*]Added options to individually configure appearance of player and npc werewolves[/*]\n<br />[*]Updated small treasures in random containers to be based on distance to a city[/*]\n<br />[*]Disabled stats menu button when using a controller (enable faction scroll in ini file)[/*]\n<br />[*]Added summon animal icon[/*]\n<br />[*]Updated pdf readme[/*]\n<br />[/list]\n<br />[i]Version 5.0 (8/8/2025)[/i]\n<br />[list]\n<br />[*]Added MenuQue as required mod (MOO will not work without it)[/*]\n<br />[*]Updated all creatures and npcs to have fixed levels (can be changed in ini file)[/*]\n<br />[*]Added easy versions of bandits, marauders, conjurers and necromancers[/*]\n<br />[*]Updated areas near roads and settlements to be considered safe (based on Imperial Legion strength)[/*]\n<br />[*]Added ability for Imperial Legion strength to drop when there are invasions, open Oblivion gates, etc.[/*]\n<br />[*]Added ability for the Empire to collect taxes from all cities (amount based on world events)[/*]\n<br />[*]Added ability for the Empire to pay for upkeep and training of Imperial Legion[/*]\n<br />[*]Updated spawns near city to be \"easy\" when Imperial Legion is close to maximum strength[/*]\n<br />[*]Disabled creature invasions near Imperial City when Imperial Legion is considered strong[/*]\n<br />[*]Updated creature invasions in regions to have a random starting strength[/*]\n<br />[*]Added ability to lower creature invasion strength by killing invading creatures[/*]\n<br />[*]Added ability to lower creature invasion strength by Imperial Legion based on their strength[/*]\n<br />[*]Added requirement for regional factions to prepare for a certain amount of time before invading[/*]\n<br />[*]Added ability for regional factions to invade when Imperial Legion drops below a certain strength[/*]\n<br />[*]Added diplomatic, expansionistic and strategic leaders to regional factions when having a minimum strength[/*]\n<br />[*]Added ability for regional factions to form alliances (based on leader type and races)[/*]\n<br />[*]Added ability for weak alliances to recruit factions[/*]\n<br />[*]Added button in menu to show faction ratings (also shows leader type and alliances)[/*]\n<br />[*]Added vampire versions of all enemy npcs[/*]\n<br />[*]Added ability for wanted vampire to take over nearby dungeons where range is based on vampire level and time[/*]\n<br />[*]Added ability for regions taken over by vampires to lower Imperial Legion strength until wanted vampire is killed[/*]\n<br />[*]Updated lock difficulty on containers and doors to be based on location, lock quality and any nearby actors[/*]\n<br />[*]Updated loot on npcs/creatures to based on their level (rather than player character level)[/*]\n<br />[*]Updated loot in containers to be based on nearby npcs/creatures[/*]\n<br />[*]Added ability for boss containers to be guarded by a stronger creature/npc and have improved loot[/*]\n<br />[*]Updated merchant base items to be based on merchant level[/*]\n<br />[*]Updated merchant additional items to be based on regional events (invasions, available ore veins, etc.)[/*]\n<br />[*]Updated merchant gold to change based on buying/selling items[/*]\n<br />[*]Updated merchant gold and items to be based on the danger of the area around the city and Imperial Legion strength[/*]\n<br />[*]Added ability to buy pet related items from horse sellers[/*]\n<br />[*]Added ability to buy house and furniture deeds from house upgrade sellers[/*]\n<br />[*]Added ability to buy traps and regional faction capes from fences and npcs in the evilsolo faction[/*]\n<br />[*]Added 5 types of werewolves (fire, frost, poison, bleed and summoning based)[/*]\n<br />[*]Added 3 versions of each type of werewolf based on the character's class (combat, magic and stealth)[/*]\n<br />[*]Added 97 werewolf abilities[/*]\n<br />[*]Added 68 totems (15 are werewolf hearts)[/*]\n<br />[*]Added Path of Exile style totem system (like gems in PoE)[/*]\n<br />[*]Added ability to level up totems from level 1 to 20 by killing actors (more xp for higher level enemies)[/*]\n<br />[*]Added ability to see totem abilities, xp and level when mouse over totem in inventory menu[/*]\n<br />[*]Added wanted npc werewolves[/*]\n<br />[*]Added ability for player character to become a werewolf[/*]\n<br />[*]Added hotkey wheel for being a werewolf[/*]\n<br />[*]Added bounty when being seen changing werewolf form (same as other committing crimes)[/*]\n<br />[*]Disabled ability for werewolf to cast spells, repair items, craft potions and use bandages[/*]\n<br />[*]Added ability for werewolf to regenerate health (more in werewolf form)[/*]\n<br />[*]Added ability for werewolf to feed on dead npcs (and creatures based on used totems)[/*]\n<br />[*]Added ability for werewolf to gain totems when feeding on dead werewolves[/*]\n<br />[*]Added ability for werewolf to bash locks (based on strength and totems)[/*]\n<br />[*]Added ability for werewolf to cure all diseases when turning into werewolf form[/*]\n<br />[*]Added ability to use the whistle ability to tell followers (pets and werewolves) to stay or follow[/*]\n<br />[*]Added Bloodmoon events which have a chance to happen when there's a full moon (every 24 game days)[/*]\n<br />[*]Changed weather at night to a red color when Bloodmoon event active[/*]\n<br />[*]Added ability for werewolf (super) packs to spawn during bloodmoon event[/*]\n<br />[*]Added ability for werewolf packs to hunt at night[/*]\n<br />[*]Added ability for werewolf packs to invade cities (MOO expert difficulty only)[/*]\n<br />[*]Added Skaal werewolf hunters when there's a bloodmoon event[/*]\n<br />[*]Added ability for Skaal werewolf hunters to travel at night to hunt werewolves[/*]\n<br />[*]Added werewolf cure instructions scroll to Skaal Shaman npcs[/*]\n<br />[*]Added Cave Wolves to animal and monster dungeons (based on weather and time)[/*]\n<br />[*]Added Cave Wolf Packleaders which carry a wolf claw (used to craft totems)[/*]\n<br />[*]Added the Tree of Spirits near Hircine's Shrine[/*]\n<br />[*]Added ability to use the Tree of Spirits to create totems (requires wolf claw and certain ingredients)[/*]\n<br />[*]Added ability to get Hircine's ring by trading with Hircine at his shrine[/*]\n<br />[*]Added ability to prevent becoming a werewolf at night when wearing Hircine's ring[/*]\n<br />[*]Added ability to cure being a werewolf by dying (become a vampire)[/*]\n<br />[*]Added ability to cure being a werewolf by crafting and drinking a Wolf Ender potion[/*]\n<br />[*]Updated backpacks on adventurers (new meshes and textures)[/*]\n<br />[*]Added 3 huge backpack versions that can't be purchased from merchants[/*]\n<br />[*]Added ability for adventurers to have the werewolf gene and at a chance be a werewolf[/*]\n<br />[*]Updated adventurer preferences (elemental and summon type)[/*]\n<br />[*]Added show info dialog option to show stats before asking an adventurer to join party[/*]\n<br />[*]Added ability to see an adventurer's werewolf status when player character is a werewolf[/*]\n<br />[*]Added ability for companions to level up by gaining experience (no longer linked to player level)[/*]\n<br />[*]Improved companion needs[/*]\n<br />[*]Added ability for companions to cast light spell (requires Illusion skill)[/*]\n<br />[*]Added ability for companions to cure diseases (requires Restoration skill)[/*]\n<br />[*]Added ability for companions to collect scissors/cloth and craft/use bandages[/*]\n<br />[*]Added additional information about companions to show info dialog option[/*]\n<br />[*]Improved ability for companions to buy spells and loot items[/*]\n<br />[*]Disabled ability for player character to tame anything other than wolves when werewolf[/*]\n<br />[*]Added ability for player character to regenerate health when vampire[/*]\n<br />[*]Added ability for player character to turn into a bat when vampire (use jump to fly)[/*]\n<br />[*]Updated Red Ruby Cave to only contain Red Ruby ore veins[/*]\n<br />[*]Disabled ability for the tutorial dungeon to contain gem veins and dungeon extensions[/*]\n<br />[*]Improved region identification code resulting in changes to notice boards, treasure maps, etc.[/*]\n<br />[*]Added corrupted items which are dynamically generated and have dynamically generated enchantments[/*]\n<br />[*]Added corrupted items to Oblivion gates based on item quality and gate difficulty[/*]\n<br />[*]Updated sigil stone quality based on difficulty of the Oblivion gate[/*]\n<br />[*]Increased Rune effects and added a cap to have a maximum of 5 of each type at a time[/*]\n<br />[*]Disabled certain events (like MOO spawns in dungeons) when the location has an associated quest[/*]\n<br />[*]Added wanted werewolf notices to notice board[/*]\n<br />[*]Added werewolf invasion notices to notice boards[/*]\n<br />[*]Added 6 new ini files (companions, corrupted items, quests, totems, weather and werewolves)[/*]\n<br />[*]Fixed a number of outstanding issues and tweaked many features (too many to list)[/*]\n<br />[*]Added many (compatibility) ini settings[/*]\n<br />[/list][spoiler]\n<br />[i]Version 4.9.4.2 (27/8/2019)[/i]\n<br />[list]\n<br />[*]Updated actor healing code[/*]\n<br />[*]Fixed minor spelling issue related to Marksmanship requirement[/*]\n<br />[*]Renamed \"Sharp Weapons\" requirement to \"Bladed Weapons\" for improved readability[/*]\n<br />[*]Removed fix for test of resolve in the dreamworld as it's no longer necessary[/*]\n<br />[*]Fixed issue which could cause crashes when reloading when using Better Cities (possibly other mods)[/*]\n<br />[/list]\n<br />[i]Version 4.9.4 (26/8/2019)[/i]\n<br />[list]\n<br />[*]Replaced placeholder enemies in dungeon extensions with more fitting enemies[/*]\n<br />[*]Updated traps in containers to be based on amount and value of items they protect[/*]\n<br />[*]Updated all conjurers and necromancers equipment (so it can be modified using ini files)[/*]\n<br />[*]Added ability to clear lists in dynamic lists ini file to replace contents completely[/*]\n<br />[*]Replaced goblin equipment with items from WAC goblins (requires WAC to be loaded)[/*]\n<br />[*]Added ability to configure quality of equipment of faction npcs[/*]\n<br />[*]Lowered quality of equipment on various npcs (bandits, etc.)[/*]\n<br />[*]Lowered difficulty of adult mud crabs (excluding other types)[/*]\n<br />[*]Added ability to configure enemy group sizes based on the distance to a city[/*]\n<br />[*]Updated Mimic collision[/*]\n<br />[*]Rotated placement of container in hidden alcoves in Outposts[/*]\n<br />[*]Updated actor healing to improve compatibility and avoid crashes[/*]\n<br />[*]Updated ability to shear sheep (more accurate)[/*]\n<br />[*]Updated whistle ability to only pull followers when no more than 75 meters away[/*]\n<br />[*]Updated whistle ability to pull enemies at 20% chance when no more than 75 meters away[/*]\n<br />[*]Updated code to avoid AddActorValues spamming the console[/*]\n<br />[*]Updated chance of dungeon extensions to be a boss room 65% of the time[/*]\n<br />[*]Updated chance of a missing pet in a normal dungeon extension to 65%[/*]\n<br />[*]Removed healing ability from Water Dragons[/*]\n<br />[*]Forced faction relation between dremora and conjurers to 100 to avoid dremora and daedra fighting each other[/*]\n<br />[*]Improved combat with pets[/*]\n<br />[*]Fixed issue causing vultures to not spawn properly[/*]\n<br />[*]Fixed issue where name of companion is not correctly displayed when told to leave party[/*]\n<br />[*]Fixed issue related to Haskill being incorrectly moved to entrance[/*]\n<br />[*]Fixed issue where ini setting related to vampires taking damage from silver damage was wrongfully removed[/*]\n<br />[*]Fixed issue where ini setting to disable sleeping to level did not actually do anything[/*]\n<br />[*]Fixed issue where mods using the soul trap event handler could cause crashes[/*]\n<br />[*]Fixed 2 issues related to Kvatch[/*]\n<br />[*]Fixed texture on 1 of the Deadric Lord weapons[/*]\n<br />[*]Added support for Loot Menu (v2.0+)[/*]\n<br />[*]Added ability to gain xp in Ultimate Leveling when doing various tasks (taming, etc.)[/*]\n<br />[*]Added ability to show xp gained by pets through Ultimate Leveling's progress text (requires ULVL v1.8+)[/*]\n<br />[*]Added Ultimate Leveling to compatibility ini file[/*]\n<br />[*]Updated compatibility settings for Deadly Reflex and Unnecessary Violence 3[/*]\n<br />[*]Added Rathunas to compatibility ini file[/*]\n<br />[/list]\n<br />[i]Version 4.9.3 (19/10/2018)[/i]\n<br />[list]\n<br />[*]Fixed issue where regional factions increased faster in size than intended[/*]\n<br />[*]Added option to display regional faction strength through faction ratings scroll (on by default)[/*]\n<br />[*]Disabled the ability to join the Imperial Legion when in an evil faction[/*]\n<br />[*]Added ability to gain/lose rating with Imperial Legion based on bounty and closing Oblivion gates[/*]\n<br />[*]Added ability for companions with armorer skill to repair equipment of other companions and player character[/*]\n<br />[*]Added ability for companions to share loot before leaving a party[/*]\n<br />[*]Added ability to configure the amount of items companions will loot (lockpicks, etc.) based on their skills[/*]\n<br />[*]Added option to display a message of any items looted by companions (on by default)[/*]\n<br />[*]Added ability to add equipment of other mods to adventurers/wanted npcs through dynamic lists ini file[/*]\n<br />[*]Added WAC equipment (mostly armor) to adventurers/wanted npcs[/*]\n<br />[*]Disabled ability for companions to loot owned items[/*]\n<br />[*]Fixed issue related to repairing equipment of companions[/*]\n<br />[*]Fixed issue where companions could be shooting invisible arrows[/*]\n<br />[*]Fixed issue where companions could be selling incorrect items[/*]\n<br />[*]Updated combat styles for dynamically generated npcs (new npcs only)[/*]\n<br />[*]Fixed issue where changing load order could stop events from spawning in mod added worldspaces[/*]\n<br />[*]Disabled ability to call pets in pet carriers by whistling[/*]\n<br />[*]Updated Vanishing Cabinets for improved compatibility[/*]\n<br />[*]Updated price and weight of bandages[/*]\n<br />[*]Increased chance of bandages spawning when crafting is disabled[/*]\n<br />[*]Updated Imbuement Tool and gold reward ini setting[/*]\n<br />[*]Updated mythical creature spawns for improved compatibility[/*]\n<br />[*]Removed Land Dreugh setting (no longer necessary)[/*]\n<br />[*]Added ability to adjust brightness of lanterns (both types)[/*]\n<br />[*]Updated icon for Plaugebringer Hood[/*]\n<br />[*]Updated looks of Hood of the Lich[/*]\n<br />[*]Added ability to configure quality of loot based on distance to nearby cities[/*]\n<br />[*]Added SM Regional Bounty to compatibility ini file[/*]\n<br />[*]Added Crime Handler with Regional and Provincial Bounty to compatibility ini file[/*]\n<br />[/list]\n<br />[i]Version 4.9.2 (11/6/2018)[/i]\n<br />[list]\n<br />[*]Added ability to smelt items using a forge and blacksmith hammer[/*]\n<br />[*]Added ability to craft a rustic cabin using a workbench[/*]\n<br />[*]Added ability to craft rustic furniture using a workbench[/*]\n<br />[*]Added ability to craft a plate with candles, candelabra and a lamppost using tinker's tools[/*]\n<br />[*]Added ability to craft Novice Mortar &amp; Pestle using tinker's tools[/*]\n<br />[*]Added ability to craft a sack (container) using sewing kit[/*]\n<br />[*]Added craft deed ini file[/*]\n<br />[*]Added ability to grind bones with a grain grinder[/*]\n<br />[*]Added option to disable the placement check of crafted items, so they can be placed anywhere[/*]\n<br />[*]Updated how crafting resources are added through ini file[/*]\n<br />[*]Added support for craft tools added by other mods that can't be converted to usable tools[/*]\n<br />[*]Added eggs to merchants[/*]\n<br />[*]Updated weight of wool and some recipes needing cloth[/*]\n<br />[*]Updated workbench to be used both in and outdoors[/*]\n<br />[*]Renamed bone clutter when crafting is enabled[/*]\n<br />[*]Added ability to configure the time vampires don't regenerate health when hit by a silver weapon[/*]\n<br />[*]Increased the time vampires don't regenerate health when hit by a silver weapon[/*]\n<br />[*]Updated light spell to lower health regeneration based on ligh magnitude (100 magniture for 100%)[/*]\n<br />[*]Added ability to vampire mages to dispel the light spell of themselves and any other nearby vampires[/*]\n<br />[*]Added enhanced bandages to cure diseases and repair damaged attributes[/*]\n<br />[*]Added ability to enhance bandages by praying at the altar of the nine[/*]\n<br />[*]Lowered time required to use (enhanced) bandages on npcs and creatures[/*]\n<br />[*]updated how equipment is selected for (named) bosses[/*]\n<br />[*]Updated chitin ammo for Morrowind faction[/*]\n<br />[*]Updated ancient nord bastard sword name[/*]\n<br />[*]Removed light armor shields from heavy armor item lists[/*]\n<br />[*]Updated equipment of Hammerfell Sword-Singer[/*]\n<br />[*]Updated slaver faction and arena factions to be considered evil[/*]\n<br />[*]Added ability to increase disposition of pets through feeding[/*]\n<br />[*]Added warning message to pets when affected by any damaging effects (use enhanced bandage to fix)[/*]\n<br />[*]Added ability to purchase pet carriers[/*]\n<br />[