nexusDescription=Better Recoil and Stagger\r\nby Souldemon\r\n\r\n----------------------------------------------------\r\n\r\nThis mod changes the stagger and recoil in oblivion by simply adding a few more animations. \r\nNO esp or script extender needed\r\n\r\nLook gameplay Video\r\n\r\nit will decrease the chance of beeing staggered\r\nand also a high chance for playing a short blockhit animation instead of the long recoil animation\r\nfor you and every npc (onehanded weapons with/without shield and twohanded weapons)\r\n\r\nIt should be compatible with every mod instead of mods changing the stagger and recoil animations.\r\n--Compatibility patch for Deadly Reflex 6.0 added to fix 1st person view.\r\n\r\n-----------------------------------------------------\r\n\r\nTo install just put the files in your oblivion directory.\r\nOverwrite the existing files if asked.\r\n\r\n-----------------------------------------------------\r\n\r\nCredit\r\nAll animations are edited files of bethesda\r\n\r\nFeel free to use it for your mods or whatever you want
