nexusDescription="[font=Arial][size=3][center][img]https://i.imgur.com/KwPryjl.png[/img][/center][/size][/font]   ﻿\n<br />[list]\n<br />[left][*][font=Arial][size=3]English version of Oblivion (Chinese version available [url=https://www.nexusmods.com/oblivion/mods/51240?tab=description]here[/url]﻿)[/size][/font]\n<br />[*][font=Arial][size=3][font=Arial][size=3][font=Arial][size=3]OBSE (v0021) or [url=https://github.com/llde/xOBSE/releases/]xOBSE (Recommended)[/url][/size][/font][/size][/font][/size][/font]\n<br />[*][font=Arial][size=3][url=https://www.nexusmods.com/oblivion/mods/48577]NorthernUI[/url]﻿ (only for the NUI version)[/size][/font]\n<br />[*][font=Arial][size=3][font=Arial][size=3][url=https://www.nexusmods.com/oblivion/mods/47085]EngineBugFixes[/url]﻿[/size][/font] (not required, but highly recommended)[/size][/font]\n<br />\n<br />[*][font=Arial][size=3]Freeing up a couple of keys/buttons, or changing controls in the ini[/size][/font]\n<br />[/left][font=Arial][size=3][/size][/font][/list][center][list]\n<br />[font=Arial][size=3]﻿[/size][/font][/list][font=Arial][size=3][img]https://i.imgur.com/kDLG4OG.png[/img][/size][/font][/center][font=Arial][size=3]\n<br />[/size][/font][left][font=Arial][size=3]This mod will add numerous new mechanics to Oblivion's combat, most of which are inspired by games such as Dark Souls, Sekiro, Nioh, [/size][/font][font=Arial][size=3]and various Skyrim combat mods. Works best if playing in third person, though it is not required. Highly configurable, every feature can be tweaked and/or disabled.\n<br />\n<br />The current version of the mod includes:\n<br />\n<br />( [color=#660000]x[/color] = optional/disabled by default)\n<br />\n<br />[/size][/font][list]\n<br />[*][font=Arial][size=3] Dodging: with i-frames, first person dodging, timed dodges, perfect dodges, NPC dodging, etc.[/size][/font]\n<br />[*][font=Arial][size=3] Backstabs: attacks made against enemies that cannot see you deal bonus damage[/size][/font]\n<br />[*][font=Arial][size=3] Critical Strikes: global critical strike chance [color=#660000]x[/color][/size][/font]\n<br />[*][font=Arial][size=3] Hitstop: on-hit time slowdown[/size][/font]\n<br />[*][font=Arial][size=3] Poise: count-based stagger system with a cooldown[/size][/font]\n<br />[*][font=Arial][size=3] Enemy AI/Creature AI: increased enemy reaction speed, condition-based combat styles, enemy dodging/countering, etc[/size][/font]\n<br />[*][font=Arial][size=3] Enemy AI Chase Idles: greatly reduces enemy weapon swinging while running at the player[/size][/font]\n<br />[*][font=Arial][size=3]﻿[/size][/font][font=Arial][size=3] Bashing: reaction-based, staggers enemies out of blocking animation and power attacks[/size][/font]\n<br />[*][font=Arial][size=3] Attack Chains: allows you to cancel your current attack and immediately attack again, if timed correctly[/size][/font]\n<br />[*][font=Arial][size=3] Attack Cancel: allows you to block/dodge-cancel out of your attacks[/size][/font]\n<br />[*][font=Arial][size=3] Attack Cleaving: allows you to hit multiple enemies with weapon attacks[/size][/font]\n<br />[*][font=Arial][size=3] Guard Counters: completely original feature, not stolen from a certain game[/size][/font]\n<br />[*][font=Arial][size=3] Weapon Clash: simulates the clashing of weapons if two fighters attack at the same time[/size][/font]\n<br />[*][font=Arial][size=3] Parry/Counter: staggers enemies, allows the next attack to deal more damage[/size][/font]\n<br />[*][font=Arial][size=3] Lock-on: now with an animated marker![/size][/font]\n<br />[*][font=Arial][size=3] Finishers: allows executing low health enemies, works on any enemy[/size][/font]\n<br />[*][font=Arial][size=3] Power Attacks: adds extra effects depending on the weapon's type[/size][/font]\n<br />[*][font=Arial][size=3] Attack Commitment related options for the player [color=#660000]x[/color][/size][/font]\n<br />[*][font=Arial][size=3] Attack Commitment for enemies[/size][/font]\n<br />[*][font=Arial][size=3] Equipment Remover for killed NPC's [color=#660000]x[/color][/size][/font]\n<br />[*][font=Arial][size=3] Equipment Requirements [color=#660000]x[/color][/size][/font]\n<br />[*][font=Arial][size=3] Short Recoil Animations for faster paced combat[/size][/font]\n<br />[*][font=Arial][size=3] Attack Animations: adds more weight to weapon attacks and increases wind-up time [color=#660000]x[/color][/size][/font]\n<br />[*][font=Arial][size=3] Combat Rating: performing well in combat will award the player with tokens[/size][/font]\n<br />[*][font=Arial][size=3] Marksman additions: Charged Shots, Power Shots, the Steady Hand perk from Skyrim, Denock, and more[/size][/font]\n<br />[*][font=Arial][size=3] Consumables: two healing items are added to the world, used with a custom key, and animated[/size][/font]\n<br />[*][font=Arial][size=3] Other misc. additions such as Block Sparks, a stable Purge Cell Buffers feature, a toggleable light source, etc.[/size][/font]\n<br />[*][font=Arial][size=3] Some more cool stuff![/size][/font]\n<br />[/list][font=Arial][size=3]\n<br />Dark Souls Stamina includes:\n<br />\n<br />[/size][/font][list]\n<br />[*][font=Arial][size=3] Stamina system similar to Dark Souls (Fatigue will regen a lot faster but actions such as attacking, blocking, dodging, etc. will drain more Fatigue. Fatigue regeneration is also disabled while performing these actions.)[/size][/font]\n<br />[font=Arial][size=3]\n<br />[/size][/font][/list][font=Arial][size=3]An in-game book will automatically be added once the mod is initialized for the first time. This book will describe the mod's features and how to take advantage of them.\n<br />\n<br />The default controls for various features can be found in the spoiler below, if you do not wish to read the manual. (but you should!)\n<br />\n<br />[spoiler]\n<br />\n<br />Keyboard controls:\n<br />\n<br />Dodge: Left Shift\n<br />Parry: Timed Block (custom key available)\n<br />Bashing: B (Block + Attack available)\n<br />Guard Counter: LMB while blocking, after getting hit\n<br />Lock-On: F to Lock-on, F while locked on to switch target, hold RMB and press F to stop locking on\n<br />Finishers/Executions: Activate key while holding the Attack key\n<br />Consumables: N/RMB + N\n<br />Charged Shots/Power Shots toggle: H\n<br />Arrow Cancel/Denock: Sheathe/Unsheathe key while aiming with a bow\n<br />Light Toggle: J\n<br />\n<br />Gamepad Controls:\n<br />\n<br />Dodge: B\n<br />Parry: Timed Block[font=Arial][size=3] (can be assigned to a button in the ini)[/size][/font]\n<br />Bashing/Guard Counter: LT + RT (Guard Counters take priority)\n<br />Lock-on: [font=Arial][size=3]RS to Lock-on/stop locking on, move RS left/right to change targets[/size][/font]\n<br />Executions: Activate key while holding the Attack key (Defaults to RT + A)\n<br />Consumables: Unmapped (can be assigned to a button in the ini)\n<br />Charged Shots/Power Shots toggle: LT (hold while Blocking) + D-Pad Left\n<br />Arrow Cancel/Denock: Sheathe/Unsheathe key while aiming with a bow (Defaults to RT + X)\n<br />\n<br />Controls can be changed in the ini file.\n<br />\n<br />I realize that some of these controls overlap with vanilla Oblivion's controls, this is because I've changed my own controls years ago and actually kind of... forgot what the default controls are. Here are my own controls for reference:\n<br />\n<br />Activate: E\n<br />Cast: Q\n<br />Jump: Space\n<br />Ready weapon: R\n<br />Run: &#92; (unused)\n<br />Always Run: Z\n<br />Auto Run: X\n<br />Change View: G/MMB\n<br />\n<br />I honestly don't even know if there are any conflicting gamepad controls. B isn't mapped to anything for me, so I made that the Dodge key. LT+X also does nothing so I mapped it to Bashing. If I messed up big time then I apologize, it's probably my fault because I changed the controls at some point, forgot about it, and assumed that those were the default button mappings. You can either remap the buttons themselves or change the controls in the mod's ini so I hope it's not too big of an issue!\n<br />\n<br />[/spoiler]\n<br />\n<br />This mod is ideally used together with high damage multipliers to shift combat towards more of a reaction/counter-based experience. It basically gives you the tools to evade or counter every attack - but also punishes the player's mistakes through player Poise, a 3 second cooldown on failed Parries, stamina management from Dark Souls Stamina, etc.\n<br />\n<br /> The mod is highly configurable however, and you can increase/decrease combat difficulty by tweaking/enabling/disabling the various options in the ini. [/size][/font][/left][font=Arial][size=3][center]\n<br />[img]https://i.imgur.com/YrOJP0E.png[/img][/center]\n<br />This mod has been expanded a lot since it first released and will continue to grow in features, so I would recommend not using any other combat mods alongside this one if using the full mod with all of it's features enabled, though anything that simply increases damage done is compatible and recommended.[/size][/font][font=Arial][size=3]\n<br />\n<br />Individual features from the mod will most likely have no compatibility issues as long as there is no overlap with other mods.\n<br />\n<br />Some of the mod's controls will overlap with vanilla Oblivion's controls, this is because I've changed my own controls years ago and actually kind of... forgot what the default controls are. Here are my own controls for reference:\n<br />\n<br />Activate: E\n<br />Cast: Q\n<br />Jump: Space\n<br />Ready weapon: R\n<br />Run: &#92; (unused)\n<br />Always Run: Z\n<br />Auto Run: X\n<br />Change View: G/MMB\n<br />\n<br />I'd recommend changing the default controls to free up keys for the mod's features, but the controls for Dodging/Bashing/etc. can also be changed in the ini file.\n<br />\n<br />Other than that, the (full) mod should be compatible with more popular mods such as OOO/MMM/MOO, etc, because I always test the mod with some of them active, usually OOO + Frans.\n<br />\n<br />[/size][/font][list]\n<br />[*][font=Arial][size=3]Mods that change stagger frequency/duration will conflict with Poise[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]Custom races/characters with extra limbs might be incompatible with the mod's animations, resulting in stretching of body parts[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]Sex mods with extra bones for visible genitals will probably only stretch if you do mod-related stuff while naked[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]Incompatible with Unidirectional Attack, updated/custom versions are included in this mod[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]This mod includes a PCB feature (Purge Cell Buffers) that will only run once in a while[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]Incompatible with Enhanced Camera for now, dodging in first person causes the camera to go crazy[/size][/font]\n<br />[/list][list]\n<br />[*][font=Arial][size=3]Compatible with Vanilla Combat Enhanced - except for VCE's scripted changes, which probably won't interact well with this mod's Poise feature. If you're using VCE then you should either disable it's scripted changes in VCE's ini, or disable Poise from this mod.[/size][/font]\n<br />[/list]\n<br />[font=Arial][size=3][center][img]https://i.imgur.com/kXCnIIo.png[/img][/center]\n<br /> The mod functions purely through scripts, so the load order should not matter. The only thing this mod changes is the default Light spell color (from green to torch-colored) and the change might get overwritten by other mods below this one. I have it loaded last personally, after the bashed patch/MOO. Dark Souls Stamina needs to be loaded below the main mod.\n<br />[center]\n<br />[img]https://i.imgur.com/cAIeiN7.png[/img][/center]\n<br />Most features in this mod are achieved through OBSE functions, invisible clothing, and  a couple of silent spell effects. These will only last for a few seconds and will quickly get removed from the player/enemies when they are no longer needed. Combat between NPC's will also remain unchanged from vanilla, as everything in the mod will only function if the player is involved.\n<br />\n<br />The most script-intensive features in this mod are Enemy AI/Creature AI (has been reworked to improve performance though), and to a lesser extent, Poise. Try to disable them if you experience slowdowns or if the mod's performance isn't to your liking.\n<br />[center][color=#6aa84f]\n<br />[/color][img]https://i.imgur.com/pDp5tYU.png[/img][/center]\n<br />Just drop the files in your Data folder or install with Wrye Bash, and either check the ini to customize the mod to your liking or simply read the in-game manual to get started if you wish to play with the default settings enabled.\n<br />\n<br />The 'Main Files' folder includes the .esp file along with the necessary folders to get the mod to work, along with short Recoil animations, while the 'Optional' folder includes optional stuff such as slower dodge animations, even shorter recoil, and edited attack animations that add short wind-ups while also increasing delay between attacks.\n<br />\n<br />How to install with Wrye Bash:\n<br />\n<br />[spoiler]Drag the 7zip archive into the Installers tab in Wrye Bash, click on it and you'll see a list of sub-packages on the right side of your screen. Tick the '00 Core' box (this one is required), then also tick the boxes for whichever additional features you would like to install. After that right-click the 7z archive on the left side (called MCA_1.9.999_BAIN.7z, for example) then click on Install. [/spoiler]\n<br />\n<br />The mod includes a couple of tweaks/quality of life changes that are enabled by default, such as:\n<br />\n<br />- The removal of vanilla knockback when actors get hit\n<br />- Third person camera fix that forces it to always instantly rotate with the player\n<br />- Purge Cell Buffers feature that helps with stability (activates on each interior -&gt; exterior transition)\n<br />\n<br />Other tweaks to game settings such as reduced hit cone angles and movement speed changes can be enabled in the mod's ini. The above tweaks can also be disabled there.\n<br />\n<br />I wouldn't recommend uninstalling mid-game, but if you wish to do so, go into an empty cell with no NPC's around, save the game, then disable the mod. If that doesn't work, just disable all features in the ini and it'll be like the mod isn't even loaded.\n<br />[center][color=#6aa84f]\n<br />[/color][img]https://i.imgur.com/oz9a2fS.png[/img][/center]\n<br />- Something that increases all damage done (there are disabled damage settings in this mod's ini that can be used as well)\n<br />- Attack animations from this mod if playing in third person, a couple of features are balanced around them\n<br />[url=https://www.nexusmods.com/oblivion/mods/49134]- Ultimate Leveling[/url] (this mod is all about not getting hit, and Ultimate Leveling will allow you to increase your Armor skills by leveling up)\n<br />[url=https://www.nexusmods.com/oblivion/mods/43695]- Combat Stance Reanimation[/url] (used in the mod's images/video)\n<br />[url=https://www.nexusmods.com/oblivion/mods/46702]- OCSS[/url] and it's [url=https://www.nexusmods.com/oblivion/mods/47942 ]English Translation[/url]\n<br />[url=https://www.nexusmods.com/oblivion/mods/49067]- WalkBlessed[/url]﻿ (Amazing mod for Third-Person gameplay)\n<br />[url=https://www.nexusmods.com/oblivion/mods/49209]- Oblivion Subtle Sprint[/url]\n<br />[url=http://www.nexusmods.com/oblivion/mods/49995]- Interact Animations [/url](decent mod but the mod's author is kind of an idiot)\n<br />[url=https://www.nexusmods.com/oblivion/mods/13987?tab=description]- Symphony of Violence[/url] (goes well with the SFX from this mod)\n<br />- Something that increases enemy numbers, to use with Attack Cleaving\n<br />\n<br />And the following stability mods:\n<br />\n<br />[url=https://www.nexusmods.com/newvegas/mods/53635]- NVAC[/url]﻿ (not an Oblivion mod but it does work)\n<br />[url=https://www.nexusmods.com/oblivion/mods/47085]- EngineBugFixes[/url]﻿[/size][/font]\n<br />\n<br />[font=Arial][size=3][center][b][img]https://i.imgur.com/qwH0H86.png[/img][/b][/center][b][spoiler][/b]\n<br />\n<br />- Equipment Requirements description\n<br />\n<br />[spoiler]Equipment Requirements is based on weapon/armor tiers, so every piece of a Daedric set for example will have the same Heavy Armor requirement. \n<br />\n<br />This does not fully apply to weapons if there are multiple weapon types in the same category. The order for Blade weapons, for example, goes Dagger -&gt; Shortsword -&gt; Longsword/Claymore, with the latter being the most demanding. \n<br />\n<br />The required Blade skill to equip a Daedric Longsword is 100, so a Daedric Shortsword will require 95 skill, and a Daedric Dagger will require 90 skill.\n<br />\n<br />The same goes for all weapon types with multiple kinds of weapons within them.\n<br />\n<br />The weakest armor set of it's type requires at least 10 skill to wear, to make things interesting for very low level characters so that they will need to train (or level, use Ultimate Leveling - it's great) their armor skills a couple of times, otherwise even Rusty Iron/Fur armor will be unequippable. \n<br />\n<br />Bound items and Quest items are excluded and should be equippable regardless of your skills.\n<br />\n<br />If used together with the Equipment Remover, you will actually have to scavenge for single armor pieces - half of which you will not even be able to equip. Sounds like fun, right? maybe not, but it should make things a bit more interesting.\n<br />\n<br />It's also compatible with weapon/armor mods or mods that change weapon damage/armor rating. I've tested every weapon/armor set in the testing hall with OOO active, with and without MOBS, and all I can say is I T J U S T W O R K S [/spoiler]\n<br />\n<br />- Replacing AI Chase animations\n<br />\n<br />[spoiler](Requires NifSkope)\n<br />\n<br />The included chase animations are vanilla walk/run animations. If these are too jarring or if they differ too much from the animations mods you're using, you can do the following.\n<br />\n<br />1. Grab the following animations from your /data/meshes/characters/_male folder and copy them somewhere:\n<br />\n<br />onehandforward.kf\n<br />onehandfastforward.kf\n<br />twohandforward.kf\n<br />twohandfastforward.kf\n<br />\n<br />2. Open each one in NifSkope, double-click on the 'Value' field next to 0 NiControllerSequence, and rename it to something that has 'specialidle_' in front of it, for example:\n<br />\n<br />specialidle_chaseanim \n<br />specialidle_distantidle \n<br />specialidle_itstheyear2075andeldenringstillhasntbeenreleasedmiyazakiwhydoyoutorturemelikethis \n<br />\n<br />(you can give them all the same name too, it doesn't matter as long as it has specialidle_ in front of it)\n<br />\n<br />3. Click on 0 NiControllerSequence again, and find Cycle Type in the list above it. Change it from CYCLE_CLAMP to CYCLE_LOOP (double-click it then scroll your mouse wheel up a couple of times)\n<br />\n<br />4. Save the files in NifSkope and close it. After that, rename the actual files you just edited:\n<br />\n<br />onehandforward.kf -&gt; MCADistantIdle1H.kf\n<br />onehandfastforward.kf -&gt; MCADistantIdleFast1H.kf\n<br />twohandforward.kf -&gt; MCADistantIdle2H.kf\n<br />twohandfastforward.kf -&gt; MCADistantIdleFast2H.kf\n<br />\n<br />After you've done that, paste the animations into your data/meshes/characters/_male/idleanims folder, and overwrite the existing files.\n<br />\n<br />Note: you can also rename these files if you want enemies to only walk or run at you. Duplicating and renaming MCADistantIdleFast1H.kf to MCADistantIdle1H.kf for example will replace the walking animation with the run animation, which eliminates enemy walking behavior and causes them to only run at you without swinging their weapons.\n<br />\n<br />5. Realize that you can do this with any idle animation and replace the Bashing animation with some sort of sexual thrust or something.[/spoiler]\n<br />\n<br />- Visible Healthbars above enemies' heads\n<br />\n<br />Go to Documents/My Games/Oblivion and open Oblivion.ini, then find the following line: bHealthBarShowing=0 \n<br />And change it to 1 so it reads: bHealthBarShowing=1\n<br />\n<br />- An option in the ini is not working as expected\n<br />\n<br />That can happen because the mod gets updated frequently and the code is constantly changing, which can sometimes break an option that depends on said code. I try to test all of the different settings as much as I can, but there's always a chance that an ini option no longer works once the mod gets updated. Just let me know about it and I'll have it fixed shortly.\n<br />\n<br />- Default ini settings\n<br />\n<br />The default settings have pretty much every notable feature enabled and are more of a demonstration of what the mod can do. This game can be modded in a lot of ways and the default settings might not be particularly balanced for your game, which mostly applies to overhauls that increase enemy spawn rates.\n<br />\n<br /> I'll include ini presets for them at some point in the future, but my advice for now, if using OOO/MMM/MOO or something similar, is to disable the Clash feature and increase player Poise to your liking in the ini file. This will allow you to cleave through hordes of enemies without recoiling from enemy weapons and getting staggered too much.\n<br />\n<br />- Enemies not following outside when leaving dungeons\n<br />\n<br />Disable the PCB feature of the mod, it's at the end of the ini. It should not happen anymore since there is a 7 second delay before the buffers get purged.\n<br />\n<br />- Compatibility issues/Crashes/Bugs/Other issues\n<br />\n<br />The lack of an audio codec/filter called 'AC3 Filter' can apparently be a reason for random crashes. Not just with this mod but in general. If random crashes occur either with or without this mod, try installing 'AC3 Filter' or 'K-Lite Codec Pack' which can easily be found with a Google search. (credits to gabrielrock19 for the information on this)\n<br />\n<br />Please report mod-specific issues to me in the comments! There are so many mods out there that I've never used myself, so there's no way I would know whether they are or aren't compatible with this one. I check the Nexus every day so if you find any bugs or strange interactions with other mods and let me know about them, there's a good chance that I'll have it fixed in a couple of days max. So please report them!\n<br />\n<br />- Dark Souls Stamina regen amount\n<br />\n<br />The regen amount scales with both the equipped armor type (heavy or light/none) and the player's level. A high level character wearing light armor or no armor at all will have the highest stamina regen possible.\n<br />\n<br />- Getting staggered a lot\n<br />\n<br />Player Poise is enabled by default because I feel like it's balanced well enough for vanilla enemy spawn rates. It'll be easy for enemies to stagger you at low levels/low Endurance, but you'll be able to stagger them just as easily. All enemy attacks can be evaded or countered in duels/small encounters from my experience, but if you use a mod that adds an ungodly amount of enemies to dungeons (like OOO for example) then you're probably better off disabling/increasing player Poise in the mod's ini unless you think you can dodge or parry every attack. \n<br />\n<br />Enemy AI Chase Idles should at least reduce the amount of time spent getting ganked because enemies will have a 50% chance to slowly walk towards you when chasing instead of running at you while swinging their weapons around. \n<br />\n<br />Attack Cleaving should help out a bit as well, since you'll be able to hit (and stagger) multiple enemies with your attacks.\n<br />\n<br />- Getting staggered for a split second\n<br />\n<br />That's the Poise feature saying 'No!' to vanilla/random stagger. It won't even be noticeable if your framerate is stable, but if the engine is overloaded at that point then it might take a little while for the script to kick in, usually about a second.\n<br />\n<br />- This mod has a bunch of features that can kill enemies\n<br />\n<br />The kills are registered as player kills, so it won't break anything by not giving you credit for killing an enemy with backstabs, cleave damage, etc.\n<br />\n<br />- No damage settings included/disabled by default\n<br />\n<br />I'm not fully sure how damage is calculated in this game, because I've been simply using MOO/OOO/VCE/something else to increase all damage myself. The damage values in the ini SHOULD make fights more lethal in theory - but I can't guarantee that they're super balanced or anything. This mod is all about adding a lot of cool scripted combat-related features to the game, so that's what I focus on most of the time! If you're able to find or figure out damage multipliers that go well with this mod then feel free to let me know about them.\n<br />\n<br />- No Unidirectional Attack timer configuration in the ini\n<br />\n<br />The length of the directional lock is only as long as the enemy's attack animation length, so no timers needed.\n<br />\n<br />- Chase Idles doesn't work on certain enemies\n<br />\n<br />It only applies to melee enemies (or whatever the game considers a melee class) so that enemy archers and mages can keep doing their thing from a distance. If an enemy is displaying default chase behavior (running at you while swinging non-stop) then it's either an archer or a mage.\n<br />\n<br />- Purpose of Creature AI\n<br />\n<br />The current version cranks everything up to 11 which results in Creatures being much more active and chaining various attacks together. Creatures with weapons or shields will attempt to block player attack spam whenever possible. \n<br />\n<br />- No first-person animations \n<br />\n<br />Will try to create first person equivalents of the mod's attack animations soon. Update: nope, still can't create any because the camera just sinks into the ground whenever I attempt to add/modify first person animations. Will keep looking into it.\n<br />\n<br />- Lock-on sucks\n<br />\n<br />Not anymore it doesn't! \n<br />\n<br />- Lock-on stutter\n<br />\n<br />Not much I can do about that one unfortunately, the Lock-on script runs every frame and should be smooth in theory. The issue lies with Oblivion's frame pacing or something. You can fix it by installing Oblivion Display Tweaks with the Tick Fix enabled. Oblivion Stutter Remover should be able to fix it as well.\n<br />\n<br />- Lock-on Angle Bug\n<br />\n<br />Sometimes, when circling around an enemy while locked on, the game gets confused and doesn't know what to do anymore. Your compass will disappear and your attacks won't hit anything. Seems to be an engine bug that I can't do anything about script-wise, but is easily fixable by just... moving the mouse (or Right Stick) up and down. \n<br />\n<br />- Animations bad\n<br />\n<br />Y e s\n<br />\n<br />- Colored Shaders on actors during combat\n<br />\n<br />Those are basically there to let you know whenever a mod-added combat event is happening. Powerattacking enemies glow red for a second, Poise-broken actors emit an orange glow once their Poise has reset, your character will briefly glow on succesful Parries/Attack Chains, etc. I feel like they can help new users get familiar with the mod's features. You can of course disable all of them in the mod's ini.\n<br />\n<br />- Consumables are named like [this]\n<br />\n<br />It puts them at the top of the list when looking through a container, making them easier to find. Some mods add a lot of misc. items to NPC's and chests, and having to search through all of them every time just to find a healing item can get a bit annoying.\n<br />\n<br />- Reason for all the optional stuff\n<br />\n<br />It's because I don't really want to force anything on anyone with this mod - that's why pretty much everything can be configured or turned off. \n<br />\n<br />- Gore/mutilation/other disgusting stuff\n<br />\n<br />Besides having to add more requirements to the mod, I'm just not a fan of seeing people get decapitated or screaming in agony because their limbs have been torn off and just thinking about it makes me want to vomit so I'm gonna have to pass. Sorry!\n<br />\n<br />- Only female characters in images/videos\n<br />\n<br />I have this specialanims.esp that gives my character unique but feminine animations, and I'm too lazy to turn it off. That's it, that's the whole reason. This mod will work just fine with male characters.\n<br />\n<br />- A couple of features don't work in the NorthernUI version\n<br />\n<br />These are mainly the ones that use walk/run toggle to function - NorthernUI doesn't have this because it's replaced by joystick movement instead, so Momentum/Charged Shots slowdown are currently not functional in the NUI version. \n<br />\n<br />If anything else is missing then it's because it requires free buttons on the controller of which there seems to be a lack of!\n<br />\n<br /> [/spoiler][b]\n<br />[/b][center]\n<br />[img]https://i.imgur.com/6JQNgKd.png[/img][/center]\n<br />- The OBSE team\n<br />- llde for xOBSE\n<br />- DavidJCobb for NorthernUI\n<br />- documn for Double-tap Dodge\n<br />- mitzi for Unidirectional Attack and Stagger Recoil &amp; Hitstop\n<br />- Souldemon for Better Recoil and Stagger\n<br />- Bethesda for the TES games, which are among my favorite games out there\n<br />- People in the Comments section for giving me ideas for new features and helping me improve the mod!\n<br />- Wiepman for info on the PCB command\n<br />- TheKingdomSCH for taking the time to translate this mod into Chinese\n<br />- My cat for being such a cute kitty\n<br />- Coffee[/size][/font]"
