nexusDescription="Name: Ultimate Leveling\n<br />Version: 1.9.5.2\n<br />Date: 4/6/2020\n<br />Language: English\n<br />Category: Skills and Leveling\n<br />Requirements: [url=http://obse.silverlock.org]Oblivion Script Extender[/url] (OBSE), [url=https://www.nexusmods.com/oblivion/mods/32200]MenuQue[/url]\n<br />Recommended: [url=http://www.nexusmods.com/oblivion/mods/10763]DarNified UI[/url], [url=https://www.nexusmods.com/oblivion/mods/50144]LINK[/url], [url=http://www.nexusmods.com/oblivion/mods/2097]Oblivion Mod Manager[/url] (OBMM)\n<br />Author: Maskar\n<br />Source: [url=http://www.nexusmods.com/oblivion/mods/49134]http://www.nexusmods.com/oblivion/mods/49134[/url]\n<br />[line]\n<br />[b]Description[/b]\n<br />\n<br />This mod changes how the player character levels, removing the need for efficient leveling and making character development more diverse. Either pick an experience based leveling system (like Oblivion XP), or a skill usage leveling system (like Realistic Leveling). The experience based leveling system allows the player character to level by gaining experience, which is done by performing actions like killing enemies, completing quests and discovering new locations. The skill usage leveling system allows the player character to level by using skills, much like vanilla, but includes an optional skill cap to encourage character diversity.\n<br />\n<br />A leveling system is a combination of choices, which are configurable in the ini file, split into the following 7 categories:\n<br />\n<br />[list][*]Leveling;\n<br />[*]Skills;\n<br />[*]Attributes;\n<br />[*]Luck;\n<br />[*]Health;\n<br />[*]Magicka;\n<br />[*]Sleeping.\n<br />[/list]\n<br />See chapter 2 of the pdf readme for an overview of the available leveling systems and chapter 3 to 9 for more information concerning the available options for each category.\n<br />\n<br />Additionally, powerscrolls have been added to increase attribute caps and profession books to change the player character's class. Please read the included pdf readme file for further details.\n<br />\n<br />[b]Compatibility and requirements[/b]\n<br />\n<br />This mod requires [url=http://obse.silverlock.org]OBSE[/url] (version [color=yellow]21[/color] or higher) and [url=https://www.nexusmods.com/oblivion/mods/32200]MenuQue[/url] to function properly. Currently [url=https://www.nexusmods.com/oblivion/mods/10763]DarNified UI[/url], [url=https://www.nexusmods.com/oblivion/mods/11280]DarkUI'd DarN[/url], [url=https://www.nexusmods.com/oblivion/mods/48577]NorthernUI[/url], [url=https://www.nexusmods.com/oblivion/mods/48662]Dark Transparent UI[/url] and [url=https://www.nexusmods.com/oblivion/mods/49492]Major Jim's UI[/url] are automatically supported. Any other UIs, like [url=https://www.nexusmods.com/oblivion/mods/1825]BTmod[/url], will use the new vanilla UI menus.\n<br />\n<br />Do not use this mod with other character leveling and/or uncapper mods. It can however be used with existing savegames. Also, load order is not important.\n<br />\n<br />For anyone using [url=https://www.nexusmods.com/oblivion/mods/34905]HUD Status Bars[/url], [url=https://www.nexusmods.com/oblivion/mods/38801]Real Time Lockpicking[/url], [url=https://www.nexusmods.com/oblivion/mods/44925]Alchemy Advanced (Adjustments)[/url], [url=https://www.nexusmods.com/oblivion/mods/48118]Pickpocket Skill Overhaul[/url], or [url=https://www.nexusmods.com/oblivion/mods/41553]Fundament Enchanting Addons[/url] have a look at chapter 13 of the pdf readme for information concerning compatibility.\n<br />\n<br />[b]Install[/b]\n<br />\n<br />[list][*]Extract the files to a temporary location\n<br />[*]Copy files to (install folder)&#92;Oblivion&#92;Data&#92;\n<br />[*]Start Oblivion Launcher, click 'Data Files', place a checkmark beside the .esp file\n<br />[*]Optionally edit the .ini file to customize it to your preferences\n<br />[/list]\n<br />[b]Uninstall[/b]\n<br />\n<br />[list][*]Start Oblivion Launcher, click Data Files, uncheck the .esp file\n<br />[*]Delete the Ultimate Leveling files in the Data folder\n<br />[/list]\n<br />[b]History[/b]\n<br />\n<br />Version 1.9.5.2 (4/6/2020)\n<br />[list][*]Updated LINK support\n<br />[/list]\n<br />Version 1.9.5.1 (26/5/2020)\n<br />[list][*]Removed custom event handler to avoid possible OBSE issue\n<br />[/list]\n<br />Version 1.9.5 (25/5/2020)\n<br />[list][*]Added LINK support\n<br />[*]Added support for Map Marker Overhaul player markers\n<br />[*]Updated attribute point distribution calculation\n<br />[*]Added option to increase skill caps to be above 100 when using xp leveling system\n<br />[*]Updated horseshoe placement\n<br />[/list]\n<br />Version 1.9.4 (17/4/2020)\n<br />[list][*]Replaced all generic levelup menus with modified \"real\" levelup menus\n<br />[*]Updated vanilla UI for various attribute modes\n<br />[*]Improved use of profession books with new leveling modes\n<br />[/list]\n<br />Version 1.9.3 (9/4/2020)\n<br />[list][*]Added support for Dark Transparent UI and MajorJim's UI\n<br />[*]Improved all UIs\n<br />[*]Improved support for non-English game versions\n<br />[/list]\n<br />Version 1.9.2 (4/4/2020)\n<br />[list][*]Added skills based luck mode\n<br />[*]Added ability to configure the amount of training sessions for each level\n<br />[*]Added ability to configure the cost of training\n<br />[*]Added ability to configure skill point cost for specialization of major and minor skills individually\n<br />[*]Added ability to follow the path of a custom class\n<br />[*]Added custom class profession books to merchants and as loot\n<br />[*]Added ability to gain xp from kills of actors under the influence of a frenzy spell\n<br />[*]Improved UI for attribute/skill menu and progress text\n<br />[*]Improved support for changing race and class during character creation\n<br />[/list]\n<br />Version 1.9.1 (27/3/2020)\n<br />[list][*]Fixed issue related to amount of experience received killing actors\n<br />[*]Added compatibility ini file to automatically configure itself when needed \n<br />[*]Added Balanced Magic, Av Latta Magicka and Race Balancing Project to compatibility ini file \n<br />[/list]\n<br />Version 1.9 (25/3/2020)\n<br />[list][*]Added realistic leveling mode\n<br />[*]Added manual, realistic and KCAS wheel attribute modes\n<br />[*]Added manual luck mode\n<br />[*]Added unleveled, retroactive and unchanged health modes\n<br />[*]Added various sleeping modes\n<br />[*]Added ability to configure the speed of individual skills\n<br />[*]Updated xp calculation for various actions like quests, repair items and training\n<br />[*]Removed support for onsoultrap event handler to avoid crashes\n<br />[*]Updated fame based luck calculation\n<br />[*]Updated horseshoes to be golden when giving luck or have a normal appearance otherwise\n<br />[*]Added quest ini file to configure xp and description of quests\n<br />[*]Added advanced users ini file\n<br />[*]Rewritten ini file and moved most settings to advanced users ini file\n<br />[*]Updated UI for various leveling system modes\n<br />[/list]\n<br />[spoiler]Version 1.8 (26/8/2019)\n<br />[list][*]Added custom event handler for XP messages from other mods (like MOO v4.9.4+)\n<br />[*]Updated soul trapping to gain xp based on soul level of target\n<br />[/list]\n<br />Version 1.7 (9/8/2019)\n<br />[list][*]Added custom event handler for new skills for improved xp leveling support\n<br />[*]Fixed issue where too many horseshoes could be placed near 1 location\n<br />[*]Added ability to configure how quickly new skills increase when using automatic xp leveling\n<br />[/list]\n<br />Version 1.6 (29/7/2019)\n<br />[list][*]Added support for mods adding new skills (enchanting, pickpocketing, etc.)\n<br />[*]Added option for rested bonus to be based on experience rather than time (like WoW)\n<br />[*]Changed UI ini file text variables to make them slightly more readable\n<br />[*]Disabled skill point penalty for a skill being a minor skills (change in ini file)\n<br />[*]Fixed minor display issue related to skill masteries\n<br />[/list]\n<br />Version 1.5 (22/7/2019)\n<br />[list][*]Added (Golden) Horseshoes to outdoor places of interest, like settlements, caves and shrines\n<br />[*]Changed luck attribute calculation to be based on the amount of horseshoes found\n<br />[*]Added ability to configure luck to be based on either horseshoes found or fame, infamy and bounty\n<br />[*]Added ability to gain experience from kills by companions, pets and followers\n<br />[*]Added ability to gain some experience from assisted kills\n<br />[*]Added skill requirement to change class using profession book\n<br />[*]Updated profession books to show major skills in red when they're too low\n<br />[*]Added (optional) sound when progress text is displayed (off by default)\n<br />[*]Added ability to configure skill cost when skill is a minor skill\n<br />[*]Added ability to configure skill cost when skill belongs to a class specialization\n<br />[*]Added ability to configure amount rested bonus for each hour slept (default 1 hour)\n<br />[*]Added ability to configure maximum amount of rested bonus (default 8 hours)\n<br />[*]Disabled meditate message when using xp leveling\n<br />[*]Updated crafting potion experience calculation\n<br />[*]Improved support for Northern UI\n<br />[*]Added support for FormID Finder\n<br />[*]Added support for Alchemy Advanced Adjustments\n<br />[*]Added instructions to pdf readme how to use Real Time Lockpicking\n<br />[/list]\n<br />Version 1.4 (30/3/2019)\n<br />[list][*]Updated ability to gain experience through soul trapping to avoid an OBSE issue\n<br />[*]Fixed issue where a string variable was not destroyed resulting in some savegame bloat\n<br />[*]Added ability to gain experience from reading normal books and eating ingredients\n<br />[*]Updated how the progress bar and text are displayed to improve compatiblity with other mods\n<br />[*]Added option to show the level of enemies killed in the progress text (off by default)\n<br />[*]Added option to show the type of location discovered in the progress text (off by default)\n<br />[*]Added ability to increase/decrease size of the progress bar by editing the UI ini file\n<br />[*]Updated progress bar to not show when in menumode\n<br />[/list]\n<br />Version 1.3 (15/3/2019)\n<br />[list][*]Added ability to undo skill points using right mouse button on skill in skills menu\n<br />[*]Added ability to see amount of skill points assigned to a skill in skills menu\n<br />[*]Added text buffer for showing multiple experience messages at once\n<br />[*]Fixed issue where training sessions did not reset after leveling up (xp leveling mode only)\n<br />[*]Updated required experience to be in steps of 100\n<br />[*]Added optional text to skills menu showing exact current and required xp to level up\n<br />[/list]\n<br />Version 1.2 (8/3/2019)\n<br />[list][*]Added experience based leveling system (set as default for this version)\n<br />[*]Added progress bar (and text) to display character leveling progress\n<br />[/list]\n<br />Version 1.1 (13/2/2019)\n<br />[list][*]Added levelup menus for various UIs (requires MenuQue)\n<br />[*]Added profession books to change the class of the player character (requires MenuQue)\n<br />[*]Added profession books as loot and to npcs and book merchants\n<br />[*]Forced the need to sleep to level-up, even when disabled by another mod\n<br />[*]Fixed issue where casting a scroll would display errors in the console\n<br />[/list]\n<br />[i]Version 1.0 (2/2/2019)[/i]\n<br />[list][*]Initial release[/list][/spoiler]"
