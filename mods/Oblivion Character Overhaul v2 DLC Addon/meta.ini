nexusDescription="REQUIREMENTS:\n<br />[url=https://www.nexusmods.com/oblivion/mods/44676]Oblivion Character Overhaul v2[/url]\n<br />\n<br />DESCRIPTION:\n<br />This mod improves the faces of the NPCs in all the official DLCs (except Horse Armor since it doesn't add any NPCs) for use with OCOv2. It also includes the eye changes to the DLC NPCs from my mod [url=https://www.nexusmods.com/oblivion/mods/52052]Unused OCOv2 Eyes and DLC Characters Incorporated[/url]. It does not affect any Shivering Isles NPCs, for that use my mod [url=https://www.nexusmods.com/oblivion/mods/51971]Improved NPC Faces for OCOv2[/url]. All NPCs were adjusted manually, this was not made with an xEdit script. A lot of the NPCs in some of the DLCs had the same faces, I've changed them to all have at least somewhat-unique faces. I've also assigned hair to any NPCs that didn't have hair assigned, as well as eyes. A few NPCs have different hair and/or eyes that I feel fit them better.\n<br />\n<br />INSTALLATION:\n<br />Install with your mod manager of choice or put the ESP in your data folder. If you use Wrye Bash, deactivate and import the plugin into your Bashed Patch. It's a filter patch, so even if you don't use some of the DLCs you can still get the changes from the ones you use imported into your Bashed Patch. There's also a standalone version with separate plugins for each DLC.\n<br />\n<br />This mod is always safe to install, uninstall, or update mid-game.\n<br />\n<br />COMPATIBILITY:\n<br />Using a Bashed Patch and [url=https://www.nexusmods.com/oblivion/mods/52010]Oblivion Character Overhaul - Advanced Edition[/url] should eliminate pretty much all compatibility issues.\n<br />\n<br />LOAD ORDER:\n<br />Place after the official DLCs and [url=https://www.nexusmods.com/oblivion/mods/44676]Oblivion Character Overhaul v2[/url]. If you use [url=https://www.nexusmods.com/oblivion/mods/52010]Oblivion Character Overhaul - Advanced Edition[/url] load this after the faces plugin from that mod.\n<br />\n<br />If you were a user of [url=https://www.nexusmods.com/oblivion/mods/52241]OCOv2 Knights of the Nine addon[/url], [url=https://www.nexusmods.com/oblivion/mods/52337]OCOv2 Battlehorn Castle Addon[/url], [url=https://www.nexusmods.com/oblivion/mods/52336]OCOv2 Thieves Den Addon[/url], or the Better Aurelinwae file from  [url=https://www.nexusmods.com/oblivion/mods/51971]Improved NPC Faces for OCOv2[/url], uninstall them and use this instead. I've made some changes and this is where those plugins will be hosted and maintained from now on.\n<br />\n<br />Also check out [url=https://www.nexusmods.com/oblivion/mods/52052]Unused OCOv2 Eyes and DLC Characters Incorporated[/url] and  [url=https://www.nexusmods.com/oblivion/mods/51971]Improved NPC Faces for OCOv2[/url].\n<br />\n<br />This mod makes [url=https://www.nexusmods.com/oblivion/mods/48557]Oblivion Character Overhaul V2 - DLC Faces[/url]﻿ obsolete.\n<br />\n<br />Let me know if you have any questions or suggestions. \n<br />\n<br />That's all... enjoy!"
