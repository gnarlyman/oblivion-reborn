nexusDescription="[center][b]ConScribe[/b]\r<br />[b]Console Logging for the Masses[/b]\r<br />[b]version 10.0[/b]\r<br />\r<br />[b]Requires [url=http://obse.silverlock.org]Oblivion Script Extender[/url][/b][/center]\r<br />\r<br />\r<br />[b][u]Description[/u][/b]\r<br />\r<br />\r<br />[i]Bah &#33; These useless mod authors are always asking for something or the other when it comes to bug reports. Load order, OBSE version, bashed patch status, sexual orientation, Oblivion version and non-existent error logs to name a few. Bah &#33;[/i]\r<br />May your head fall off at an awkward moment if such a thought were to ever pass through it, verbatim or otherwise.\r<br />\r<br />Until then, consider using ConScribe\r<br />\r<br />\r<br />\r<br />[b][u]Fine Print[/u][/b]\r<br />\r<br />ConScribe is an OBSE plugin that supersedes speedo’s long-since-gone Console Logger. It logs all console output to text files for later reviewing, including those typed in by the player. It removes the need for modders to adopt independent logging functions. \r<br />\r<br />ConScribe supports 3 logging modes:[list]\r<br />[*]Per Game Load; and\r<br />[*]Per Game Session\r<br />[*]Static Logging\r<br />[/list]Per Game Load creates a new log every time a game is loaded. Per Game Session creates a single log file on game start and appends all logged output to it, for the length of the session. Subsequent game loads are delimited by their instance (nth game load) and time of loading.  Static logging behaves like Per Game session but uses a static log ( Static Log.log ).\r<br />\r<br />Console logs are saved to a folder named “ConScribe Logs” in your Oblivion root directory and each log is named in accordance to the time of its creation.\r<br />\r<br />ConScribe also adds, as contradictory in terms as it may seem, independent log functions that allow mods to log output to text files. Output is primarily segregated into 2 types: [list]\r<br />[*]Logs made per script – Output is grouped by the parent script\r<br />[*]Logs made per mod – Output is grouped by the parent mod\r<br />[/list]The primary output function Scribe is used to log all output. Mods may register logs using the RegisterLog function and then use Scribe to write to it. Registered logs can be unregistered using UnregisterLog. GetRegisteredLogNames returns the names of the calling mod&#39;s registered logs. The contents of registered logs may be read using the ReadFromLog function.\r<br />\r<br />\r<br />\r<br />[u][b]Compatibility[/b][/u]\r<br />\r<br />This plugin is compatible with every other OBSE plugin with the exception of ConLog (Console Logger). Using both at once will create duplicate logs.\r<br />\r<br />\r<br />\r<br />[b][u]Credits[/u][/b]\r<br />\r<br />[i]Special thanks[/i] to :\r<br />[list]\r<br />[*]Ian Patterson, Stephen Abel and Paul Connelly (The OBSE Team) - For keeping up the Oblivion Modding spirit and providing the modding community with TES4 Oblivion&#39;s Elixir of Immortality\r<br />[*]LHammonds - For his Readme generator\r<br />[*]Speedo - For releasing the first console logger\r<br />[*]Scruggsywuggsy the ferret - For the console hook code\r<br />[*]Kyoma - For spamming in the discussion thread\r<br />[/list]The Entire Community around the TES Construction Set Wiki – For making such an exhaustive resource catering to ES Modding.[/list]The Entire Community around the TES Construction Set Wiki - For making such an exhaustive resource catering to ES Modding.\r<br />The Folks at the Construction Set Forums - For all their help, rum and fish.\r<br />The Rest of the Modding Community - For the inspiration I needed to start modding and all the wonderful mods which I use.\r<br />Bethesda - For providing a great game, with enough flaws to keep us busy.\r<br />\r<br />\r<br />\r<br />[u][b]Change Log[/b][/u]\r<br />\r<br />10.0 -\r<br />Added CSE inter-op support\r<br />Misc. fixes\r<br />\r<br />9.0 -\r<br />New Commands : GetLogLineCount, DeleteLinesFromLog\r<br />RegisterLog returns -1 when it fails\r<br />Fixed a bug that prevented UnRegisterLog from deleting the default log when log name was passed as &#39;*.*&#39;\r<br />Fixed a memory leak in the ReadFromLog handler\r<br />Moved default log directory inside the Data folder to increase compatibility with installers. Existing logs need to be moved manually.\r<br />Rewrote the INI manager as a new library\r<br />Optimised ReadFromLog handler\r<br />Temporarily removed support for CSE’s IntelliSense\r<br />8.0c - Fixed the bug thought fixed in 8.0b\r<br />8.0b - Fixed a bug introduced in the last update that prevented scribe from working\r<br />8.0a -\r<br />[list]\r<br />[*]Fixed a bug in serialization code\r<br />[*]Added missing console printing code to Scribe’s handler\r<br />[/list]\r<br />8.0 –\r<br />[list]\r<br />[*]Rewrote plugin internals\r<br />[*]Removed the alternate INI path added in 7.0.0.5\r<br />[*]Fixed up INI format (forthelasttimedammit)\r<br />[*]Removed the 24 hour clock INI setting in lieu of a format string\r<br />[*]Made the log directory changable through an INI setting\r<br />[*]Added interop support for the OBSE plugin Construction Set Extender\r<br />[*]Standardized serialization record format to allow expansion and backward compatibility in later builds; \r<br />      Records saved by previous builds are automatically converted[*]Released source code\r<br />[*]Log headers are no longer appended on unregistered logs during load callbacks\r<br />[/list]7.0a –\r<br />[list]\r<br />[*]Scribe allows the pipe character in its string argument as long as one is appended as the log name delimiter\r<br />[*]Log directory is accepted as an alternate parent directory to the INI file\r<br />[/list]7.0 –\r<br />[list]\r<br />[*]The static log is also backed up now\r<br />[*]Support for multiple logs\r<br />[*]Ability to read from logs\r<br />[*]Can optionally delete logs while unregistering them\r<br />[*]Changed the INI format (for the last time … hopefully)\r<br />[*]Fixed a potential bug in the plugin load callback.\r<br />[*]Fixed a bug that kept script logs from being appended with headers\r<br />[/list]6.0 - Added append mode to scribed logs\r<br />5.0 - Some code moved around, modified and rewritten; Changes to the INI; New log functions\r<br />4.0 - Decided to have ice cream for dessert\r<br />3.0a - Fixed a null pointer crash\r<br />3.0 - Replaced Prefix notation with an INI file; Option to use 24 Hour time notation in log names\r<br />2.0 - Renamed prefix [i]PerGame[/i] to [i]PerSession[/i] ; Added new prefix [b]PerSessionEx[/b]\r<br />1.0 - Initial Release"
