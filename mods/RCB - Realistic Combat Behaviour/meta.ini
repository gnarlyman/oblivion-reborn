nexusDescription="[b][u][font=Comic Sans MS]\n<br />\n<br />[size=4]Optional Requirements[/size][/font][/u][/b]\n<br />[size=3][font=Times New Roman]  Ω [/font]DLCBattlehornCastle.esp[/size]\n<br />[size=3][font=Times New Roman]  Ω [/font]Knights.esp[/size]\n<br />[size=3][font=Times New Roman]  Ω [/font][url=https://www.nexusmods.com/oblivion/mods/42780]Maskar’s Oblivion Overhaul.esp[/url]\n<br />[/size][font=Times New Roman][size=3]  Ω [/size][/font][size=3][url=https://www.nexusmods.com/oblivion/mods/46199][font=Arial]Oscuro's_Oblivion_Overhaul.esm[/font]\n<br />[font=Times New Roman][color=#f4f4f4]  Ω[/color] [/font][font=Arial]OOOCreatureAddons.esp[/font][/url]\n<br />[font=Times New Roman]  Ω [/font][url=https://www.nexusmods.com/oblivion/mods/5296]Unofficial Oblivion Patch.esp[/url]\n<br />\n<br />[/size][url=https://www.nexusmods.com/oblivion/mods/11536][font=Times New Roman][color=#f4f4f4][size=3]  Ω [/size][/color][/font]xEdit[/url] to Merge the Plugins (use the normal xEdit executable, NOT the QuickAutoClean executable)\n<br />[b][u][font=Comic Sans MS][size=4]\n<br />Installation[/size][/font][/u][/b]\n<br />[size=3]   Use all the files you need [u][b]watch the v2.0 Video Mod Showcase[/b][/u] if you want [u][b]to know how to merge these plugins[/b][/u].\n<br />   You can install this mod simply[/size][size=3] by throwing the esp’s you need at the data folder of your Oblivion [/size][size=3]installation folder or by using a mod manager, there shouldn’t be any problem [/size][size=3]at all.\n<br />[/size]   The Vanilla version is for those who only want these changes for the base game, you can avoid this file if you plan to use either the Oscuro's or Maskar's MERGE (both of these last two files contain already the changes found in the vanilla version).\n<br />[size=3]   And make sure that no other mod takes priority if there’s any conflict, you can check that in xEdit by loading all your plugins.[/size]\n<br />\n<br />[font=Comic Sans MS][size=4][u][b]Updating[/b][/u][/size][/font]\n<br />[font=Arial][size=2]   Recently I noticed that if you want to update this mod using your already created merge, you only need to follow the same process described in the v2.0 video, but instead of selecting the \"Deep copy as override into...\" you need to select the next option:\n<br />   \"Deep copy as override (with overwriting) into...\"\n<br />[/size][/font]\n<br />[font=Comic Sans MS][size=4][u][b]Uninstallation[/b][/u][/size][/font]\n<br />[size=3]Just delete the plugin (esp) from your data folder[/size]\n<br />\n<br />\n<br />[u][b][font=Comic Sans MS][color=#6aa84f][size=4]Description[/size][/color][/font][/b][/u]\n<br />[left][size=3]   All of us have experienced and enjoyed this game, its storytelling, and the abundance of options offered to take. The game [/size][size=3]promises so much from the start that once you leave the tutorial you end up [/size][size=3]feeling amazed, in the need of adventure, you fight against some mobs and the [/size][size=3]next time you open the game you never feel the same again.[/size]\n<br />[size=3]   That’s because, [b][u]in the vanilla game[/u][/b], the enemies tend to have the [b]same jumping attack animation[/b], this one has a large [/size][size=3]percentage of occurrence, this is a huge problem which provokes that the [/size][size=3]different enemies end up using only that animation, [u][b]that impedes the feeling to [/b][/u][/size][size=3][u][b]fight against more diverse and intelligent enemies[/b][/u], which makes the gameplay [/size][size=3]experience itself becoming so boring past a certain point.[/size]\n<br />[size=3]   So, I decided to improve that, by making the enemies use different attacks with a more varied occurrence, so goblins and [/size][size=3]their different variations (archer, shaman, skirmisher, berserk, archer berserk, [/size][size=3]etc.) would never feel the same for example. Unfortunately, there are some [/size][size=3]exceptions to this, for example, the goblin warlords tend to use that jumping [/size][size=3]attack so much because they do not come with weapons as far as I’m concerned, so, [/size][size=3]I’m still thinking to give them weapons, but that could create some [/size][size=3]incompatibilities with other mods, probably… so at the moment I’m going to test [/size][size=3]this mod in-game to see if there’s something more I should do to give a more [/size][size=3]varied experience against the different enemies.[/size]\n<br />[size=3]   There are some other examples for which, [u][b]I would love to get your feedback, and suggestions[/b][/u]… take in mind that [b]doesn’t [/b][/size][size=3][b]imply[/b] that [b]I’m going to accept everything you propose[/b], so I suggest to anyone [/size][size=3]who wants to try this mod, that if you find something game-breaking or a rather [/size][size=3]immersive-breaking problem, to please share the name of the enemy you were [/size][size=3]fighting against and if possible the BaseID of the enemy, post the problem you [/size][size=3]found and optionally how would you think to solve it. Take in mind that I’m still testing [/size][size=3]this mod so if I find something to improve it myself, I will change it as soon as possible.[/size]\n<br />\n<br />[u][color=#e69138][url=https://www.youtube.com/watch?v=OfrszVj4GKE&amp;list=PL8ho9_PqALhujYSltpp090ZGxGItsfVWy&amp;index=3&amp;ab_channel=Art2DWooky][size=5]Link to the Video Mod Showcase[/size][/url]﻿﻿[font=Comic Sans MS][size=6] v 1.0.0[/size][/font]\n<br />\n<br />[size=6][font=Trebuchet MS][/font][url=https://www.youtube.com/watch?v=RNku60_vl24&amp;list=PL8ho9_PqALhujYSltpp090ZGxGItsfVWy&amp;index=4&amp;ab_channel=Art2DWooky][font=Trebuchet MS]Link to the [/font][font=Comic Sans MS][b]v 2.0.0[/b][/font][font=Trebuchet MS] Video Mod Showcase[/font][font=Comic Sans MS]﻿[/font][/url]﻿﻿[font=Comic Sans MS][/font][/size][/color][/u][/left][font=Comic Sans MS][color=#6fa8dc][size=4][u][b]\n<br />Recommended Mods[/b][/u][/size][/color][/font]\n<br />[font=Trebuchet MS][size=3] [url=https://www.nexusmods.com/oblivion/mods/31882]- Deadlier Creatures V2[/url] - https://www.nexusmods.com/oblivion/mods/31882﻿\n<br />(The best gem that someone has recommended to me EVER).\n<br />[url=https://www.nexusmods.com/oblivion/mods/16959] - More Enemies in Shivering Isles[/url] - https://www.nexusmods.com/oblivion/mods/16959\n<br />[url=https://www.nexusmods.com/oblivion/mods/50869] - Leveled List Fixes - Goons Without Glass (or Daedric)[/url] - https://www.nexusmods.com/oblivion/mods/50869\n<br /> [url=https://www.nexusmods.com/oblivion/mods/42975]- Unidirectional Attack[/url] - https://www.nexusmods.com/oblivion/mods/42975\n<br /> [url=https://www.nexusmods.com/oblivion/mods/42411]- Basic Physical Activities[/url]﻿ - https://www.nexusmods.com/oblivion/mods/42411\n<br />[url=https://www.nexusmods.com/oblivion/mods/5296] - Unofficial Oblivion Patch[/url] - [url=https://www.nexusmods.com/oblivion/mods/42780][color=#f4f4f4]https://www.nexusmods.com/oblivion/mods/5296[/color]\n<br />[/url][url=https://www.nexusmods.com/oblivion/mods/46199] - OOO - Oscuro's Oblivion Overhaul - Updated[/url] [color=#f4f4f4]- https://www.nexusmods.com/oblivion/mods/46199[/color]\n<br />AND\n<br />[url=https://www.nexusmods.com/oblivion/mods/42780] - Maskar's Oblivion Overhaul[/url] - https://www.nexusmods.com/oblivion/mods/42780\n<br />OR\n<br />[url=https://www.nexusmods.com/oblivion/mods/6085] - LGS Unscaled Enemies V11[/url] - https://www.nexusmods.com/oblivion/mods/6085\n<br />OR\n<br />[url=https://www.nexusmods.com/oblivion/mods/47763] - Lower Level Enemies Don't Disappear[/url] - https://www.nexusmods.com/oblivion/mods/47763[/size]\n<br />[/font]\n<br />[color=#e06666][size=4][u][b][font=Comic Sans MS]Troubleshooting[/font][/b][/u][/size][/color]\n<br />[size=2]   As simple as this mod is I doubt it could make your game crash, [font=Lucida Sans Unicode]maybe if you summo[/font]n a large number of enemies but that, even without my mod could make your game crash. [u][b]My mod is able to be installed mid playthrough[/b][/u] and is quite safe to uninstall unless you have created a merge of some sort, like with Wrye Bash in that case just redo the bash patch and that should be ok.\n<br />   In case you have a conflictive mod you need to make the mod you prefer to take priority below the other plugin in the Load Order (LO) but is completely possible to use my mod below any other mod that changes the same in that case my mod should apply the enemy behaviour, obviously, if both mods change the same things I recommend you to choose only one mod to use, the worst that could happen if you have a little conflict is that you don’t get the benefits of my mod with that specific creature/enemy that is getting the conflict, so it's highly suggested to load all your LO along with this mod using xEdit unfold my plugin and check and select anything turned red, doing this you may be able to see the plugin that conflicts with my mod.\n<br />   Currently, I only know about a minor conflict with the mod Vanilla Combat Enhanced, for which I recommend placing my plugin below that mod, the conflicts are only for the Combat styles of the Minotaur Lord and the Mountain Lion.\n<br />   I also have a little patch for the mod Maskar's Oblivion Overhaul for this to be consistent with the changes I have made in the vanilla game, but this is just for consistency.\n<br />[/size]\n<br />[u][b][font=Comic Sans MS][color=#ff7700][size=4]Compatibility[/size][/color][/font][/b][/u]\n<br />[size=3]   This mod could replace the vanilla Combat styles modified by mods like [url=https://www.nexusmods.com/oblivion/mods/17784]Martigen's Monster Mod (MMM)[/url]﻿ and yes, you can place my mod below his to change the behaviour of vanilla mobs but in this specific case, I think MMM is enough to get a better experience in Oblivion still my mod is more lightweight and offers something different (so, it's a matter of taste).\n<br />   [url=https://www.nexusmods.com/oblivion/mods/49873]Dynamic Oblivion Combat[/url] is completely compatible with any version of Realistic Combat Behaviour because these touch different things.\n<br />[/size]\n<br />[color=#ffe599]Credits and Thanks[/color]\n<br />[size=3]   ﻿– To the xEdit team for creating this awesome tool which allowed me to make this [/size][size=3]plugin easier.[/size]\n<br />[size=3]   ﻿– To the Unofficial Oblivion Patch team for their job in making this game better.[/size]\n<br />[size=3]   ﻿– To [url=https://www.nexusmods.com/oblivion/users/1006768?tab=user+files]Maskar[/url] the author of Maskar’s Oblivion Overhaul who gave me his consent to make [/size][size=3]the patch for his mod.[/size]\n<br />   ﻿– To [url=https://www.nexusmods.com/users/567666?tab=user+files]WalkerInShadows[/url] &amp; Team Alpha for allowing me to make the requested patch for Oscuro's Oblivion Overhaul and its complement (OOO Creature Addon).\n<br />[size=3]   ﻿– And obviously to the game designers of this marvellous game who allowed us to [/size][size=3]continue making this game better and more suited to our taste.\n<br />[/size]"
