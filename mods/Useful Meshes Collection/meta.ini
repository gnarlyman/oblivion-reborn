UDING\r<br />   textures from: CG Textures[/color]\r<br />-Washington\r<br />   +Palisade Set - Modders Resource\r<br />   +Old Village Walls Set - Modders Resource\r<br />   +Tribal Village Set\r<br />   +Southport Tileset - Modders Resource\r<br />   +Balcony - Modders Resource\r<br />   [color=yellow]INCLUDING\r<br />   Syscrusher - Chorrol Retextures[/color]\r<br />-Room 207\r<br />   +Correction to sinHHHans&#39;s MistShrub.nif\r<br />-Pronam\r<br />   +Nams Ayleid Resources\r<br />-lunasprite13\r<br />   +Filled Lowerclass Shelf\r<br />   +Lunas Lowerclass Dish Shelf\r<br />   +Lunas Upperclass Dish Shelf\r<br />   +Lunas Full Cloth Rack\r<br />   +Lunas Tool Barrel\r<br />   +Lunas Tool Barrel\r<br />-Da Mage\r<br />   +Mine Rails\r<br />-Dracula420\r<br />   +Veiny Landscape Resource\r<br />   +Organic Looking Landscape Resource\r<br />   +Dried Up Lake Bed Landscape Resource\r<br />-Divine Heresy\r<br />   +DM Barn Resource\r<br />-pompiliusnuma\r<br />   +Cliffs caves and caverns etc\r<br />-JGreyBear\r<br />   +JGAyleidNBB2 v2\r<br />-from Sheogorad\r<br />   +DAEDRIC TILESET\r<br />      Models - Phitt\r<br />      Textures - Kzinistzerg\r<br />   +DWEMER RICH TILESET\r<br />      Models/Textures - Phitt\r<br />      Additional Models - MrSiika\r<br />   +VELOTHI TILESET\r<br />      Models - Phitt\r<br />      Additional Models - SpeedyB\r<br />      Textures - Kzinistzerg\r<br />      Additional Textures - Phitt\r<br />   +DWEMER CREATURES\r<br />      Models/Textures - MrSiika\r<br />   +ASHLANDS MODELS (Ashlander Huts, rocks, plants)\r<br />      Models/Textures - Dave91\r<br />   +ALL OTHER STUFF\r<br />      Models/Textures - Phitt\r<br />      \r<br />-Myself\r<br />   +Clean Ayleid Ruins Dark retexture (CAR* & DAR*)\r<br />   +Copper and Gold dishes set textures (must improve them)\r<br />   +Crypt in Ayleid Stone\r<br />   +Animated Ayleid Door\r<br />   +Black and white door\r<br />   +Castle Ayleid retexture\r<br />   +Flesh Halls Alpha Release\r<br />   +Dwemer Set\r<br />   +Welkynd set (Welk*)\r<br />   INCLUDING textures from http://www.tutorialsforblender3d.com/Textures/Textures_index.html\r<br />   +Astral Set (AS*)\r<br />   +New Old School Dungeons (NOSD*) set (sewers and dwarven)\r<br />\r<br />[b]If you want me to include some resources you like (if the authors give permission), just message me and I&#39;ll do it&#33;[/b] \r<br />\r<br />[color=yellow]INCLUDING[/color] means that the author asked to add to credits those listed below. It means that their work was used for his/her mod (the way is specified near the name).\r<br />  \r<br />[color=orange]As you can see I&#39;ve included really a lot of resources inside this mod. This is because it is ment to help a large number of people who want shared resources easy to use for their own mods. But on the other hand it has become impossible to check all resources and also follow all the credits. \r<br />\r<br />If you see some problems (missing meshes/textures) or some unproper credits, please, help me sending a message.[/color]\r<br />\r<br />Concerning Ceano&#39;s and AxLRocks&#39; works, I modified them to create a new set (using also some of MEO&#39;s textures).\r<br />\r<br />Concerning WhiteWizard&#39;s Senaria Rugs and Tapestries I only added normal maps to the textures and that fixed all the problems.\r<br />\r<br />Dark Ayleid set is not the Herculine Onyx set, but a retexture of Ceano&#39;s and AxLRocks&#39; works.\r<br />\r<br />[heading]Legal[/heading]\r<br />Before redistributing or changing any of those texture or meshes, please read the terms of the original authors. They usually are all free to use/modify/redistribute, but sometimes explicit request must be sent.\r<br />\r<br />If you want me to remove your material from this collection, PLZ, or you think I&#39;m using your work without permissions, PM me and I&#39;ll fix it.\r<br />\r<br />You can freely include this .esm in your works without asking permissions to me or giving me any credit, but still you&#39;ll need to give credits to original authors where required. [color=red]You cannot use those contents in any commercial mod or ask to be payd for them&#33;[/color]\r<br />\r<br />[heading]Hystory[/heading]\r<br />[list][b]2.30MC[/b][*] Added Sheogoard resources\r<br />[/list][list][b]2.20MC[/b][*] Added JGAyleidNBB2 v2\r<br />[*] Added new items in NOSD collection\r<br />[/list][list][b]2.10MC[/b][*] Added Cliffs caves and caverns etc\r<br />[*] Added Mudwater set from Phitt\r<br />[*] NOSD Sewers and Dwarven sets\r<br />[*] Resized Welkynd set and added furniture\r<br />[*] added Astral Statue and revamped the set\r<br />[*] Some improvement in Dwemer set\r<br />[*] Added test elements from Dwemer set 02\r<br />[/list]2.00MC[list]\r<br />[*]Ayleid elevator\r<br />[*]Astral set\r<br />[*]Welkynd chairs/table and bed\r<br />[*]New Old School Dungeons set\r<br />[*]Added Aisis Royal Furniture\r<br />[*]Updated AlAnonim cave to 1.6\r<br />[*]Added AlAnonim Resource Stove\r<br />[*]Added Gizmodian&#39;s Demon banner\r<br />[*]Added Gildur&#39;s Atmospheric Clutter\r<br />[/list]1.90MC[list]\r<br />[*]Added interiors from Strotis new castle wall resource\r<br />[*]Added new dwemer meshes\r<br />[*]Added Welkynd set\r<br />[/list]1.81MC[list]\r<br />[*]corrected link to Dwemer Boiled\r<br />[/list]1.80MC[list]\r<br />[*]Added Dwemer se by me\r<br />[*]Added Strotis new castle wall resource\r<br />[/list]1.70MC[list]\r<br />[*] Flesh Halls ALPHA release\r<br />[*] Added Stroti&#39;s useable alchemy objects in addition to the old static version\r<br />[*] Added Stroti&#39;s Old Mill and Old Cabin\r<br />[*] Added Stroti&#39;s New houses\r<br />[*] Added Stroti&#39;s Skyrim Smelter\r<br />[*] Added Stroti&#39;s Rustic Furniture, Animal Trophies, New Food and lion fur\r<br />[/list]1.60MC[list]\r<br />[*] Added Strotis new dungeon meshes\r<br />[*] Added Strotis Ayleid Clutter\r<br />[*] Added strotis Ayleid Furniture\r<br />[*] Added Strotis Ayle