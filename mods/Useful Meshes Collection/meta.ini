nexusDescription="[heading][color=yellow]Ayleid Collection & CO[/color][/heading]\r<br />\r<br />Title: Useful Meshes Collection (ex Ayleid Collection & CO)\r<br />Author: Various\r<br />Last Update: 2 OCT 2014\r<br />Requirements: Oblivion, Shivering Island\r<br />\r<br />The work has been renamed in Useful Meshes Collection because it deosn&#39;t concern only Ayleid resources, but a wide variety of them. But the esm and the data are still compatible with the old Ayleid Collection & CO, so if you created plugins based on that they will work with new releases too.\r<br />\r<br />[heading]Description[/heading]\r<br />This mod is a collection of great mods form other great authors in TesNexus. They are all fused in an easy to use .esm file for all your modding imagination&#33; It includes 2 sets of Clean Ayleid items, a lot of clutter, some alchemical, some furnitures, many harvestable plants, paintings and more. To understand the extents of this work, read the Credits by Contents section.\r<br />\r<br />[heading]Installation[/heading]\r<br />Just copy the contents of all three files ([b]AyleidCollection_mc_esm.zip[/b], AyleidCollectionTextures, AyleidCollectionMeshes) in your Oblivion folder, (so they will put the contents in Oblivion&#92;Data by default) then enable AyleidCollectionMC.esm file.\r<br />\r<br />[heading]Uninstalling[/heading]\r<br />Unselect AyleidCollectionMC.esm from the active plugins. Remember to deselect also all the files that use it or you&#39;ll experience CTD.\r<br />You&#39;ll have to manually remove the folders.\r<br />\r<br />For further informations, please refer to the ReadMe file\r<br />\r<br />[color=orange][heading]Usage (IMPORTANT)[/heading][/color]\r<br />[color=orange]You need to download ALL 4 archives for this one to work:[/color]\r<br />[list][color=yellow]\r<br />[*]AyleidCollection_Textures_1_80.Exe\r<br />[*]AyleidCollection_Meshes_3_20.Exe (7 SEP 2011)\r<br />[*]AyleidCollection_02_Resources_4_70.exe (20 NOV 2015)\r<br />[/color][*][color=yellow]SheogoradData.exe (10 NOV 2015) [/color][color=orange]ONLY if you have not the original Sheogoard files[/color][color=yellow][/color]\r<br />[*][color=yellow]AyleidCollection_MC_ESM_2_10.zip (20 NOV 2015)[/color]\r<br />[/list]\r<br />[color=orange]Optional: you can download the Patch file instead of redownloading some big files. \r<br />Patches are always included in the lastet available release, so if you download the lastest files, you never need patches&#33; Patches are there only if you don&#39;t wont to download the big files. Still I suggest to download the lastest files once in a while. That way you&#39;ll have a more safe configuration. \r<br />\r<br />Patches includes:[/color][list]\r<br />No patches right now[/list]\r<br />\r<br />[color=red]DEPRECATED:\r<br />* AyleidCollection_ESM_3_20.zip (10 AUG 2011)\r<br />[/color]\r<br />\r<br />[b]MC[/b] means [b]manximum compatibility[/b], and AyleidCollection_MC.esm has been tested and works with total conversions file such as Nehrim. Notice that it does not have Oblivion.esm as requirement. \r<br />\r<br />[color=red]IMPORTANT NOTICE: sometimes I upload files in miscellaneous section. They usually are incomplete archives, so don&#39;t download them until I move them to the main file section&#33; Or else you&#39;ll have to download the final release later.[/color]\r<br />\r<br />You need to import AyleidCollection.esm in your mod and you&#39;ll have all the resources available.\r<br />\r<br />All the files uses the same folders of the original resources in order to avoid duplication.\r<br />[color=yellow]I need to know if it&#39;s all right or there&#39;re missing meshes or textures[/color]\r<br />\r<br />[heading]Known Issues and Bugs[/heading]\r<br />I can&#39;t seem to associate a BSA file to the ESM file (it works only with ESP files. Therefore I still have to distribute this as group of cluttering meshes and textures.\r<br />\r<br />[heading]Help request[/heading]\r<br />If you have modder&#39;s resources that you think can fit in this collection (and mind to share &#39;em) please PM me.\r<br />\r<br />[heading]Credits by contents[/heading]\r<br />-Meo \r<br />   +Ayleid Clutter\r<br />   [color=yellow]INCLUDING:[list]\r<br />   [*]Phaedra for low res icons\r<br />   [*]Myrilath for original idea\r<br />   [*]Ceano for basic textures\r<br />[/list][/color]   +Meos Modular Fireplaces - Resource\r<br />   +Meos Labyrinth Garden - Resource\r<br />   +Meos Room Dividers - Resource\r<br />   +Meos Series Booksets - Resource\r<br />   +Meos Bits and Pieces\r<br />   +Meos Open Books - Resource\r<br />   +Meos Winecellar - Resource\r<br />   +Meos Framed Butterflies - Resource\r<br />   +Meos Settlement - Resource\r<br />    [color=yellow]INCLUDING:[list]\r<br />   [*]Thanks to Mikal33 for his &#34;Improved Trees and Flora&#34; textures.\r<br />[/list][/color]-Ceano\r<br />   +&#34;Clean Ayleid Ruins&#34;\r<br />-AxLRocks\r<br />   +&#34;Clean Ayleid Ruins Independent Version&#34;\r<br />   Special textures created for Ayleid Collection (you can find them only here)\r<br />    [color=yellow]INCLUDING:[list]\r<br />    [*]PSDGraphics.com for base textures\r<br />[/list][/color]-css0101\r<br />   +&#34;Ancient Elven Furniture&#34;\r<br />-Quairtra\r<br />   +Semi Precious Stones\r<br />-Wench1\r<br />   +New Gems\r<br />-Hel_Borne\r<br />  +&#34;Hel Borne Ayleid Architecture Resource&#34;\r<br />-seigfreid\r<br />  +&#34;Valenwood Village Modders Resource&#34; \r<br />   [color=yellow]INCLUDING   [list]\r<br />   [*]mr_siika- rock meshes\r<br />   [*]JonSatriani- Telvanni Tileset\r<br />   [*]Olaf_soulshade- sylvan houses\r<br />   [*]N&#39;dib- Podhook meshes, windows, and stuff from his twilight mod\r<br />   [*]Razorwing- agora mesh\r<br />   [*]Siegfried- conversion to ES4, retextures, and normal maps\r<br />   [*]Shannon- the awesome telvanni forest textures\r<br />[/list][/color]-WhiteWizard and and the TESIV Senaria team.\r<br />  +Rugs and Tapestr