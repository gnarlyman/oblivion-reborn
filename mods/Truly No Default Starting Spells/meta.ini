nexusDescription="[center][img]https://staticdelivery.nexusmods.com/mods/101/images/53278/53278-1692094690-2091080987.png[/img]\n<br />[i]\"The game uses the default starting spell Heal Minor Wounds as a fallback when casting a scroll spell,\n<br />and therefore it is not recommended to remove it using any method.\"\n<br />- The Unofficial Elder Scrolls Pages[/i]\n<br />\n<br />^ Not without a little ingenuity! This mod 'removes' the default starting spells, so now you will truly start the game with no spells.\n<br />\n<br />This is the cleanest, most Vanilla-Esque 'Default Spell Remover' ever! THE definitive Default Spell Removing Mod!\n<br />An original unused Bethesda icon has been reenabled in-game!\n<br />[i]History behind the Crystal Ball icon:[/i][spoiler]This original Bethesda icon is unused in the released game, but it can be seen during Todd Howard's Oblivion E3 Presentation. During the E3 footage, the crystal ball icon is used as a generic/default magic icon regardless of what spell is currently selected.\n<br />\n<br />It probably goes unused in the released game for these possible reasons:\n<br />\n<br />[list=1]\n<br />[*]It could have been a placeholder before they gave spell groups individual icons or decided to show the icon of the currently selected spell group rather than display a generic icon.\n<br />[*]It might not have been a placeholder. It could have been the devs' original intention, but later removed due to change in development direction.\n<br />[*]After choosing to display spell group icons on the HUD and giving every player \"Heal Minor Wounds\" as the default spell with no way to deselect it, the crystal ball icon doesn't really fit into the game at all.\n<br />[/list]\n<br />This mod brings back the crystal ball icon to be used as the icon for having 'No Spell' selected or for the 'Script Effect' Magic Effect.\n<br />I think it really fits in well for this purpose! The crystal ball implies mystery / possibility / variety and is also related to magic/mysticism.\n<br />Who knows what spell/effect you'll choose next![/spoiler][/center]\n<br />\n<br />█══ [b][u]You will no longer start the game with the spells \"Heal Minor Wounds\" and \"Flare.\"[/u][/b]\n<br />   [i]In the basic version, this is all that was done.[/i]\n<br />\n<br />⭐ After using a scroll, your current spell will default to \"No Spell.\"\n<br />\n<br />⭐ \"No Spell\" can be hotkeyed.\n<br />\n<br />⭐ Birth Signs and Character Classes that start with spells other than the default spells will still have them.\n<br />\n<br />\n<br />█══ [b][u]Additional Spell Changes Version:[/u][/b] Also does the following:\n<br />   [i]The Additional Spell Changes version is the recommended version. The basic version is more for simplicity or compatibility.[/i]\n<br />\n<br />⭐ Removes the \"Summon Dremora Lord\" spell from Volanaro in Bruma and gives it to Borissean in the Arcane University.\n<br />   ⤷ This was accomplished with a Script so it won't cause conflicts.\n<br />   ⤷ You could consider this a fix for the following reasons:\n<br />      ⤷ Volanaro dies in the storyline leaving you no chance of getting the spell. Now you can buy it even after Volanaro dies.\n<br />      ⤷ Volanaro is not as skilled as Borissean and it's easier to gain access to Volanaro.\n<br />      ⤷ It makes more sense for Borissean to have the spell in terms of Lore and Gameplay.\n<br />\n<br />⭐Reworked some spells for a more Hardcore / Immersive playthrough.\n<br />   [i]These changes are unobtrusive. Patching is easy.[/i]\n<br />\n<br />   ⤷ [b]Heal Minor Wounds:[/b] Restoratioin Starting Spell.\n<br />      ⤷ If you choose Restoration as a starting skill, your character will start the game with Heal Minor Wounds.\n<br />      ⤷ ﻿You can also buy 'Heal Minor Wounds' from any of the Chapels in Cyrodil. This was accomplished with a Script so it won't cause conflicts.\n<br />      ⤷ Absorb Health is no longer a starting Restoration spell.\n<br />      ⤷ 'Heal Minor Wounds' Technical:[spoiler]⤷ ﻿There's 2 versions of 'Heal Minor Wounds' in the vanilla game:\n<br />   1) \"DefaultPlayerSpell\" (for Player, unavailable to NPCs - Heals 8 HP)\n<br />   2) \"StandardRestoreHealth1Novice\" (for NPCs, unavailable to Player - Heals 10 HP)\n<br />⤷ This mod removes \"DefaultPlayerSpell\" and allows you to learn \"StandardRestoreHealth1Novice\"\n<br />⤷ \"StandardRestoreHealth1Novice\" costs more magicka to cast, because it heals slightly more.\n<br />⤷ The original \"DefaultPlayerSpell\" previously healed too little HP and costed too little MP.[/spoiler]\n<br />   ⤷ [b]Shocking Touch:[/b] No longer Destruction Starting Spell.\n<br />\n<br />   ⤷ [b]Cold Touch:[/b] No longer Destruction Starting Spell.\n<br />\n<br />   ⤷ [b]Entropic Touch[/b] is the new Destruction Starting Spell because it is the weakest Destruction Spell. 5 dmg → [b]6 dmg[/b]\n<br />   ⤷ Why did I do this? \n<br />      ⤷ Because Entropic Touch was previously underutilized.\n<br />      ⤷ Now you'll actually use it in the early game because you'll start with it if you're a Destruction-based character.\n<br />      ⤷ You can later move on to other more powerful spells as you progress.\n<br />\n<br />   ⤷ [b]Flare:[/b] You no longer start with it, so it is stronger. 6 dmg → [b]8 dmg[/b]\n<br />      ⤷ In the Vanilla game, Flare is sold by Druja in Skingrad and Volanaro in Bruma.\n<br />\n<br />   ⤷ The names of the Spells [b]'Superior Wound'[/b] and [b]'Dire Wound'[/b] have been flipped around. Other than this name flip, the spells are the same.\n<br />      ⤷ What was previously called Superior Wound is now called Dire Wound,\n<br />      ⤷ and what was previously called Dire Wound is now called Superior Wound.\n<br />\n<br />\n<br />█══ [b][u]Versions, Compatibility &amp; Technical:[/u][/b]\n<br />\n<br />⭐ Versions which modify the 'Script Effect' Magic Effect make changes similar to [url=https://www.nexusmods.com/oblivion/mods/15677]Duke Patricks Basic Script Effect Silencer.[/url]\n<br />   ⤷ Duke Patrick's mod is NOT required - my mod does essentially the same thing.\n<br />   ⤷ This was done in order to NOT use the 'DARK' Magic Effect.\n<br />\n<br />⭐ You can choose the 'Script Effect' version OR the 'DARK' version.\n<br />   ⤷ Versions which use the 'DARK' Magic Effect will likely be incompatible with any other mod that also uses the 'DARK' Magic Effect.\n<br />\n<br />⭐ This mod should be highly compatible. Let me know if you need any help regarding compatibility with another mod or making a patch.\n<br />\n<br />\n<br />█══ [b][u]Installation Instructions:[/u][/b]\n<br />\n<br />*Choose one esp file.\n<br />*Using a program like MO2 works well.\n<br />*Wrye Bash should work if you remove the mod pictures from the installation package.\n<br />\n<br />[b]If installing manually, this is what you'll see:[/b]\n<br />\n<br />[u]TNDSSB = Basic[/u]\n<br />Does very little, mainly for compatibility.\n<br />*Does NOT use the Crystal Ball icon.\n<br />\n<br />[u]TNDSSBC = Basic (Crystal Ball)[/u]\n<br />Same as Basic, but replaces the 'Script Effect' magic effect icons with the Crystal Ball icon.\n<br />\n<br />[u]TNDSSBCD = Basic (DARK Effect + Crystal Ball)[/u]\n<br />Same as basic, but does not replace the 'Script Effect' magic effect icons with the Crystal Ball icon, because 'No Spell' uses the 'DARK' magic effect instead of the 'Script Effect.'\n<br />*Both the 'Script Effect' and Crystal Ball icons can be seen.\n<br />\n<br />[u]TNDSSASP = Additional Spell Changes[/u]\n<br />*Does NOT use the Crystal Ball icon.\n<br />\n<br />[u]TNDSSASPC = Additional Spell Changes (Crystal Ball)[/u]\n<br />Same as Additional Spell Changes, but replaces the 'Script Effect' magic effect icons with the Crystal Ball icon.\n<br />\n<br />[u]TNDSSASPCD = Additional Spell Changes (DARK Effect + Crystal Ball)[/u]\n<br />Same as Additional Spell Changes, but does not replace the 'Script Effect' magic effect icons with the Crystal Ball icon, because 'No Spell' uses the 'DARK' magic effect instead of the 'Script Effect.'\n<br />*Both the 'Script Effect' and Crystal Ball icons can be seen.\n<br />\n<br />\n<br />[center][size=3][color=#7FFFD4][b]Thanks[/b][/color][/size]\n<br />Thank You for checking out [url=https://www.nexusmods.com/users/19686204?tab=user+files&amp;BH=0]my mods![/url]\n<br />[i]Your endorsement really helps![/i][/center]"
