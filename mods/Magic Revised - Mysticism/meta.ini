nexusDescription="--- [u]Magic Revised: Mysticism v1.2[/u] ---\r<br />\r<br />(mod for TESIV: Oblivion)\r<br />\r<br />by doubledeviant (aka iamnone)\r<br />\r<br />---\r<br />\r<br />What does this mod do?\r<br />\r<br />1. Changes all Absorb effects from Restoration to Mysticism (as in Morrowind).  All default and mod spells using Absorb Attribute, Absorb Skill, Absorb Fatigue, Absorb Health, or Absorb Magicka effects become Mysticism spells.\r<br />\r<br />2. Alters Mysticism effect base costs.  Some decrease, some increase, and some are unchanged.  For example, Soul Trap decreases in cost, and Absorb Health increases in cost.  See the file RevisedMysticismEffectBaseCosts.txt for exact details.\r<br />\r<br />3. Adds new Mysticism spells including Telekinetic Push, Force Lock, and a menu-based Teleport: City spell.  All spells can be purchased from Ita Rienus, the Mysticism trainer and spell merchant of the Bravil Mages Guild.  See the spell list in this readme for details.\r<br />\r<br />4. Changes the Mysticism start spells from Absorb Health, Minor Dispel, and Minor Detect Life to Vitae Siphon, Minor Dispel, and Fetch (see spell list).  Minor Detect Life can be purchased from Ita Rienus.\r<br />\r<br />This mod does not radically increase the power of magic.\r<br />\r<br />---\r<br />\r<br />Fetch: Telekinesis 15 ft 15 sec (Novice)\r<br />\r<br />Soul Theft: Soul Trap 20 sec Target (Apprentice)\r<br />\r<br />For Each Attribute:\r<br />Attribute Siphon: 5 pts 25 sec (Novice)\r<br />Attribute Theft: 10 pts 25 sec (Apprentice)\r<br />Attribute Transfer: 20 pts 25 sec (Journeyman)\r<br />\r<br />For Each Skill:\r<br />Skill Siphon: 5 pts 25 sec (Novice)\r<br />Skill Theft: 10 pts 25 sec (Apprentice)\r<br />Skill Transfer: 20 pts 25 sec (Journeyman)\r<br />\r<br />Weak Energy Siphon: Absorb Fatigue 18 pts (Novice)\r<br />Lesser Energy Theft: Absorb Fatigue 36 pts (Apprentice)\r<br />Greater Energy Transfer: Absorb Fatigue  71 pts (Journeyman)\r<br />\r<br />Weak Power Siphon: Absorb Magicka 22 pts (Novice)\r<br />Lesser Power Theft: Absorb Magicka 44 pts (Apprentice)\r<br />Greater Power Transfer: Absorb Magicka 86 pts (Journeyman)\r<br />\r<br />Weak Vitae Siphon: Absorb Health 6 pts (Novice)\r<br />Lesser Vitae Theft: Absorb Health 13 pts (Apprentice)\r<br />Greater Vitae Transfer: Absorb Health 27 pts (Journeyman)\r<br />\r<br />Gentle Push: Telekinetic Push: Non-Hostile (Novice)\r<br />* Gentle Push is NOT sold in-game because it enables an easy theft exploit; add the spell with the console if you want to use it.\r<br />\r<br />Weak Telekinetic Push: 10 Damage (Novice)\r<br />Lesser Telekinetic Push: 20 Damage (Apprentice)\r<br />Greater Telekinetic Push: 30 Damage (Journeyman)\r<br />Supreme Telekinetic Push: 40 Damage (Expert)\r<br />Ultimate Telekinetic Push: 50 Damage (Master)\r<br />\r<br />Lesser Force Lock: Unlock 25 pts (Apprentice)\r<br />Greater Force Lock: Unlock 50 pts (Journeyman)\r<br />Supreme Force Lock: Unlock 75 pts (Expert)\r<br />Ultimate Force Lock: Unlock 100 pts (Master)\r<br />\r<br />Teleport: City (Apprentice)\r<br />* Menu-based teleportation to the city of your choice; teleportation sites are the city gates nearest to the stables.\r<br />\r<br />---\r<br />\r<br />[u]Changes from v1.1[/u]:\r<br />\r<br />- Added Force Lock series of spells\r<br />- Renamed some spells for better sorting\r<br />- Added buyable spellbook\r<br />\r<br />---\r<br />\r<br />[u]Special Thanks[/u]:\r<br />\r<br />OB Force Push and Veshnakar&#39;s Mysticism Spellpack inspired the Telekinetic Push series of spells.\r<br />\r<br />Modular Oblivion Enhanced inspired the Teleport spell."
