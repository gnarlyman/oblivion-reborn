nexusDescription="So I like Nuska&#39;s Oblivion Character Overhaul version 2. But I also like Room207&#39;s Orsimer Overhaul.\r<br />Only one way to solve this dilemma; MERGE THEM TOGETHER&#33; :D\r<br />\r<br />This is a little patch that replaces the orc head meshes in Oblivion Character Overhaul version 2. The male orc mesh is replaced with Room207&#39;s Orsimer Overhaul, while the skull and brow of the female orc mesh has been edited to match. The hair meshes are also replaced with the ones from Room207&#39;s Orsimer Overhaul.\r<br />\r<br />[b]Updates:[/b]\r<br />[b]- 14th February 2014:[/b] Just some minor rebranding. My Tumblr username is TheNathanParable, and I want the &#34;Author&#34; name and filenames to match.\r<br />[b]- 8th January 2014:[/b] Added optional &#34;Nuska Style&#34; male head.\r<br />[b]- 31st December 2013:[/b] Original upload.\r<br />\r<br />[b]Requirements:[/b]\r<br />Nuska&#39;s Oblivion Character Overhaul version 2. That&#39;s it really. As long as you&#39;ve got that installed and working you shouldn&#39;t have any issue.\r<br />\r<br />[b]Installation:[/b]\r<br />Simply install it after Oblivion Character Overhaul version 2 (and preferably after any body replacers you&#39;re using), either manually or with a modding tool (such as NMM or Mod Organizer).\r<br />\r<br />[b]Optional Nuska Male Head:[/b]\r<br />This is for those who like the rounded skulls and hair compatibility that Orsimer Overhaul brings, but prefer the way that Nuska&#39;s male orcs look face-wise. This includes a version of Nuska&#39;s male orc mesh that has been edited to have the same rounded skull as Orsimer Overhaul. Simply install it over the main file (OCOv2 Orsimer Overhaul).\r<br />\r<br />[b]Credits:[/b]\r<br />Nuska - for her brilliant Oblivion Character Overhaul version 2, and for pushing me in the right direction when it came to editing her head mesh.\r<br />Room207 - for his equally brilliant Orsimer Overhaul.\r<br />Bethesda - for the vanilla teeth and mouth meshes used by the male orcs."
