nexusDescription="The aim of this mod is to fix the bugs existing in the official mods released by Bethesda.\n<br />\n<br />[b]NOTE:[/b] These fixed plugins use the ESP master (aka mod de-isolation) method which means you still need the original plugins for these plugins to work! The plug-ins are not a redistribution of modified original Bethesda plug-ins, but contain only changes and have the original plug-ins set as masters. [b]Because of this, these are not standard plug-in ESP files. Merging, editing or otherwise modifying them using the Elder Scrolls Construction Set or other utilities may cause them to stop functioning or cause severe bugs in your game! These plugins MUST load after the DLC's that they patch; reversing this load order, or activating the UODP ESP's without the official DLC's that they patch present, can cause Oblivion to crash on launch or load of a save.[/b] \n<br />\n<br />The UODP is currently [b]not compatible with the JOG's Official Plugins Unnerfed mod[/b] because it modifies the original Bethesda plug-in ESP files. If you use the UODP overtop of Unnerfed, Oblivion may crash on launch. The UODP is compatible with S.M. Plug-In Refurbish (move the S.M. ESP's after the UODP ones)\n<br />\n<br />Please report any new bugs on our project bug tracker at [url=https://afktrack.afkmods.com/index.php?a=issues&amp;project=36]AFK Mods[/url]﻿\n<br />\n<br />[url=https://www.afkmods.com/Unofficial%20Oblivion%20DLC%20Patches%20Version%20History.html]Complete changelog\n<br />[/url]"
