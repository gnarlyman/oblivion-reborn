nexusDescription="A simple mod that removes the annoying quest popup when harvesting your first [url=https://en.uesp.net/wiki/Oblivion:Nirnroot]Nirnroot[/url]. The [url=https://en.uesp.net/wiki/Oblivion:Seeking_Your_Roots]Seeking Your Roots[/url] quest can still be started later by presenting a Nirnroot to any alchemist. Also the popup for [url=https://en.uesp.net/wiki/Oblivion:The_Sunken_One_(quest)]The Sunken One[/url] quest will now start when reading the relevant note, as opposed to it starting from just entering the [url=https://en.uesp.net/wiki/Oblivion:Shetcombe_Farm]Shetcombe Farm[/url]. And also for Sickly Bernice's [url=https://en.uesp.net/wiki/Shivering:A_Liquid_Solution]quest[/url].\n<br />\n<br />You can deactivate and merge this mod into your bashed patch in [url=https://www.nexusmods.com/oblivion/mods/22368]Wrye Bash[/url]﻿, to save a slot in your load order. This mod has been verified clean by TES4Edit v4.0.4c, and there are no TES4Edit reported errors in this mod."
