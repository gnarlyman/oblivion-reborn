nexusDescription="[center][img]http://www.eutek.co.uk/The.Wanderer/tw_blue_banner.jpg[/img][/center]\r<br />Blue Leather Armour Set\r<br />By\r<br />The Wanderer\r<br />\r<br />Description\r<br />===========\r<br />Resource only - nothing added in game.\r<br />\r<br />Install\r<br />=======\r<br />1. Extract the files to (install folder)&#92;Oblivion&#92;Data&#92;\r<br />2. Start Oblivion Launcher, click &#39;Data Files&#39;, place a checkmark beside the .esp file.\r<br />\r<br />\r<br />Uninstall\r<br />=========\r<br />1. Start Oblivion Launcher, click Data Files, uncheck the .esp file.\r<br />2. Delete the files/folders associated with the mod.\r<br />\r<br />\r<br />Details\r<br />=======\r<br />I use the &#34;Oblivion Intensity&#34; mod which already adds a Red, Green, Black and Gray set (not sure who did the original re-tex on these)\r<br />But I also wanted a blue set (go figure) so I created it... I just like this armour set for my steath characters.\r<br />I&#39;m releasing it as well in case someone else also likes it.\r<br />\r<br />This just addes that full set of Male and Female Blue Leather Armour to the CS.\r<br />\r<br />This is just a re-coloured Thief&#39;s armour which uses Exnem female body &#39;B&#39; Cup size mesh for the female Cuirass.\r<br />If you want bigger boob&#39;s then feel free to use the texture to do it yourself.\r<br />\r<br />If you want to add the items to your Player in game you can through the console.\r<br />\r<br />Their ID&#39;s are:-\r<br />\r<br />Boots     ##003EB6\r<br />Cuirass   ##003EB9\r<br />Greaves   ##003EBA\r<br />Helmet    ##003EBB\r<br />Guantlets ##003EBC\r<br />\r<br />Where the ## is the load order number for my esp.\r<br />\r<br />Credits\r<br />=======\r<br />I didn&#39;t really do much so feel free to use this as you want...\r<br />If you use it in a released mod though then a mention would be nice... but not neccesary... \r<br />just don&#39;t try and claim it as your own work."
