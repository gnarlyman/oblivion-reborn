nexusDescription="Necromancy and Lichdom introduces a new necromancy system where you create leveled undead followers using body parts, as well as the ability to transform into a Lich, complete with the accompanying animations. A Skeleton and Wraith form are also options.\n<br />\n<br />The mod begins when you pick up the Tome of Unlife during the quest \"Where the Spirits have Lease\"\n<br />By reading different chapters of the book, you will gain the ability to harvest bodies for parts which you can use to create various undead followers.\n<br />When you have the required parts you will be able to create the body, and then use magic to animate them to act as permanent followers.\n<br />\n<br />The spells are locked behind skill prerequisites, so I would recommend leveling your Restoration, Conjuration, and Mysticism if you want to be able to use them.\n<br />\n<br />All followers levels will be scaled to the player at the time of creation (e.g. If you create a skeleton at level 1 it will be a normal skeleton, but if you create a skeleton at level 20 it will be a skeleton champion.)\n<br />\n<br />In order to toggle whether a minion follows you or not just interact with them.\n<br />\n<br />Currently Creatable Followers\n<br />Zombies\n<br />Skeletons (Can use weapons and shields)\n<br />Ghosts/Wraiths (Depending on level)\n<br />Shambles\n<br />Flesh Atronachs\n<br />Abomination (Spider Zombie)\n<br />Hulking Zombie (Can use weapons and shields)\n<br />Greater Flesh Atronachs (Gate Keeper)\n<br />\n<br />Requires OBSE\n<br />\n<br />[b][u]KNOWN BUG PLEASE READ[/u][/b]\n<br />The players animation set cannot be swapped out while in first person, the engine prevents it.\n<br />\n<br />To counter this the camera is forced into third person when swapping animation sets, however if the user were to quickly tab back into first person, this would prevent the swap and likely result in exploding geometry caused by missing bones in the currently loaded skeleton.\n<br />\n<br />If you experience this, simply cast the spell again to swap forms and stay in third person until the skeleton swap occurs.\n<br />\n<br />[b][u]KNOWN BUGS[/u][/b]\n<br />In version 3.0 there was a bug that causes you Human Form bounty, fame and infamy to be overwritten if you transform into a Wraith. If you have experienced this bug simply make sure you are in Lich/Skeleton form and use the following console commands to fix the issue.\n<br />\n<br />set NecroLichBountyH to 0\n<br />set NecroLichFameH to X (replace X with whatever your fame was before the bug)\n<br />set NecroLichInfamy to X (replace X with whatever your infamy was before the bug)"
