nexusDescription="[size=6][b][center][font=Verdana][color=#ff0000][u]DLC  INTEGRATION[/u][/color][/font][font=Verdana][u]\n<br />\n<br />[/u][color=#ff0000][u]Preface[/u][/color][u]\n<br />[/u][size=3][b]This mod introduces [color=#ffff00]200+[/color][/b][color=#ffff00] edits[/color] to the overall gameworld. The goal? To integrate content exclusive to the DLCs in ways that are sensible and lore-friendly for a fuller gameplay experience. These edits include (but are not limited to) [b]Items, Spells, Leveled Lists and more.... \n<br />\n<br />[color=#ff0000][size=6][b][u]Examples[/u][/b][/size][/color]\n<br />Heretics, Necromancers, Conjurers and Zealots will now have a wider array of summons at their disposal. The Drothmeri Army (which have primarily been operating out of Sundercliff Watch) now scour the Nibenay Basin and are poised to undermine the Empires reign in its time of turmoil. Marauders have invaded Battlehorn Castle and plundered it, making off with Talan's collection of magical vintages. Raid Marauder lairs and maybe you can reclaim some of these lost wines. Certain Creatures and NPCs now wield leveled cutlasses originally featured only in the cavernous trove of Dunbarrow Cove. Blacksmiths in Cyrodiil can now forge more durable varieties of weapons and will sell them at their storefronts. Not every enchanted item found whilst dungeon diving will be beneficial... some bear curses that were placed on them to punish grave robbers and hapless adventurers. Imperial Legion patrol Horses are now outfitted with steel plate armor. All generic Shivering Isles spells now have corresponding spell tomes which can now be found delving the dungeons of madness. Powerful vampires will now have exquisite padded coffins decorating their lairs.\n<br />\n<br />These and many more....[/b][size=6][b][size=3]\n<br />[/size][/b][/size][/size][size=3]\n<br />[color=#ffff00][size=6][b][u]Support[/u][/b][/size][/color]\n<br />[b][size=3]Like the mod? Don't forget to [/size][size=4]👍[/size][/b][color=#ff7700][size=4][b]Endorse[/b][/size][/color][color=#ff7700][size=4][b]![/b][/size][/color][/size]\n<br />[/font][/center]\n<br />[/b][/size]"
