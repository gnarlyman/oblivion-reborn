nexusDescription="[color=#ffdf3e][b]Name:[/b][/color] Apophis: Armory of the Silver Dragon\r\n[color=#ffdf3e][b]Version:[/b][/color] 0.9.3 BETA\r\n[color=#ffdf3e][b]Date:[/b][/color] 11/14/2007\r\n[color=#ffdf3e][b]Category:[/b][/color] Weapons and Armor\r\n[color=#ffdf3e][b]Required:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=15579]7-Zip[/url]\r\n[color=#ffdf3e][b]Recommended:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=2097]Oblivion Mod Manager[/url]\r\n[color=#ffdf3e][b]Author:[/b][/color] [url=http://www.tesnexus.com/modules/members/index.php?id=128909]LHammonds[/url]\r\n[color=#ffdf3e][b]Source:[/b][/color] [url=http://www.tesnexus.com/downloads/file.php?id=8440]TESNexus[/url]\r\n[color=#ffdf3e][b]File Mirror #1:[/b][/color] [url=http://planetelderscrolls.gamespy.com/View.php?view=OblivionMods.Detail&id=5920]Planet Elder Scrolls[/url]\r\n[color=#ffdf3e][b]File Mirror #2:[/b][/color] [url=http://elderscrolls.filefront.com/file/Apophis_Armory_of_the_Silver_Dragon;104649]ElderscrollsFF[/url]\r\n[color=#ffdf3e][b]File Mirror #3:[/b][/color] [url=http://www.filefront.com/14679431/Armory_of_the_Silver_Dragon_0_9_3.7z]FileFront[/url]\r\n[color=#ffdf3e][b]File Mirror #4:[/b][/color] [url=http://www.mediafire.com/?mgenomnnwmy]MediaFire[/url]\r\n[color=#ffdf3e][b]File Mirror #5:[/b][/color] [url=http://www.4shared.com/file/29284858/9229089/ArmoryOfTheSilverDragon093.html]4Shared[/url]\r\n[color=#ffdf3e][b]File Mirror #6:[/b][/color] [url=http://www.fileshaker.com/armoryofthesilverdragon093]File Shaker[/url]\r\n[color=#ffdf3e][b]File Mirror #7:[/b][/color] [url=http://rapidshare.com/files/69703388/ArmoryOfTheSilverDragon093.7z]RapidShare[/url]\r\n[color=#ffdf3e][b]RELz Thread:[/b][/color] [url=http://thenexusforums.com/index.php?showtopic=29848]TESNexus Forums[/url]\r\n[color=#ffdf3e][b]Homepage:[/b][/color] [url=http://lhammonds.game-host.org/obmm]OBMM How-To Site[/url]\r\n\r\n[color=#ffdf3e][b][u]Description[/u][/b][/color]\r\nApophis: Armory of the Silver Dragon adds several complete weapons/armor/clothes sets for sale to various vendors in the Imperial City Market District.  Go to the 1st Edition book store and purchase the book called \\\"Apophis: Armory of the Silver Dragon\\\" and read it for more information about the armor sets.\r\n\r\nYou need to read the book after you\\'ve reached level 20 or higher in order for the weapons and armor to become available in the vendor shops.\r\n\r\nHeavy armor and weapons are equivalent to Daedric.  Must be level 20+ before you see them in vendor shops.\r\n\r\nLight armor is equivalent to Glass.\r\n\r\nClothing (non-armor) can be purchased at any level.\r\n\r\n[color=#ffdf3e][b][u]Location[/u][/b][/color]\r\nEverything can be found in the Imperial City Market District.\r\n\r\nBattleMage/Light/Stealth/Crusader Armor + Mask (Male and Female) - The Best Defense (Maro)\r\nHeavy/Knight Armor + Mask (Male and Female) - The Best Defense (Varnado)\r\nWeapons - A Fighting Chance\r\nCapes, Eye Patches, Clothes, Amulet, Rings - Divine Elegance\r\nLight and Heavy Shields - Stonewall Shields\r\nRobes/Hoods/Offensive/Defensive Staffs - Rindir\\'s Staffs\r\nBooks - The First Edition\r\n\r\n[color=#ffdf3e][b][u]Clothing Details[/u][/b][/color]\r\nApophis Elegant Clothing Set (Male / Female)\r\nApophis Knight Robe Set (Male / Female)\r\nApophis Mage Robe Set (Male Only)\r\nApophis Amulet\r\nApophis Cape (Tail Slot) (5 Sizes)\r\nApophis Eye Patch (Tail Slot) (3 Sizes)\r\nApophis Gloves (Leather / Silver)\r\nApophis Diamond Ring (Left Hand)\r\nApophis Ruby Ring (Right Hand)\r\n\r\n[color=#ffdf3e][b][u]Weapon Details[/u][/b][/color]\r\nApophis Arrows\r\nApophis BattleAxe\r\nApophis Bow\r\nApophis Claymore\r\nApophis Spiked Club (Blunt 1H)\r\nApophis Dragon Crusher (Blunt 2H)\r\nApophis Dragon Saw (Blunt 2H)\r\nApophis Dragon Flame (Claymore+FireFX)\r\nApophis Heavy Dagger\r\nApophis Hammer (Blunt 1H)\r\nApophis Crusader Sword (Longsword)\r\nApophis Knight Sword (Longsword)\r\nApophis Light Dagger\r\nApophis Longsword\r\nApophis Mage Blade (Longsword+FireFX)\r\nApophis Mage Bow\r\nApophis Polearm\r\nApophis Spear\r\nApophis Staff of Ice (Weapon/Enchanted)\r\nApophis Staff (Weapon/Unenchanted)\r\nApophis Stealth Bow\r\nApophis Stealth Dagger\r\nApophis Stealth Ninjato (Longsword)\r\nApophis Stealth Odachi (Claymore)\r\nApophis War Axe (Blunt 1H)\r\nApophis War Dagger\r\nApophis War Club (Blunt 2H)\r\nApophis War Hammer (Blunt 1H)\r\n\r\n[color=#ffdf3e][b][u]Armor Details[/u][/b][/color]\r\nApophis BattleMage Armor Set (Male / Female)\r\nApophis Crusader Armor Set (Male / Female)\r\nApophis Heavy Armor Set (Male / Female)\r\nApophis Knight Armor Set (Male / Female)\r\nApophis Light Armor Set (Male / Female)\r\nApophis Stealth Armor Set (Male / Female)\r\n\r\n[color=#ffdf3e][b][u]Install Instructions[/u][/b][/color]\r\nThis archive is distributed in what I call OMOD-Ready format.\r\nIt allows you to manually extract and install like most other mods but it also allows you to use Oblivion Mod Manager and import this archive with all the settings pre-configured for an OMOD file.\r\n\r\nPlease see the readme file for details.\r\n\r\n[color=#ffdf3e][b][u]Incompatibility[/u][/b][/color]\r\nNone.  All files have been renamed and added as new and unique objects.  This means that any items in this mod that is used in other mods will not conflict in any way if the mods are all enabled.\r\n\r\n[color=#ffdf3e][b][u]Known Issues or Bugs[/u][/b][/color]\r\nThere is an enchanted test hammer in the street of the IC Market that is left-over when correcting the infamous NVidia blackscreen bug.  Just consider it a freebie although the enchants are probably worthless.\r\n\r\n[color=#ffdf3e][b][u]History[/u][/b][/color]\r\n0.9.3, 2007/11/14 - Not much of an update...just wanted to combine all files into one mod now that TESNexus can host files larger than 50 MB.\r\n - Updated the Mage\\'s Bow with Nicoroshi\\'s latest version of \\\"The Bow of Bones\\\"\r\n - Moved the German-translated plugin into a separate file to simply the installation process.\r\n - Updated the readme with current info.\r\n0.9.2, 2007/07/11 - Fixed most reported bugs.\r\n - Replaced leveled lists with a script attached to the book.  All weapons/armor is immediately available at level 20+ after reading the book.\r\n - Updated meshes for Mage Defensive Staff (Shield) and the Hammer to resolve NVidia+HDR+Shader bug causing black screens.\r\n - Removed cheat codes as they are no longer needed.\r\n0.9.1, 2007/01/20 - Added German translation. Thanks Wozee!\r\n0.9.0, 2006/12/26 - Initial BETA Release.\r\n\r\n[color=#ffdf3e][b][u]Future Plans[/u][/b][/color]\r\n2.0 - Add quests for the original enchanted versions of the armor and reveal the truth behind the ancient and mysterious hero that killed Apophis. (I need a Dragon creature before I will start work on version 2.0).  Features: New Land, Quests, the original enchanted armory!\r\n1.0 - Initial release (non-enchanted equipment for sale that will \\\"level-up\\\" in power as you do)\r\n\r\n[color=#ffdf3e][b][u]Contact[/u][/b][/color]\r\nYou can find me on the official Elder Scrolls forums as \\'[url=http://www.elderscrolls.com/forums/index.php?showuser=259214]Conan_Lon[/url]\\'\r\nYou can find me on TESNexus as \\'[url=http://thenexusforums.com/index.php?showuser=128909]LHammonds[/url]\\'\r\n\r\n[color=#ffdf3e][b][u]Credits[/u][/b][/color]\r\n - Special Thanks to [color=#33ff33]Senus[/color] for modifying the mesh for the BattleMage robe (removed hood that sat on the back).\r\n - Thanks to [color=#33ff33]Lazarus[/color] for the Knight armor/robe set and various weapons.\r\n - Thanks to [color=#33ff33]Wozee[/color] for the German translation.\r\n - Thanks to [color=#33ff33]Misiak95[/color] for the Polish translation.\r\n - Thanks to [color=#33ff33]alex1992[/color] for the French translation.\r\n - Thanks to [color=#33ff33]nicoroshi[/color] for the Bones Bow (Mage) and Blade Bow (Stealth)\r\n - Thanks to [color=#33ff33]NorrabMaster[/color] for the ShadowBlade sword (Mage Blade)\r\n - Thanks to [color=#33ff33]Kearsage[/color] for the Defensive Staff (Mage Shield)\r\n - Thanks to [color=#33ff33]Ino Zenosis[/color] for the Elegant clothes.\r\n - Thanks to [color=#33ff33]Phitt[/color] for the Crusader and Knight Sallet helmets.\r\n - Thanks to [color=#33ff33]Ryuujin[/color] (ryuujin-AT-adelphia-DOT-net) for the stealth sword (Ninjato).\r\n - Thanks to [color=#33ff33]AlienSlof[/color], [color=#33ff33]Robert[/color], [color=#33ff33]XMarksTheSpot[/color] and [color=#33ff33]emoovampyre[/color] for the mage robe.\r\n - Thanks to [color=#33ff33]Dimitri Mazieres[/color] for the Stealth armor compilation.\r\n - Thanks to [color=#33ff33]xifr[/color] (thexifr-AT-gmail-DOT-com) for the separated Dark Brotherhood armor pieces.\r\n - Thanks to [color=#33ff33]KafeiDotour[/color] (dark_razielim-AT-yahoo-DOT-com) for the ring textures.\r\n - Thanks to [color=#33ff33]Coolman[/color] for the cool daggers\r\n - Thanks to [color=#33ff33]ModelMan[/color] for the Ninja Breaker (Stealth Shield)\r\n - Thanks to [color=#33ff33]ayhan[/color] (ayhan_w-AT-hotmail-DOT-com) for the BattleMage Robe and Hood.\r\n - Thanks to [color=#33ff33]KafeiDotour[/color] (dark_razielim-AT-yahoo-DOT-com) for the eye patch.\r\n - Thanks to [color=#33ff33]The Atronach[/color] (rBloodrain-AT-aol-DOT-com) for the Heavy armor textures.\r\n - Thanks to [color=#33ff33]kalikut[/color] (kalikut-AT-juno-DOT-com) for the Light armor female cuirass.\r\n - Thanks to [color=#33ff33]Templar GFX[/color] for the club and one-handed axe.\r\n - Thanks to [color=#33ff33]Jannix Quinn[/color] for the hammer.\r\n - Thanks to [color=#33ff33]RDjeke[/color] for the double-sided axe.\r\n - Thanks to [color=#33ff33]Someone1074[/color] for the Capes and Cloaks mod.\r\n - Thanks to [color=#33ff33]Viro[/color] for the dragon on the shirt that I lifted an used everywhere.\r\n - Thanks to [color=#33ff33]Cryo_[/color] for the masks.\r\n - Thanks to [color=#33ff33]es4player[/color] for the Light armor textures.\r\n - Thanks to [color=#33ff33]Bethesda[/color] for Oblivion and the original 3D meshes this mod uses.\r\n - Thanks to [color=#33ff33]God[/color] for making all of us.\r\n - Thanks to the authors of the tools listed below.\r\n\r\n[color=#ffdf3e][b][u]Tools Used[/u][/b][/color]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=15579]7-Zip[/url]\r\n[url=http://www.adobe.com/photoshop]Adobe Photoshop[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=8698]DDS Converter 2[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=11680]ESPluginCracker[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=14920]GIMP[/url] (Mainly used for the NormalMap filter)\r\n[url=http://niftools.sourceforge.net/wiki/NifSkope]NIFSkope[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=2097]Oblivion Mod Manager[/url]\r\n[url=http://www.paintshoppro.com]Paint Shop Pro[/url]\r\n[url=http://HammondsLegacy.com/obmm/tools_readme_generator1.asp]Readme Generator[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=11367]TES Construction Set[/url]\r\n[url=http://www.tesnexus.com/downloads/file.php?id=2114]TESsnip[/url]\r\n\r\n[color=#ffdf3e][b][u]Licensing/Legal[/u][/b][/color]\r\nSince this is a re-package of other mods and then modifications made on top of them, the permission to re-package gets a little more complicated.\r\nAs far as the changes I made, I don\\'t mind what you do with it...all I ask in return is that you give me credit if you re-package this mod. I would also like to know what mods are including my work.\r\nAs for all the mods that I included, you\\'ll need to check the original sites noted in the Credits Section to see what level of permission is required.\r\nPlease ask for my permission first before uploading this mod to distribution sites.  If I do not reply within 4 weeks, you can upload this mod anywhere you want."
