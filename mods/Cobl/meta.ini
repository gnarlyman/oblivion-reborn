nexusDescription="[b]Common Oblivion (Cobl)[/b] is: 1) a world enrichment mod that adds lots of little things that enriches your gameplay experience; 2) a shared library that acts as a resource for other mods; and 3) an integration tool that allows different mods to \"talk\" to each other.\n<br />\n<br />[b]Enrichment[/b]\n<br />* Alchemical Sorters (store and sort your alchemical items)\n<br />* Cobl Clock (configurable on screen clock)\n<br />* Lore Books (lore books from previous Elder Scroll games)\n<br />* Tamrielic Ingredients (ingredients from Morrowind and Daggerfall)\n<br />* Tarnsman's Beer! (Beer's to buy from stores)\n<br />* Foods from Salmo the Baker (a large selection of foods)\n<br />* The Luggage (a hold all container accessible from pubs, guild halls, homes)\n<br />* Etc. etc.\n<br />\n<br />[b]Cobl Races[/b]\n<br />Cobl provides a large assortment of popular hairs and eyes plus five new races.\n<br />* Eyes from Capucine and Miss Onatop.\n<br />* Hairs from: Rens, Capucines, Babe, Soya, Throttlekitty, Saram, Corean, Kafeid.\n<br />* Races: Playable Aureal, Mazken and Xivilai. Plus Ohmes-Raht (based on Luchaire's Tabaxi), and Hidden Elves (based on Ren's Mystic Elves).\n<br />\n<br />[b]Shared Library[/b]\n<br />All the items listed above are available for use in mods. Many home mods are making use alchemical sorters, foods, water sources, mage altars, etc. that are defined in Cobl. Other mods make use of more advanced features, like Cobl's Death Handling, which allows the player's death to be safely intercepted and modified. Or more simply, Cobl provides a shared Options menu, which any mod can use to make their options easy to find and configure.\n<br />\n<br />Not only does Cobl make modding easier, it also makes Cobl aware mods richer since mods able to draw form a much richer set of objects at no cost. E.g. if you go into a pub, you're more likely to find interesting beers and/or foods for sale. If you visit a house, you're more likely to find an odd collection of books, or perhaps some Adamantium ore from Mournhold.\n<br />\n<br />And if you're tired of seeing multiple types of pearl dust, multiple types of mountain lion meat, etc., Cobl is on the path to fixing those problems as well.\n<br />\n<br />[b]Mod Communication[/b]\n<br />Cobl provides several interfaces that allow mods to communicate information. \n<br />* Foods added by one mod can be used to satisfy hunger requirements of a hunger mod. \n<br />* Water wells placed by a village mod can fill water containers of a thirst mod.\n<br />* And afterlife mod can suspend the activity and penalties of hunger/thirst/sleep mods.\n<br />* Etc. etc.\n<br />\n<br />[b]For more Information[/b]\n<br />* [url=http://wryemusings.com/Cobl.html]Cobl Readme[/url]\n<br />* [url=http://wryemusings.com/Cobl.html#Versions]Version History[/url]\n<br />* [url=http://www.uesp.net/wiki/Tes4Mod:Cobl/Mods]Cobl Mods[/url]\n<br />* [url=http://www.uesp.net/wiki/Tes4Mod:Cobl/Modding]Cobl Modders Guide[/url]\n<br />* [url=http://forums.bethsoft.com/?showtopic=1059126]Cobl Topic[/url]\n<br />* [url=http://forums.bethsoft.com/?showtopic=1051762]Cobl Races Topic[/url]\n<br />\n<br />[b]Translations:[/b]\n<br />* [url=http://www.ei-der-zeit.com/portal/index.php?option=com_content&amp;view=article&amp;id=854]German[/url] by ThreeD (up to date)\n<br />* [url=http://tesall.ru/files/authors/svshu/?page=1#cobl]Russian[/url] by SvShu (up to date)\n<br />\n<br />[b]Downloads[/b]\n<br />* Cobl Core\n<br />--* If you've previously installed Cobl 1.63 or higher, then get and install cobl 163 to 170 patch.\n<br />--* Otherwise, get/install Cobl 170.\n<br />* Cobl Cosmetics Res 01\n<br />--* If you want to use Cobl's race/cosmetics features, then get and install Cob Cosmetics Res 01. This file will be rarely (if ever) modified. So, if you've gotten it before, then there's no need to get it again."
