nexusDescription="Adds sword and shield called \\\"Dragon Claw\\\". Daedric equivalent.\r\n\r\nName: Dragon Claw Sword And Shield\r\nVersion: 1.0\r\nDate: 12/28/2007\r\nCategory: Weapons and Armor\r\nAuthor(s): jojjo (jojo_d@abv.bg)\r\n\r\nDescription\r\n===========\r\nFantasy sword and shield. Daedric equivalent. And this time they don\\'t replace any daedric weapon, hehe...\r\nIf you like them, please, rate\\'em. If you don\\'t like\\'em, please, do something else. It takes much time and endeavour to make new items. Thanks.\r\n\r\nLocation\r\n========\r\nSouth of Imperial City Waterfront in Fort Homestead. Look in Heroes\\' Hall, near one of my favourite chests (Because usually there\\'s something valuable inside the chest or in the warlord that guards it). I don\\'t have much time to create quests, If you do have time be my guest. I prefer to create items.\r\n\r\nDetails\r\n=======\r\nMy second mod (after \\\"Dark Flame Sword And Shield\\\") with also my meshes and textures. This time I did better I think. You will judge it yourself.\r\nThe blade and the shield are not enchanted. It\\'s more fun to do it yourself I think.\r\n\r\nInstall\r\n=======\r\n1. Place the folders and the .esp file from the archive into your Oblivion\\\\Data folder.\r\n2. In Oblivion Launcher, click \\'Data Files\\', place a checkmark beside the Dragon Claw Sword And Shield.esp and go check Fort Homestead\\'s Heroes\\' Hall.\r\n\r\nUninstall\r\n=========\r\n1. Start Oblivion Launcher, click Data Files, uncheck the Dragon Claw Sword And Shield.esp file.\r\n2. Delete the files/folders associated with the mod.\r\n\r\n\r\nOblivion\\\\Data\\\\meshes\\\\armor\\\\DragonClawShield\\\\DragonClawShield.nif\r\nOblivion\\\\Data\\\\meshes\\\\weapons\\\\DragonClaw\\\\DragonClawSword.nif\r\nOblivion\\\\Data\\\\Textures\\\\armor\\\\DragonClawShield\\\\DragonClawShield.dds and DragonClawShield_n.dds\r\nOblivion\\\\Data\\\\Textures\\\\weapons\\\\DragonClaw\\\\DragonClawSword.dds and DragonClawSword_n.dds\r\nOblivion\\\\Data\\\\Textures\\\\menus\\\\icons\\\\armor\\\\dragonclaw\\\\DragonClawShield.dds\r\nOblivion\\\\Data\\\\Textures\\\\menus\\\\icons\\\\weapons\\\\dragonclaw\\\\DragonClawSword.dds\r\n\r\n\r\n\r\nIncompatibility\r\n===============\r\nNone that I know.\r\n\r\nKnown Issues or Bugs\r\n====================\r\nNone that I know.\r\n\r\nContact\r\n=======\r\njojo_d@abv.bg\r\n\r\nCredits\r\n=======\r\nThanks to Bethesda for the best game.\r\nAnd thanks to my humble self for the meshes and textures. It was real fun and pleasure.\r\n\r\nTools Used\r\n==========\r\nTES4BSA\r\n3ds Studio Max\r\nNIFSkope\r\nPhotoshop\r\nTES Construction Set\r\n\r\n\r\nLicensing\r\n===============\r\nPlease, contact me before reupload any of these items."
