[Main]
; Fix for the dreaded 64Hz bug. It's also required for fps fix below.
; Can be set to 1 or 2 - different methods. Probably the same results.
; Disable Oblivion Stutter Remover's bReplaceGetTickCount if using this one.
iTickFix = 1
; FOV Fix. Disable any features from other mods forcing FOV, and set fDefaultFOV under [Display] in Oblivion.ini to your desired FOV.
bFOVFix = 0
; Fast exit, for convenience
bFastExit = 1
; Borderless window, for convenience
bBorderless = 1

[DirectX]
; Recommended to enable it unless you're using ENB. It's 100% incompatible and there's no way around it.
; Required for FlipEx. Possibly improves performance.
bUseD3D9Ex = 0

[D3D9Ex]
; Allows G-Sync/FreeSync to work in windowed mode.
bUseFlipExSwapMode = 0
; It's not clear at the moment whether this helps or hurts performance. Try it out and let me know!
bUseDynamicBuffers = 0

[TickFix]
; FPS Fix. You don't actually need this if your fps are below 50.
bFPSFix = 0

[FPSFix]
; Set this to your fps cap plus 60. Putting it at 0 will remove the max checks, but it will definitely have repercussions if you plan to Alt-Tab, and it's generally NOT recommended.
iMaxFPSTolerance = 120
; If you know you're able to get more than 24 fps all the time, put this at your desired minimum. Otherwise, leave it. The absolute minimum would be 1. But I would strongly discourage to go below 20.
iMinFPSTolerance = 35
; Like SKSE Havok Fix
bfMaxTime=1
; lipsync fix
fDialogFixMult = 2.000

[FOVFix]
; Fixes hardcoded 75.0 FOV value in dialogue zoom calculation. Was causing the camera FOV to snap slightly when starting/ending a conversation with modified FOV.
bDialogFOVFix = 0
