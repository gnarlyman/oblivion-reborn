;Encoding:UTF-8
[ControlNode]
name=Bip01

;should be an integer, set it to 0/1 to disable smooth turn, ignored when auto speed enabled
framesNeededToTurn45Degree=8

;turning speed base on speed attribute of pc
EnableAutoTurningSpeed=false
MaxFrames=15
MinFrames=3

;rotate controlNode of 1st person skeleton
Enable1stSkeRot=false
1stNodeName=Bip01

[Spine2ControlNode]
;name1=Bip01 Spine1
name2=Bip01 Spine2
fSpineRotXMul=0.8
;rotate 3rd person Spine2, when diagonal move
EnableSpine2Control=true
;when in 1st person, rotate 3rd spine to lookup and down for all weapon, used with OR's camera mode, not blend well with animation
bEnableSpine2RotWhenAnyWeaponDrawn=false

[ExVanity]
EnableExVanity=true
;double click to switch shoulder, default "z", see(https://docs.microsoft.com/en-us/windows/desktop/inputdev/virtual-key-codes)
KeySwitchShoulder=0x5A
;pressing toggleKey and double click switchShoulder key in the same time to toggle exVanity mode
ToggleKey=0x12
;disable camera effect when in ExVanity, camera will not zoom in/out when rotate
DiableFlyCam=true
fVanityModeXMult=3.5
fVanityModeYMult=3.5
fDrawn3rdCamXOffset=25.5
fDrawn3rdCamYOffset=0.0
fDrawn3rdCamZOffset=25.0
fSheathed3rdCamXOffset=40.5
fSheathed3rdCamYOffset=0.0
fSheathed3rdCamZOffset=3.0
fSneak3rdCamZOffset=-35
iMaxStep=10
