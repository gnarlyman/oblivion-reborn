; Advanced Ini file for Display Skill Perk Effects
; 
; This file must be in Oblivio/Data/Ini if you want to use it.
; This is only needed if you want to override some of the perk descriptions
; To override one, set the override value to 1, remove the ; at the beginning of the 
; next line (set lSPDMainQuest.Perks*) and enter the text you want
; Examples are vanilla default values; Variables are not possible in overrides
; 
; Important:
; Make sure to not use quotation marks (") in the text. Use %q instead.
; Make sure to not use single quotation marks. Use %% instead. 
; Special characters will most likely not work.
; %r is a new line. Perk texts should start with %r%r to leave some space
; between skill description and perk texts.
; Lines can't be longer than 512 characters.


; Combat

set lSPDMainQuest.OverrideArmorer to 0
;set lSPDMainQuest.PerksArmorer to Sv_construct "%r%rNovice: Hammers break easily.%r%rApprentice: Hammers last twice as long.%r%rJourneyman: Can repair magic items.%r%rExpert: Can repair to 125%%.%r%rMaster: Never breaks repair hammers."

set lSPDMainQuest.OverrideAthletics to 1
set lSPDMainQuest.PerksAthletics to Sv_construct "%r%rNovice: Fatigue regenerates 0%% faster while running.%r%rApprentice: Fatigue regenerates 25%% faster while running. No longer require a minimum amount of fatigue to light attack.%r%rJourneyman: Fatigue regenerates 50%% faster while running.%r%rExpert: Fatigue regenerates 75%% faster while running.%r%rMaster: Fatigue regenerates 100%% faster while running." 

set lSPDMainQuest.OverrideBlade to 1
set lSPDMainQuest.PerksBlade to Sv_construct "%r%rNovice: Basic Power Attack (2.5x damage).%r%rApprentice: Standing power attacks deal 20%% more damage and inflict bleeding damage over time.%r%rJourneyman: Sideways power attacks cleave through multiple enemies.%r%rExpert: Backwards power attacks disarm power attacking enemies.%r%rMaster: Forwards power attacks instantly kill enemies at 30%% health or lower."

set lSPDMainQuest.OverrideBlock to 1
set lSPDMainQuest.PerksBlock to Sv_construct "%r%rNovice: Can execute a timed block within 0.3s, preventing all weapon damage.%r%rApprentice: Blocking no longer fatigues you.%r%rJourneyman: Blocking no longer damages your weapon or shield. Bashing fatigues enemies.%r%rExpert: Bashing knocks down enemies that are power attacking.%r%rMaster: Timed blocks have a 50%% chance to disarm the attacker."

set lSPDMainQuest.OverrideBlunt to 1
set lSPDMainQuest.PerksBlunt to Sv_construct "%r%rNovice: Basic Power Attack (2.5x damage).%r%rApprentice: Standing Power attacks shatter enemy armor.%r%rJourneyman: Sideways power attacks disorient enemies, making them stagger 50%% more, or launch them back if already affected.%r%rExpert: Backwards power attacks cripple enemies, draining their strength, speed, and agility.%r%rMaster: Forward power attacks spend all of your remaining fatigue to deal bonus armor piercing damage."

set lSPDMainQuest.OverrideHandToHand to 1
set lSPDMainQuest.PerksHandToHand to Sv_construct "%r%rNovice: Basic Power Attack (2.5x damage).%r%rApprentice: Standing Unarmed power attacks are 20%% stronger and deal bonus armor-piercing damage to foes below 20%% fatigue.%r%rJourneyman: Sideways unarmed power attacks disarm enemies with low fatigue.%r%rExpert: Backwards unarmed power attacks knockback enemies with low fatigue.%r%rMaster: Forwards Unarmed power attacks paralyze enemies with low fatigue."

set lSPDMainQuest.OverrideHeavyArmor to 1
set lSPDMainQuest.PerksHeavyArmor to Sv_construct "%r%rNovice: Heavy armor degrades rapidly (150%% rate).%r%rApprentice: Suffer only 2/3rds the normal fatigue penalty from your armor.%r%rJourneyman: Gain an additional 35%% resistance to stagger.%r%rExpert: Suffer only 1/3rd the fatigue penalty from armor weight.%r%rMaster: Attacks have a chance to recoil off your armor."



