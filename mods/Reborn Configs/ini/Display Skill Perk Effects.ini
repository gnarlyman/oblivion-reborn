set lSPDMainQuest.OverridePickpocket to 1
set lSPDMainQuest.PerksPickpocket to Sv_construct "%r%rNovice: Can pickpocket humanoid npcs while crouching.%r%rApprentice: Pickpocketing keys, gold, low weight & value items, or from sleeping targets never fails while undetected.%r%rJourneyman: Poisons that you reverse-pickpocket on non-essential actors are applied to them.%r%rExpert: Stolen items you carry don't add to your encumbrance.%r%rMaster: : You can pickpocket equipped items from non-essential targets while undetected by them."