; Stealth

set lSPDMainQuest.OverrideAcrobatics to 1
set lSPDMainQuest.PerksAcrobatics to Sv_construct "%r%rNovice: Cannot attack while jumping or falling.%r%rApprentice: Normal attack while jumping or falling. %r%rJourneyman: Power attack while jumping or falling. Dodge by holding block while pressing jump.%r%rExpert:Jumping and Dodging cost less fatigue..%r%rMaster: Water Jump ability, can jump off the surface of water."

set lSPDMainQuest.OverrideLightArmor to 1
set lSPDMainQuest.PerksLightArmor to Sv_construct "%r%rNovice: Light armor degrades rapidly (150%% rate).%r%rApprentice: Weight penalizes fatigue regeneration half as much when you aren't wearing heavy armor.%r%rJourneyman: Gain 40%% resistance to poison, disease, paralysis, and petrification.%r%rExpert: Suffer no fatigue penalty from worn light armor.%r%rMaster: All incoming attacks have a chance to be dodged completely." 

set lSPDMainQuest.OverrideMarksman to 1
set lSPDMainQuest.PerksMarksman to Sv_construct "%r%rNovice: Fatigue loss when holding a drawn bow (3/s).%r%rApprentice: Less fatigue loss when holding a drawn bow (2/s).%r%rJourneyman: Zoom and slow time by holding block. Less fatigue loss when holding a drawn bow (1/s).%r%rExpert: Chance of knockdown on hit. Zoom and time slow increased. No fatigue loss when holding a drawn bow.%r%rMaster: Chance of paralysis on hit."

set lSPDMainQuest.OverrideMercantile to 1
set lSPDMainQuest.PerksMercantile to Sv_construct "%r%rNovice: Sell items at reduced price.%r%rApprentice: Chance to find bonus treasure based on Mercantile. Spellmaking is 35%% cheaper.%r%rJourneyman: Merchants receive additional gold. Repairs are 35%% cheaper.%r%rExpert: Invest in a shop to permanently increase the shop's available gold. Recharging is 35%% cheaper.%r%rMaster: All merchants have 500 more gold. Barter at 100%% ratio. Services are 50%% cheaper."

set lSPDMainQuest.OverrideSecurity to 1
set lSPDMainQuest.PerksSecurity to Sv_construct "%r%rNovice: When you fail to pick a lock, you break a lockpick.%r%rApprentice: When you fail to pick a lock, you have 50%% chance to keep your lockpick.%r%rJourneyman: You find more gold in picked chests.%r%rExpert: You receive a wax copy of a picked lock's key, if one exists.%r%rMaster: You can pick locks in the open without being noticed."

set lSPDMainQuest.OverrideSneak to 0
;set lSPDMainQuest.PerksSneak to Sv_construct "%r%rNovice: Sneak damage: Melee 4.0x, Bow 2.0x.%r%rApprentice: Sneak damage: Melee 6.0x , Bow 3.0x.%r%rJourneyman: Sneak damage: Melee 6.0x , Bow 3.0x. No penalty for booth weight.%r%rExpert: Sneak damage: Melee 6.0x , Bow 3.0x. No penalty for running.%r%rMaster: Sneak damage: Melee 6.0x , Bow 3.0x. Sneak attacks ignore armor."

set lSPDMainQuest.OverrideSpeechcraft to 1
set lSPDMainQuest.PerksSpeechcraft to Sv_construct "%r%rNovice: Can receive gifts & hints. Can tame 1 animal.%r%rApprentice: Get hints for best & worst options. Can tame 2 animals.%r%rJourneyman: Minimum disposition gain for success increased. Can tame 3 animals.%r%rExpert: Total disposition loss is reduced. Can tame 4 animals.%r%rMaster: Recieve better & more unique gifts based on class of person you talk to. Can tame 5 animals."


