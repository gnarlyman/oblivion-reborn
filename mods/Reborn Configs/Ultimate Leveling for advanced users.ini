;=============================================================================;
;                                                                             ;
; This is an advanced INI file for: Ultimate Leveling                         ;
; (IT MUST BE USED FOR THIS ADDON TO WORK CORRECTLY)                          ;
;                                                                             ;
; Edit this file to customize it to your preferences                          ;
;                                                                             ;
; Place this in your "Data" folder                                            ;
;                                                                             ;
;=============================================================================;
; UI									      ;
;=============================================================================;
; By default the progress text (in gamemode) fades after 5 seconds.

set ULVL.ini_UI_progress_text_fade to 5

; By default profession books have a button added to enable the player
; character to switch class. Set to 0 to disable.

set ULVL.ini_UI_professionbook to 1

; By default the amount of horseshoes found is displayed on the 59th
; position of the stats menu (bottom). Set to 0 to disable.

set ULVL.ini_UI_horseshoes to 59

; By default when using the manual skill/attribute modes, skills/attributes
; can be increased through the use of skill/attribute points. Use the left
; mouse button on a skill/attribute to increase it, while using the right
; mouse button will revert this. The key can be changed with DirectX key
; scancodes.

set ULVL.ini_UI_key_skillpoints to 257

; By default when using the experience based leveling system, the exact
; experience required to level up is displayed in the skills menu.

set ULVL.ini_UI_experience_text to 1


;=============================================================================;
; leveling (2: disabled)						      ;
;=============================================================================;
;
; ** DO NOT USE: NOT YET IMPLEMENTED **
;
; By default the player character's level is determined by the distance
; to a city, but capped at 30. If the worldspace does not have any city a
; fixed value is used.
;
; mylevel = ( pow DistanceToCity ULVL.ini_location_level_outdoors_pow ) + ULVL.ini_location_level_outdoors_base

set ULVL.ini_location_level_outdoors_base to -5
set ULVL.ini_location_level_outdoors_pow to 0.725
set ULVL.ini_location_level_outdoors_max to 30

set ULVL.ini_location_level_outdoors_unknown to 20

; By default the player character's level is further increased when inside
; a dungeon based on the depth inside.
;
; mylevel = BaseLevel + ( ( pow BaseLevel ULVL.ini_location_level_dungeon_depth_pow ) + ULVL.ini_location_level_dungeon_depth_base ) * DungeonDepth

set ULVL.ini_location_level_dungeon_depth_base to 0
set ULVL.ini_location_level_dungeon_depth_pow to 0.5

; By default the player character's level is set to the owner of a building
; when inside, or when the owner is unknown set to a fixed value.

set ULVL.ini_location_levelmod_interior_unknown to 20

; By default the player character's level in the arena is based on his/her rank.

set ULVL.ini_location_level_arena_rank0 to 3
set ULVL.ini_location_level_arena_rank1 to 6
set ULVL.ini_location_level_arena_rank2 to 10
set ULVL.ini_location_level_arena_rank3 to 15
set ULVL.ini_location_level_arena_rank4 to 20
set ULVL.ini_location_level_arena_rank5 to 26
set ULVL.ini_location_level_arena_rank6 to 32
set ULVL.ini_location_level_arena_rank7 to 38
set ULVL.ini_location_level_arena_rank8 to 42

; By default the player character's level is set to a fixed value when entering
; the Realm of Peryite and the Realm of Boethia.

set ULVL.ini_location_level_oblivion_peryite to 10
set ULVL.ini_location_level_oblivion_boethia to 20

; By default the player character's level, when inside Oblivion, is based on
; progression of the main quest.

set ULVL.ini_location_level_oblivion_base to 1

set ULVL.ini_location_level_oblivion_MQ03 to 3
set ULVL.ini_location_level_oblivion_MQ04 to 6
set ULVL.ini_location_level_oblivion_MQ05 to 9
set ULVL.ini_location_level_oblivion_MQ06 to 12
set ULVL.ini_location_level_oblivion_MQ07 to 14
set ULVL.ini_location_level_oblivion_MQ08 to 16
set ULVL.ini_location_level_oblivion_MQ09 to 18
set ULVL.ini_location_level_oblivion_MQ10 to 20
set ULVL.ini_location_level_oblivion_MQ11 to 23
set ULVL.ini_location_level_oblivion_MQ12 to 26
set ULVL.ini_location_level_oblivion_MQ13 to 32
set ULVL.ini_location_level_oblivion_MQ14 to 38
set ULVL.ini_location_level_oblivion_MQ15 to 42

; By default the player character's level is further increased when inside
; Oblivion and an interior.

set ULVL.ini_location_level_oblivion_depth_base to 1
set ULVL.ini_location_level_oblivion_depth_pow to 0.5


;=============================================================================;
; leveling (2: xp based)						      ;
;=============================================================================;
; By default you can't increase skill above 100 points. It's recommended to
; not increase above 200.

set ULVL.ini_xp_skill_cap to 100 

; By default required XP to level based the following calculation:
; required xp == ULVL.ini_xp_level_base + ( pow PlayerLevel ULVL.ini_xp_level_pow ) * ULVL.ini_xp_level_mult

set ULVL.ini_xp_level_base to 3000
set ULVL.ini_xp_level_pow to 1.25
set ULVL.ini_xp_level_mult to 500

; By default experience received from killing a hostile actor is based on the
; level difference (for both stronger and weaker than the player character).
; It's further adjusted based on attributes and confidence.
;
; BASE CALCULATIION
; base XP = ULVL.ini_xp_kill_base + ( EnemyLevel * ULVL.ini_xp_kill_mult )
;
; ADJUSTMENT BASED ON LEVEL DIFFERENCE
; XP = Base XP * ( 1 + ULVL.ini_xp_kill_difference_mult * ( pow ( EnemyLevel - PlayerLevel ) ULVL.ini_xp_kill_pow )

set ULVL.ini_xp_kill_base to 45
set ULVL.ini_xp_kill_mult to 5

set ULVL.ini_xp_kill_weaker_difference_mult to 0.1
set ULVL.ini_xp_kill_weaker_pow to 0.5
set ULVL.ini_xp_kill_stronger_difference_mult to 0.1
set ULVL.ini_xp_kill_stronger_pow to 0.5

; By default the player character receives the full 100% experience when killing
; a target. Targets killed by a companion, pet or follower will give 50% experience.
; Any kills made by actors who have been encouraged to fight by player character
; with a frenzy spell will give 25% experience. If a target is killed by anyone else
; the player character will receive 25% experience, under condition the player
; character has hit the target at least once.

set ULVL.ini_xp_kill_companion to 50
set ULVL.ini_xp_kill_pet to 50
set ULVL.ini_xp_kill_follower to 50
set ULVL.ini_xp_kill_frenzy to 25
set ULVL.ini_xp_kill_other to 25

; By default the player character does NOT gain experience when hitting a
; friendly target, if the killing blow is done by someone else. This to avoid
; gaining experience from friendly fire. Set to 1 to enable.

set ULVL.ini_xp_kill_friendly to 0

; By default the experience gained killing an actor is based on the
; game difficulty. More experience is given at higher game difficulty.
; set to 0 to disable.

set ULVL.ini_xp_kill_difficulty to 1

; By default the progress text does NOT show the level of actors killed.
; set to 1 to enable.

set ULVL.ini_xp_kill_show_level to 0

; By default you gain 4% experience of the character's current level when
; reading a skill books for a major skill, or 2% for a minor skill.

set ULVL.ini_xp_read_skillbook_minor to 2
set ULVL.ini_xp_read_skillbook_major to 4

; By default you gain 5% experience of the character's current level when
; training a major skill, or 3% for a minor skill. This is further modified
; by the current skill level, resulting in lower skills giving less experience.

set ULVL.ini_xp_train_minor to 3
set ULVL.ini_xp_train_major to 5

; By default you gain a fixed amount of experience for the following actions:

set ULVL.ini_xp_pickpocket to 50
set ULVL.ini_xp_persuasion to 10
set ULVL.ini_xp_find_nirnroot to 100
set ULVL.ini_xp_find_artifact to 800
set ULVL.ini_xp_feed to 125
set ULVL.ini_xp_trap_soul to 50
set ULVL.ini_xp_read_book to 25
set ULVL.ini_xp_eat_ingredient to 3

; By default finding locations gives experience based on the distance to
; any nearby cities and the type of location. When Maskar's Oblivion Overhaul
; is detected the multiplier is increase by 0.25.
; XP == ULVL.ini_xp_find_location_base + ( ( ULVL.ini_xp_find_location_mult * ( pow mydistance ULVL.ini_xp_find_location_pow ) ) * LocationMultiplier )

set ULVL.ini_xp_find_location_base to 25
set ULVL.ini_xp_find_location_mult to 0.5
set ULVL.ini_xp_find_location_pow to 1.2
set ULVL.ini_xp_find_location_MOO to 0.25

set ULVL.ini_xp_find_location_city to 1
set ULVL.ini_xp_find_location_landmark to 1
set ULVL.ini_xp_find_location_tavern to 1
set ULVL.ini_xp_find_location_settlement to 1
set ULVL.ini_xp_find_location_shrine to 1.25
set ULVL.ini_xp_find_location_camp to 1.5
set ULVL.ini_xp_find_location_cave to 2
set ULVL.ini_xp_find_location_ruin to 2
set ULVL.ini_xp_find_location_fort to 2
set ULVL.ini_xp_find_location_mine to 2
set ULVL.ini_xp_find_location_gate to 2

; By default the progress text does NOT show the type of location found.
; set to 1 to enable.

set ULVL.ini_xp_find_location_show_type to 0

; By default repairing items gives experience based on the health repaired,
; broken repair hammers and the characters armorer skill.
;
; XP == ( ItemHealthRepaired / sqrt( ArmorerSkill ) ) * RepairSuccessMult * ULVL.ini_xp_repair
;
; RepairSuccessMult == 1 - ( BrokenHammers * ULVL.ini_xp_repair_penalty / 100 )
;
; Where RepairSuccessMult is capped to be at least 25% of normal.

set ULVL.ini_xp_repair to 1.5
set ULVL.ini_xp_repair_penalty to 25
set ULVL.ini_xp_repair_success to 25

; By default making potions gives experience based on the cost of the potions.
; XP == ULVL.ini_xp_potion_base + ULVL.ini_xp_potion_mult * PotionCost

set ULVL.ini_xp_make_potion_base to 4
set ULVL.ini_xp_make_potion_mult to 0.2

; By default picking a lock gives experience based on the difficulty of the lock.
; XP == ULVL.ini_xp_unlock_base + ULVL.ini_xp_unlock_mult * LockDifficulty
; experience.

set ULVL.ini_xp_unlock_base to 25
set ULVL.ini_xp_unlock_mult to 1.5

; By default completing quests gives a fixed amount of experience based on
; the amount of stages and player level.
;
; XP == ( ULVL.ini_xp_complete_quest_base + ( ULVL.ini_xp_complete_quest_stage * ( pow stages ULVL.ini_xp_complete_quest_stage_pow ) ) * ( pow PlayerLevel ULVL.ini_xp_complete_quest_level )

set ULVL.ini_xp_complete_quest_base to 100
set ULVL.ini_xp_complete_quest_stage to 100
set ULVL.ini_xp_complete_quest_stage_pow to 0.5
set ULVL.ini_xp_complete_quest_level_pow to 0.333

; By default shutting oblivion gates gives a fixed amount of experience.
; XP == ULVL.ini_xp_shut_obliviongate * ( pow PlayerLevel ULVL.ini_xp_shut_obliviongate_level )

set ULVL.ini_xp_shut_obliviongate to 400
set ULVL.ini_xp_shut_obliviongate_level_pow to 0.333

; By default finding horseshoes give a fixed amount of experience when not
; giving luck.

set ULVL.ini_xp_find_horseshoe to 150


;=============================================================================;
; Leveling (3: realistic)						      ;
;=============================================================================;
; By default, when using realistic leveling, the character increases level by
; increasing both major and minor skills. The maximum level reached is 50.

set ULVL.ini_level_realistic_levelmax to 50

; By default major skills contribute 65% to the amount of levels gained, while
; minor skills contribute to the remaining amount.

set ULVL.ini_level_realistic_major to 65

; By default skill increases have less impact on leveling when the skill is low.
; Set to 1 for impact to be the same for any skill level.

set ULVL.ini_level_realistic_curve to 0.5


;=============================================================================;
; skills (0: vanilla)							      ;
;=============================================================================;
; By default major skills increase faster than minor skills. These values are
; multipliers. The values 1.33 (major) and 0.8 (minor) are default for
; vanilla leveling. As example, setting the major multiplier to 2.66 would
; double the speed major skills increase. Set to -1 to keep unchanged (default).

set ULVL.ini_skill_major_multiplier to -1
set ULVL.ini_skill_minor_multiplier to -1

; By default skills increase at normal speed. Change to following settings
; to increase/decrease the speed of individual skills.

set ULVL.ini_skill_acrobatics_jump 			to 0.3000
set ULVL.ini_skill_acrobatics_fall 			to 3.0000
set ULVL.ini_skill_alchemy_potion_creation 		to 5.0000
set ULVL.ini_skill_alchemy_ingredient_use 		to 0.5000
set ULVL.ini_skill_alteration_cast 			to 0.0000
set ULVL.ini_skill_alteration_hit_target		to 4.0000
set ULVL.ini_skill_armorer_repair_one_swing		to 1.5000
set ULVL.ini_skill_athletics_second_of_running		to 0.0300
set ULVL.ini_skill_athletics_second_of_swimming		to 0.0400
set ULVL.ini_skill_blade_hit_target			to 0.5000
set ULVL.ini_skill_block_hit_while_blocking		to 1.2500
set ULVL.ini_skill_blunt_hit_target			to 0.5000
set ULVL.ini_skill_conjuration_cast			to 0.0000
set ULVL.ini_skill_conjuration_hit_target		to 6.0000
set ULVL.ini_skill_destruction_cast			to 0.0000
set ULVL.ini_skill_destruction_hit_target		to 1.2000
set ULVL.ini_skill_handtohand_hit_target		to 0.6000
set ULVL.ini_skill_heavyarmor_hit_on_armor_piece	to 1.2500
set ULVL.ini_skill_illusion_cast			to 0.0000
set ULVL.ini_skill_illusion_hit_target			to 3.0000
set ULVL.ini_skill_lightarmor_hit_on_armor_piece	to 1.5000
set ULVL.ini_skill_marksman_hit_target			to 0.8000
set ULVL.ini_skill_mercantile_barter			to 0.4000
set ULVL.ini_skill_mysticism_cast			to 0.0000
set ULVL.ini_skill_mysticism_hit_target			to 3.0000
set ULVL.ini_skill_restoration_cast			to 0.0000
set ULVL.ini_skill_restoration_hit_target		to 0.6000
set ULVL.ini_skill_security_pick_lock			to 1.5000
set ULVL.ini_skill_sneak_avoid_notice			to 0.7500
set ULVL.ini_skill_sneak_pickpocket			to 2.0000
set ULVL.ini_skill_speechcraft_persuasion		to 2.4000


;=============================================================================;
; Skills (1: manual)							      ;
;=============================================================================;
; By default, when increasing skills using skill points, the player character
; receives 25 major skill points and 15 minor skill points for every level gained.

set ULVL.ini_xp_skill_level_points_major to 25
set ULVL.ini_xp_skill_level_points_minor to 15

; By default new skills (added by other mods) give 5 additional skill points each.

set ULVL.ini_xp_skill_level_points_newskill to 5

; By default increasing skills cost more skill points based on their mastery level.

set ULVL.ini_xp_skill_level_points_novice to 1
set ULVL.ini_xp_skill_level_points_apprentice to 2
set ULVL.ini_xp_skill_level_points_journeyman to 3
set ULVL.ini_xp_skill_level_points_expert to 4

; By default the cost to increase skills is further increased if the skill does
; not belong to the class specialization. The cost is NOT further increased if
; if it's a minor skill.

set ULVL.ini_xp_skill_level_points_specialization_major to 1
set ULVL.ini_xp_skill_level_points_specialization_minor to 1
set ULVL.ini_xp_skill_level_points_class to 0


;=============================================================================;
; Skills (2: npc)							      ;
;=============================================================================;
; By default, when skills automatically increase, the rate at which a skill
; increases is determined by whether or not the skill is a major skill, and
; whether or not it belongs to the class specialization.
; Custom skills are new skills added by other mods (like Unarmored skill).

set ULVL.ini_xp_skill_level_minor to 0.1
set ULVL.ini_xp_skill_level_minorspecialization to 0.6
set ULVL.ini_xp_skill_level_major to 1
set ULVL.ini_xp_skill_level_majorspecialization to 1.5
set ULVL.ini_xp_skill_level_custom to 1
set ULVL.ini_xp_skill_level_customspecialization to 1.5


;=============================================================================;
; Skills (3: skill cap)							      ;
;=============================================================================;
; By default, when skill cap is enabled, the player is capable of learning up
; to 1000 points in any skills. This excludes abilities, like birthsigns.
; Increasing skills above the skill cap will automatically lower any minor
; skill(s) with the same amount.

set ULVL.ini_skill_cap_total to 1000

; By default minor skills can't drop below their starting value. Set to 0
; to allow skills to drop below their starting value.

set ULVL.ini_skill_start to 1


;=============================================================================;
; Attributes (1: manual)						      ;
;=============================================================================;
; By default, when using attribute points to increase attributes, the player
; character receives 10 attribute points for every level gained.

set ULVL.ini_attribute_level_points_base to 10

; By default the player character receives 1 additional attribute point
; when luck is also increased manually.

set ULVL.ini_attribute_level_points_luck to 1

; By default attributes and attribute points are reset when amount of points
; assigned is not consistent with amount of points available for the current
; level. In specific the character can have 1 level in points below 0 before
; they are reset (normally this is 11 points).

set ULVL.ini_attribute_level_points_reset to 1


;=============================================================================;
; Attributes (2: npc)							      ;
;=============================================================================;
; By default, when using npc style attributes, attributes increase 0.6 every
; level and 0.8 for each major skill increase associated to this attribute.

set ULVL.ini_attribute_base to 0.6
set ULVL.ini_attribute_skill to 0.8

; By default attributes favored by the player character (as defined in the
; class) are rounded up, while any other attributes are rounded down.
; Set to 0 to always have attributes rounded down.

set ULVL.ini_attribute_favored to 1


;=============================================================================;
; Attributes (3: realistic)						      ;
;=============================================================================;
; By default, when using realistic attributes, all skill point increase
; attributes, while the attributes themselves are lowered by 15 points to
; compensate. Set to 0 for only newly gained skill points to affect attributes
; and disable the penalty.

set ULVL.ini_attribute_realistic_allskills to 1
set ULVL.ini_attribute_realistic_penalty to 15

; By default skill increases have less impact on attributes when the skill is
; low.

set ULVL.ini_attribute_realistic_curve to 0.75

; By default any skill increase, increases the governing attribute by 0.25.
; This is further modified based on if the attribute is a governing attribute
; and if the skill is a class skill and/or part of the character's specialization.

set ULVL.ini_attribute_realistic_base to 0.25

set ULVL.ini_attribute_realistic_favorite_mult to 1.5
set ULVL.ini_attribute_realistic_class_mult to 1.25
set ULVL.ini_attribute_realistic_specialization_mult to 1.25

; By default attributes of races that start higher will contribute to higher
; overall attributes when associated skills increase.
;
; race modifier == pow ( RaceAttribute / 40 ) ULVL.ini_attribute_realistic_race_pow

set ULVL.ini_attribute_realistic_race_pow to 0.5


;=============================================================================;
; Luck (2: horseshoes)							      ;
;=============================================================================;
; By default finding a horseshoe gives 1 luck.

set ULVL.ini_luck_horseshoe_reward to 1


;=============================================================================;
; Luck (3: fame)							      ;
;=============================================================================;
; By default the player character's luck is modified by his/her fame, infamy
; and bounty. Bounty is capped to 1000, while luck modifier can't be below -50.
; Set ULVL.ini_luck_bounty_max to 0 to disable effect of bounty on luck.
;
; High fame:	fame modifier = ( fame - infamy ) * ULVL.ini_luck_fame_multiplier
;		bounty modifier = ULVL.ini_luck_fame_base - ( bounty / -500 )
;
; High infamy:  fame modifier = ( infamy - fame ) * ULVL.ini_luck_infamy_multiplier
; 		bounty modifier = ULVL.ini_luck_infamy_base + ( bounty / 2000 )
;
; Luck:		luck modifier = fame modifier * bounty modifier

set ULVL.ini_luck_fame_multiplier to 0.4
set ULVL.ini_luck_infamy_multiplier to 0.4

set ULVL.ini_luck_fame_base to 1
set ULVL.ini_luck_infamy_base to 0.75

set ULVL.ini_luck_bounty_max to 1000
set ULVL.ini_luck_mod_min to -50


;=============================================================================;
; Luck (4: skills)							      ;
;=============================================================================;
; By default increasing a minor skill increases luck by 0.05 points, while
; increasing a major skill increases luck by 0.1 point.

set ULVL.ini_luck_skills_minor_reward to 0.05
set ULVL.ini_luck_skills_major_reward to 0.1


;=============================================================================;
; Health (1: unleveled)							      ;
;=============================================================================;
; By default the player character's health is based on his/her endurance and
; strength.
;
; Health = Endurance * ( sqrt(Strength) * ULVL.ini_health_strength_multiplier )

set ULVL.ini_health_strength_multiplier to 0.3


;=============================================================================;
; Health (2: npc)							      ;
;=============================================================================;
; By default the player character's health increases each level, based on
; his/her class factor, level and endurance. This calculation is very similar
; to the npc health calculation.
;
; Health = ( ( PlayerLevel - 1 ) * ClassFactor ) + ( Endurance * ULVL.ini_health_multiplier )
;
; ClassFactor is a value that ranges from 3 to 6, and is based upon the
; player's class. If the class specialization is Magic, ClassFactor is 3; for
; Stealth it is 4; and for Combat it is 5. If Endurance is one of the class
; attributes, ClassFactor is one larger.

set ULVL.ini_health_combat to 5
set ULVL.ini_health_stealth to 4
set ULVL.ini_health_magic to 3
set ULVL.ini_health_endurance to 1

set ULVL.ini_health_multiplier to 2


;=============================================================================;
; Health (3: retroactive)						      ;
;=============================================================================;
; By default the player character's health is based on his/her current level,
; starting endurance and current endurance.
;
; Health = ( ( PlayerLevel - 1 ) * ( ( StartEndurance + Endurance ) * ULVL.ini_health_retroactive_multiplier ) + ( Endurance * ULVL.ini_health_multiplier )

set ULVL.ini_health_retroactive_multiplier to 0.03


;=============================================================================;
; Magicka (2: npc)							      ;
;=============================================================================;
; By default the player character's magicka is based on his/her intelligence.
; When using the npc style magicka mode this uses a 2.5 multiplier.
;
; Magicka = Intelligence * ULVL.ini_magicka_multiplier

set ULVL.ini_magicka_multiplier to 2.5


;=============================================================================;
; Sleep (2: rested bonus)						      ;
;=============================================================================;
; By default the player character receives rested bonus in time. Set to 2
; to receive rested bonus in experience (requires xp leveling).
;
; 1 time based rested bonus
; 2 experience based rested bonus

set ULVL.ini_rested_mode to 2

; By default sleeping for 1 hour will give 1 hour rested bonus, up to 8 hours.
; When using experience based rested bonus this is 5% of the total experience
; for each hour slept (40% max).

set ULVL.ini_rested_recovery to 1
set ULVL.ini_rested_max to 8
set ULVL.ini_rested_experience to 5

; By default the player character receives 50% bonus experience when rested.

set ULVL.ini_rested_bonus to 50


;=============================================================================;
; Powerscrolls								      ;
;=============================================================================;
; By default powerscrolls drop on npcs with attributes of 90+. The chance a
; scroll drops is 50%, but can drop no more than once every 5 to 25 npcs.

set ULVL.ini_powerscrolls_npc_attribute to 90
set ULVL.ini_powerscrolls_npc_chance to 50
set ULVL.ini_powerscrolls_npc_min to 5
set ULVL.ini_powerscrolls_npc_max to 25

; By default there's a 10% chance a luck scroll drops rather than any of the
; other scrolls.

set ULVL.ini_powerscrolls_luck to 10

; By default powerscrolls can be found as loot in the same location as
; normal scrolls. Set to 0 to disable.

set ULVL.ini_powerscrolls_loot to 1

; By default more powerful powerscrolls are harder to find. This means that
; if a powerscroll drops there's roughly a 5% chance it's an ultimate scroll.

set ULVL.ini_powerscrolls_rarity_wondrous to 15
set ULVL.ini_powerscrolls_rarity_exalted to 10
set ULVL.ini_powerscrolls_rarity_mythical to 7
set ULVL.ini_powerscrolls_rarity_legendary to 4
set ULVL.ini_powerscrolls_rarity_ultimate to 2

; By default more powerful powerscrolls increase the attribute cap more. This
; increase should be between 1 and 100.

set ULVL.ini_powerscrolls_attribute_wondrous to 10
set ULVL.ini_powerscrolls_attribute_exalted to 25
set ULVL.ini_powerscrolls_attribute_mythical to 50
set ULVL.ini_powerscrolls_attribute_legendary to 75
set ULVL.ini_powerscrolls_attribute_ultimate to 100

; By default more powerful powerscrolls have a gold value of 85 to 425 gold.

set ULVL.ini_powerscrolls_price_wondrous to 85
set ULVL.ini_powerscrolls_price_exalted to 170
set ULVL.ini_powerscrolls_price_mythical to 255
set ULVL.ini_powerscrolls_price_legendary to 340
set ULVL.ini_powerscrolls_price_ultimate to 425


;=============================================================================;
; Profession books							      ;
;=============================================================================;
; By default following the path of a profession requires to be apprentice (25+)
; in all its skills.

set ULVL.ini_professionbooks_skill_min to 25

; By default following the path of a profession book automatically removes
; the book from the inventory (similar to using a scroll). Set to 0 to disable.

set ULVL.ini_professionbooks_remove to 1

; By default profession books drop on npcs at 4% chance.

set ULVL.ini_professionbooks_npc_chance to 4

; By default profession books can be found as loot in the same location as
; normal books. Profession books with paths considered "good" can be purchased
; from merchants. Set to 0 to disable.

set ULVL.ini_professionbooks_loot to 1
set ULVL.ini_professionbooks_merchant to 1


;=============================================================================;
; Horseshoes								      ;
;=============================================================================;
; By default 150 horseshoes are placed randomly in the game world, near places
; of interest.

set ULVL.ini_horseshoe_total to 150

; By default horseshoes have a golden appearance when picking them up gives
; luck (as defined in the main ini file), or look like normal when they don't.
;
; (-1) looks based on giving luck
;   0  always normal horseshoes
;   1  always golden horseshoes

set ULVL.ini_horseshoe_gold to -1

; By default you do NOT receive a message when being near a horseshoe. When
; this setting is enabled (set to 1) it will shows a message once for every
; horseshoe.

set ULVL.ini_horseshoe_message to 0


;=============================================================================;
; Training								      ;
;=============================================================================;
; By default the player character can have 5 training sessions for each level.
; The cost of each session is 10 times the skill value.

set ULVL.ini_training_sessions to 5
set ULVL.ini_training_cost to 10


;=============================================================================;
; Read-only settings							      ;
;=============================================================================;
; DO NOT CHANGE THE FOLLOWING SETTINGS.

set ULVL.ini_version to 195
