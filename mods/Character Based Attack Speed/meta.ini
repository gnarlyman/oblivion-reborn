nexusDescription="[b][font=Trebuchet MS][size=4]Features[/size][/font]\n<br />\n<br />[/b][i][font=Arial][b]Attack speeds for all characters are dynamic. NPCs are also affected, and creatures can be optionally excluded. \n<br />[/b][/font]\n<br />[/i][font=Arial][size=2]The attack speed value is based on: how heavy the weapon is, how proficient the character is with that weapon type (blade, blunt hand-to-hand, etc.), how much strength and speed they have, how encumbered they are (more importantly what armour they are wearing on their upper-body and hands), and their current fatigue levels.\n<br />\n<br />[/size][/font][font=Arial][size=2]The influence on attack speed by each of the stat categories can be modified with the included .ini file. You can set how much you want each component to contribute to attack speed, including defining the influence of gauntlet encumbrance vs total encumbrance, as well as a few other settings.\n<br />[/size][/font][size=2]\n<br />[/size][font=Arial][size=2]Generally you will find that at the beginning of the game or with low stat values, attacks are slower than Vanilla (Unmodded) Oblivion. As your attributes become very high you will be able to reach a higher potential and swing weapons faster than the standard speeds that shipped with the game.[/size][/font]\n<br />\n<br />\n<br />\n<br />[b][font=Trebuchet MS][size=4]Attack Speed Calculation[/size][/font]\n<br />\n<br />[/b][font=Arial][b]Source code[/b]:\n<br />[/font][font=Arial][url=https://github.com/gazareth/CBAS]https://github.com/gazareth/CBAS\n<br />\n<br />[/url][/font][font=Arial][size=2]There is a fair bit of maths behind the calculation, and personally I think the result feels natural and realistic. That said, I am happy to suggestions in updating/changing the formula(s). I don't want to get right down to the equations here. I am providing the source code if you are interested in that. I will give a brief overview here:\n<br />[/size][/font][font=Arial][size=2]\n<br />[/size][/font][font=Arial][size=2]The calculation can be broken down into five parts:[/size][/font][list]\n<br />[*][font=Arial][size=2]Attribute(s) -- Wielding a melee weapon requires strength, Staff requires Intelligence &amp; Will.[/size][/font]\n<br />[*][font=Arial][size=2]Skill -- Higher skill in blade allows you to swing swords faster, Blunt allows you to swing maces faster, etc.[/size][/font]\n<br />[*][font=Arial][size=2] Alacrity -- Higher speed or agility (whichever one is higher is chosen) means faster attacks.[/size][/font]\n<br />[*][font=Arial][size=2]Encumbrance -- How much the character is carrying (with a focus on which gauntlets and cuirass the character is wearing). Carrying more weight reduces attack speed. Strength and armour skill (Light/Heavy) are taken into account.[/size][/font]\n<br />[*][font=Arial][size=2]Fatigue -- The current % of fatigue the character has. Low fatigue will result in slower attacks.[/size][/font]\n<br />[/list][font=Arial][size=2]\n<br />[/size][/font][font=Arial][size=2]There is then a final formula applied to provide diminishing returns at extreme values, so that there are lower and upper areas of speed that cannot feasibly be reached.[/size][/font]\n<br />\n<br />\n<br />\n<br />[font=Trebuchet MS][size=4][b]Motivation[/b][/size][/font][b]\n<br />[size=2]\n<br />[/size][/b][size=2]Oblivion has a decent variety of progressable stats and you can grow your character in all different ways: move speed, jump height and weapon damage can be improved as your character develops by running, jumping and swinging weapons at foes. But no matter how many times you've swung your Iron Longsword, you still swing it at exactly the same pace. This is because in Oblivion, attack speed is determined through the speed of the weapon equipped. Not only that, but all weapons of the same type (e.g. one-handed swords), have the same speed. (see:   [url=https://en.uesp.net/wiki/Oblivion:Weapons][b]https://en.uesp.net/wiki/Oblivion:Weapons[/b][/url]﻿) \n<br />\n<br />[b]CBAS– Character Based Attack Speed –[/b]Is able to set the attack speed for all characters dynamically based on their attributes and the attributes of their weapon.\n<br />[/size][size=2]\n<br />[/size][b]\n<br />\n<br />[font=Trebuchet MS][size=4]Credits[/size][/font]\n<br />\n<br />[/b][font=Arial][size=2]Several modders have made attempts to correct the attack speed issue. When I first begun making this mod I was basing it entirely upon [url=https://www.nexusmods.com/oblivion/mods/46133]Reworked Dynamic Weapon Speeds﻿[/url]﻿ by [b]sandone[/b]. This was based on [url=https://www.nexusmods.com/oblivion/mods/11191]Weight Based Dynamic Weapon Speeds﻿[/url]﻿ by [b]Offkorn[/b], which was based on [url=https://www.nexusmods.com/oblivion/mods/10684]ANB Dynamic Weapon Speed[/url]﻿. [/size][/font][font=Arial][size=2]Unfortunately, I found that if you modify weapon speeds dynamically via scripts using OBSE, the game won't pick up the speed and put it into the attack process until the weapon has been re-equipped.\n<br />\n<br />[/size][/font][font=Arial][size=2]For this reason I set out to create an OBSE DLL which injects the desired attack speed directly into the attack process code for each actor directly. It was a difficult process and I'm glad I managed to achieve it!\n<br />[/size][/font][font=Arial]\n<br />[/font][font=Arial]_____\n<br />\n<br />[i][size=3]A very special thank you to the wonderful team behind [url=https://www.nexusmods.com/oblivion/mods/37952]OBSE[/url]. I hope this to be another example of how anything is possible with the Elder Scrolls games thanks to their amazing work.[/size][/i][/font]"
