nexusDescription="Description:\n<br />An OBSE plugin intended to enable simple PC diagonal movements, inspired by the famous NV mod \"Diagonal movement\".\n<br />\n<br />diagonal movements, when in bow aiming rotate 3rd person spine2 to look up and down, skyrim-like vanity camera mode.\n<br />add 3rd camera offset settings, separated settings when weapon sheathed and weapon drawn, and z offset to set sneaking camera z offset. iMaxStep to set max transition steps.\n<br />\n<br />\n<br />Requirements:\n<br />1. obse;\n<br />[s]2. Universal Skeleton Nif. Let skeleton.nif/skeletonbeast.nif of this mod to overwrite the ones from Universal Skeleton Nif.\n<br />[/s]\n<br />\n<br />Compatibility:\n<br />[s]not compatible with mods which change skeleton, can make a patch(add \"PelvisCon\" node to skeleton.nif with NifSkope)\n<br />[/s]no need skeleton patch after beta11, thanks to LogicDragon's Oblivion - Enhanced Camera(https://www.nexusmods.com/oblivion/mods/44337)\n<br />\n<br />\n<br />\n<br />Install:\n<br />extract files to \"Data\" folder.\n<br />\n<br />Use:\n<br />load a save, walk around...\n<br />double click \"z\" to enable exVanity(skyrim-like vanity mode) mode...\n<br />\n<br />\n<br />\n<br />Notice: Current version haven't been tested or tweaked intensely. Use at your own risk.\n<br />\n<br />THE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND,\n<br />EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF\n<br />MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT.\n<br />IN NO EVENT SHALL THE AUTHORS BE LIABLE FOR ANY CLAIM, DAMAGES OR\n<br />OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE,\n<br />ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR\n<br />OTHER DEALINGS IN THE SOFTWARE.\n<br />\n<br />Credits:\n<br />thanks to bethesda\n<br />\n<br />thanks to obse team: \n<br />Ian Patterson (ianpatt), Stephen Abel (behippo), Paul Connelly(scruggsywuggsy the ferret)\n<br />Timeslip, The J, DragoonWraith, SkyRanger-1, shademe, kyoma\n<br />\n<br />thanks to llde(https://github.com/llde/Oblivion-Script-Extender)\n<br />some code used from adm244's obsilver(https://github.com/adm244/obsilver)\n<br />some code used from jazzisparis' JIP NVSE(https://www.nexusmods.com/newvegas/mods/58277/?)\n<br />idea to enable diagonal movements from Xilandro and Carxt(https://www.nexusmods.com/newvegas/mods/64333?)\n<br />thanks to LogicDragon's Oblivion - Enhanced Camera(https://www.nexusmods.com/oblivion/mods/44337)\n<br />inih (https://github.com/benhoyt/inih)\n<br />thanks to Alenet - Timeslip - Scanti - ShadeMe - Ethatron for Oblivion Reloaded(https://github.com/Alenett/TES-Reloaded-Source)\n<br />\n<br />for the universal skeleton nif thanks to:\n<br />Growlf, TheTalkieToaster, ADDk1k, Vipcxj, Coronerra, Drake, Deedee, Dryad, mmmpld, LogicDragon\n<br />and to all other modders changing the original skeleton.nif.\n<br />\n<br />inih (https://github.com/benhoyt/inih)\n<br /> Detours (https://github.com/Microsoft/Detours)"
