nexusDescription="[color=#76a5af][size=5][u][b]Base Object Swapper Integrations\n<br />[/b][/u]\n<br />[/size][size=3]After porting over [url=https://www.nexusmods.com/oblivion/mods/53872]Base Object Swapper to Oblivion[/url] I got to work integrating various popular mods. The files on this page consists of .ini files to swap various vanilla Oblivion items to several different modded variants.\n<br />\n<br />The current options are as follows:\n<br />[b]\n<br />[/b][/size][size=4][b]Oscuro's Oblivion Overhaul[/b][/size]\n<br />[list]\n<br />[*][color=#76a5af][size=3][b]Treasure[/b][/size][/color]\n<br />[*][color=#76a5af][size=3]   Bolts of Cloth to Fine Bolts of Cloth (50% chance)[/size][/color]\n<br />[*][color=#76a5af][size=3]   Folded Cloth to fine Folded Cloth[b]﻿ [/b](50% chance)[/size][/color]\n<br />[*][color=#76a5af][size=3]   Gold Nugget to various OOO nuggets and metal bars (varying chance)[/size][/color]\n<br />[*][color=#76a5af][size=3]   Silver Nugget to various OOO nuggets and metal bars (varying chance)[/size][/color]\n<br />[*][color=#76a5af][size=3]   All vanilla gems and their variants have a chance to be swapped to OOO's gems and their variants (varying chance)[/size][/color]\n<br />[*][color=#76a5af][size=3]   The vanilla silverware set to OOO's goldware set (25% chance)[/size][/color]\n<br />[/list]\n<br />[size=4][b]Cobl[/b][/size]\n<br />[list]\n<br />[*][b][size=3]Food (all 25% chance)[/size][/b]\n<br />[*][size=3]   [b]﻿[/b]Cheese to Cobl cheese[/size]\n<br />[*][size=3]   Bread to Cobl breads[/size]\n<br />[*][size=3]   Shepherd's Pie to Cobl pies and soups[/size]\n<br />[*][size=3]   Sweetrolls and Sweetcakes to Cobl desserts[/size]\n<br />[*][size=3]   All fruits and vegetables to various Cobl fruits/veggies[/size]\n<br />[*][size=3]   ﻿Vegetables to their Cobl cooked counterparts[/size]\n<br />[*][size=3]   All vanilla meats to their Cobl cooked counterparts[/size]\n<br />[*][size=3]   Vanilla meats to various soups and stews[/size]\n<br />[*][size=3]   Flour, Rice, and Wheat to Saltrice[/size]\n<br />[/list][size=4]\n<br />[b]Skyrim Ingredients[/b][/size]\n<br />[list]\n<br />[*][size=3][b]Food (all 25% chance)[/b][/size]\n<br />[*][size=3]   [b]﻿[/b]Cheese to Skyrim cheese[/size]\n<br />[*][size=3]   Shepherd's Pie to various Skyrim soups and stews[/size]\n<br />[*][size=3]   Sweetrolls and Sweetcakes to various Skyrim desserts and pastries[/size]\n<br />[*][size=3]   Fruits and Veggies to various Skyrim fruits/veggies[/size]\n<br />[*][size=3]   Some veggies to their respective cooked counterparts[/size]\n<br />[*][size=3]   ﻿Vanilla meats to their cooked counterparts[/size]\n<br />[*]   [size=3]Vanilla meats to various soups and stews[/size]\n<br />[*]   [size=3]Flour, Rice, and Wheat to Salt Piles[/size]\n<br />[/list]\n<br />[size=4]No More Raw Food[/size]\n<br />[list]\n<br />[*][size=3]Food (all 25% chance)[/size]\n<br />[*][size=3]   [b]﻿[/b]Cheese to various new cheeses\n<br />[/size]\n<br />[*][size=3]   Bread to new breads, soups, stews, and pies[/size]\n<br />[*][size=3]   Sweetrolls and Sweetcakes to new cakes and desserts[/size]\n<br />[*][size=3]   ﻿Veggies to new veggie dishes\n<br />[/size]\n<br />[*]   [size=3]Meats to cooked meats[/size]\n<br />[*]   [size=3]Meats to new soups and stews[/size]\n<br />[*]   [size=3]Rice to steamed rice[/size]\n<br />[/list][size=3]\n<br />[/size][b][size=4]OCRAFT[/size][/b]\n<br />[list]\n<br />[*][b][size=3]Stations (100% chance)[/size][/b]\n<br />[*][b]﻿[/b]   [b]﻿[/b][size=3]Cooking Pots to their OCRAFT counterpart[/size]\n<br />[*][size=3]   Anvils to their OCRAFT counterpart[/size]\n<br />[/list]\n<br />[b][size=4]Currency of Tamriel[/size][/b]\n<br />[list]\n<br />[*][size=3][b]Currency[/b][/size]\n<br />[*][size=3]   [b]﻿[/b]Gold Septims to paper septim bill denominations (chance starts at 30% and decreases by 5% for each higher denomination)[/size]\n<br />[/list]\n<br />[size=4][b]Jade Dishes[/b][/size]\n<br />[list]\n<br />[*][color=#76a5af][size=3][b]Treasure[/b][/size][/color]\n<br />[*]   ﻿The vanilla silverware set to the jade set (25% chance)\n<br />[/list]\n<br />[size=4][b]Colored Lower Class Beds[/b][/size]\n<br />[list]\n<br />[*][size=3][b]Beds[/b][/size]\n<br />[*][size=3]   [b]﻿[/b]Vanilla lower class beds (double and single) to various colored lower class beds (50% chance)[/size]\n<br />[/list]\n<br />[size=4]There are also [b]merged [/b]ini files for:\n<br />[list]\n<br />[*][color=#76a5af][size=4]Cobl and Skyrim Ingredients[/size][/color]\n<br />[*][color=#76a5af][size=4]Cobl, Skyrim Ingredients, and No More Raw Food[/size][/color]\n<br />[*][color=#76a5af][size=4]OOO and Jade Dishes[/size][/color]\n<br />[/list]\n<br />[b]Requirements[/b]\n<br />[/size][url=https://github.com/llde/xOBSE]xOBSE\n<br />[/url][url=https://www.nexusmods.com/oblivion/mods/53872]Base Object Swapper﻿[/url]\n<br />\n<br />[size=4][b]Credits[/b][/size]\n<br />[size=3]powerofthree for the original BOS[/size]\n<br />[size=3]Ilde and the entire xOBSE team for OBSE[/size][url=https://www.nexusmods.com/oblivion/mods/23615/?]\n<br />[/url][size=3]Bethesda for Oblivion[/size][/color]"
