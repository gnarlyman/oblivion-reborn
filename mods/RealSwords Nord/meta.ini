nexusDescription="Name: RealSwords - Nord\r\nVersion: 1.0\r\nDate: March 14, 2009\r\nCategory: Weapons and Armor\r\nAuthor: waalx (waalx@yahoo.com)\r\nforum: http://waalx.com/RealSwordsForum/index.php\r\nusage: patch to 1.2 version of Oblivion is required\r\n\r\n\r\n--- SPECIAL IN THIS MODULE---\r\nThis module continue building the Axes, Bow and Maces module. There\\'s 4 bows of Nord origin, and they give the Nord user a marksman bonus similar to the one the blades gives. There is also a special selection of 3 differents arrows. Two types of Axes give a blunt bonus.\r\n\r\nNord add three new NPC and a new location/building, The Nord Forge Tower of Bruma. Aside from the Tower that is a new building mesh, I made a good amount of new props and stuff to decorate the place.\r\n\r\n===========\r\nDescription\r\n===========\r\n\r\nThe Nord module features an assortment of swords, axes, bows and arrows that can be wielded by any race, but the Nords get a bonus!\r\n\r\nThis module feature a difference to the previous RealSwords release, where I\\'m getting closer to my initial idea. RealSwords Nord introduce a new weapon system based on the weapon quality. For each types of weapons you get 3 variations based on 2 differents models and 2 differents textures.\r\n\r\n- New : those are new, so they are rare. In RS Nord they can only be bought at the store. Even in NPC versions you will not see them other than in the store.\r\n\r\n- Worn : those are the common weapons that have been used. They use a different model based on the New version, they all have dents and appear to have been in use as it should be.\r\n\r\n- Old : those are less common and can be found usually on Undead and on bad guys sometimes.  The use the Worn model and the Old textures. You should find the Old versions on Nords Bandits/Marauders sometimes in RealSwords Nord. \r\n\r\nHowever, RealSwords doesn\\'t deal with monsters/undead, so this is for Waalx Animals and Creatures (WAC), and FCOM. Remember RealSwords is a preview? Remember that. The real RealSwords thing with all the races, the 12th module that is named The Chronicles of Steel has begun, and is now a part of WAC.\r\n\r\n\r\n============\r\nWeapon Bonus\r\n============\r\n\r\nThe weapons give bonus abilities if used by the race of it\\'s origin.\r\n\r\nIt fortify the blade attribute by 5, the agility by 5, and ease the wearer fatigue by 10. It doesn\\'t add more damage, it act more like a \\\"feel natural\\\" bonus. This bonus stay the same for the four esp.\r\n\r\nThe bows bonus fortify the marksman attribute by 5 instead of the blade...but the two other bonus are the same.\r\n\r\nThe axes will give the user a blunt bonus.\r\n\r\n========\r\nLocation\r\n========\r\n\r\nThe weapons are sold in the Forge Tower of Bruma, near the main gate.\r\n\r\nThey are powerful, and they are expensive, yet less than they were in previous RS mods..\r\n\r\n\r\n=======\r\nInstall\r\n=======\r\n\r\n1. Extract this archive to any folder and then copy the contents to your Oblivion/data folder. \r\n\r\n   Or you can extract the archive directly in your oblivion/data.\r\n\r\n2. Open your Oblivion/data folder and find the folder RSNordESP. Now you need to THINK! ONLY ONE ESP IS NEEDED FOR REALSWORDS NORD TO RUN, ONE. In that folder there are 8 different ones. You need to chose ONLY one. So think of what you want, and pick one. Copy the one you want in your Oblivion/Data. \r\n\r\nDESCRIPTIONS of the 8 esp versions:\r\n\r\nNon-NPC versions:\r\n\r\n- RealSwords Nord LO.esp  - This is only the shop with weapons at low damage. No change to vanilla NPC. This version has only the NEW versions of the swords/weapons.\r\n\r\n- RealSwords Nord LO-SI.esp Shivering Isles required - This is only the shop with weapons at low damage. No change to vanilla NPC. This version has only the NEW versions of the swords/weapons. In this SI version the blacksmith will use the blacksmith animation of SI with a new hammer & clamp mesh.\r\n\r\n- RealSwords Nord HI.esp  - This is only the shop with weapons at high damage. No change to vanilla NPC. This version has only the NEW versions of the swords/weapons.\r\n\r\n- RealSwords Nord HI-SI.esp Shivering Isles required - This is only the shop with weapons at high damage. No change to vanilla NPC. This version has only the NEW versions of the swords/weapons. In this SI version the blacksmith will use the blacksmith animation of SI with a new hammer & clamp mesh.\r\n\r\n\r\nNPC versions:\r\n\r\n- RealSwords Nord LO-NPC.esp  - Distribute the low damage weapons to Nords NPC via lvl lists AND for sale in the shop. \r\n\r\n- RealSwords Nord LO-NPC SI.esp  Shivering Isles required - Distribute the low damage weapons to Nords NPC via lvl lists AND for sale in the shop. In this SI version the blacksmith will use the blacksmith animation of SI with a new hammer & clamp mesh.\r\n\r\n- RealSwords Nord HI-NPC.esp  - Distribute the high damage weapons to Nords NPC via lvl lists AND for sale in the shop. \r\n\r\n- RealSwords Nord HI-NPC SI.esp  Shivering Isles required - Distribute the high damage weapons to Nords NPC via lvl lists AND for sale in the shop. In this SI version the blacksmith will use the blacksmith animation of SI with a new hammer & clamp mesh.\r\n\r\n3. Start Oblivion Launcher, click Data Files, and enable the one .esp file you choosed to use.\r\n\r\n4. Optional: You can move/delete the folder RSNordESP (once you have made your choice).\r\n\r\nTROUBLESHOOTING: \r\n\r\n1. Be sure you are running Oblivion pacthed to the 1.2 version. \r\n\r\n2. please verify your installation before asking for help, as this is the cause 99%  of problems you could have with the mods. check your installation. and recheck your installation. \r\n\r\n3. Be sure you are running only ONE esp at a time. Read the Install section about this?\r\n\r\n\r\nPermission\r\n==========\r\n©2009 RealSwords and related material are copyrighted work of Alex Brisson aka waalx. All models and textures are freely distributed to be used in the game Elder Scroll IV: Oblivion only. NO OTHER USES  OF THE MODELS AND TEXTURES ARE PERMITTED. \r\n\r\nWhile I deliver these swords to the public domain via this mod, most of them have been designed and created by smiths in the real world. Those artist have their own copyright, and I didn\\'t recreate their design to have them stolen for commercial purpose, let alone the commercial use of my models. So, as long as you use these models for your own enjoyment and don\\'t try to make any commercial attempt with them, it\\'s good.\r\n\r\nThat mean you CAN use them in your own mods if you want. You can retexture them pink with blue spots and make them glow green if you want (please! if you do something like this don\\'t show me ok?). \r\n\r\nBut if you do something cool with them, in your mod, or a retexture that kick ass..show me, I\\'m interested to see.\r\n\r\nI would also appreciate a lot if you could give me credit if you are using them in your own things.\r\n\r\nThanks, love,  and see you in the next pack...\r\n\r\nwaalx\r\n\r\nvisit my forum at http://waalx.com/RealSwordsForum/index.php for more information about the progress on the upcoming other modules.And please register to show you support my work!\r\n\r\n\r\n\r\nSpecial thanks\r\n==============\r\n\r\nTo you all who support my work on the Workshop...Cheers! :)\r\n\r\nAnd thanks to the team at Bethesda for their great game!\r\n\r\n\r\nReferences\r\n==========\r\nAtmorian Crown: based on archeological photograph. \r\nGramr: No reference (creation). Gramr mean \\'fierce\\'.\r\nWarp: Made from a fuzzy internet reference with no link to origin.\r\nBeserker: Peter Johnsson, from historical research. Albion Armorer. I made it a patern-welded blade.\r\nNorland: Made from a fuzzy internet reference with no link to origin.\r\nGotland: Peter Johnsson, from historical research. Albion Armorer. I made it a patern-welded blade and deco.\r\nCawood: I modeled that one from an archeological photograph, and also looked at the work of Andy Davis and David Delagardelle of Mad-Dwarf Workshop.\r\nNaegling: Based on a painting for Thorgal #7, L\\'enfant des Étoiles by Grzegorz Rosinski. (Thorgal is my favorite comic book!) Naegling mean \\'Hole-maker\\'.\r\nBroadedge & Broadpoignard: No reference (creation).\r\nPoignard: No reference (creation).\r\n\r\n-----------------------------------------------------------------------\r\n\r\n-Looking to hire a 3D artist for your studio?  \r\n-Like my work? \r\n-Want to see more?   \r\n\r\ncontact me at:\r\nwaalx@yahoo.com\r\n\r\n©2009 RealSwords and related material are copyrighted work of Alex Brisson aka waalx. All models and textures are freely distributed to be used in the game Elder Scroll IV: Oblivion only. NO OTHER USES  OF THE MODELS AND TEXTURES ARE PERMITTED. "
