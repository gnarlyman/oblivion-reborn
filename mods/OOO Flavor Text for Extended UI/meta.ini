nexusDescription="OOO Flavor Text by Crackomint, for Extended UI by qwertyasdfgh\n<br />v1.1 - April 8 2022\n<br />=============\n<br />\n<br />This project uses the awesome [url=https://www.nexusmods.com/oblivion/mods/50135]Extended UI[/url] mod to add flavor text to hundreds of items from [url=https://www.nexusmods.com/oblivion/mods/46199]Oscuro's Oblivion Overhaul[/url] (WalkerInShadows version 1.5+).\n<br />\n<br />Not every item is covered, but the majority of armor and weapons are, with a scattering of other items. Please note that this is just for base OOO, and does not cover anything from OOO Extended, OOO Shivering Isles, etc.\n<br />\n<br />Un/Installation\n<br />=============\n<br />\n<br />To use, install the included xml file to Oblivion's Data&gt;Menus&gt;Strings folder, alongside the Oblivion_strings.xml from Extended UI. To uninstall, simply delete OOO_Strings.xml\n<br />\n<br />Credits\n<br />=============\n<br />\n<br />Thank you to qwertyasdfgh for Extended UI\n<br />Thank you to Sotobrastos, Team Alpha, WalkerInShadows, etc for OOO. I am not affiliated with any OOO developers or maintainers.\n<br />\n<br />Changelog\n<br />=============\n<br />1.0 - Initial Release\n<br />1.1 - Fixed an entry, and added more coverage for unique (boss) items"
