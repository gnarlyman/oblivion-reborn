nexusDescription="[center][size=5]MessageLogger[/size][/center]\r<br />\r<br />A plugin for OBSE which logs error and warning messages from the game engine to a text file.\r<br />This may help users and MOD authors to find errors and problematic settings including missing master files,\r<br />missing meshes, missing animations, invalid assignments in the CS, script errors, and many more.\r<br />\r<br />Both the game and the construction set use a so called &#39;MessageHandler&#39; class to give feedback about errors,\r<br />warnings, and other things. While the CS usually shows normal Windows message boxes, the game logs all messages\r<br />to log files... Or it would, if the MessageHandler in Oblivion.exe hadn&#39;t been almost completely disabled in the\r<br />release version of the game.\r<br />This plugins attempts to bring back the logging functionality.\r<br />There are basically 5 logging &#39;channels&#39; for errors, warnings, debug messages, program flow messages.\r<br />(The name of the 5th channel is not known.)\r<br />An INI file allows you to filter specific channels and to add less helpful messages to an ignore list.\r<br />Additional (optional) hooks can help making specific messages more helpful by adding editor IDs from the CS, etc.\r<br />\r<br />When installed, the plugin will output a text file called &#39;MessageLog.txt&#39; in the Oblivion game folder.\r<br />You can examine the contents of the file after finishing the game or after a crash and check its contents for problems."
