nexusDescription="I just read online that setting CPU affinity of Oblivion to 2 cores could improve stability. I don't want to alt+tab to desktop then perform the action nor use a third party tool for this, that's why I made this small plugin, just put it inside your OBSE plugin directory and forget about it.\n<br />\n<br />Q&amp;A:\n<br />Q: Does it really improve stability?\n<br />A: Like I said, I just read it online. It shouldn't make the game more unstable or perform worse, since Oblivion won't utilize more than 2 cores for CPU intensive works, at least from my test.\n<br />\n<br />Source code is on [url=https://github.com/maboroshinokiseki/cpu_affinity]GitHub[/url]."
