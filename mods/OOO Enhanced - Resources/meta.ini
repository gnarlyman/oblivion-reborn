nexusDescription="[center][b][size=5][size=4][i] [b][size=6][b][b]IMPORTANT[/b][/b][/size][size=5][b][size=5][b]: The main readme for now is THIS page. The readme included in the download file is from 3.0 still.\n<br />\n<br />[/b][/size][/b][/size][/b]30/12/2025 OOOExtended has been FULLY included. Players who were still using it can now remove it altogether. I'm open to making patches that disable this or that creature.[/i][/size]\n<br />\n<br />[i]CHECK THE INSTALLATION INSTRUCTIONS BELOW (and don't forget the compatibility section). THEY WORK ALSO FOR 6.0[/i][/size][/b][/center]\n<br />\n<br />[center][size=5][size=5][b]INTRODUCTION[/b][/size][/size][/center]\n<br />[size=5][size=4]This mod tries to expand and improve on Oscuro's vision of Oblivion. After many years of working on it, at this point we can already say this is an \"Overhaul\" of OOO.\n<br />I did not want to call it that way because it sounds terrible, but it is not wrong to see it as something like: \"Saldron's Oscuro's Oblivion Overhaul Overhaul\".\n<br />It is inevitable that this will be personal (I am not Oscuro), but I believe I have worked in the same spirit.[/size][/size]\n<br />[size=5][size=5][size=4]As of 6.2, virtually all of OOOExtended has been incorporated into OOO Enhanced (often in a new, but I think improved fashion). [/size][/size][/size]\n<br />\n<br />[center][b][size=5][b][size=5][b]WHAT YOU CAN EXPECT[/b][/size][/b][/size][/b][/center]\n<br />[size=5][size=4]- [b]OOO Adaptations for each DLC [/b](Note: for Shivering Isles, use mainly Shivering OOO, the included plug-in here just increases the difficulty a bit and not much else).[b]\n<br />- Greater difficulty[/b], especially at higher levels. [/size][/size]\n<br />[size=2][i][b]Note[/b]: There's the option to play on [b]easy difficulty[/b], which I would rank as slightly easier than normal OOO on lower levels, but still harder than normal OOO in some high level areas. For those looking for an even greater challenge,  there is the hardcore \"[b]original difficulty[/b]\" plug in. Lower level areas will remain mostly the same as in normal mode, but mid and high level areas will be more difficult and will remain out of reach for longer. This is the difficulty that OOO Enhanced had originally. It is recommended for players running companion mods or combat mods that make the game easier. Not recommended without some damage multiplier, like Maskar's. A combat mod like Combat Reshoveled would also work. The default settings of a mod like Av Latta Magica also make the game easier (for mages).[/i][/size][size=5][size=4]\n<br />- [b]Great rebalance of many aspects of the game[/b]. Enemies, enchantments, dungeons, quest difficulty, (to a lesser extent) items. [/size][/size]\n<br />[size=2][b]Note[/b]: Spells have been altered only in some cases, but more so for players of the Original Difficulty plug in, which makes some of them more costly. In any case, a magic overhaul like Balanced Magica by Kobal (the most conservative one, but also very balanced), Av Latta Magica or LAME is recommended. A combat mod that increases damage is also recommended unless playing on easy. I used to use Vanilla Combat Enhhanced, but it seems somewhat broken now. More modern options are Maskar's Oblivion Overhaul (can increase global damage) and Combat Reshoveled.[/size]\n<br />[size=5][size=5][size=4]- Tons of[b] new creatures. [/b]Since 6.2, [i]all [/i]of OOO Extended's creatures have been included. Besides these, many other creatures have been included, making OOO Enhanced considerably richer in terms of creatures than OOOExtended itself was.  [/size][/size][/size]\n<br />[size=2][i][b]Note[/b][/i]: There are specific plug-ins to disable specific creatures, and I am open to make more per request.[/size][size=5][size=4]\n<br />- Most [b]creature bosses look now unique[/b].\n<br />- [b]Tons of new items.[/b]  Hundreds of new weapons, armor and clothing mods have been incorporated and integrated along the years. OOO Enhanced's vision is not about randomly adding new content, but about making every inclusion feel organically part of the game. Because of this, new equipment is often related to some particular enemy or faction.  Again, [b]all of OOO Extended's new items[/b] have been included with very few exceptions, and I believe they have been better integrated. Basically only things like wigs, which were very unpopular, have been excluded. A few missing items from OOOExtended may still appear in the future.[/size][/size]\n<br />[size=5][size=4]- [b]Pretty much all factions have been overhauled[/b]. This includes those from OOO and, to a lesser extent - it depends on which -, vanilla. New equipment and unique leveled lists for most factions will give each of them a unique look. In the case of vampires, especially when it comes to the higher ranks, each vampire class will feel unique. In terms of difficulty, OOO's new factions are going to be much tougher. The stories of a few factions have also been greatly expanded on via pieces of writing, of which I have added more than a few. Two entirely new factions, a Khajit one and an Orc one, have been included (although, so far, they appear only in one dungeon each).[/size][/size]\n<br />[size=5][size=5][size=4]- Many [b]new NPC bosses, as well as creature bosses,  [/b]have been added, almost always with unique equipment and some kind of story.[/size][/size][/size]\n<br />[size=5][size=4][b]- More varied enemy weaknesses[/b] - while most of them remain as in OOO, there are some important changes when it comes to weaknesses of factions and creatures. Some creatures have now different weaknesses than in vanilla-OOO, so pay attention. [/size][/size]\n<br />[size=5][size=5][size=4]- [b]Questlines have been overhauled:[/b] the difficulty keeps increasing and reaches great heights by the end.[/size][/size][/size][size=5][size=5][size=4] This includes Guild  Quests, the Main Quest, Knights of the Nine...\n<br />- [b]OOO's quests have been overhauled[/b]. Except for the Light of Dawn, all the others have had significant improvements and changes.[/size][/size][/size]\n<br />[size=5][size=5][size=4]- [b]Dungeon Overhaul[/b][/size][/size][/size][size=5][size=5][size=4]. [/size][/size][/size][size=5][size=5][size=4]The [/size][/size][/size][size=5][size=5][size=4]most important change is that dungeons are now more unlevelled[/size][/size][/size][b][size=5][b][size=5][b][size=4]. [/size][/b][/size][/b][/size][/b][size=5][size=5][size=4]Many more dungeons will remain \"easy\", which means that they'll never spawn high-level enemies.[/size][/size][/size][size=5][size=5][size=4] On the other hand, it will happen more often (especially far away, or in deep areas of dungeons) that really strong enemies will appear right from the start.[/size][/size][/size][size=5][size=5][size=4] Additionally, [size=5][size=5][size=4]many items have been hand-placed in dungeons. Some dungeons have different enemies than before. The goal was to have plenty of variety in terms of difficulty, but beware: if you're not playing on easy mode, even the easiest ones will be somewhat of a challenge at level 1. [/size][/size][/size]\n<br />- [b]New decorations[/b] - Faction related dungeons have brand-new unique decorations to reflect the factions that live in them. This concerns mostly the Astral Walkers and the Underworld's Hand. To a lesser extent, also the Eclipser Raiders.[/size][/size][/size][b][size=5][b][size=5][b][size=4] [/size][/b][/size][/b][/size][/b][size=5][size=5][size=4]Since 6.3, this includes a lot of new tapestries and rugs that will give these factions much more personality. Some other dungeons have been altered as well. It should be compatible with Snus Dungeons and Better Dungeons (use the patches found in the download section). \n<br />- [b]+30 new extra dungeons [/b]([i]not [/i]counting the original OOO dungeons) of varying size, some of them very small, a few of them huge. Most of them have been taken from the modder David Brasher, who allowed free use of his mods. I have tweaked them heavily and played around with them to adapt them to OOO Enhanced. Since 6.4, his 16 Skyrim Nord Tombs have been added (most of them are small). All the new dungeons have been added for a reason, will be related to some quest, some boss, or will have something interesting or unique.[/size][/size][/size]\n<br />[b][size=5][b][size=5][b][size=4]- [/size][/b][/size][/b][/size][/b][size=5][size=5][size=4]An [/size][/size][/size][b][size=5][b][size=5][b][size=4]additional oblivion realm[/size][/b][/size][/b][/size][/b][size=5][size=5][size=4] (credit to [url=https://www.nexusmods.com/oblivion/users/2647660]rockbiter68[/url])[/size][/size][/size][b][size=5][b][size=5][b][size=4]\n<br />- Friendly NPCs have more unique, appropriate equipment and stats - [/size][/b][/size][/b][/size][/b][size=5][size=5][size=4]This was something I felt lacking not only in Vanilla, but in OOO as well right from the start. It was actually this what got me started on this project: giving friendly NPCs higher-level equipment which truly reflects their strength, accomplishments, or rank in some guild.[/size][/size][/size]\n<br />[size=5][size=4]- [b]Vendors offer more interesting items[/b], including OOO's Slaver and Smuggler special vendors. Many powerful special enchanted robes that were not used in the original OOO, but were intended to be sold by vendors, will now be available.\n<br />[b]- More creative and interesting names.[/b] This may seem like something not very important, but I have spent a lot of time deciding better names for NPCs, factions, items, and more.\n<br />- [b]Each race gets an small bonus with a particular set of weapons[/b]. This tebds ti be related to Waalx's Real Swords, all of which have been included, but not only. Altmer, for instance, will have the bonus with Elven weapons, as there is no Real Swords module for them. I think this goes along with OOO's \"spirit\". It will make gameplay more strategic, it will make races more unique and it will be useful given the increased difficulty. As of v. 6.5, the bonuses have been made considerably more useful than before. [/size][/size]\n<br />[size=2][b]Details[/b]: On normal difficulty, it'll be a neat +16% increase in damage when using a race weapon, plus 2 points of fatigue regeneration. On original difficulty (hard) and easy difficulty, it will be +14% and +18% respectively.  When using arrows of the player's race, the increase in damage will be +14%. On original difficulty (hard) and easy difficulty, it will be +12% and +16% respectively. [/size][size=5][size=4]\n<br />- [b]Staffs require intelligence[/b]. Sorry, this is something that always bothered me and I had to do it. To compensate, you may use Maskar's Enchantment Rebalance, which I recommend.  Now, staffs will really feel like equipment for mages. Some new, extremely powerful staffs will be available. Some of them require well over 100 intelligence and will, therefore, require boosting the intelligence with potions or enchanted items in order to be equipped.\n<br />[/size][/size][size=2][b][i]Note[/i][/b]: This also includes the magic blunt staffs and blades from Mage Equipment (which are spread through the game, usually related to some faction). Their requirements are not as high as the casting staffs.[/size][size=5][size=4] [/size][/size][size=2]Since v. 5.0, defensive staffs have been included as well. Their requirements are likewise not as high as the casting staffs'. To compensate, all defense staffs will now give some ability thought to benefit battlemages.[/size][size=5][size=4]\n<br />- [b]Set Bonuses[/b]: +20 armor sets will get a set bonus when they are completed, making it more rewarding to complete them. This includes: The Silver Dragon Set, The Pegasus Set (partly new), the Heaven's Fury set, the old and the new Dread Armours, the Black Hand Robes, and others. \n<br />- [b]Two new player homes[/b]. Since 6.0, the Aranmathi Ayleid palace home mod has been included and integrated into a new quest. It has been tweaked and duly redecorated and adapted as well. Since 6.4, the much more modest  \"Sunken Fortress\" by Lemurian has been added. Unlike vanilla homes, these homes will require very difficult fighting to become available, especially the first one (getting it should be one of the hardest challenges in the game).[/size][/size]\n<br />\n<br />\n<br />[center][b][size=5]GENERAL CHANGELOG[/size][/b][/center]\n<br />[b][size=5]6.0[/size][size=4] - MAIN CHANGES AND ADDITIONS [/size][size=5][size=5][size=4]\n<br />\n<br />[b]Bugfixes[/b][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4]- Some important bugs have been corrected, most notably a crash that happened when looting certain NPCs and which made completing the FG's questline impossible.\n<br />- The skeletons wearing black robes will not stretch anymore when they die (fix by xenogerarlucas).\n<br />- A few helmets have been corrected so that they work with Argonians.\n<br />- Race weapon bonuses are added in a way (thanks to OBSE) that will STILL get you the bonus even if you enchant those weapons.\n<br />- Most armor sets that give bonuses have been enchanted: this is because if the player chose to enchant one of the items belonging to a set they would not be granting the bonus anymore.\n<br />- Fixed the bug in which a vampire spawn spawned 17 vampires instead of 1.[/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Items[/b][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4]- Pretty much all of OOOExtended's equipment has been included. Not so the creatures and some other small things (for that, you'll still need to use my modified version + my integration patch, included in the main download).[/size][/size][/size]\n<br />[size=5][size=5][size=4]- A lot of other new items (and some creatures or creature variants) have been included. [/size][/size][/size]\n<br />[size=5][size=5][size=4]- Following OOO Enhanced's vision, the majority of these items have been well integrated into the game: they don't just show up randomly. [/size][/size][/size]\n<br />[size=5][size=5][size=4]- The stats of armor and weapons have been a bit reworked, in line with what I was already doing in previous versions. Some new full weapon and armor sets have been included. Elven and glass will now be much rarer, but also stronger. Going by looks, I've decided to make silver weapons [/size][/size][/size][size=5][size=5][size=4]and fine steel weapons quite stronger. Orcish weapons, instead, will be weaker than those. I'll try to write things in more detail in the future, but there've been A LOT of changes to stats, both to weapons andarmor, and I think the balance will be more interesting than ever. With all the weapons and armors I've included, I've made sure that each of  them has unique stats: no two weapons with the same stats / features.\n<br />- A big part in the new balance is the re-working of the race weapons from Waalx's Real Swords. ALL his modules have now been included. These weapons have also been heavily rebalanced and fitted into the game. Generally, race weapons are low to mid quality. \n<br />- A lot of new armor set bonuses have been included.\n<br />- ALL the scythes from the original OOO have been remade (they looked awful, so they could not be used). The new ones have been made by Xenogearlucas. Some other look improvements for polearms by the same author. Polearms are better integrated into the game and appear more often.[/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Enchantments and bonuses\n<br />[/b][/size][/size][/size][/b][size=5][size=5][size=4]- [b]Race weapons.[/b] As in v. 6.5,  the player will get, on normal difficulty, a 16% damage bonus when wielding a race weapon, and a 14% damage bonus with arrows, plus +2 fatigue regeneration (it's 14% and 18% for weapons, 12% and 16% for arrows, on hard and easy difficulties respectively). These weapons should now be quite useful, especially for lower level characters.  Race weapons have also been much better distribuited into loot and NPCs.\n<br />[size=5][size=5][size=4]- Some unique weapons or armor set bonuses, or armor or clothing pieces, will grant extra damage to specific enemies, or overall extra damage. This is not so common, but many \"high level\" items to have something like this.[/size][/size][/size]\n<br />- Damage bonuses can be combined. The player can be wearing a necklace giving x% of extra damage + a weapon of his race that gives a 12% damage bonus at once. \n<br />- Many new set bonuses have been added.\n<br />- A lot of new enchantmets have been added, including, but not only, enchantments from OOOExtended. Following OOExtended, the Daedric Weapon enchantments will now be stronger than before too. The game is very hard at the beginning, but with all these things I'm pretty sure even the \"hard difficulty\" (the original one and my preferred one) is doable. \n<br />- A LOT of enchantments have been rebalanced. Everything is more balanced, unique and interesting than ever. [/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Quests[/b][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4]- The home mod [url=https://www.nexusmods.com/oblivion/mods/41449]Aranmathi[/url] has been fully included (credits to [url=https://www.nexusmods.com/oblivion/users/99359]anakondrak[/url] and [url=https://www.nexusmods.com/oblivion/users/1818630]evenstargw[/url]) and integrated into a fully new, OOO styled (and extremely difficult)\n<br />quest. Besides the home, there are a lot of rewards to be found.\n<br />- Many quests from OOO have been reworked or improved, most notably, Argonians and Smugglers + Shadows in a Struggle for Power. \n<br />- Followers have been added: they are related to the Argonians and Smuggler quest (you can get them by helping either of the two factions) and to the Sylvan Rangers' quest (you can get Bosmer Protector followers).[/size][/size][/size]\n<br />[size=5][size=5][size=4]- There will now be dialogue be the Smuggler and the Slaver leaders: they'll reward you as you progress in their quests. The quest is now going to be (hopefully) more clear and rewarding: in OOO, by the time you could get them to sell you things you probably wouldn't be interested in them anymore. Now, these factions are going to sell you items much more quickly, but not everything at the start. As you progress, they'll start selling you better items. In total, there are 3 \"levels\" of items they can sell you depending on your reputation with these factions. Both these factions will be selling a lot of race weapons, but also [/size][/size][/size][size=5][size=5][size=4]enchanted items up to ebony. \n<br />- A new quest, parallel to [size=5][size=5][size=4]Shadows in a Struggle for Power,[/size][/size][/size]  has been added involving the \"good Rangers\" and Bosmer protectors. It mostly works as a way to guide the player a bit in \"Shadows\" (OOO's quest) as well as to give rewards after dealing with the \"bad\" Sylvan Rangers. There will be quite a lot of dialogue with the new leader of the Bosmer protectors: Faradan, found in one of their camps. Everything is non-linear, so you can complete OOO's quest without having met the Bosmer Protectors (and get your reward anyhow). \n<br />- The possibility to become Molag Bal's servant as you progress in OOO's \"Shadows in a Struggle for Power\". This will be a hard choice, because you will not be able to get OOO's reward from Jephre (i.e.: animal summons + animals becoming friendly). On  the other hand, you'll get other rewards. It's a bit like \"selling your soul to the devil\", though.\n<br />- As you can see, many quests are connected to OOO's Shadows in a Struggle for Power (which we may consider OOO's \"main quest\").  Players of OOO Enhanced +4.0 will remember a quest called \"The Dread and the Void\", involving the \"Dread Lord's weapons\", which was also connected to \"Shadows\". That quest has been improved as well and has new parts and rewards. All these quests, and now even \"A path of Iron\" and some other NPCs, are now interconnected, making the game-world more immersive and realistic.\n<br />- A lot of writing has been done, with improvements over previous versions (some things still need to be revised).\n<br />- Vanilla quest's specially the MQ and the guild quests, will reward the player with interesting new items as they progress.[/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Factions and NPCs[/b][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4]- Most enemy factions have been overhauled yet again -- especially those which had been less so. Sylvan Rangers and Amazons are probably the ones getting the most changes in this update. If you've played previous versions, you'll notice the changes easily if you visit their lairs. Each of them has a lot of new specific items and sets. New animations from OOOExtended have been included for amazons to wear spears and scythes. Standard bandits and marauders, previously not very modified, will also now have unique items that appear only in them. Eclipser raiders are also getting a lot of new, unique stuff. Same goes for Argonian Smugglers and Dunmer Slavers. The Mage's Guild robes have been overhauled as well. \n<br />- The arena fighters have also been overhauled. The rewards will also be MUCH higher.\n<br />- Many factions now will get specific chests (non-respawn) which have their signature items.\n<br />- More than 20 new bosses have been added. Most notably, there was a lack of vampire bosses, so there'll now be a few more (making \"Light of  Dawn\" more useful). Following OOO Enhanced's vision, existing bosses have been improved as well: each of them has something unique. Prepare for the challenge. \n<br />- \"Acrobatic\" Dual-wielding, \"heavy\" and \"agile animations\" (these work for spears or scythes) from OOOExtended have been added, typically only to named bosses. I did not notice any problems. This will make enemies more interesting and varied. [/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Creatures\n<br />[/b][/size][/size][/size][/b][size=5][size=5][size=4]- Banshees (undead from OOOExtended) have been added, but they appear only in two or three locations so far.\n<br />- Undead Knights (and Undead Monks) have been added.\n<br />- Some other new creatures have been added. \n<br />- All quest-related and unique-named ogres and trolls will now have a unique appearance.\n<br />- Many creature bosses will now be getting a unique appearance as well. \n<br />- Some new creature bosses have been added, including two powerful, uniquely looking Xivilai bosses. [/size][/size][/size][b][size=5][size=5][size=4]\n<br />\n<br />[b]Weaknesses[/b][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4]- Daedra are again weak against shock, as in the lore, but many of them will still be weak against frost as well (those looking less \"fiery\" won't be). \n<br />- Skeletons are no longer weak against shock.\n<br />- Gargoyles are again weak against frost, as in OOO.\n<br />- I think I have found a way to make all the \"elements\" useful: there are enough enemies weak to frost, shock or fire to make all of those useful.[/size][/size][/size][b][size=5][size=5][size=4]\n<br />[size=5][size=5][size=4]\n<br />[b]Dungeons[/b][/size][/size][/size][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4][size=5][size=5][size=4]-  A lot of new items have been manually placed in dungeons or in chests in dungeons. Sometimes they're unique too.\n<br />- Dungeon types will now have more specific loot: oblivion gates, forts/caves and ayleid ruins will each of them have quite different leveled lists.\n<br />- Quite a few new dungeons have been included. They're mostly by David Brasher, who gave open permissions. They have usually been integrated into a quest. Therefore, DO NOT use, [url=https://www.nexusmods.com/oblivion/mods/41391]Strotis new dungeon meshes playable tomb[/url],  [url=https://www.nexusmods.com/oblivion/mods/36152]Dungeons of Blackwood[/url] or [url=https://www.nexusmods.com/oblivion/mods/41359]Fort Dreftin[/url]. There are no problems with Unique Landscapes or Better Cities that I could find. The landscape edits are very small.\n<br />- A new (small) worldspace has been included. It will be part of one of the existing OOO quests which I have modified, and will come as a surprise to players of the original OOO. It will basically be the space of a boss fight, but it can later become some kind of \"exterior player home\" as well. [/size][/size][/size][/size][/size][/size][b][size=5][size=5][size=4][size=5][size=5][size=4]\n<br />\n<br />[size=5][size=5][size=4][b]Other\n<br />[/b][/size][/size][/size][/size][/size][/size][/size][/size][/size][/b][size=5][size=5][size=4][size=5][size=5][size=4][size=5][size=5][size=4]- Horses don't have such crazy prices anymore. They're still going to be much more expensive than vanilla, but they've been almost halved  compared to older versions of OOO Enhanced.\n<br />- Countless little improvements.[/size][/size][/size][/size][/size][/size][/size][/size][/size][b][size=5][size=5][size=4][size=5][size=5][size=4]\n<br />\n<br />[b][size=5]DLC[/size]\n<br />KOTN: [/b][/size][/size][/size][/size][/size][/size]\n<br />[/b][size=5][size=5][size=4][size=5][size=5][size=4]- A completely new area (some kind of uniquely looking crypt) has been added in Underpall Cave, very fitting in my opinion, which will host KOTN's wraith boss. As you may know, the problem with OOO is that this wraith boss was placed alongside OOO's boss: Fayth Noor. I had worked around some kind of solution, which was adding a door and locking it so that the player could defeat this wraith without having to face Noor, but it was far from optimal and felt strange. Therefore, I have included\n<br />this new, separate area in the very same dungeon so that players don't even have to enter Noor's area.\n<br />- A new unique enchanted ring has been added during the questline. \n<br />- Fort Bulwark will be easier: there won't be so many Astral Lords anymore.\n<br />- The crusader weapons will now have unlimited enchantment, like OOO's \"Paladin of the divines\" weapons.\n<br />- Crusader weapons will now deal fire damage again, like in vanilla, and\n<br />not shock damage as in previous versions of OOO Enhanced.\n<br />- The idea is that KOTN is hard, but not TOO hard. Mid level characters should be able, with some effort, to complete it. The rewards will be good in this case.[/size][/size][/size][/size][/size][/size][b][size=5][size=5][size=4][size=5][size=5][size=4]\n<br />[b]- Battlehorn Castle: [/b][/size][/size][/size][/size][/size][/size][/b][size=5][size=5][size=4][size=5][size=5][size=4]The female lich (courtesy of xenogearlucas) and the skeleton in the castle will now look unique. The\n<br />reward sword will now not be as overpowered anymore.[/size][/size][/size][/size][/size][/size][b][size=5][size=5][size=4][size=5][size=5][size=4]\n<br />- [b]Vile Lai[/b][/size][/size][/size][/size][/size][/size][/b][size=5][size=5][size=4][size=5][size=5][size=4]r: Instead of getting the key directly with the quest update, the player will have to find it hidden in the lair of a new vampire boss, which stole it from its owners. The Crimson Scars seek vengeance against this particular vampire. (Will improve the letter and the story a bit in future versions).[/size][/size][/size][/size][/size][/size][b]\n<br />\n<br />[size=5]5.0 [/size]\n<br />\n<br />[/b][size=3]This update, smaller than the other recent ones had, besides many small improvements and a few new additions of items and creatures, these main features:\n<br />- Two new quests \n<br />- Improvements on OOO's quests.\n<br />- Improvements on OOO Enhanced's \"The White Horror\" unmarked quest.\n<br />- [/size][size=3]New dungeon decorations for some specific factions.[/size]\n<br />[size=3]- An undead overhaul, basically importing - an improving upon - OOOExtended's skeleton system, with +20 new types of skeletons.[/size][b][size=3]\n<br />\n<br />The new addition of 5.0 is, therefore: quests and improvements on quests.[/size]\n<br />[/b][size=3]Even though OOO Enhanced did have an unmarked quest before, it hadn't really dealt with quests until this point.[/size]\n<br />\n<br />[left][b][size=5] 4.0 [/size][/b][/left]\n<br />\n<br />- Between 4.0 Alpha + now this Beta version, tons of new equipment and a few new creatures, including [b][i]all that I considered essential from OOOExtended[/i][/b] (when I could get permisison) but also much more. Nonetheless, OOOExtended is still recommended as there is much which has not been added (I don't want to make this mod huge either, I would like not to add much more resources).\n<br />- Four modules from waalx's Real Swords have been included to make four of OOO's new factions more unique. They have also been rebalanced extensively to find Oblivion's world better and to fit the strength of each faction (in which \"reals swords\", like steel or iron, are rarelly the best weapons) - usually quite nerfed.\n<br />- \"Mage Equipment\" by [url=https://www.nexusmods.com/oblivion/users/211916]Aknevrec[/url] has been included and, like the real swords, very intricately integrated into the game.\n<br />- With this Beta release, pretty much every faction from OOO and venilla has been overhauled. This is very connected to the new equipment that has been added (which is much more than just real swords and Mage Equipment, even though those are the biggest inclusions). Stories and uniqueness of each faction has been improved. The names of some factions have been changed to make them more interesting and less \"standard\". Many factions get a new rank, which always has something unique and interesting. Even more bosses (there were already a few in v. 3) have been included, and old ones - including from OOO and sometimes from vanilla - have been made more unique and interesting as well. It is not complete, but I plan that most if not all of them will get one or two pieces of text that will tell their story a bit.\n<br />- In 4.0, the following NEW CREATURES have been added: Wraith Lords, Arch-Xivilais and Dremora Lords (quite similarly to OOOExtended) as well as a few armored skeletons and even a few skeletons with robes). A new kind of rare, even stronger spectral warrior has been added (\"spectral invincible\").\n<br />- Every single rank of dremora mage (including the new \"Dremora Arch Sorcerer) has now a UNIQUE robe. And often they also wear an enchanted hood which, in this case, the player may take. Such robes may appear in some instances, but very rarely, elsewhere too.\n<br />- The Dread Armor now looks like the \"Dread Lord Armor\" by Jojjo. I always found the look of the Dread Armour underwhelming. Its story has been expanded (it needs some more work still) by including some new characters and the fact that the weapons related to this armour (i.e.: Dread Lord Weapons by Jojjo) will also be part of the set and the story, even though they are not needed to complete OOO's quest \"Shadows in a Struggle for Power.\"\n<br />- The \"old Dread Armor\" has now a different name and will now be a different armor worn by a new NPC - still really powerful and dark.\n<br />- The gorgeous \"pegasus armor set\", which OOO only included partially because it's original creator never finished it, has been FULLY included in the completed version done by [b][url=https://forums.nexusmods.com/profile/497340-eventineshangea/]EventineShangea[/url],[/b] who has kindly given me permission[b].[/b] Guess who will be wearing it...\n<br />- Vampires have gotten the most comprehensive overhaul. If you want to see OOO Enhanced at its best, check out any ancient vampire dungeon (but beware).\n<br />- A very comprehensive rebalance of the weapon stats, which takes into account the NEW [b]inclusion of mithril and orcish weapons[/b]. Elven is now stronger, but also much rarer. Dwemer is also rarer.\n<br />. [b]Mithril and Orcish weapon sets[/b], completely integrated + enchanted versions of them with unique names. This already will change the gameplay quite a lot (this was also an aspect of OOOExtended I couldn't but integrate).  I have balanced it, though, differently than OOOExtended does and is usually done: Orcish weapons will be lower than Dwemer and more common (they do look worse!) ; Mithril will be much stronger, close to elven and much more common than elven weapons. Elven has been made more rare, but also stronger. Glass has mostly been left the same, with a few changes. High level war-axes have been given 1 point more damage. Prices have been reworked to reflect better the stats of each armour. New equipment has been balanced taking all this into consideration. Arrows have been given different speeds and have been rebalanced as well. The noble and shadowmail sets from OOO are a bit stronger. And more.\n<br />- Many enchantments have been rebalanced again (but better).\n<br />- Many abilities (i.e.: weaknesses, resistances of enemies) have been rebalanced after some testing.\n<br />- While a few NPCs, especially bosses and certain powerful factions, have been made even stronger, it's also true that the difficulty has been a bit decreased in many aspects. For instance: skeletons are not as strong as before (I had given them special abilities, even to the weakest of skeletons, for some reason). The newly added necromancers are not as strong as before, etc. In the future, perhaps I will work on decreasing the difficulty in more areas as well - making the difference between \"high-level\" and \"mid-level\" factions and places greater.\n<br />- Overall, I'm pretty sure the game is better balanced than in any of my previous versions[b], [/b]and this on many levels: enemies, rythm in which you find new and better equipment, enchantments, stats, balance of the factions, abilities and weaknesses...For instance: more than a few items have been newly hand-placed in dungeonswhich could be useful, always taking into consideration what kind of place it is.\n<br />- As of 4.0 Beta, all the \"unique\" additions of my \"OOOExtended Difficulty Adjustments\" have been ported into the main plug-in.\n<br />- Many improvements in the stories of existing and new characters, which make the world feel more alive (this aspecto still needs some work).\n<br />- Many new rewards, as hand-placed items and even some surprises.\n<br />- Many dungeons have been made even more unique than before (I will probably work a bit more in this direction in the future, especially in dungeons related to factions).\n<br />- A few changes in the locations of some of OOO's new items for balance purposes.\n<br />- New interesting set bonuses for the best armours from OOO and from OOOEnhanced.\n<br />- Many creative names have been thought for the newly added equipment, and also older, plane names have been included. This includes also factions, enemies, and it expands on what I had already done before. For instance: now vampires are, besides the standard ones without adjective: \"aged\" \"ancient\" and \"ancestral\"; instead of \"fearsome\", \"deadly\" and \"ancient\". The real swords weapons have also been renamed to not be so technical and fit more into the game.[b]\n<br />- Staff intelligence requirements. [/b]I've always loved staffs, and I was always unsatisfied with anyone being able to use them in Oblivion, making it seem they are not really a Mage's thing - more apt, instead, for non-mage's who want to do magic. All staffs, except a few related to quests or the Daedric Ones, require intelligence now, including those of OOOExtended with the Integration Patch. Some of them  require very high intelligence, even a bit above 100, especially some unique ones that will only be possible to use by high level mages. I recommend using \"more effective enchantments\" to make them have more uses.\n<br />\n<br />[center][b][size=3]REAL SWORDS AND WEAPON RACE BONUSES[/size][size=4]: An interesting addition[/size][/b][/center]\n<br />\n<br />[size=3]I have kept the \"race bonuses\" from \"real swords\", but as I only included four \"real swords\" modules (and I don't plan to include others). The bonus is small, but it will certainly help low-level characters.\n<br />In the end, I thought it would be interesting to keep this little feature and expand it to the other races somehow (even without OOOExtended, which includes the rest of the RS modules): it makes races more unique, and it adds a little advantage in a very difficult world, but one in which the player has to think strategically... and it's not always easy to get hold of these weapons.\n<br />The reals swords modules included in the main plug - in are: [b]Nord, Bosmer, Dunmer, Argonian[/b] and [b]Breton[/b]. The first 4 are very related to certain factions from OOO. The last one will be found throughout the game.\n<br />\n<br />Particular weapon bonuses exist for the other races as well:\n<br />- [b]Orcs [/b]are going to get bonuses with the whole new Orcish set of weapons which OOO Enhanced 4.0 adds (as of 6.0, they get their own \"real swords\" weapons as well, together with other unique additions). Also the Orcish weapons OOO itself already added (bardiches, batons...). Since Orcish weapons are going to be rather common in OOO Enhanced, orcs will get a pretty good advantage too in this sense (on the other hand, I have decided to make Orcish weapons weaker than Dwemer ones, both for aesthetic and balance reasons).\n<br />- I thought it made sense to give [b]Khajiit[/b]'s a bonus when using scimitars (as of 6.0, they get their own \"real swords\" weapons as well).\n<br />- It of course made sense to give elven weapons to the [b]Altmer[/b]. In this case, I thought it wouldn't be very useful, though, as getting elven weapons is not easy at the beginning and, besides, altmer tend to be mages. This is why I have made this bonus better than the rest -- maybe it will motivate some interesting altmer battlemage character builds. The bonus is still not great for mid level characters, but I think it's interesting enough to give a little advantage even then. To not make things over the top, I have excluded the \"special elven weapons\" like cutlasses, scimitars, katanas, etc. Other kinds of elven weapons, like OOO Enhanced's Welkynd Elven Weapons, are also not included.\n<br />\n<br />The following ones I was not very sure of, and maybe someone can share a better idea and I will change this:\n<br />- [b]Redguards [/b]have been given a bonus with katanas (note: besides getting their own race weapons, as of 6.0, because of lore reasons, they get bonuses with cutlasses instead of katanas).\n<br />- [b]Imperials [/b]have been given a bonus with both iron and steel weapons (note: imperials got their own real swords weapons in 6.0, so they do not longer have bonuses with iron and steel weapons). This is because in the LORE section in UESP wiki I have read \"The Legion's Blacksmiths can forge heavy armor from iron, steel, while some of their most skilled can create some dwarven, orcish, ebony or even daedric quality items.\". Maybe not very convincing, as it mentions other races being involved too, but whatever. We can re-invent the lore a little bit.\n<br />I think it will be interesting to give this advantage to he imperials, a race that I have the feeling is one of the least played. It will be noticed even more, I'd say, because it will work with the first weapons the player will have available. As for later on in the game, there are some interesting steel weapons too, especially with OOOExtended. The katanas and scimitars are still reserved for other races and imperials won't get bonuses from \"strange\" weapons like scythes, though. Neither from cutlasses (I may be wrong, but I don't see the imperials as great pirates).[/size]\n<br />\n<br />[size=3]Of course, the rest of the real swords weapons included in OOOExtended will give bonuses to the related race if the integration patch is used.[/size]\n<br />\n<br />\n<br />[center][b][size=4][size=5]************************** INSTRUCTIONS *************************[/size][/size][/b][/center]\n<br />[size=3][b][size=5]\n<br />Updating from 5.33 or older versions to v. 6.0[/size]\n<br />[/b][size=3][b]\n<br />[size=5][size=3]Even though I do highly recommend starting a new game, I understand many people don't want to do that. I, for one, tend to play very slowly and don't like starting many new games. I like  keeping my old saved games with new mods I install. [/size][/size]\n<br />\n<br />[/b][/size][/size][size=3][size=3][size=4]\n<br />Potential problems: some items might disappear, or change stats radically, which may frustrate (a bit?) your game. Many enchantmens have been very modified, and names of items as well, and also the stats of many weapons, so it could be confusing. [size=3][size=3][size=4]Maybe, to compensate for these situations, the player can add something to his character via the console.\n<br />Another thing is that if you've already killed some specific NPCs you won't be able to see the new items I have given them (I have given a lot of new things to old NPCs). This shouldn't be game breaking. There were already lots of things to find before, and new ones have been added in completely new NPCs or containers.[/size][/size][/size]\n<br />It would be wise to [b]update NPC levels [/b]with Wrye Bash. Go to the \"saves\" tab, right click on your save and then Edit =&gt; Update NPC levels.[/size][/size]\n<br />\n<br />[size=3][size=3][b][size=5][size=3]Most importantly: it's something that should be tested, and I hope it works more or less  well, but  there's definitely going to be problems with QUESTS. [/size][/size][/b][/size][/size]\n<br />\n<br />[b]Here is a guide for things players who plan to UPGRADE should know:[/b]\n<br />[Spoiler alert: just read if you've started or finished these quests and are worried there may be problems]\n<br />[b]The path of iron[/b]\n<br />If you have started or completed the PATH OF IRON, one problem is that I have done some changes to the armor pieces locations (two pieces of the armor appear now elsewhere as before). This means that you could find again the same item you already have, which is already immersion breaking. For quest updates, this is potentially a bit breaking, since maybe you can end up with e.g.: two cuirasses and the game interprets you have the WHOLE armor set already.\n<br />What do you have to do? Basically, if you already have a piece of the Heaven's Fury (Melus Petilius) armor and find it REPEATED, DO  NOT activate it. Best is to just disable it with the console. But do make sure you already have [i][b]that [/b][/i]piece! \n<br />\n<br />[b]Shadows in a Struggle for Power\n<br />[/b]The dread helmet will no longer be appearing where it was before. Instead, it will be worn by one of the related bosses from OOO. The gauntlets will be in the place were the dread helmet used to be found. This is a similar issue to the previous one: if you already picked one of these two items,  you will find them again. In this case, I don't think it will cause any big problems, but for immersion I recommend to disable the duplicated item. Diary entries might get a big chaotic but it should work.\n<br />If you already killed Eregor, DO NOT press the statue of Molag Bal found inside Yeleri. In fact, it is best to just go and disable it if you find it.\n<br />If you already killed Fayth Noor (Underpall Cave) but you DON'T have the  dread helmet, you won't be able to find the dread helmet. If someone has this situation, write me in the comments and I'll do a quick patch which gets you this item. \n<br />If you already COMPLETED Shadows in a Struggle for Power, I recommend NOT entering Varastal again. Now it's a new area, and you'll find the same boss, alive again, which is, while not game breaking, immersion breaking.\n<br />\n<br />[b]The Dread and the Void (OOO Enhanced's unique quest)[/b]\n<br />If you have already destroyed the \"items of dread\", because of what has been said above, you may find them again, which I consider an exploit. Do not cheat! \n<br />Furtheremore: the vampire Boss from this quest is now to be found in an ENTIRELY NEW dungeon. It is called Fort Mystery. If you have already completed this quest, it is better if you don't visit this place at all, just to be sure. There, you'd find the same boss, but alive again.\n<br />\n<br />[b]Skyrim Bandit Clans[/b]\n<br />If you've completed the quest, you'll still get some new journal entries. Probably everything will work anyway.\n<br />\n<br />[b]Slavers and Smugglers[/b]\n<br />Probably it should work with the new additions - which include followers-, although I am not sure now if the player will be able to get the rewards if he has already completed the quest. The player can try to speak with the Smuggler or Slaver leaders (depending on who he helped during this quest).[/size]\n<br />\n<br />[center][size=4][b]INSTALLATION[/b][/size][/center]\n<br />[size=3]\n<br />[b]BEFORE STARTING[/b]\n<br />It's highly recommended to use Wrye Bash, Mod Manager or a similar program.\n<br />The mod is structured for a Wrye Bash BAIN installation, but a manual install is also possible (by copying all the plug-ins one is interested in into the Oblivion/Data folder.\n<br />A bashed patch is also more or less required if one has other mods which edit vanilla characters or levelled lists. Basically, if you have a lot of mods, you need to make a bashed patch with Wrye Bash.\n<br />\n<br />[b]00 - OOO ENHANCED INSTALLATION[/b]\n<br />To install OOO Enhanced, first of all, you must download and install with MO2 or Wrye Bash (or manually copy - not recommended [size=3]into the Oblivion&#92;data folder[/size]) the RESOURCES.\n<br />Then, download OOO Enhanced itself (the other file). Everything included in the \"00 Base\" folder must be installed into the Oblivion/Data folder. The plug in \"OOO Enhanced.esp\" must be activated.\n<br />\n<br />[b]LOAD ORDER[/b]\n<br />If one uses - as one should - a bashed patch with Wrye Bash, \"OOO Enhanced.esp\" should be loaded rather late in the load order. It's difficult to say where exactly because each user is using different mods -- often mods I have not tried. In my testing, everything important from other mods gets imported almost always.\n<br />For instance: if one loads OOO Enhanced after the Better Cities plug-ins, all the AI packages from BC get imported*.\n<br />So, if you want to \"be safe\" (and hopefully - because there are many mods I haven't tested -  quest mods and so on which edit vanilla characters will still work!), the best is to load OOO Enhanced [i]after [/i]the mods you think could edit vanilla's NPCs.\n<br />\n<br />* As far as this particular example goes, it has been tested and OOO Enhanced no longer needs to be loaded after Better Cities. All of OOO Enhanced's edits to NPCs get imported into the bashed patch properly. Loading OOO Enhanced after Better Cities will work as well, so it really doesn't matter. With Oblivion Uncut and Faregyl, though, I have noticed OOO Enhanced needed to be loaded after for its changes to be imported.\n<br />\n<br />[b]10 - DLC ADAPTATIONS [/b]\n<br />Since 6.0, these adaptations have been greatly improved and many of them now require OOO Enhanced to work. I'll release versions of them separately which do only require OOO in the near future.\n<br />As for the load order, not many mods edit these DLCs (and even more rarely do they edit the stats, which I've rebalanced), so most of the time it's only important to load each plug-in after the relevant DLC and after each Unofficial Patch. \n<br />They should be loaded after SM Plugin Refurbish or any similar mods (but I recommend this one, as I've made a couple of changes to make it \"make sense\", see below).\n<br />\n<br />[size=3][b] KNIGHTS OF THE NINE ADAPTATION[/b]\n<br />\n<br />First of all, install the original patch \"Oscuro's_Oblivion_Overhaul - Knights of Nine.esp\", found in the miscellaneous files on the [url=https://www.nexusmods.com/oblivion/mods/46199]OOO Updated [/url]page.\n<br />For now, this patch is still REQUIRED.\n<br />\n<br />What has been said about the DLCs's load order applies here as well.[/size]\n<br />\n<br />[b]15 - SM Plugin Refurbish Compatible Version\n<br />[/b]While some of my Adaptations do include new quests or requirements for the DLCs, I personally still use this. To begin with, because not all of my Adaptations do that. Also, to stop the annoying quest pop-ups at the start of each game. \n<br />The included file has made some changes to some texts to reflect the new additions in OOO Enhanced -- that was the only compatibility issue.\n<br />It's enough to install this file, load it BEFORE the DLC adaptations and play the game. If you want to configure the levels at which DLCs will start, you will have to visit the [url=http://]SM PR[/url] page, download it and use the SM Plugin Refurbish Lite OBSE.esp plug in as well. \n<br />\n<br />[b]30 [/b]- HARDER SHIVERING ISLES \n<br />It requires OOO Shivering Isles. Simply load it after it.\n<br />I don't know if I'll ever work more on this little plug-in or SI in general, but right now it's quite small. SI will be more difficult (I thought it should be a very difficult place).\n<br />\n<br />[b]40 - [/b]BALANCED MAGIC REBALANCED AND EXCURSUS: A FEW NOTES ON BALANCE MODS\n<br />If you use Balanced Magic (I haven't tested any newer mods, but \"in my day\", last time I played, I thought this was the best balanced magic mod for an OOO playthrough), this plug-in will further balance things to OOO Enhanced's \"way\".\n<br />Keep in mind that the whole \"enchantment rebalance\" file of Balanced Magica has been completely integrated - again, with more than a few personal changes - into OOO Enhanced, so if you use Balanced Magica, don't use that file.\n<br />OOO's magica system is \"incomplete\" in my opinión, though, so if you have nothing better, I highly recommend using Balanced Magic, just as I recommend using Vanilla Combat Enhanced. (with Vanilla Combat Enhanced, remember to have the following setting at 0 in the .ini file: \"set ImprovedCombatQ.CreatureStagger to 0\", as some users found it was buggy. Perhaps alternatives exist and I am not aware of them).\n<br />Be that as it may, there's something which is in my opinion almost necessary unless you're playing on easy mode or have A LOT of patience): DUPLICATING DAMAGE. You may do it with Vanilla Combat Enhanced or with Maskar's Oblivion Overhaul. Combat Reshoveled also increases damage enough.\n<br />Another mod that is extremely recommended, in this case for creature damage, but also a few other features, is Migck's Miscellaneous fixes tweaks and additions.\n<br />I would also recommend \"More Effective Enchantments\" by Maskar. It has support for OOO.\n<br />As for sneak, I use Sneak Penalties by Phitt in combination with Stealth Overhaul Redux.\n<br />For lockpicking, I highly recommend [url=https://www.nexusmods.com/oblivion/mods/38801]Real Time Lockpicking[/url]. OOO already adds requirements (+ traps) to locked containers, but I like making it even higher, i.e.: similar to Fallout. Generally, I configure this mod so that you can only lockpick a lock one level higher than yours. I.e.: so that only if you're an expert (+75 skill) you can lockpick a \"very hard\" lock.\n<br />For the economy system: Enhanced Economy by TheNiceOne (don't forget to also install Lubrons patch - Enhanced Economy) is a must.\n<br />You may also want to add Map Marker Overhaul, I think it's a very useful addition to OOO Enhanced, as it allows you, not only to set your own markers, but to add \"tags\" to dungeon markers to indicate that you found a \"strong enemy\", or that you \"cleared it\" already.\n<br />Last but not least, in order to make speech actually useful (and balanced) I recommend, first, Strategy Master's recent SupreMe Overhaul which, among other great additions, includes a much more challenging \"Persuasion Overhaul\". Second, some mod that allows you to recruit companions based on your speech. Maskar's Overhaul does this, for example. Even though I never really made such a character, I've always played with \"Companion Share and Recruit\" BUT with the \"Companion Share And Recruit Balanced and Bugfixed\" patch by flexcreator, but I'm not sure how buggy it is and perhaps there are better options. \n<br />[b]MORE MODERN SOLUTIONS: [/b]Gameplay with Av Latta Magica (but I'd recommend maxing summons to 1, or AT MOST 2, and having the settings in its configuration .ini not as over powered as they are by default) + Combat Reshoveled has worked well with users of OOO Enhanced. Combat Reshoveled increases damage too.\n<br />\n<br />[b]50 - EASY AND \"ORIGINAL\" (HARDER) DIFFICULTIES [/b]\n<br />Just as the names indicate, they will either make the game easier or harder. This has mostly to do with NPC health (decreasing or increasing OOO's health buffs) and the stats of some creatures (not all). With the easy difficulty, the player will get a low level race weapon already in the tutorial. \n<br />\n<br />[b]60 - [/b][b]Normal Sigil Stones\n<br />[/b]With this patch, sigil stones will no longer fire spells at the player (addition imported in 6.0 from OOOExtended)\n<br />Furthermore, you will be able to do the reload exploit. I.e.: saving the game and reloading over and over until you get the desired stone. In standard OOO Enhanced, the stone will be decided as soon as you enter the new area, so you'd have to save the game BEFORE entering the cell in which the sigil stone is located. Not with this patch.\n<br />\n<br />[b]70 - Longer Essential death time disabled\n<br />[/b]OOO Enhanced makes essential NPCs stay unconscious for a long time. Use this if you want them to \"wake up\" like in vanilla.\n<br />\n<br />[b]80 - Enhanced Economy House Prices Patch\n<br />[/b]Use this if you are using Enhanced Economy and want the house prices to be in line with OOO Enhanced.\n<br />\n<br />[b]LOAD ORDER EXAMPLE WITH IT ALL [/b]\n<br />\n<br />Oblivion.esm\n<br />DLCHorseArmor\n<br />DLCHorseArmorUnofficial Patch\n<br />DLCOrrery.esp.\n<br />DLCOrrery UnofficialPatch.esp\n<br />DLCVileLair\n<br />DLCVileLairUnofficial Patch\n<br />DLCMehrunesRazor.esp\n<br />DLCMehrunesRazor- Unofficial Patch.esp\n<br />DLCThievesDen.esp\n<br />DLCThievesDenUOP.esp\n<br />DLCFrostcrag\n<br />DLCFrostcragUnofficial Patch (not to be used with Frostcrag Revisited Redux)\n<br />Knights\n<br />OblivionUncut.esp\n<br />DLCBattlehornCastle\n<br />Knights Unofficial patch\n<br />[size=3]SM Plugin Refurbish Lite.esp (use the version included in OOO Enhanced's package[/size]\n<br />Oscuro's Oblivion Overhaul.esp\n<br />Mannimarco Revisited.esp\n<br />DLCHorseArmor- OOO Adaptation)\n<br />DLCOrrery - OOO Adaptation)\n<br />DLCMehrunesRazor- OOO Adaptation)\n<br />DLCThievesDen- OOO Adaptation)\n<br />DLCFrostcrag- OOO Adaptation) (either of the included versions)\n<br />DLCBattlehornCastle- OOO Adaptation (either of the included versions)\n<br />SM Plugin Refurbish Lite OBSE.esp\n<br />Oscuro's_Oblivion_Overhaul - Knights of Nine.esp\n<br />Oblivion Uncut - OOO Adaptation.esp\n<br />UniqueLandscapes.esp\n<br />Unique Landscapes - OOO Adaptation - note: since 2.0, includes an option for separate plug-ins\n<br />ShiveringOOO.esp\n<br />Better Dungeons.esp\n<br />SnusDungeons.esp (walkerinshadow's version)\n<br />SnusDungeons - BD patch.\n<br />OOO Enhanced - Shivering Isles.esp\n<br />BalancedMagic.esp / Av Latta Magica\n<br />OOO Enhanced\n<br />[size=3]Knights of Nine - OOO Enhanced Adaptation.esp\n<br />DLCVileLair - OOO Enhanced Adaptation.esp (+any future plug ins for DLCs that have \"Enhanced\" in their names.[/size]\n<br />Balanced Magic Rebalanced.esp\n<br />Better Dungeons - OOO Enhanced Compatibility Patch.esp\n<br />Snus Dungeons - OOO Enhanced Adaptation.esp\n<br />Mannimarco Revisited - OOO Enhanced Adaptation.esp\n<br />OOO Enhanced - Av Latta Magica Compatibility Patch\n<br />BetterCities Full/Better Cities Bravil - in case you are not using the full version\n<br />(The rest of the Better Cities plug ins, including Better Imperial City\n<br />Better Cities Full - OOO.esp (my replacer mod or the original patch)\n<br />Bashed Patch.esp\n<br />Maskar's Oblivion Overhaul.esp[/size]\n<br />\n<br />[size=5][b]KNOWN ISSUES[/b][/size][size=3]\n<br />- Guars not working. If guars are not moving all and have no collision (you can go through them), you probably installed something that is changing them.  [b]Solution[/b]: Go to data&#92;meshes&#92;creatures, find the folder \"OOO_guar\" and delete it. \n<br />- If in the \"Path of Iron\" quest, if you found the CAPE first, there is a bug in which you will not be able to get the armor pieces (solved from 6.22). \n<br />[b][i]Solution [/i][/b]Write either of these in the console: \n<br />set OOOHeavenFuryClaymoreQuest.armortype to 2  (light armor)\n<br />set OOOHeavenFuryClaymoreQuest.armortype to 1 (heavy armor)\n<br />- The area in which the unicorn is located, which is also the area of Unique  Landscapes Dark Forest, tends to provoke more crashes than other areas. \n<br />It seems that this issue is not happening in the latest updates, though. [/size]\n<br />[b]\n<br />\n<br />[size=5]COMPATIBILITY[/size][/b][size=4]\n<br />\n<br />[b]The following mods have been included[/b]. It is recommended not to use them (potential issues even in cases in which I have located their entrances differently).\n<br />- OOOExtended (fully included since 6.2)\n<br />- Colorful Clothing\n<br />- WEPON\n<br />- Immersive Weapons\n<br />- Apophis Silver Dragon (or most of it).\n<br />- Nicoroshi's weapons (most of them).\n<br />- A lot of Gizmodian mods: Shell of artifice, blades, sorcerer outfits, netherweave, veraxanima, dredfire staff, copperthorn, the vicious heart, featherwynd, slitterblade\n<br />[size=4]- David Brasher's: Dungeons of Blackmarsh, Fort Dreftin, Cave of Wishcraft, Skyrim Nord Tombs (included). Some cell parts of other Brasher dungeons have been included, but probably it wouldn't be an issue to use the complete dungeons on their own if someone wants to do it.\n<br />-  Aranmathi home mods.\n<br />-  Lemunde's Sunken Fortress\n<br />- Fort Valdis.\n<br />- Additional Oblivion Realm (rockbitter68)\n<br />[size=4]\n<br />[i]In short, [/i][b][i]DO NOT USE WITH[/i][/b]: Any of the mods which are mentioned in the permission-credit section, including, besides the ones mentioned before, Mage Equipment, any of Waalx' Real Swords and many others.[/size][/size]\n<br />\n<br />\n<br />[b]Additionally...[/b]\n<br />- ISSUES WITH Ultimate Levelling with the XP mode (some weapons give attribute bonuses and, when you take them off, sometimes your stats won't be recalculated rightly). [b]Note[/b]: Some users have NOT experienced this problem. I am not sure under what conditions it appears exactly. \n<br />- DO NOT USE with SM Plugin Refurbish Merged. Use, instead, the \"SM Plugin Refurbish Lite\" version included in the OOO Enhanced package. Load OOO Enhanced's DLC plugins AFTER.\n<br />- INCOMPATIBLE with Better Forts - Legion Occupied Forts.\n<br />- Skyrim Nord Tombs are ALSO included in TWMP Skyrim improved (and, therefore, with Skyrim Alive as long as it requires it). They're located in exactly the same spot, so everything would be duplicated. A patch will be made.\n<br />[size=4]- A few dungeons have been modified more extensively than before as of 4.1 , as this includes new decorations. So far I am not aware of any compatibility problems, but there might be issues with mods which edit: Fieldhouse Cave, Varondo, Sardavar Leed, Ceyatatar, Mackamentain, Wendelbek, Fort Linchal, Hame, Sage Glenn Hollow, Elenglynn.[/size]\n<br />\n<br />[b][i]Good news:[/i][/b]\n<br />- [/size][size=4]A patch for SnusDungeons (find this mod with the link on the first comment [url=https://www.nexusmods.com/oblivion/mods/46199?tab=posts]here[/url]) is available in \"Optional Files\". Perhaps it will need further tweaks.\n<br />- A patch for Better Dungeons is also available.[/size][size=4]\n<br />- In older versions, there seemed to be crashes with Unique Landscapes: Dark Forest. Users of the newer versions say it is working well.[/size]\n<br />\n<br />\n<br />[b][size=4]\n<br />VERSION 3.4 BETA. MAJOR UPDATE.[/size] [/b][i]( I have done a long list of most of the changes, but I need to organize it first…)[/i]\n<br />[b]\n<br />[size=4]The most important:[/size]\n<br />\n<br />[/b]- Lots of bug fixes. Most importantly: many enemies were duplicated somehow. This has been fixed.\n<br />- Lots of much perfected implementation of the same philosophy of old: including changes in the stats of some equipment and enchantments, friendly (and enemy) NPC equipment and stats, rebalance of dungeons levelled lists… in which, as before - but a bit more perfected -, there are easy, middle and difficult dungeons, we could say to simplify (it's not so clear as that). I have done everything more maturely as well, I believe, as I am older now.\n<br />- Some new bosses with their own story\n<br />- Lich overhaul (NeverwinterPinata is to be credited)\n<br />- Welkynd Elven Gear (credits ZuSkunks!). Fully integrated into the game... But generally only high level vampires wear it.\n<br />- [b]Secret entrance to the Arcane University![/b] It works using the same system of mage portals requiring mysticism that I implemented in the previous versions. Furthermore, doors to each building inside the complex are locked now, and most mages have a key for that. The upper floors, though, require a key that is only carried by people who are conjurers or above. This all includes mages from other cities. You will be given those keys as you advance in rank as well.\n<br />Members of the thieves guild, as before, sell powerful fortify mysticism spells… This has all been greatly rebalanced and improved. Now, the spell lasts for just 5 seconds and drains your speed… You can't abuse it. In Misdirection, Methrendel will also give you, besides a few of such scrolls (as before) a note with instructions.\n<br />\n<br />As for OOOExtended, the very powerful armor that was previously worn by Volmyr, is not worn by him anymore. Instead, there's a new vampire boss who has most parts, and most of the weapons from that set are well places as rewards… There're also some notes relating to this armor.\n<br />More unique OOOExtended enemies have been hand placed in dungeons (just a few - I don't like a too static game either).[b][size=5]\n<br />\n<br />GENERAL DESCRIPTION[/size]\n<br />\n<br />[/b]This started as a not a very big mod called \"OOO Improvements andTweaks\". At first it didn't change anything important from the original OOO, mostly dealing with some little aspects I thought would have made sense OOO dealt with but it had left untouched. It was a complement to OOO which, I thought, would make the game feel a bit more real within its own world.\n<br />Soon, the project included an [i]OOO Adaptation for all official DLCs[/i].\n<br />From [b]VERSION 2[/b] onwards, I have started making [i]actual additions andserious rebalance[/i] [i]touches [/i](maintaining, and even furthering, thespirit of OOO I believe).\n<br />Starting with [b]VERSION 3,[/b] I changed the name to \"OOO Improvements and Additions\", as the mod had already become a small expansion to OOO, with new bosses, small quests, general rebalance of dungeons, and even some completely new creatures and equipment.\n<br />As Version 3 (I don't want to go further than this in scope) reaches its end, I think it's right to start calling it \"OOO Enhanced\".\n<br />Years later, I came back to develop this mod into something perhaps more than twice as big as before. With [b]VERSION 4[/b],  the new feature is the inclusion of lots of new items, and not at all in a random way: most of it has been thought for a specific character, faction or as a reward for something. Hand in hand with it, goes a very, very thorough FACTION OVERHAUL of most enemy and friendly factions, as well as a major revision of most of what I had done previously (with the greater maturity that comes with being older). New gameplay changes: each race gets a bonus with some specific kind of weapons. Staffs, including defense staffs, require intelligence. Many armor sets get bonuses.\n<br />With [b]VERSION 5, [/b]the faction overhaul continues and gets more refined: factions get even more differentiated and unique and, most importantly, some dungeons get new decorations. A couple of new dungeons are added (there was already one in 3.0), and they come with some kind of \"quest\". A couple of new quests are added; some of OOO's quests are refined and their story is greatly enhanced via pieces of text for those who like reading. Story has also been added for many of OOO Enhanced's new bosses. We can also talk of a full undead overhaul at this point , especially with the addition of lots of armored skeletons (similarly to OOOExtended, but I believe even better). More items continue to be added and implemented. The levelled lists of items have gone a major revision and finally OOO Enhanced's items (at least those that are not \"unique items\") appear in them. Many new bonuses for equipment sets are added. The magical melee weapons from Mage Equipment (blades and blunt staffs) are implemented (they also require intelligence). Defense staffs now give some magical bonus to make them more interesting than shields are for battlemages. With these last two features + the more than a few new enchanted robes and equipment, playing as a battlemage will be a lot more fun. Many items are hand-placed in appropriate dungeons or put in special chests in some location, making everything feel quite interesting and new again even for those who have already played OOO. Many creature bosses from Vanilla, OOO or OOO Enhanced get to look completely unique.\n<br />\n<br />\n<br />Most aspects of OOOExtended which I consider essential have been implemented in my mod at this point. I will still use it and support it, but it will become much less \"essential\", especially if you also use other mods that add equipment or creatures like MOO or Waalx.\n<br />Also users may be interested to know that since 5.0 I believe I have fixed the problems with dual wielding NPCs in OOOExtended in my integration patch for it.\n<br />\n<br />\n<br />[center][size=5][b]PREVIOUS CHANGES (OOO Improvements and Additions)[/b][/size][/center]\n<br />[b]NPC LORE-FRIENDLY UNIQUENESS\n<br />[/b]- Inventory added to countless friendly NPCs which were mostly untouched by OOO. Now they will have equipment that reflects their reputation. (this was the original idea behind the whole mod).\n<br />- Stats and abilities of many friendly NPCs changed to further reflect who they are.\n<br />- At this point (version 3.3) a ton of NPCs have been altered.\n<br />- Some vanilla NPCs now have combat scripts similar to OOO bosses (including Lucien Lachance).\n<br />[b]\n<br />DLC PLUG INS\n<br />[/b]- Separate plug ins for each DLC that needed some kind of adaptation to OOO.\n<br />- Shivering Isles plug in, which requires Shivering OOO, which mostly just increases the difficulty a bit (but it also adds some uniqueness to the\n<br />friendly NPCs there) (thanks Kobal for making the base of these mods)\n<br />\n<br />[b]DUNGEON AND LEVELED LISTS DIFFICULTY REBALANCE[/b]\n<br />This is one of my favourite changes.\n<br />Starting with Version 3, I have gone through almost every dungeon in the game and made everything more interesting and unique. This is also an important addition, as the mod could otherwise have become too difficult. Following the philosophy of OOO, which is that the further you go from civilization, the more dangerous dungeons tend to be.\n<br />I have made many dungeons  easier and many of them more difficult from level one. In the case of the \"easy\" dungeons, they'll spawn stronger versions of creatures until level 15-20, and after that they'll just stay the same.\n<br />In the case of the \"difficult\" dungeons, they'll spawn stronger enemies from the beginning (a feature present already in many dungeons in the original OOO, but greatly expanded here).\n<br />\n<br />\n<br />- One of the random Oblivion gates will have now unique leveled lists; stronger enemies will appear there. You will not be able to predict so well what you will find before going into a gate.\n<br />\n<br />- Many leveled lists have been altered and rebalanced; and new ones have been created for this purpose. Sometimes, as enemies have been made stronger, they'll\n<br />tend to appear later than in the original OOO (except in \"difficult\" locations!).\n<br />(To experience this fully you'll need OOOExtended and the new patch I included for it, as I did the undead leveled lists with it in mind.)\n<br />\n<br />\n<br />[b]ENEMY REBALANCE[/b]\n<br />- While the weaker factions have been mostly left untouched, most of the stronger (for the most part, OOO-added) factions will scale a couple of levels\n<br />higher. Their bosses too. This includes amazons, Skyrim Bandits, Putrid Hand Masters, Guardians of Oblivion and Raiders, as well as some of the Vanilla\n<br />factions like Black Bow Bandits.\n<br />- Putrid Hand members have been made slightly more powerful than before, even considering the above.\n<br />- Some creatures have been made stronger, and higher level.\n<br />- All NPCs have more health per level than before. Low Level NPCs don't have a health penalty anymore. (a mod which increases damage, like Vanilla Combat\n<br />Enhanced or MOO, is therefore recommended; otherwise, I recommend the \"easy difficulty\" plug in included here).\n<br />- At this point (version 3.3) a ton of NPCs have been altered and rebalanced, a bit with trial-and-error philosophy.\n<br />- Guards from towns and the imperial legion have been made stronger, (but the guards in the imperial city remain the strongest ones.)\n<br />- Daedra are now weak to frost, not to shock (except some exceptions); it makes sense, and already too many enemies were weak to shock.\n<br />\n<br />[b]NEW BOSSES[/b]\n<br />- Many new bosses have been added, both creature and NPC ones. Some of them come with special rewards and some kind of story as well.\n<br />- These bosses have been added for factions that lacked bosses completely or just had one, like the amazons. ([i]An extra, low-level animal boss is includedin my patch for Cyrodiil Reloaded[/i]).\n<br />- All these bosses have been placed in locations which make sense.\n<br />- [b][i]UNMARKED QUEST[/i][/b]: A NEW hidden and unmarked cave hosts one of the new bosses –this is some kind of unmarked quests which includes several notes and a story related to it.\n<br />\n<br />[b]NEW ENEMIES[/b]\n<br />- A new HIGH LEVEL NECROMANCER kind will appear during the later part of the mage's guild questlines; the leveled lists for those quests have been altered to make them more difficult. It kind of didn’t make sense that the main necromancers were always much weaker than the putrid hand ones.\n<br />- NEW CREATURE: Superior Flame Atronach. These armed flame atronachs are more or less on par with Storm Atronachs in strenght. (MODEL: ZuSkunks)\n<br />- NEW CREATURES of the Will-O-The-Wisp kind, using VASE's resources; including a very strong boss hidden somewhere. (Full credit goes to Vacuity)\n<br />NEWCREATURE Spectral Warg. The high level version of the \"Spectral Wolf\".\n<br />\n<br />[b]QUEST REBALANCE[/b]\n<br />- At this point, I have already gone through pretty much every quest to consider its enemies,  allies, difficulty and reward and balance it according to how I feel it should be like, changing the levelled lists of certain quest related dungeons in the process to make stronger enemies appear from the beginning.\n<br />-Miscellaneous quests which had specific quest-related creatures are now unleveled.\n<br />- Later guild quests made more difficult (and sometimes earlier ones as well, but not excessively).\n<br />- Daedric Quests are usually even more difficult. Those rewards have to be fought for.\n<br />- ARENA: almost all fighters have had their levels increased.\n<br />- A fewquests will not start as early now, or will take longer to update, for several reasons. Those requiring fame, for example, will now require more. One reason\n<br />is that  this gives a bigger sense of time passing, things progressing, than if everything starts right away.\n<br />- The goldor item rewards (but those of unique items) of many side quests are now unleveled or almost unleveled. You will get much more gold at lower levels.\n<br />What I did not want to touch was the leveled item rewards; maybe I will in the future. At the moment, personally I use [i]AULIAS[/i].\n<br />[b]\n<br />TUTORIAL REBALANCE[/b]\n<br />- To make it fit more realistically: tutorial creatures and NPCs are stronger, more on par with their real-world counterparts.\n<br />- The Blades are also much stronger than before, so defeating the mythic dawn agents as they are supposed to will still be easy for them.\n<br />- In order to keep the whole thing still quite easy, Renault's Katana is also much more powerful (Baurus will retrieve it in the end).\n<br />- Some equipment found during the tutorial in vanilla has been removed. You'll have to start off with, for the most part, some of the lowest equipment in the game!\n<br />\n<br />[b]ITEM REBALANCE[/b]\n<br />- Many trophies from creatures have had their cost increased slightly.\n<br />- Some equipment rebalance: Guard's armors are more powerful, always according to their rank; Blade's armor and weapons are slightly more powerful. The arch\n<br />mage's armor is now light armor and has an enchantment. And more.\n<br />- Some enchantments have been rebalanced, but always following their original\n<br />traits in vanilla.\n<br />- Black Bows actually look black; new item: black arrow (credit to ElderScrollsFan001_Aetric)\n<br />- A few new enchanted items have been created, mostly to be given to this or that\n<br />character.\n<br />- ReflectSpell and Reflect Damage enchantments have been extensively modified so it's, as far as I know, impossible to reach 100% in any of both just by wearing\n<br />items. (I could have done the same with Chameleon, but I think using the mod \"Real chameleon rebalance\" is a good alternative. In any case, I reduced the sigil stone's enchantments for it: transcendent ones will only give 20%.)\n<br />- Theskeleton key's enchantment has been removed.\n<br />- Mace ofMolag Bal is more damaging than a daedric mace and not that difficult to obtain, so it won't be such an easy choice to refuse to do the quest in\n<br />exchange for the OOO one.\n<br />- Thereward helmet at the end of the Fighter's Guild quests has a much better enchantment, but it's now (very slightly) less protective than a daedric helmet\n<br />(unlike in vanilla or OOO)\n<br />- Black HandRobes made much more powerful (if you use OOOExtended, it gives them a cool model as well).\n<br />- Blade ofWoe's enchantment rebalanced.\n<br />- Brandnew, and more powerful, unique enchantment for \"Frostwyrm Bow\" (Horror of Dive Rock reward)\n<br />- Arch-Mage’s robes made much more powerful (including the cape added by OOO).\n<br />\n<br />[b]Sanguine Rose and Wabbajack overhauled[/b]\n<br />(this is why OBSE and the UOP have been included as requirements)\n<br />- Bossess and a few of the most powerful creatures have been made inmune to Wabbajack (including, thanks to OBSE, a few from OOOExtended or other modslike MMM).\n<br />- Sanguine Rose now will summon a certain set of enemies until you are level 20, and from then on, a stronger set.\n<br />[b]This is because: [/b]\n<br />1) These items are too easy to obtain.\n<br />2) I personally use (and recommend) more effective enchantments x3 by Maskar, so it would have x3 more uses.\n<br />3) I made all the creature versions these staffs summon as powerful as the creatures are in my mod (which is, like in OOOExtended, a lot more than in the original OOO and  of course than in vanilla). This would have made Sanguine Rose even more useful for low level characters.\n<br />Last but not least, I included a few new creatures, including some OOO uniques, to the spawn list of both staffs using the same system the UOP uses to\n<br />avoid  problems.\n<br />[b]\n<br />OTHER[/b]\n<br />- Some changes from OOOExtended imported to my mod (for those who are not using\n<br />that mod, and are using FCOM or the simple OOO instead)\n<br />[b]\n<br />Arcane portal rebalance [/b]\n<br />To go through the portals in the arcane university you need a minimum skill of mysticism: 40 for the first one and +60 for the second one. Either that or\n<br />being high enough in the rank of the faction. \n<br />For it not to be a hassle during the Thieves Guild Quest in which you need to go there, you will be given some very powerful scrolls of fortify mysticism at the time\n<br />of the quest. These scrolls will eventually be available for purchase from Fathis Ules.\n<br />\n<br />[center][size=4][b](I made avery complete list of the changes in the readme included in the main file (although it’s not been updated since v. 3.0)[/b][/size][/center]\n<br />[b]\n<br />[u]FAQs[/u]\n<br />\n<br />Some quests are not starting (i.e.: An unexpected voyage). Is this a bug?[/b]\n<br />\n<br />No. As mentioned in the readme, I have made some quests require a bit of fame, or a higher level (one reason for this is that I have made these quests harder:\n<br />if you started an unexpected voyage at level 1 you'd probably get stuck, now, as the characters are stronger).\n<br />\n<br />\n<br />[b]USE WITH MOO[/b]\n<br />\n<br />[b]With the standard MOO's settings I've come across more than once, even in dungeons which I had changed (like\n<br />Vilverin) to only spawn weak undead, 3 or even 4 Liches at once. MOO\n<br />creatures will appear  seldom in dungeons,but there's already a great\n<br />variety of them if you use OOOExtended. Use at your own risk!\n<br />[/b]\n<br />[b]Recommended ini settings:[/b]\n<br />[i]set MOO.ini_levelscaling_reduced to 1 [/i](optional: as in my mod enemies are very strong, you might appreciate a lesser number)[i]\n<br />set MOO.ini_levelscaling_npc_overridden to 2 [/i](this way OOO will be managingvanilla NPC's levels)[i]\n<br />set MOO.ini_levelscaling_namedboss_hard_minlevel to 29 [/i](this will prevent  really hard bossess appearing in bandit or standard conjurer\n<br />dungeons)\n<br />[i]set MOO.ini_MOOcreatures to 1[/i][b]\n<br />\n<br />\n<br />I  recommend disabling the creatures which are already added by OOO or OOOExtended, as well as by my mod (will o wisps).[/b]\n<br />\n<br />[b]This are the settings of creatures I'd consider important , therefore, formy mod to be balanced:[/b]\n<br />set MOO.ini_add_daedra to 1\n<br />set MOO.ini_add_dremora to 1\n<br />set MOO.ini_add_gargoyles to 0\n<br />set MOO.ini_add_guars to 0\n<br />set MOO.ini_add_hungers to 0\n<br />set MOO.ini_add_mythicalcreatures to 1\n<br />set MOO.ini_add_skeletons to 0\n<br />set MOO.ini_add_wisps to 0\n<br />set MOO.ini_add_wraiths to 1\n<br />set MOO.ini_add_xivilailords to 1\n<br />set MOO.ini_add_zombies to 1\n<br />set MOO.ini_add_snowbears to 0\n<br />set MOO.ini_add_snowleopards to 0\n<br />\n<br />set MOO.ini_add_bandits to 0\n<br />set MOO.ini_add_conjurers to 0\n<br />set MOO.ini_add_necromancers to 0\n<br />set MOO.ini_add_marauders to 0\n<br />set MOO.ini_add_mythicdawn to 0\n<br />set MOO.ini_add_vampires to 0\n<br />(I now set this to 0, but you may set it to 1, it will make it a bit more\n<br />random, but you should, in that case - if you want to keep it more\n<br />\"static\" or \"OOO-like\"- set the proper levels in which these enemies are\n<br />\"allowed\" to spawn\"). For this, go to the section \"; Bandits and\n<br />Marauders\"\" (or any other enemy) in the MOO .ini. It's very\n<br />straightforward.\n<br />\n<br />set MOO.ini_add_ancientvampires to 0\n<br />set MOO.ini_add_outlaws to 0\n<br />set MOO.ini_add_plunderers to 0\n<br />set MOO.ini_add_plaguebringers to 0\n<br />set MOO.ini_add_planesummoners to 0\n<br />[i](similar NPCs are already added by OOO)[/i]\n<br />\n<br />[b]If you are using OOOExtended, there are many more creatures you should disable: [/b]bats, bone lords (optional, but I think there are enough skeletons with\n<br />OOOExtended and they don't fit) daedric lord, durzog, foxes, giants,\n<br />ghouls, rabbits, scorpions, xivilai lords.  [b]\n<br />\n<br />Right now, I [i]personally [/i]use these settings. With OOOExtended, of course. I'd rather disable most of\n<br />the new enemies since OOOExtended already adds enough of them. I now\n<br />also disabled invasions as well, but I played with them before and they\n<br />can be quite fun and also surprisingly compatible, so you can enable\n<br />them and still have a pretty neat OOO Enhanced experience.\n<br />\n<br />[/b]set MOO.ini_add_ancientlich to 1\n<br />set MOO.ini_add_ayleidghosts to 1\n<br />set MOO.ini_add_bats to 0\n<br />set MOO.ini_add_beasts to 1\n<br />set MOO.ini_add_beetles to 1\n<br />set MOO.ini_add_birds to 1\n<br />set MOO.ini_add_bonelords to 1 (I had this disabled before, but now I checked what they look like and they're quite cool)\n<br />set MOO.ini_add_caribou to 1\n<br />set MOO.ini_add_corprus to 1\n<br />set MOO.ini_add_cats to 1\n<br />set MOO.ini_add_daedra to 0\n<br />set MOO.ini_add_daedriclord to 0\n<br />set MOO.ini_add_dragons to 0[i] (you may enable them, as they are not added by any of our mods, but I\n<br />somehow didn't find that they fit? But it's a personal choice!)[/i]\n<br />set MOO.ini_add_dremora to 0\n<br />set MOO.ini_add_dogs to 1\n<br />set MOO.ini_add_draugr to 0 [i](you may enable them as well)[/i]\n<br />set MOO.ini_add_dwemerspiders to 1\n<br />set MOO.ini_add_durzog to 0\n<br />set MOO.ini_add_elephants to 0 (I somehow didn't find that they fit, but they can be enabled as well)\n<br />set MOO.ini_add_farmanimals to 1\n<br />set MOO.ini_add_foxes to 1\n<br />set MOO.ini_add_frostgiants to 1\n<br />set MOO.ini_add_gargoyles to 0\n<br />set MOO.ini_add_giants to 0\n<br />set MOO.ini_add_ghouls to 0\n<br />set MOO.ini_add_gnarls to 0 (they are already present in Shivering Isles)\n<br />set MOO.ini_add_goblins to 1\n<br />set MOO.ini_add_guars to 0\n<br />set MOO.ini_add_harpies to 0 [i](again, you may enable them. I found them a bit annoying personally! And I'm not very much into crafting) [/i]\n<br />set MOO.ini_add_hungers to 0\n<br />set MOO.ini_add_lizard to 1\n<br />set MOO.ini_add_mammoths to 0 [i](again, you may enable them. I wasn't sure they fit or are lore-friendly in Cyrodiil)[/i]\n<br />set MOO.ini_add_mimics to 1\n<br />set MOO.ini_add_minotaurs to 0[i] (these are good to enable too. I just want to keep it simple for now, I\n<br />guess. But it's true there still may be a bit of a lack of minotaurs\n<br />with OOO)[/i]\n<br />set MOO.ini_add_monkey to 1\n<br />set MOO.ini_add_mudcrabs to 1\n<br />set MOO.ini_add_mummies to 0 [i](I wasn't sure lore-wise, or their resurrection ability, but may enable)[/i]\n<br />set MOO.ini_add_muntjac to 1\n<br />set MOO.ini_add_mythicalcreatures to 1\n<br />set MOO.ini_add_ooze to 1\n<br />set MOO.ini_add_oreatronachs to 0 (OOO already adds a lot of Golems; very similar)\n<br />set MOO.ini_add_pahmars to 0 (wasn't sure that they fit in Cyrodiil, but you may enable)\n<br />set MOO.ini_add_pheasants to 1\n<br />set MOO.ini_add_puppies to 1\n<br />set MOO.ini_add_rabbits to 1\n<br />set MOO.ini_add_rats to 1\n<br />set MOO.ini_add_redpanda to 1\n<br />set MOO.ini_add_scorpions to 0\n<br />set MOO.ini_add_seagulls to 1\n<br />set MOO.ini_add_skeletons to 0 (OOOExtended already adds more than enough\n<br />skeleton types, but probably you need this for the bone lord to appear)\n<br />set MOO.ini_add_slaughterfish to 1\n<br />set MOO.ini_add_snowbears to 0\n<br />set MOO.ini_add_snowleopards to 0\n<br />set MOO.ini_add_spriggans to 0\n<br />set MOO.ini_add_spiders to 1\n<br />set MOO.ini_add_tapir to 1\n<br />set MOO.ini_add_unicorns to 0\n<br />set MOO.ini_add_vultures to 1\n<br />set MOO.ini_add_wasps to 1\n<br />set MOO.ini_add_waterdragons to 1\n<br />set MOO.ini_add_wisps to 0\n<br />set MOO.ini_add_wolves to 0 (more than enough wolves with OOO and Extended)\n<br />set MOO.ini_add_wraiths to 0 (there's already the \"wraith lord\" with OOOExtended)\n<br />set MOO.ini_add_xivilailords to 0\n<br />set MOO.ini_add_zombies to 0 (There doesn't seem to be anything that is not already more or less in OOOExtended)\n<br />\n<br />set MOO.ini_add_bandits to 0\n<br />set MOO.ini_add_conjurers to 0\n<br />set MOO.ini_add_necromancers to 0\n<br />set MOO.ini_add_marauders to 0\n<br />set MOO.ini_add_mythicdawn to 0\n<br />set MOO.ini_add_vampires to 0\n<br />\n<br />set MOO.ini_add_ancientvampires to 0\n<br />set MOO.ini_add_outlaws to 0\n<br />set MOO.ini_add_plunderers to 0\n<br />set MOO.ini_add_plaguebringers to 0\n<br />set MOO.ini_add_planesummoners to 0\n<br />\n<br />set MOO.ini_add_cannibals to 1\n<br />set MOO.ini_add_fanatics to 1\n<br />set MOO.ini_add_frostwitches to 1\n<br />set MOO.ini_add_graverobbers to 1\n<br />set MOO.ini_add_heroes to 1\n<br />set MOO.ini_add_mercenaries to 1\n<br />set MOO.ini_add_poachers to 1\n<br />set MOO.ini_add_slavers to 0\n<br />set MOO.ini_add_smugglers to 0 (similar ones appear with OOO)\n<br />set MOO.ini_add_wildorcs to 1\n<br />set MOO.ini_add_moragtong to 1\n<br />\n<br />set MOO.ini_add_legionsergeants to 1\n<br />set MOO.ini_add_adventurers to 1\n<br />\n<br />(...)\n<br />\n<br />set MOO.ini_creature_invasion_daedra to 0\n<br />set MOO.ini_creature_invasion_goblins to 0\n<br />set MOO.ini_creature_invasion_zombies to 0\n<br />set MOO.ini_creature_invasion_skeletons to 0\n<br />set MOO.ini_creature_invasion_trees to 0\n<br />set MOO.ini_creature_invasion_harpies to 0\n<br />\n<br />(...)\n<br />\n<br />set MOO.ini_spawn_mushrooms to 0 (I was not sure that they fit very well)\n<br />\n<br />[b][size=4]OOO EXPERIENCE ENHANCED PROJECT[/size]\n<br />\n<br />[/b]I made a [url=http://www.nexusmods.com/oblivion/mods/47911/?]true compatibility patch for BetterCities for OOO[/url] (very complete one, if I may say so), for[url=https://www.nexusmods.com/oblivion/mods/48463?tab=description] Unique Landscapes[/url], for [url=https://www.nexusmods.com/oblivion/mods/47913]Cyrodiil Re-loaded[/url]﻿, for [url=https://www.nexusmods.com/oblivion/mods/47904]Universitas Arcanarum[/url]﻿, for[url=https://www.nexusmods.com/oblivion/mods/54538][b]a few of Arthmoor's mods ﻿[/b][/url]and for [b][url=https://www.nexusmods.com/oblivion/mods/49825]Kvatch Rebuild[/url]﻿[/b][b]. [/b]\n<br />They can be considered as part of this mod.They remain, of course, completely independent from it.\n<br />\n<br />\n<br />[b][size=5]OLD README (OOO Improvements and Additions)[/size]\n<br />[/b]\n<br />[b]INSTALLATION/COMPATIBILITY (OLD)[/b]\n<br />\n<br />First of all, download and install OBSE and the Unofficial Oblivion Patch if you don't have them already. They are required since Version 2.\n<br />\n<br />The mod is BAIN ready, so a BAIN install is more recommended than a manual one.\n<br />If you want to go manual, just copy and paste in the [i]data [/i]folder the files you want from each folder, which are self-explanatory.\n<br />\n<br />\n<br />A [b]bashed patch[/b] with Wrye Bash is [b]HIGHLY RECOMMENDED[/b]. Without it my mod should be loaded much higher in the load order or there would be\n<br />compatibility problems, since it edits a lot of vanilla NPCs; of course, you would not see many of my changes in that case.\n<br />\n<br />With a proper use of a bashed patch, it should be compatible with anything that is compatible with OOO.\n<br />\n<br />Load LATE in the load order,[b] no matter what LOOT says![/b]\n<br />[b]BETTER CITIES[/b]: For the changes in some of the Bravil NPC's inventory to be kept, it needs to be loaded AFTER Better Cities Full.esp\n<br />\n<br />\n<br />[b]EXAMPLE OF LOAD ORDER (OLD)[/b]\n<br />\n<br />This is the load order I have found best (I include here, for clarity purposes,\n<br />the other mods I made linked above):\n<br />\n<br />[i]DLCHorseArmor[/i]\n<br />[i]DLCHorseArmorUnofficial Patch[/i]\n<br />[i]DLCOrrery.esp.[/i]\n<br />[i]DLCOrrery UnofficialPatch.esp[/i]\n<br />[i]DLCVileLair[/i]\n<br />[i]DLCVileLairUnofficial Patch[/i]\n<br />[i]DLCMehrunesRazor.esp[/i]\n<br />[i]DLCMehrunesRazor- Unofficial Patch.esp[/i]\n<br />[i]DLCThievesDen.esp[/i]\n<br />[i]DLCThievesDenUOP.esp[/i]\n<br />[i]Oscuro's OblivionOverhaul.esp[/i]\n<br />[i]DLCFrostcrag[/i]\n<br />[i]DLCFrostcragUnofficial Patch (not to be used withRR)[/i]\n<br />[i]Knights[/i]\n<br />[i]OblivionUncut.esp[/i]\n<br />[i]DLCBattlehornCastle[/i]\n<br />[i]Knightsunofficial patch [/i]\n<br />[i](DLCHorseArmor- OOO)[/i]\n<br />[i] (DLCOrrery - OOO)[/i]\n<br />[i](DLCVileLair- OOO)[/i]\n<br />[i](DLCMehrunesRazor- OOO)[/i]\n<br />[i](DLCThievesDen- OOO)[/i]\n<br />[i](DLCFrostcrag- OOO) (any version)[/i]\n<br />[i](DLCBattlehornCastle- OOO)[/i]\n<br />[i] (Oscuro's Oblivion Overhaul - Knights of theNine) (my patch)[/i]\n<br />[i]OblivionUncut - OOO Adaptation.esp[/i]\n<br />[i]UniqueLandscapes.esp[/i]\n<br />[i]UniqueLandscapes - OOO Adaptation[/i]\n<br />[i]ShiveringOOO.esp[/i]\n<br />[i]OOO Improvements and Additions - Shivering Isles.esp[/i]\n<br />[i]BalancedMagic.esp[/i]\n<br />[i]BetterCities Full/Better Cities Bravil (in case you are not using the fullversion)[/i]\n<br />[i]OOOExtended.esp[/i]\n<br />[i]Alluring PotionBottles - OOO Extended.esp (my patch)[/i]\n<br />[i]OOO improvements and Additions[/i]\n<br />[i]Difficulty Plug ins. (optional)[/i]\n<br />[i]OOO Extended Difficulty Adjustements (recommended)[/i]\n<br />[i]The rest of the Better Cities plug ins (including Better Imperial City) [/i]\n<br />[i]BetterCities Full - OOO (my replacer mod or the original patch)[/i]\n<br />[i]Bashed Patch[/i]\n<br />[i]Maskar's Overhaul[/i]\n<br />\n<br />\n<br />[b]USE WITH OOO EXTENDED (OLD)[/b]\n<br />\n<br />This mod was made with all Kobal add-ons (OOOExtended, OOO Shivering Isles) in mind, but they are not required. When using OOO Extended, the optional plug in\n<br />in my mod \"OOO Extended difficulty adjustements\" is highly recommended.\n<br />\n<br />[b]IMPORTANT[/b]: You must download the latest version of OOO AND [b]OOO MiscFiles[/b]: it is [b][i]there [/i][/b]you can find an patched version ofOOOExtended which is necessary not only for my mod, but to run the latest versions of OOO with OOOExtended together!"
