nexusDescription="I always found it rather odd that older NPCs with craggy and wrinkly faces should have the neck of a 20 year old. So I experimented and added some definition to the necks of Cyrodiil. This is the result of said experiment. \r<br />This is pretty much my first attempt here, so things may not be perfect yet. I may update this in time, I may not. Time will tell.\r<br />[b][u]\r<br />What this mod does:[/u][/b]\r<br />\r<br />This mod alters the agemap normal maps from Nuska&#39;s Oblivion Character Overhaul v2 and adds extra detail around the neck and throat. There&#39;s some subtle blend toward the edge of the mesh to avoid accentuating the neck seam.\r<br />\r<br />All human and elf males get new necks, older females also get new necks. Orcs, Kajiit and Argonians remain unaffected.\r<br />\r<br />[b][u]What this mod does NOT do:[/u][/b]\r<br />\r<br />Fix the neck seams. Ruin your game. End world hunger. Help you find true love. Make you a cup of tea.\r<br />[b][u]\r<br />Installation and requirements:[/u][/b]\r<br />\r<br />This mod requires [url=http://www.nexusmods.com/oblivion/mods/44676]Oblivion Character Overhaul v2 by nuska \r<br />[/url]which in turn requires [url=http://www.nexusmods.com/oblivion/mods/43752]Blockhead by shadeMe\r<br />[/url]which in turn requires [url=http://obse.silverlock.org/]Oblivion Script Extender (OBSE)\r<br />[/url]Once those are installed, simply extract Better Necks into your data folder and Bob&#39;s your Lobster&#33;\r<br />A quick word of warning: this will overwrite some of OCO&#39;s files so make a back up before installing mine.\r<br />\r<br />Special thanks to nuska for creating OCO. Tis a truly amazing work and you should be using it."
