nexusDescription="[b]Name[/b]: Hentai Gentlemen's EyeCandy Body\n<br />[b]Version[/b]: 1.21\n<br />[b]Date[/b]: 11/4/2009\n<br />[b]Category[/b]: Models and Textures\n<br />[b]Requirements[/b]: Oblivion Patch 1.2.0.214\n<br />[b]Recommended[/b]: Oblivion Mod Manager\n<br />[b]Author(s)[/b]: RAIAR &amp; MadCat221\n<br />\n<br />\n<br />[b]Description[/b]\n<br />===========\n<br />Improved body meshes by RAIAR (Normal, Fighter &amp; GUTS) and MadCat221 (EBE). It also includes Exnem's EyeCandy Body textures, so it's a standalone mod now.\n<br />\n<br />[b]Make sure you read the installation instructions if you aren't familiar with OMOD files (redundant statement but you can never be to sure XD)[/b]\n<br />\n<br />\n<br />[b]Details[/b]\n<br />=======\n<br />There are 4 body versions you can choose:\n<br />\n<br />Normal: This is a modification of the Eye Candy (lower, upper &amp; hand) body meshes made by RAIAR. The upper mesh features more natural looking breasts, improved shoulders area and waist. The lower mesh features a wider rear, wider thighs and a more natural genital area (Yes, it includes some modeled \"bits\" :P). The wider body shape might clip with certain outfits though. There are a lot of improvements that make the body look more feminine overall. Features Nude (With A, AA, B, C, D &amp; H Cup sizes and S, M, L &amp; XL lowerbody sizes) and Underwear (with E-Cup and Medium lowerbody Size) versions. \n<br />\n<br />Fighter: A more muscular body which features Nude (With A, B, C, D, E &amp; H Cup sizes and S, M, L &amp; XL lowerbody sizes) and Underwear (with E-Cup and Medium lowerbody Size) versions.\n<br />\n<br />Fighter Extra Buff Edition: A body with a bit more substance in the shoulders and upper arms that aims to be the HGEC-Derived body most faithful to the original Exnem's Eye Candy Body. Features Nude and Underwear versions, both come with with E-Cups and Medium lowerbody size.\n<br />\n<br />GUTS: A very muscular/bulky body featuring H-Cups and a really large lower body. Only Nude version.\n<br />\n<br />\n<br />[b]Notes[/b]\n<br />=======\n<br />I (}{ellKnight) am not the author of this mod, I uploaded these on Nexus (after getting permissions) since not many people had access to this and a lot of modders could put it to good use.\n<br />\n<br />[b]Use the 1.21 OMOD only with [url=http://www.nexusmods.com/oblivion/mods/2097/?]Oblivion Mod Manager[/url], not with Nexus Mod Manager![/b]\n<br />\n<br />The textures that appear in the screenshots are the [url=http://www.nexusmods.com/oblivion/mods/20022/?]Ozmo's High Rez Skin Textures for HGEC[/url], not the ones included in the mod.\n<br />Additional screenshots are found in the screenshots folder.\n<br />\n<br />[b]If you're wondering where to get the faces/hairs from the screenshot refer to [url=http://forums.nexusmods.com/index.php?/topic/51577-hg-eyecandy-body/page-76#entry1221092]this post[/url][/b].\n<br />\n<br />[b]It doesn't need an ESP file.[/b] So stop asking for one.\n<br />\n<br />MGEC Body is included in the archive, it will not be installed by the OMOD though. This version can be used to make armors/clothing, it features smaller wrists and ankles. Still you can use the normal meshes in your projects (I recommend using the normal ones).\n<br />\n<br />If you use custom races make sure you look for EC/HGEC textures for those races (ask the authors of those mods for support). You might get away with just copying the texture to the right folder so they overwrite the textures that originally came with the race but you might get texture seams.\n<br />\n<br />\n<br />[b]Install &amp; Uninstall[/b]\n<br />===================\n<br />You have a few options. Most of them involve using a mod manager.\n<br />\n<br />[b]Don't forget to also use [url=http://cs.elderscrolls.com/index.php?title=Oblivion_Mods_FAQ#Archive_Invalidation]Archive Invalidation[/url] or the mod won't work as intended[/b].\n<br />[b]Alternatively (and preferably) use ﻿[url=https://www.nexusmods.com/oblivion/mods/49568]this OBSE plugin[/url] that﻿[/b] [b]will handle archive invalidation for you if you use OBSE.[/b]\n<br />[u]\n<br />Option 0 (the best one): Mod Organizer 2 or Vortex[/u]\n<br />Grab the NMM file and install it through Mod Organizer 2 or Vortex. They're both excellent mod managers that are a lot more feature rich than the old stuff bellow it.\n<br />\n<br />[u]Option 1: NMM[/u]\n<br />Get the NMM package and install it with Nexus Mod Manager. Props to Haikem for providing the install scripts for this!\n<br />\n<br />[u]Option 2: Wrye Bash[/u]\n<br />If you use Wrye Bash I recommend downloading [url=http://www.nexusmods.com/oblivion/mods/45422/?]this instead[/url].\n<br />I has everything packed up so that you can easily install it with Wrye Bash (BAIN wizard included). Props to nycz for making it!\n<br />\n<br />[u]Option 3: OBMM[/u]\n<br />Grab the OMOD ready file and [url=http://cs.elderscrolls.com/index.php?title=Oblivion_Mods_FAQ#OBMM]read this!!![/url] It explains the basics of installing mods and OBMM-ready files with [url=http://www.nexusmods.com/oblivion/mods/2097/?]Oblivion Mod Manager[/url]. It's OMOD-ready file meaning it can be converted to an OMOD file with OBMM, there are instructions on how to do that on the page I linked.\n<br />\n<br />[u]Option 4: Manual install[/u]\n<br />If you know what you're doing you can install it manually (that's why it isn't packed as a OMOD directly) which isn't that hard but you need some basic mod know-how that I'm not going to explain, use the CS Wiki and Google.\n<br />\n<br />\n<br />\n<br />[b]Incompatibility[/b]\n<br />===============\n<br />This is compatible with any other Exnem-derived body mod as the critical element of compatibility is the body texture, not the mesh.\n<br />\n<br />\n<br />[b]Known Issues or Bugs[/b]\n<br />====================\n<br />None are known.\n<br />\n<br />\n<br />[b]History[/b]\n<br />=======\n<br />1.00  8th of March 2008 - Initial release.\n<br />1.01 13th of March 2008 - Added a newer version of the fixed hand mesh.\n<br />1.10 19th of March 2008 - Updated with improved meshes and a new more muscular version (the fighter version).\n<br />1.11 21st of March 2008 - Added the MGEC version.\n<br />1.12 23rd of March 2008 - Uploaded new file containing more cup sizes for the normal version.\n<br />1.13 29th of March 2008 - Uploaded new file containing more cup sizes for the fighter version.\n<br />1.14 30th of March 2008 - Fixed the AA - D fighter versions.\n<br />1.15  5th of April 2008 - Added the H-cup (both normal and fighter versions) and more lower body varieties.\n<br />1.16  6th of April 2008 - Added the Underwear version of the E-cup.\n<br />1.17  9th of April 2008 - OMOD added.\n<br />1.18 29th of April 2008 - Added the GUTS version.\n<br />1.19 31st of August 2008 - Added MadCat's Fighter EBE (Extra Buff Edition).\n<br />1.20  4th of May 2009 - Updated and fixed OMOD by Taanyth, it now includes Exnem's EyeCandy Body textures so this pack is standalone now.\n<br />1.21 11th of May 2009 - More OMOD fixes, it now includes Exnem's EyeCandy Body foot mesh.\n<br />1.21 9th of July 2010 - Changed the installation instructions\n<br />1.21 17th of July 2014 - Updated the installation instructions again.\n<br />1.21 14th of August 2014 - New NMM compatible archive added and added link for BAIN ready archive to the description.\n<br />\n<br />[b]Contact[/b]\n<br />=======\n<br />You can contact me (}{ellKnight) at TESNexus and at [url=http://tesadventures.com/forum/index.php]TESAdventures[/url], I uses the same nickname there.\n<br />\n<br />\n<br />[b]Credits[/b]\n<br />=======\n<br />Thanks to RAIAR, for giving }{ellknight permissions to upload his body meshes in TESNexus.\n<br />Thanks to Morniel_DeAnhelo for his help in contacting with the author and getting permissions.\n<br />Thanks to Exnem for starting the whole EC thing.\n<br />Thanks to MadCat221 &amp; ACDale for EBE.\n<br />Thanks to The TESAdventures community for being a laid-back, friendly and creative bunch and Aragorn89 for starting it.\n<br />Thanks to Dark0ne for keeping TEXNexus up.\n<br />Thanks to Lhammonds for the Readme Generator utility and his dedication to the ES community.\n<br />Thanks to The TESEyeCandy Forum, for testing, encouragement, and gratitude.\n<br />Thanks to Bethesda Softworks for making The Elder Scrolls IV.\n<br />Thanks to Taanyth for finally fixing the OBMM script (}{ellKnight's been busy &amp; lazy XD)\n<br />Thanks to nycz for making a BAIN ready archive available here: [url]http://www.nexusmods.com/oblivion/mods/45422/?[/url]\n<br />Thanks to Haikem for providing the install scripts for the NMM version.\n<br />Also thanks to claustromaniac, DrakeTheDragon and the other people that have been helping users with their issues with this mod.\n<br />\n<br />[b]Tools Used[/b]\n<br />==========\n<br />[url=http://www.nexusmods.com/oblivion/mods/2097/?]Oblivion Mod Manager[/url]\n<br />[url=http://lhammonds.game-host.org/obmm/tools_readme_generator1.asp]Readme Generator[/url]\n<br />\n<br />\n<br />[b]Licensing/Legal[/b]\n<br />===============\n<br />You can do whatever you want with this mod but all it is asked in return is that you give Exnem, RAIAR &amp; MadCat221 credit if you distribute any part of this mod."
