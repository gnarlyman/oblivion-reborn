nexusDescription="Female EyeCandy - Wardrobe v0.1\r\nby Exnem\r\n\r\n\r\nDescription:\r\n\r\nThis is a plugin for \\\"The Elder Scrolls IV: Oblivion\\\" that brings new armors and clothes for females to wear. This will be an ever growing plugin and it will be updated constantly to add more clothes.\r\n\r\nThis plugin uses my female body replacer (underwear or nude version), so you will have to get that first to use this outfits.\r\n\r\nFemale EyeCandy - Body Replacer (Underwear)\r\nhttp://www.tessource.net/files/file.php?id=10168\r\n\r\nFemale EyeCandy - Body Replacer (Nude)\r\nhttp://www.tessource.net/files/file.php?id=10171\r\n\r\nOfficial EyeCandy Mods Forum (register here to be up to date and know of current releases).\r\nhttp://www.exnemsims.com/oblivion/forum\r\n\r\nSpecial care has been taken in correct rigging and skinning to make the whole body move well and have no visible seams or gaps between body parts.\r\n\r\nCurrently this mod includes the following clothing sets:\r\n\r\nAmazon Armor v1.0\r\nThis set is worn by an Amazon Warlord who lives in Wooden Hand Fort, Southeast of Chorrol. You will have to get the armor from her.\r\n\r\nSorceress Outfit v1.0\r\nThis sets are worn by 2 Witches that live in Fort Rayles, Northwest of Chorrol. You will have to kill them to get the outfits.\r\n\r\n\r\nInstallation:\r\n\r\nManual Version.- \r\nYou will need to extract all the folders in the .zip archive to your \\\"\\\\Oblivion\\\\Data\\\" game path.\r\n\r\n\r\nKNOWN ISSUES AND BUGS:\r\n\r\nBecause of the topolgy of the forearm in my custom body, the gloves may have some clipping in extreme positions.This is a problem of the body not the armor, and we will fix it soon.\r\n\r\nThe loincloths and skirts may have some clipping with the thighs in some animations, it was either this or attach the skirt to the thighs completely which in turn gives some aweful stretching. I think it looks better this way, and unless we can use some sort of cloth simulation, clipping will always be an issue.\r\n\r\n\r\nDisclaimer and Terms of Use:\r\n\r\nFeel free to use this work however you see fit. If you want to take parts from this plugin to merge with another, or change textures or edit the mesh or anything you want, feel free, just give me credit for my work.\r\n\r\n\r\nVersion History:\r\n\r\n0.1 - Inital release"
