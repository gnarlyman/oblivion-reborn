nexusDescription="Name: Restore All Attributes Spell\r\nVersion: 1.1\r\nDate: 11 February 2011\r\nCategory: Magic - Spells & Enchantments\r\nRequirements: Oblivion\r\nAuthor(s): Lanceor\r\nSource: http://www.tesnexus.com/downloads/file.php?id=36537\r\n\r\nDescription\r\n===========\r\nTired of having eight different restore spells to restore each of eight attributes? This simple mod adds a purchasable \\\"Restore All Attributes\\\" spell.\r\n\r\nLocation\r\n========\r\nThe spell is purchasable from Edgar Vautrine at Edgar\\'s Discount Spells in the Imperial City Market District.\r\n\r\nDetails\r\n=======\r\nBase Mana Cost: 24\r\nSkill Level Required: Novice\r\n\r\nCustom spells that restores multiple attributes are unavailable from the Spellmaking Altar which is why this spell was created.\r\n\r\nTo keep it accessible, the spell only restores one point in each attribute so it may need to be cast repeatedly. Changing it to restore 2 points would make it a 72 point Journeyman spell, inaccessible to starting players.\r\n\r\nHow do I delete existing Restore Attribute spells?\r\n==================================================\r\nYou can use a utility like Wrye Bash.\r\n\r\nInstall/Upgrade\r\n===============\r\n1. Extract RestoreAllSpells.esp to a temporary location.\r\n2. Copy it to (install folder)\\\\Oblivion\\\\Data\\\\\r\n3. Start Oblivion Launcher, click \\'Data Files\\', place a checkmark besides RestoreAllSpells.esp.\r\n\r\nUninstall\r\n=========\r\n1. Start Oblivion Launcher, click Data Files, uncheck RestoreAllSpells.esp.\r\n2. Delete RestoreAllSpells.esp.\r\n3. The spell will be removed from your spell list and will not affect future saves.\r\n\r\nIncompatibility\r\n===============\r\nWon\\'t conflict with anything. The spell is added to Edgar\\'s spell list via a script and no items or NPC\\'s were edited.\r\n\r\nKnown Issues or Bugs\r\n====================\r\nNone known or expected - it\\'s an exceedingly simple mod!\r\n\r\nHistory\r\n=======\r\n1.0 2011/01/09 - Mod created during a lunchbreak.\r\n1.1 2011/02/11 - Added Restore Speed - what an embarrasing mistake!\r\n\r\nContact\r\n=======\r\nYou can find me at TESNexus, the Bethesda Forums and TES Alliance as \\\"Lanceor\\\".\r\n\r\nCredits\r\n=======\r\n- Bethesda for creating Oblivion and giving modders free reign to let their imaginations run wild.\r\n- TESNexus.com for providing file hosting and resources for authors and players alike.\r\n- LHammonds for his ever-useful Readme Generator.\r\n- VitaliyT for pointing out a crucial error.\r\n\r\nTools Used\r\n==========\r\nTES Construction Set - http://www.tesnexus.com/downloads/file.php?id=11367\r\nReadme Generator - http://lhammonds.game-host.org/obmm/tools_readme_generator1.asp\r\n\r\nLicensing/Legal\r\n===============\r\nFeel free to do anything you like with this mod."
