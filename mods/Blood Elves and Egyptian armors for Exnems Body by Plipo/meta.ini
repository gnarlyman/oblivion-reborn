nexusDescription="********Blood Elves and Egyptian armors for Exnems Body v0.9*********\r\n\r\nRetextured/modified versions of the wonderful Abovewolf\\'s Rosana armors and Exnem\\'s sorceress armor. At first, the idea was to make a custom armor for the future blood elves race mod on which ChaironDeCeleste is currently working.\r\nI have also worked on my own project of a Rosana\\'s armor retexture, which is based on an egyptian theme (ok that\\'s not obvious.. :).  \r\n\r\n\r\n*******************************Details****************************\r\n\r\nThe armors are worn by two warrioresses, who are currently hanging out with some necromancers in Istirus fort. Istirus is located between Skingrad and Kvatch, south of Miscarcand (on the other side of the road).\r\n\r\nBoth armor are light.  \t\r\n\r\nVersion 0.9 - untested version, some problem may appear, please report them as soon as possible in order to correct them. No icons yet, i\\'ll add them in version 1.0\r\n \r\n*******************************Credits****************************\r\n\r\n\r\nExnem - Female body mod and original sorceress armor\r\nAbovewolf - original models and textures from his \\\"BIG BOX OF CHOCOLATE ROSANA\\\" mod\r\nPlipo -  Retexture, Meshes mixing and other stuffs\r\n\r\n*******************************thanks******************************\r\n\r\nTo Exnem for having made his awesome body and armors\r\nTo the folks at the Exnem\\'s oblivion mods forum (http://exnemsims.com/oblivion/forum/YaBB.pl) for their support, comments and intersting advices\r\nTo nifskope/niflib developpers for their really usefull tools\r\n\r\n\r\n****************************Installation***************************\r\n\r\n\r\nExtract and place esp plus both folders (textures and meshes) in your Oblivion\\\\Data directory. Don\\'t forget to activate the esp and enjoy!\r\n\r\n\r\n\r\n"
