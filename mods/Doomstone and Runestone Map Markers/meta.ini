nexusDescription="Description\n<br />===========\n<br />Places map markers at all Doom and Rune Stones across Cyrodiil. They are not marked on your map, you will have to find them on your own, but after discovering one, you can now Fast-Travel to them.\n<br />Based on a_saffin's \"Doomstone Map Markers\" mod.\n<br />\n<br />If you want some insight on how many those exactly are, all stones mentioned here: [url=http://en.uesp.net/wiki/Oblivion:Magical_Stones]http://en.uesp.net/wiki/Oblivion:Magical_Stones[/url]﻿ (except for the nirn stone, as it doesn't exist in game) have been given map markers.\n<br />The nirn stone is added into the game by various other mods, most well known of these is probably Oblivion Uncut: [url=https://www.nexusmods.com/oblivion/mods/47191]https://www.nexusmods.com/oblivion/mods/47191[/url]\n<br />\n<br />Credits\n<br />=======\n<br />Mixxa77 - Doomstone and Runestone Map Markers.\n<br />a_saffin - Doomstone Map Markers - [url=https://www.nexusmods.com/oblivion/mods/20240]https://www.nexusmods.com/oblivion/mods/20240[/url]\n<br />\n<br />Other credits as stated on the page of the original mod.\n<br />\n<br />Tools Used\n<br />==========\n<br />TES Construction Set\n<br />Construction Set Extender - https://www.nexusmods.com/oblivion/mods/36370\n<br />Egg Translator - http://www.ei-der-zeit.com/forum/filebase/index.php?entry/325-egg-translator/\n<br />7Zip - https://www.7-zip.org/\n<br />TES4Gecko - https://www.nexusmods.com/oblivion/mods/8665\n<br />TES4Edit - https://www.nexusmods.com/oblivion/mods/11536\n<br />GIMP - https://www.gimp.org/\n<br />paint.NET - https://www.getpaint.net/\n<br />\n<br />Permissions\n<br />===========\n<br />Please refer to the permissions drop-down box above."
