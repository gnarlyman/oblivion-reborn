nexusDescription="Name: [color=red]AddActorValues[/color]\r\nVersion: [color=red]v1.0[/color]\r\nDate: 2011-12\r\nCategory: Gameplay Effects and Changes\r\nAuthor: JRoush (jroush.tesmods@gmail.com)\r\nForum Thread: [url=http://forums.bethsoft.com/index.php?/topic/1118031-relz-addactorvalues-v1beta4]Bethesda Forums[/url]\r\n\r\n[size=+1][u]Requirements:[/u][/size]\r\nNOTE: using AddActorValues with the wrong verison of Oblivion will, *at best*, cause it to crash.\r\n[list][*] Oblivion v1.2.0416\r\n[*] TESCS v1.2.404 (only if you are planning to make mods using AAV)\r\n[*] OBSE v0019 or higher[/list]\r\n\r\n[size=+1][u]    Description:\r\n[/u][/size]AddActorValues allow modders to create and use *new* actor values, which are treated *exactly* like the built-in ones.  New actor values won\\'t do anything by themselves, of course, but they are very convenient ways for mods to attach information to any actor, which is then saved with the savegame.  For details, see the included `Features\\' pdf.\r\n\r\nNote that this is a *resource* - a mod is required to actually use the new features.  Included is a demo mod, AddActorValues_Example.esp, which illustrates how to use the basic features.\r\n\r\nNew Actor Values can be used for:\r\n-   All Scripts, using the various Get/Set/Mod functions that end in \\'C\\' or \\'F\\'\r\n-   GetActorValue & GetBaseActorValue Conditions for Quests, Packages, etc.\r\n\r\nNew Actor Values cannot be used for:\r\n-   Skills (this is planned for future versions).  \r\n-   Magic Resistances or the target of a ModAV effect, *unless you install OBME*\r\n-   Class Major Attributes\r\n\r\n[size=+1][u]    Latest News:\r\n[/u][/size]I\\'m working on the framework for more advanced features.  This will involve a rewrite of most of AAV (and many of my other mods), so I\\'ve decided to officially freeze the current AAV code line.  I\\'ve also decided to stop calling it \\\"beta\\\" - should have done that months ago.  I will obviously still continue to release bug fixes.\r\n\r\n[size=+1][u]    Questions & Bug Reports:\r\n[/u][/size]If you encounter a problem, something that is confusing or doesn\\'t seem to work as expected, *please* do the following:\r\n[list][*] Read the readme, and the AV-related pages on the TESCS wiki.\r\n[*] Reproduce the problem.  I cannot fix problems that I can\\'t reproduce, so try to work out an exact procedure for me.\r\n[*] Grab a copy of your save or mod file and \\\"AddActorValues.log\\\" and \\\"AddActorValues_CS.log\\\" from the Oblivion\\\\ folder.\r\n[*] Send everything to jroush.tesmods@gmail.com, or post it the forum thread.\r\n[/list]    \r\n[size=+1][u]    Compatibility:\r\n[/u][/size]AddActorValues is compatible with all conventional mods, and with all known obse plugins.  If you encounter an incompatiblity, please report it right away.\r\n  \r\n[size=+1][u]    Changes:\r\n[/u][/size][v1.0]\r\n- Changed the way that AAV overwrites the native OBSE ModAVModC, SetAVModC, and GetAVModC commands.  This should fix situations where those functions were not working as expected, such as just after starting a new game.\r\n\r\n[size=+1][u]    Credits:\r\n[/u][/size]- Bethesda Softworks, whose game has sucked up far, far too much of my free time\r\n- The OBSE team for their incredible modding resource, without which this plugin would be a joke.\r\n- Saebel, for providing me with essential debugging feedback."
