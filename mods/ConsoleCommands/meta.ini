nexusDescription="[center][color=#6fa8dc][size=6]Console Commands[/size][/color][/center]\r<br />\r<br />\r<br />[size=2]Description:\r<br />==========\r<br />\r<br />ConsoleCommands - as the name suggests - is an OBSE plugin which adds some console/script commands to the game.\r<br />These are mostly commands I made for myself but which may be useful to others. More commands may be added in the future.\r<br />The majority of these commands was made to be used from the console, but many can be used from scripts as well.\r<br />Before using any of the commands make sure you read the explanation for each command which may contain notes about\r<br />possible limitations and/or quirks if the command is not used correctly.\r<br />\r<br />Important: I do NOT take requests for new console/script commands.\r<br />\r<br />\r<br />[color=#a4c2f4]Current command list:\r<br />===================[/color]\r<br />\r<br />This is just a quick overview.\r<br />For detailed explanation about each command please check the readme file.\r<br />\r<br />\r<br />1) [color=#6aa84f]GetCCVersion[/color]\r<br />---------------\r<br />Just a helper function to query the current version of this plugin.\r<br />\r<br />\r<br />2) [color=#6aa84f]AddDebugNote[/color] [[color=#45818e]AddDN[/color]] (message:string)\r<br />----------------------------------------\r<br />A command mainly for landscape designers and patch writers.\r<br />It is basically the same as the existing &#39;BetaComment&#39; command\r<br />but with more helpful (hopefully) log output.\r<br />Check the long description in the readme file for more info.\r<br />\r<br />\r<br />3) [color=#6aa84f]ToggleFlyCam2[/color] [[color=#45818e]TFC2[/color]] (keepTFC:bool)\r<br />--------------------------------------\r<br />This command is just like the original TFC command but additionally &#39;freezes&#39; the game while TFC2 mode is active.\r<br />It is primarily meant for taking screenshots.\r<br />There are some limitations associated with the time freeze so make sure you read the full description in the\r<br />readme file before using this command&#33;\r<br />\r<br />\r<br />4) [color=#6aa84f]GetSkyColor[/color] (layer:string)\r<br />-----------------------------\r<br />Returns the current RGB color value for the specified sky layer (e.g. Ambient, Sky Upper, Sun, etc...).\r<br />Unlike the GetWeatherColor command this returns the actual color you see on the screen which is a\r<br />composition of one or more daytime colors from the current weather and possibly a transition weather.\r<br />\r<br />\r<br />5) [color=#6aa84f]SetSkyColor[/color] (layer:string) (red:int) (green:int) (blue:int)\r<br />--------------------------------------------------------------\r<br />Sets the RGB color value for the specified sky layer in the current frame.\r<br />This command only affects the sky colors in the current frame (i.e. while the console is open).\r<br />When you close the console the game will overwrite all your changes in the next frame.\r<br />This command is therefore primarily meant to test weather colors.\r<br />To prevent the game from resetting your changes you can activate TFC2 mode (see above) to freeze the game.\r<br />This can be used to make a temporary custom lighting when taking screenshots.\r<br />\r<br />\r<br />6) [color=#6aa84f]Help2[/color] (searchString:string) (filter:int)\r<br />-------------------------------------------\r<br />Lists all objects in the game containing the specified search string in the name and/or editor ID.\r<br />You can add a search filter (optional) to narrow the search.\r<br />See the full description in the readme file for a complete list of supported filters.\r<br />You can also type help2 &#34;?&#34; in the console to print out the filter list.\r<br />\r<br />\r<br />\r<br />History:\r<br />=======\r<br />\r<br />1.1    2017/04/05        Added command: Help2\r<br />1.0    2017/03/07        Initial release.\r<br />\r<br />\r<br />Credits:\r<br />=======\r<br />\r<br />Thanks to the OBSE team for the Oblivion Script Extender.\r<br />Thanks to Bethesda for creating Oblivion.\r<br />Thanks to TESNexus.com for the a one-stop-shop resource for authors and players.\r<br />\r<br />\r<br />Legal:\r<br />=====\r<br />\r<br />This mod is provided as &#34;is&#34;.\r<br />The author is not responsible for any damage done to your save game, game installation\r<br />or even your computer (though such an event happening is highly unlikely).\r<br />Use at your own risk.[/size]"
