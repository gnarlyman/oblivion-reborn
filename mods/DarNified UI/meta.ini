nexusDescription="[center][img]http://darnified.net/images/dui_header_tesn.png[/img][/center]\n<br />\n<br />This mod gives the Oblivion UI the most extensive facelift yet. It's goal is to rid the pc version of the horrid xbox interface. Fonts are smaller, settings can be adjusted in game, user controls are scaled, more info on screen, and the hud is vastly improved.\n<br />\n<br />\n<br />[u][b]OBMM Install[/b][/u]\n<br />\n<br />[i][b][color=red]This requires OBMM v1.1.12+ and 'Allow additional script types' to be set in OBMM settings.[/color][/b][/i]\n<br />\n<br />1. Extract OMOD file in the archive to \"(Oblivion install folder)&#92;obmm&#92;mods&#92;\" \n<br />2. Start Oblivion Mod Manager.\n<br />3. Make sure the icon by the mod name is green/tan.\n<br />4. Double-click the the mod in the right-hand side of the OBMM screen.\n<br />5. After the install process has finished, icon should turn blue.\n<br />6. DarNify Books in Wrye Bash.\n<br />\n<br />\n<br />[b][u]7z Install[/u][/b]\n<br />\n<br />1. Extract archive to Oblivion&#92;Data.\n<br />2. Copy the desired fonts to Oblivion&#92;Data&#92;fonts\n<br />3. Edit \"My Documents&#92;My Games&#92;Oblivion&#92;Oblivion.ini\" to use the new fonts.\n<br />\n<br />Normal fonts:\n<br />[code][Fonts]\n<br />SFontFile_1=Data&#92;Fonts&#92;Kingthings_Regular.fnt\n<br />SFontFile_2=Data&#92;Fonts&#92;DarN_Kingthings_Petrock_14.fnt\n<br />SFontFile_3=Data&#92;Fonts&#92;DarN_Kingthings_Petrock_16.fnt\n<br />SFontFile_4=Data&#92;Fonts&#92;DarN_Oblivion_28.fnt\n<br />SFontFile_5=Data&#92;Fonts&#92;Handwritten.fnt[/code]\n<br />\n<br />Large fonts:\n<br />[code][Fonts]\n<br />SFontFile_1=Data&#92;Fonts&#92;Kingthings_Regular.fnt\n<br />SFontFile_2=Data&#92;Fonts&#92;DarN_LG_Kingthings_Petrock_14.fnt\n<br />SFontFile_3=Data&#92;Fonts&#92;DarN_LG_Kingthings_Petrock_18.fnt\n<br />SFontFile_4=Data&#92;Fonts&#92;DarN_Oblivion_28.fnt\n<br />SFontFile_5=Data&#92;Fonts&#92;Handwritten.fnt[/code]\n<br />\n<br />SFontFile_1 will depend on your choice (see 4.4).\n<br />\n<br />4. Custom options (custom_files folder)\n<br />\n<br />4.1: If you're using AF/KCAS/Realistic Leveling for leveling, copy KCAS_levelup_menu.xml to \"Data&#92;menus\". Remove the KCAS_ prefix. Set the \"_KCAS\" setting in stats_config.xml to &amp;true;.\n<br />4.2: The classic inventory can be installed by copying the contents of the \"classic_inventory\" folder to the \"Data\" folder.\n<br />4.3: If you're using Trollf's \"Loading Screens Themed Replacer\", copy trollf_loading_menu.xml to the \"Data&#92;menus\" folder. Remove the trollf_ prefix.\n<br />4.4: The fonts folder has a selection of fonts suitable for replacing font 1 (preview included). Copy the desired .fnt and .tex pair to \"Data&#92;fonts\", and edit the ini.\n<br />4.5 For the \"No Quest Added popup\" option, copy empty.xml to \"Data&#92;menus&#92;generic\", and name it quest_added.xml.\n<br />\n<br />5. DarNify Books\n<br />\n<br />DarNified Books is handled in Wrye Bash from v1.3.1. You need Wrye Bash 1.54+.\n<br />To DarNify your books, Rebuild Patch and select \"Tweak Assorted-&gt;DarNify Books\".\n<br />\n<br />\n<br />[b][u]Uninstall OMOD[/u][/b]\n<br />\n<br />1. Start Oblivion Mod Manager.\n<br />2. Double-click the name of the mod in the right-hand side of the OBMM screen, click Yes. (icon should turn green)\n<br />\n<br />\n<br />[b][u]Uninstall 7z[/u][/b]\n<br />\n<br />1. Delete the files you don't want.\n<br />2. Edit your ini to the original font setup:\n<br />\n<br />[code][Fonts]\n<br />SFontFile_1=Data&#92;Fonts&#92;Kingthings_Regular.fnt\n<br />SFontFile_2=Data&#92;Fonts&#92;Kingthings_Shadowed.fnt\n<br />SFontFile_3=Data&#92;Fonts&#92;Tahoma_Bold_Small.fnt\n<br />SFontFile_4=Data&#92;Fonts&#92;Daedric_Font.fnt\n<br />SFontFile_5=Data&#92;Fonts&#92;Handwritten.fnt[/code]\n<br />\n<br />\n<br />[b][u]Usage[/u][/b]\n<br />\n<br />All config files are in \"Data&#92;menus&#92;prefabs&#92;darn\". The in game settings are in hudmainmenu_config.xml, and the name of the setting to adjust is displayed in parenthesis at the end of the help text when hovering the setting in game.\n<br />\n<br />In general, the files are named similarly to their core files with a \"_config\" at the end. The Map Menu is configured in map_config.xml, etc. All the new (1.3.0) options can be configured there. If you're installing via OBMM, the filenames and their config files are listed in the descriptions.\n<br />\n<br />You'll find several articles on installation, configuration and DarNified Books in my Articles forum [link redacted].\n<br />\n<br />\n<br />[b][u]Compatibility[/u][/b]\n<br />\n<br />If you have other ui mods installed some menus may conflict, ie. some of my menus rely on screen real estate not being occupied, and therefore some overlap can occur. When mixing mods, make sure the matching config file (if present in the archive) is included. inventory_config.xml should always accompany inventory_menu.xml. Using BTMods inventory_config.xml with my inventory_menu.xml will produce strange results. :)\n<br />\n<br />See paragraph 4.x of the \"7z Install\" section for specific compatability menus included.\n<br />\n<br />[b]nGCD:[/b] Use the levelup_menu.xml provided with nGCD.\n<br />[b]Raised Spellmaking Enchantments Limits/Supreme Magicka/L.A.M.E:[/b] This funcionality is already part of DarNified UI. The settings are in enchantmentsetting_config.xml.\n<br />[b]Immersive Interface:[/b] This mod should not be used in conjunction with DUI. The HUD can be configured to look and function just like it.\n<br />[b]Natural Environments:[/b] This mod includes modified gfx for some of the hud elements. Take care not to include the textures/menus* folders when installing this.\n<br />[b]OblivionXP Levelling:[/b] Use the Stats Menu and LevelUp Menu included with OXP. OBMM will report a conflict with this, but no files will be overwritten.\n<br />\n<br />\n<br />[b][u]Known Issues or Bugs[/u][/b]\n<br />\n<br />- When you reach top rank in a faction, the next rank label will read 'DUMMY'. There are three fixes for this (in preferred order):\n<br />\n<br />1. Get the [url=http://www.tesnexus.com/downloads/file.php?id=5296]Unofficial Oblivion Patch v2.2.0+[/url].\n<br />2. Get the Faction Rank Fix: [url=http://www.tesnexus.com/downloads/file.php?id=5862]Here[/url] or [url=http://www.tesnexus.com/downloads/file.php?id=12039]here[/url].\n<br />3. Use this workaround that will hide the next rank info completely:\n<br />Open stats_config.xml, change &lt;_s4fnrv&gt; &amp;true; &lt;/_s4fnrv&gt; to &lt;_s4fnrv&gt; &amp;false; &lt;/_s4fnrv&gt;.\n<br />\n<br />- As of v1.3.0, the HUD functions as a settings repository for the other menus, and is a required menu. The Breathmeter for example, takes it's alpha value from the hud. If the hud doesn't have that value on offer, the alpha will be 0, which is invisible... This may be possible to work around, and I will look into it if there's a serious demand for it.\n<br />\n<br />\n<br />[b][u]History[/u][/b]\n<br />\n<br />[b]1.3.2, 2008/12/07[/b]\n<br />\n<br />- Fixed white square bug in the stats menu\n<br />- Fixed minimum (no) area in enchantmentsetting menu says \"9\"\n<br />- Fixed a height inconsistency with the Stats Menu\n<br />- Cleaned up Magic Menu a bit\n<br />- Added config file for Persuasion Menu\n<br />- Added scrollbar to Message Menu for long texts (eg. Kyoma's Journal Mod)\n<br />- Added alignment options to HUD Location text\n<br />- Script: Added compatability for Oblivion XP Levelling\n<br />- Script: Fixed some issues with modular installs\n<br />- Script: Hopefully fixed \"Palatino\" error\n<br />- Script: Mod detection now also detects active mods\n<br />\n<br />You'll find the complete changelog in the ReadMe and here [link redacted].\n<br />\n<br />\n<br />[b][u]FAQ[/u][/b]\n<br />\n<br />[b]Q:[i] Why is my hud cut off at the bottom?[/i][/b]\n<br />[b]A:[/b] Make sure the iSafeZone* values in the ini are set to default (20).\n<br />\n<br />[b]Q:[i] My browser gives me some rubbish error message when I open the xml files![/i][/b]\n<br />[b]A:[/b] Open them with a normal text editor. Do not use Word or anything that inserts formatting codes.\n<br />\n<br />[b]Q:[i] What is that small bar below my weapon?[/i][/b]\n<br />[b]A:[/b] That's the durability bar. It shows the health of your currently equipped weapon.\n<br />\n<br />[b]Q:[i] My durability bar doesn't go all the way up. Why?[/i][/b]\n<br />[b]A:[/b] It has a notch @100%. Once you reach expert level in armorer, it will fill up completely (125%).\n<br />\n<br />[b]Q:[i] Is it compatible with DarkUI?[/i][/b]\n<br />[b]A:[/b] Not out of the box. Gothic251 has made [url=http://www.tesnexus.com/downloads/file.php?id=11280]DarkUI'd Darn[/url] for that.\n<br />\n<br />[b]Q:[i] My loot menu lags. Why?[/i][/b]\n<br />[b]A:[/b] That's there in the default menu  as well. Time required to open this menu increases with the number of items in your inventory.\n<br />\n<br />[b]Q:[i] My resolution is &lt; 1024 and ...[/i][/b]\n<br />[b]A:[/b] Anything below 1024 will look bad. I suggest using vanilla BTMod, DarkUI, or the default config in this case.\n<br />\n<br />[b]Q:[i] I'm making some adjustments to some settings and nothing happens, wtf?[/i][/b]\n<br />[b]A:[/b] The settings you're adjusting are probably overridden. This will most likely change in the future.\n<br />\n<br />[b]Q:[i] I'm editing the ini and nothing changes, wtf? [/i][/b]\n<br />[b]A:[/b] Make sure you're editing the right one (My Documents&#92;My Games&#92;Oblivion&#92;Oblivion.ini).\n<br />\n<br />[b]Q:[i] OBMM tells me \"C# script failed to compile\" ???? [/i][/b]\n<br />[b]A:[/b] Make sure you're using the required version of OBMM.\n<br />\n<br />\n<br />\n<br />[b][u]Contact[/u][/b]\n<br />\n<br />You can find me on the darnifiet net forums [link redacted] as 'DarN'\n<br />You can find me on [url=http://www.bethsoft.com/bgsforums/index.php?]The Official Elder Scrolls Forums[/url] as 'DarN'\n<br />You can find me on [url=http://www.tesnexus.com/index.php]TESNexus.com[/url] as 'DarN'\n<br />\n<br />\n<br />[b][u]Credits[/u][/b]\n<br />\n<br />Beider &amp; Tikigod for BTMod\n<br />Theo Habit for the Font Generator\n<br />Darkbirdy for DarkUIfying my DarNifications and sending bugfixes\n<br />Gothic251 for DarkUIfying my DarNifications and sending bugfixes\n<br />wz_ for offering his excellent inventory\n<br />Eugen Prediger for allowing me to rip off some of his ideas\n<br />Timeslip for OBMM and implementing my suggestions\n<br />Fawzib for TweakOblivion\n<br />ScripterRon for making DarNified Books easy to deal with\n<br />MiSP for his omod script\n<br />Brumbek for his tiling fix\n<br />dongle for his Oblivion font\n<br />Tobit for DarNified Books for OOO\n<br />Wrye for taking DarNified Books off my hands\n<br />Bethesda Software for making some of the most enjoyable and buggy games I have ever encountered\n<br />Everyone making bug reports, suggestions and feeback!\n<br />\n<br />\n<br />[b][u]Tools Used[/u][/b]\n<br />\n<br />[url=http://notepad-plus.sourceforge.net/uk/site.htm]Notepad++[/url]\n<br />[url=http://www.tesnexus.com/downloads/file.php?id=2331]Font Generator[/url]\n<br />[url=http://www.tesnexus.com/downloads/file.php?id=8698]DDS Converter[/url]\n<br />[url=http://niftools.sourceforge.net/]NIFSkope[/url]\n<br />[url=http://www.tesnexus.com/downloads/file.php?id=8665]TES4Gecko[/url]\n<br />[url=http://timeslip.chorrol.com/obmm.html]Oblivion Mod Manager[/url]\n<br />[url=http://msdn2.microsoft.com/en-us/express/aa700756.aspx]Visual C# Express 2008[/url]\n<br />[url=http://www.adobe.com/products/photoshop/]Photoshop[/url]\n<br />[url=http://www.elderscrolls.com/downloads/updates_utilities.htm]TES Construction Set[/url]\n<br />[url=http://lhammonds.game-host.org/obmm/tools_readme_generator1.asp]Readme Generator[/url]\n<br />\n<br />\n<br />[b][u]Licensing/Legal[/u][/b]\n<br />\n<br />Contact me and obtain my permission before re-packaging and/or modifying any part of this mod for release. You'll most likely get it, but I just appreciate being asked y'know? If you're doing so for personal use, then by all means go ahead. :)"
