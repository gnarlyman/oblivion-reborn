nexusDescription="[center]Apparently Oblivion also had the mod limit bug. Here is a potential fix.\n<br />\n<br />\n<br />[u]You will need OBSE for this plugin to work.[/u] Simply overwrite your data folder with the folder in the zip file. An ini file will be generated in the plugins folder where you can edit the maximum allowed handles. Do not edit this if the fix works. It will not increase performance by lowering it, there is also absolutely no point in increasing it. This fix should have no conflicts whatsoever.\n<br />\n<br />\n<br />The game has a hard coded limit of 512 maximum file handles that could be opened at once. This fix simply bumps that up to 2048 to allow for more room for file handles. I picked 2048 because it is the maximum number that Windows usually allows and the more the merrier.\n<br />\n<br />\n<br />[size=3][i]Happy modding![/i][/size]\n<br />\n<br />\n<br />Thanks to lStewieAIl and RoyBatty for helping me along the way.[/center]"
