nexusDescription="[center][size=5][b]RuntimeEditorIDs[/b][/size]\r<br />[size=3][b]You may now use &#39;player.addItem lockPick 100&#39; in the console[/b][/size]\r<br />[b]version 5.0[/b]\r<br />\r<br />[size=3][b]Requires Oblivion Script Extender[/b][/size][/center]\r<br />\r<br />\r<br />[b][size=4][u]Description[/u][/size][/b] \r<br />\r<br />This OBSE plugin allocates editorIDs for forms during runtime and tracks any overrides made by plugins. Can be considered a precursor to something awesome.\r<br />\r<br />\r<br />\r<br />\r<br />[b][size=4][u]Fine Print[/u][/size][/b] \r<br />\r<br />Game initialization time may increase by a few seconds. Game memory usage may increase too, but the discussion of that topic would prove malefic to the plugin.\r<br />\r<br />\r<br />\r<br />[size=4][u][b]Compatibility[/b][/u] [/size]\r<br />\r<br />This mod is, and should be, compatible with every mod there is.\r<br />\r<br />\r<br />\r<br />[size=4][b][u]Credits[/u][/b][/size]\r<br />\r<br />[i]Special thanks[/i] to :\r<br />[list]\r<br />[*]Ian Patterson, Stephen Abel and Paul Connelly (The OBSE Team) – For keeping up the Oblivion Modding spirit and providing the modding community with TES4 Oblivion&#39;s Elixir of Immortality\r<br />[*]LHammonds – For his Readme generator\r<br />[*]JRoush - For reminding me about my latent idea to implement a plugin such as this\r<br />[/list]The Entire Community around the TES Construction Set Wiki – For making such an exhaustive resource catering to ES Modding.\r<br />The Folks at the Construction Set Forums – For all their help, rum and fish.\r<br />The Rest of the Modding Community – For the inspiration I needed to start modding and all the wonderful mods which I use.\r<br />Bethesda – For providing a great game, with enough flaws to keep us busy.\r<br />\r<br />\r<br />\r<br />[size=4][u][b]Change Log[/b][/u][/size]\r<br />\r<br />5.0 - Fixed a bug that prevented the plugin from being loaded into the runtime, added CSE interop support, added plugin interop support\r<br />4.0 - Fixed bug that messed with editorIds of TESSound forms, removed console spam from script command handler, fixed bug that prevented the plugin from being loaded into the CS\r<br />3.0 - Added script command ‘GetRuntimeEditorID’, added support for actors\r<br />2.0 - Fix for the &#39;missing voices&#39; issue\r<br />1.0 - Initial Release"
