nexusDescription="[b]NOTE: Requires OBSE! Should be compatible with pretty much any other OBSE plugin (since I haven't seen any other plugin that also includes this fix), but if you have any problems please let me know!\n<br />\n<br />NOTE2: For the stablest experience I recommend using this with [url=http://enbdev.com/patch_oblivion_enboost_v0259.htm]ENBBoost[/url], [url=http://www.nexusmods.com/oblivion/mods/23208/?]Oblivion Stutter Remover[/url], [url=http://www.nexusmods.com/oblivion/mods/47085/?]EngineBugFixes [/url]and [url=http://www.nexusmods.com/newvegas/mods/53635/?]NVAC [/url](NVAC is for New Vegas, but works with Oblivion too)\n<br />\n<br />NOTE3: If you use [url=http://www.nexusmods.com/oblivion/mods/45749/]Oblivion Reloaded[/url] this fix probably won't have any effect for you, OR changes/fixes a lot of things, which sadly seems to make Alt-Tabbing even more troublesome to the game... Of course they're doing great things for Oblivion, but improving alt-tab support probably isn't that high on their radar :P If I find anything out about the cause I'll be sure to let them know!\n<br />[/b]\n<br />This fixes a crash when alt-tabbing while on the main/pause menu, some have also reported it helped fix other alt-tab crashes with the game too but I'm not sure if it's fixed all of them - I just know that it does definitely fix the main-menu crash for me - but if your game suddenly feels more stable hopefully it helped in some way!\n<br />\n<br />The crash seems to be caused when you alt-tab back into the game, for some reason it tries to look up the coordinates of the exterior cell you're in, obviously when you're on the main menu you're not in an exterior cell - but the game still tries to look up the coordinates regardless, causing a crash since you can't really access data for a NULL cell... (this happens because it calls a class function with a null class pointer, and then crashes when it tries to access the coordinate data from that pointer.)\n<br />\n<br />This plugin just replaces the functions that look up those coordinates with ones that check if the exterior cell is NULL first, and if so just returns 0,0 for the coordinates. Very simple fix, in fact you can take a look at the source code for it here: [url=https://pastebin.com/f31sKiDU]https://pastebin.com/f31sKiDU[/url]\n<br />\n<br />To install you'll need OBSE, just put the AltTabFix.dll file into your Data/OBSE/Plugins/ folder. If a crash is prevented it'll log a message about it in the console."
