nexusDescription="[font=Trebuchet MS][img]https://i.postimg.cc/zGgNRQz4/AR-sign.jpg[/img]﻿﻿﻿\n<br />\n<br />This can be used as an alternative to using the massive \"[url=https://www.nexusmods.com/oblivion/mods/18417]Armamentaruim Complete[/url],\" which already includes a fraction of the \"[url=https://www.nexusmods.com/oblivion/mods/25309]Artifacts 1-1[/url]\" weapons &amp; armor in its' leveled lists. However, Armamentarium does not include the 19 amulets, 9 sets of clothes, 3 potions, 6 lights, and 33 robes available in this mod! [b]Adds over 400 items in total.\n<br />\n<br />Original [i]\"Artifacts 1-1\"[/i] is not required. The entire installation is included here.[/b] If you already have it installed, install the [i]OVERWRITE [/i]version.\n<br />\n<br />[b][i]Artifacts Remastered [/i][/b]will diversify your game. Adding these items to the leveled lists used by [i]townspeople[/i], [i]noblemen[/i], [i]enemies[/i], [i]vendors[/i], and [i]containers [/i]creates an environment where all of these beautiful 'Artifacts' items can be displayed naturally as you level up. I plan to make other leveled list mods... any suggestions are greatly welcome. No one gets tired of variety!\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />[/font][size=2]=============[/size]\n<br />[img]https://i.postimg.cc/gkRmT0Qn/Features.jpg[/img]\n<br />[color=#f4f4f4][font=Trebuchet MS][size=2]==============\n<br />\n<br />\n<br />[/size]...\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />[size=1]This mod includes:[/size][/font]\n<br />[/color][list]\n<br />[*][font=Courier New][color=#f4f4f4][size=4]400+ Leveled items[/size][/color][/font]\n<br />[*][font=Courier New][color=#f4f4f4][size=4]Complete balancing[/size][/color][/font]\n<br />[*][font=Courier New][color=#f4f4f4][size=4]FPS-friendly install of \"[url=https://www.nexusmods.com/oblivion/mods/25309]Artifacts 1-1[/url]﻿\" with little to no lag*[/size][/color][/font]\n<br />[*][font=Courier New][color=#f4f4f4][size=4]Lore-friendly changes to Artifacts.[/size][/color][/font]\n<br />[/list][color=#f4f4f4][color=#f4f4f4]\n<br />\n<br />[font=Courier New]...[/font]\n<br />\n<br />\n<br />[font=Courier New]...[/font][/color][font=Courier New][color=#f4f4f4][size=1]\n<br />[/size][/color][/font][font=Courier New][color=#f4f4f4][size=1]\n<br />    ﻿   ﻿    ﻿   ﻿   ﻿   ﻿   \n<br />[/size]...\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />...[/color][/font]\n<br />\n<br />\n<br />[font=Courier New]...[/font]\n<br />\n<br />\n<br />[font=Courier New]...[/font]\n<br />[/color][font=Courier New][color=#f4f4f4][size=1]\n<br />    ﻿   ﻿    ﻿   ﻿   ﻿   ﻿   \n<br />[/size]...\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />[color=#f4f4f4]   [size=2]   ﻿﻿ PLANNED:[/size]﻿   ﻿   ﻿\n<br />[/color][font=Courier New][color=#f4f4f4][size=1]   + Add new quests to the Collector's Society. These quests will be treasure hunting goose-chases with many immersive choices.\n<br />   ﻿+ Add new items from other projects to leveled lists.\n<br />   ﻿   ﻿+ Replace meshes/textures of certain items with more unique ones.\n<br />   ﻿   ﻿+ Replace icons of certain items with more unique ones.\n<br />[/size][/color][/font][font=Courier New][color=#f4f4f4][size=1]   ﻿+ Create compatibility patches for ANY AND ALL conflicting mods. Please leave suggestions![/size][/color][/font]\n<br />\n<br />\n<br />...\n<br />\n<br />\n<br />...\n<br />\n<br />   ﻿   ﻿COMPATIBILITY:\n<br />[list]\n<br />[*]Now fully compatible with [url=https://www.nexusmods.com/oblivion/mods/40923?tab=description]Tamrielic Lore.[/url]\n<br />[*]Should be compatible with almost all mods.\n<br />[*]Planned compatibility with [url=https://www.nexusmods.com/oblivion/mods/51189?tab=files]New Rumare Village.[/url] ﻿\n<br />[/list]\n<br />...\n<br />\n<br />\n<br />ENJOY! Oblivion never dies.\n<br />[size=4]\n<br />CREDITS:\n<br />trollf \n<br />Corepc \n<br />TeamArma[/size]\n<br />[/color][/font]\n<br />[size=1]*Lag was tested on an insane build of ~240+ mods. The interior clutter of the Collector's Society has been \n<br />cut down drastically, resulting in consistent frame rates that are normal for other interiors and will last well\n<br />on massive, cobbled-together Oblivion builds. Fantastic lag reduction.[/size][size=2]\n<br />[/size][size=5]Report any and all bugs. All suggestions will be considered, no matter how small.[/size]"
