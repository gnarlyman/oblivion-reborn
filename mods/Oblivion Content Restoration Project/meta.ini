nexusDescription="DESCRIPTION:\r<br />\r<br />In the process of making Oblivion, some content fell through the cracks; some was cut, some was abandoned, and some is simply inaccessible. This mod attempts to restore as much as possible in a way that blends as seamlessly as possible into the vanilla game -- almost as if it had been there all along.\r<br />\r<br />A complete account of everything restored by this mod would be too long to list, but ReadMe section boasts a changelog, and the screenshots showcase some of the restorations.\r<br />\r<br />REQUIREMENTS:\r<br />\r<br />A working copy of The Elder Scrolls IV: Oblivion, the [url=http://www.nexusmods.com/oblivion/mods/5296/]Unofficial Oblivion Patch[/url], Shivering Isles, the [url=http://www.nexusmods.com/oblivion/mods/10739/]Unofficial Shivering Isles Patch[/url], and the [url=http://obse.silverlock.org/]Oblivion Script Extender[/url].\r<br />\r<br />INSTALLATION:\r<br />\r<br />Place the contents of the .7z file in your &#34;Data&#34; folder, which is usually located under Bethesda Softworks/Oblivion.\r<br />\r<br />The ReadMe document is not required for the mod to run -- you may keep it or discard it.\r<br />\r<br />UNINSTALLATION:\r<br />\r<br />Delete the included .esp file and all the files that came in the distribution archive.\r<br />\r<br />UPDATING:\r<br />\r<br />Replace all older files with newer versions. If in doubt, replace all mod files with the contents of the latest uploaded archive.\r<br />\r<br />No in-game configuration is necessary.\r<br />\r<br />BUGS:\r<br />\r<br />As of yet, none.\r<br />\r<br />COMPATIBILITY:\r<br />\r<br />As this mod requires the Unofficial Patches, no fixes will be overwritten. However, there are a number of changes made to quests, dialogue, and NPCs. It would be best to use [url=http://www.nexusmods.com/oblivion/mods/11536/]TES4Edit[/url] to find conflicts.\r<br />\r<br />ADD-ONS:\r<br />\r<br />A small plugin is available which restores one unused response to the &#34;Anvil chapel attack&#34; topic and one unused section of the Prophet&#39;s sermon. This file requires Knights of the Nine (obviously) and the [url=http://www.nexusmods.com/oblivion/mods/9969]Unofficial Knights of the Nine Patch[/url]."
