nexusDescription="[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359426927.jpg[/img]\n<br />\n<br />From the creator of Anduril Reforged comes a sequel to Knights of the Nine. Umaril has been vanquished and the people of Cyrodiil hail you as the Divine Crusader. But little do they know that Pelinal's relics hold the key to protecting the freedom of all humankind... or enslaving it.\n<br />\n<br />[list][*]An epic quest where only YOU can prevent the enslavement of all free humans.\n<br />[*]Upgrade and customise the Crusader's Relics.\n<br />[*]Over a hundred new items.\n<br />[*]40+ NPCs, 1,500+ lines of dialogue, fully voice acted by a dozen voice actors.\n<br />[*]Original music score by Ronald Van Deurzen.\n<br />[*]Dozens of new followers.\n<br />[*]Massive, functional player home designed specifically for busy adventurers.\n<br />[*]See below for the full features list!\n<br />[/list]\n<br />[center][img]https://staticdelivery.nexusmods.com/images/101/1547970-1359379736.png[/img][url=http://oblivion.nexusmods.com/mods/modsofthemonth][img]https://staticdelivery.nexusmods.com/images/101/1547970-1359379344.png[/img][/url] [url=http://www.nexusmods.com/oblivion/mods/42490/?tab=7&amp;navtag=http%3A%2F%2Fwww.nexusmods.com%2Foblivion%2Fajax%2Fmodvideo%2F%3Fid%3D42490&amp;pUp=1][img]https://staticdelivery.nexusmods.com/images/101/1547970-1359379789.png[/img][/url][/center]\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359431777.jpg[/img]\n<br />\n<br />[list]\n<br />[*]The [url=http://bethsoft.com/en-us/games/oblivion_knights_of_the_nine]Knights of the Nine[/url] DLC\n<br />[*][url=http://obse.silverlock.org]Oblivion Script Extender[/url] (OBSE) 0020 or higher\n<br />[/list]\n<br />\n<br />[size=4][i]RECOMMENDED[/i][/size]\n<br />\n<br />[list]\n<br />[*][url=http://oblivion.nexusmods.com/mods/5296]Unofficial Oblivion Patch[/url]\n<br />[*][url=http://oblivion.nexusmods.com/mods/9969]Unofficial Mods Patch – Knights of the Nine[/url]\n<br />[/list]\n<br />\n<br />[size=4][i]OPTIONAL[/i][/size]\n<br />\n<br />[list]\n<br />[*]The [url=http://www.uesp.net/wiki/Oblivion:Horse_Armor_Pack]Horse Armor Pack[/url] DLC is required for the optional horse barding.\n<br />[*]A mannequin mod of your choice. I use [url=http://oblivion.nexusmods.com/mods/2055]Reznod Mannequins[/url].\n<br />[/list]\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359431889.jpg[/img]\n<br />\n<br />[size=4][i]INSTALLATION - NEXUS MOD MANAGER[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Open the [color=#A0522D]Mods[/color] tab.\n<br />[*]If  the mod is not already be there, click [color=#A0522D]Add Mod from File[/color] and point Nexus Mod Manager to the file location.\n<br />[*]Double-click [color=#A0522D]Knights of the Nine Revelation - Knights of the Nine Revelation 1_3_7 Full Install[/color].\n<br />[*]In the Plugins Tab, ensure that [color=#A0522D]Knights – Revelation.esp[/color] is loaded AFTER [color=#A0522D]Knights.esp[/color] and [color=#A0522D]Knights - Unofficial Patch.esp[/color].\n<br />[/list]\n<br />\n<br />[size=4][i]INSTALLATION - WRYE BASH[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Place the downloaded archive in your[color=#A0522D] Bash Installers[/color] folder.\n<br />[*]Launch Wrye Bash.\n<br />[*]Open the [color=#A0522D]Installers[/color] tab.\n<br />[*]Right-click on the downloaded archive and click [color=#A0522D]Install[/color].\n<br />[*]In the [color=#A0522D]Mods[/color] tab, ensure that [color=#A0522D]Knights – Revelation.esp[/color] is loaded AFTER [color=#A0522D]Knights.esp[/color] and [color=#A0522D]Knights - Unofficial Patch.esp[/color].\n<br />[/list]\n<br />\n<br />[size=4][i]INSTALLATION - MANUAL[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Use a utility like [url=http://www.7-zip.org]7-Zip[/url] or [url=http://www.rarlab.com]WinRar[/url] to extract the files to a temporary location.\n<br />[*]Once extracted, you should have the following files and folders:\n<br /> - [color=#A0522D]Knights - Revelation.esp[/color]\n<br /> - [color=#A0522D]Knights - Revelation.esm[/color]\n<br /> - [color=#A0522D]Knights - Revelation.bsa[/color]\n<br /> - [color=#A0522D]Knights - Revelation Music[/color] (folder)\n<br /> - [color=#A0522D]DistantLOD[/color] (folder)\n<br />[*]Copy these five items into your [color=#A0522D]Oblivion/Data[/color] folder.\n<br />[*]Use a mod manager such as [url=http://oblivion.nexusmods.com/mods/2097]Oblivion Mod Manager[/url] or [url=http://oblivion.nexusmods.com/mods/22368]Wrye Bash[/url] to ensure that [color=#A0522D]Knights - Revelation.esp[/color] is loaded after [color=#A0522D]Knights.esp[/color].\n<br />[/list]\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359431955.jpg[/img]\n<br />\n<br />You can start any time after finishing the Knights of the Nine main quest. To begin, sleep in the master bed in the Priory of the Nine. \n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359432255.jpg[/img]\n<br />\n<br />[size=3][b]RAM Usage[/b][/size] - Parts of Knights of the Nine: Revelation are very RAM intensive. It is recommended that you close all other programs and consider using a program like [url=http://www.iobit.com/gamebooster.html]GameBooster[/url] to temporarily remove unneeded background processes.\n<br />\n<br />[size=3][b]Teleportation and TCL[/b][/size] - Many quest updates are triggered by passing through certain areas. Therefore avoid using using teleportation mods to get out of dungeons. Likewise, avoid using [color=#A0522D]tcl[/color] in the console to walk through walls.\n<br />\n<br />[size=3][b]Worldspace Borders[/b][/size] - If you have disabled the borders for worldspaces, it is possible to walk outside the playable area into a seemingly unfinished area.\n<br />\n<br />[size=3][b]Tough Bosses[/b][/size] - The bosses in this mod are difficult to beat, and will require discovering their weaknesses and formulating a strategy to beat them even at 50% difficulty. Don't be afraid to turn down the difficulty if they are too tough for you.\n<br />\n<br />[size=3][b]Quest Markers[/b][/size] - Quest markers are only given if your character would realistically know the location of the target.\n<br />\n<br />[size=3][b]Double Face Bug[/b][/size] - Vanilla Oblivion has a creepy bug where NPCs will have two faces after fast-travelling. To fix this, a copy of troybayliss's [url=http://oblivion.nexusmods.com/mods/34753]Fast Travel Double Face Fix[/url] is integrated into this mod. If you wish to disable it, open the console and type [color=#A0522D]Stopquest  DoubleFaceFix[/color].\n<br />\n<br />[size=3][b]Resurrected Knights[/b][/size] - As the eight Original Knights of the Nine are needed for this quest, they will be resurrected if they are dead, and are given an “essential” status.\n<br />\n<br />[size=3][b]Loud Speeches[/b][/size] - As a workaround for Oblivion's sound volume limitations, certain speeches will remain at full volume regardless of the NPC's distance.\n<br />\n<br />[size=3][b]Weapon Turn Undead Shader[/b][/size] - The yellow weapon shader for the “Turn Undead” effect will be temporarily disabled while the Mace of the Crusader is equipped.\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359432076.jpg[/img]\n<br />\n<br />Knights of the Nine: Revelation was fully cleaned and designed for maximum compatibility. It should conflict with very few mods. It is likely to conflict with mods that make significant changes to Knights of the Nine itself or Tamriel exterior cells (-1,3), (0, 3), (-1,2) or (0, 2) where Sir Gareth's castle is located.\n<br />\n<br />[size=4][i]KNOWN CONFLICTS AND WORKAROUNDS[/i][/size]\n<br />\n<br />[size=3][b]HGEC Based Body Replacers[/b][/size] - If you use a HGEC based body replacer, you will find that skin textures are out of alignment for the Ayleid Armour. This is aesthetic only and does not affect gameplay. Nephenee13 has made a [url=http://oblivion.nexusmods.com/mods/42563]conversion[/url] that fixes this.\n<br />\n<br />[size=3][b]See You Sleep[/b][/size] by mmmpld - May cause you to be unable to activate anything after a dream in the first scene. Workaround: type [color=#A0522D]StartQuest P1DsleepFix[/color] in the console and then sleep in a different bed in the Priory. This will teleport you back to the master bed, after which the glitch should be resolved. A new version of See You Sleep created by LogicDragon has not been tested yet.\n<br />\n<br />[size=3][b]Reneers Guard Overhaul[/b][/size] - Reneers Guard Overhaul's regional bounty system may cause a bounty not to be erased after completing a certain quest. It is recommended that you switch off the regional bounty system until the completion of the Knights of the Nine questline.\n<br />\n<br />[size=3][b]Greenview Manor[/b][/size] - Occupies the same spot as Sir Gareth's Castle. Loading it [i]before[/i] [color=#A0522D]Knights - Revelation.esp[/color] will result in the manor floating in the castle courtyard but both mods will otherwise be playable. Loading it [i]after[/i] [color=#A0522D]Knights - Revelation.esp[/color] will bury the entrance to the castle underground, making it impossible to proceed.\n<br />\n<br />[size=3][b]High-Res Varla and Welkynd Texture Replacer[/b][/size] - If you use the optional mesh replacer, you'll find that a certain \"giant crystal\" in one of the quests cannot be interacted with. Temporarily disable this replacer to get past that quest.\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359432008.jpg[/img]\n<br />\n<br />Patches are regularly released which not only fix bugs and mod conflicts found by the community, but sometimes add new features as well. It is recommended that you keep the mod up-to-date. Installing a patch will not affect your savegame nor will it require a clean save. You can view the [url=JavaScript:loadBox('/ajax/modchangelog/?id=42490')]changelog[/url] to see what was added in recent patches.\n<br />\n<br />\n<br />[size=4][i]PATCH INSTALLATION - NEXUS MOD MANAGER[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Open the [color=#A0522D]Mods[/color] tab.\n<br />[*](Recommended) Uninstall any previous patches by double-clicking on it.\n<br />[*]If the latest patch is not already in the [color=#A0522D]Mods[/color] tab, click [color=#A0522D]Add Mod from File[/color] and point Nexus Mod Manager to the file location.\n<br />[*]Double-click [color=#A0522D]Knights of the Nine Revelation - Knights of the Nine Revelation 1_3_7 Patch[/color].\n<br />[*]If a message saying that a different version of Knights of the Nine: Revelation has been detected, click [color=#A0522D]No[/color] to install the patch normally. [u]Do not click [color=#A0522D]Yes[/color] as this will replace the entire mod with just the patch![/u]\n<br />[*]If prompted to overwrite existing files, click [color=#A0522D]Yes to all[/color].\n<br />[*]In the Plugins tab, ensure that [color=#A0522D]Knights - Revelation.esp[/color] is loaded after [color=#A0522D]Knights.esp[/color] and [color=#A0522D]Knights - Unofficial Patch.esp[/color].\n<br />[/list]\n<br />\n<br />[size=4][i]PATCH INSTALLATION - WRYE BASH[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Place the downloaded archive in your [color=#A0522D]Bash Installers[/color] folder.\n<br />[*]Launch Wrye Bash.\n<br />[*]Open the [color=#A0522D]Installers[/color] tab.\n<br />[*](Recommended) Right-click on any previously installed patches and click [color=#A0522D]Uninstall[/color].\n<br />[*]Right-click on the downloaded patch and click [color=#A0522D]Install[/color]. \n<br />[*]In the Mods tab, ensure that [color=#A0522D]Knights - Revelation.esp[/color] is loaded after [color=#A0522D]Knights.esp[/color] and [color=#A0522D]Knights - Unofficial Patch.esp[/color].\n<br />[/list]\n<br />\n<br />[size=4][i]PATCH INSTALLATION - MANUAL[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Use a utility like 7-Zip or WinRar to extract the files to a temporary location.\n<br />[*]Once extracted, you should have the following files and folders:\n<br /> - [color=#A0522D]Knights - Revelation.esp[/color]\n<br /> - [color=#A0522D]Knights - Revelation.esm[/color]\n<br /> - [color=#A0522D]Knights - Revelation Patch.bsa[/color]\n<br />[*]Copy these three items into your [color=#A0522D]Oblivion/Data folder[/color], overwriting when prompted.\n<br />[*]Use a mod manager such as Oblivion Mod Manager or Wrye Bash to ensure that [color=#A0522D]Knights - Revelation.esp[/color] is loaded after [color=#A0522D]Knights.esp[/color] and [color=#A0522D]Knights - Unofficial Patch.esp[/color].\n<br />[/list]\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359469004.jpg[/img]\n<br />\n<br />[size=4][i]UNINSTALLATION - NEXUS MOD MANAGER[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Open the [color=#A0522D]Mods[/color] tab.\n<br />[*]Double-click on the Knights of the Nine: Revelation files to uninstall them.\n<br />[*](Optional) Highlight any Knights of the Nine: Revelation files and click the red [color=#A0522D]X[/color] button to delete it.\n<br />[/list]\n<br />\n<br />[size=4][i]UNINSTALLATION - WRYE BASH[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Open the [color=#A0522D]Installers[/color] tab.\n<br />[*]Right-click on any installed Knights of the Nine: Revelation packages and click [color=#A0522D]Uninstall[/color]. \n<br />[/list]\n<br />\n<br />[size=4][i]UNINSTALLATION - MANUAL[/i][/size]\n<br />\n<br />[list=1]\n<br />[*]Delete the following from your [color=#A0522D]Oblivion/Data[/color] folder:\n<br /> - [color=#A0522D]Knights - Revelation.esp[/color]\n<br /> - [color=#A0522D]Knights - Revelation.esm[/color]\n<br /> - [color=#A0522D]Knights - Revelation.bsa[/color]\n<br /> - [color=#A0522D]Knights - Revelation Patch.bsa[/color] (if it exists)\n<br /> - [color=#A0522D]Knights - Revelation Music[/color] (folder)\n<br />[*]Delete any files beginning with [color=#A0522D]aaKOTNR[/color] in the [color=#A0522D]Oblivion/Data/DistantLOD[/color] directory. (Make sure you don't delete anything else though.)\n<br />[/list]\n<br />\n<br />[size=4][i]OPTIONAL BUT RECOMMENDED[/i][/size]\n<br />\n<br />After you have started Knights of the Nine: Revelation, certain items are necessarily changed as part of the mod. If you uninstall the mod halfway through, these changes may not be reverted.\n<br />\n<br />If you wish to revert to vanilla Knights of the Nine, download and install the [color=#A0522D]Knights - Revelation Uninstaller.esp[/color] and activate it. On your next game load, it should automatically revert the changes that the mod made. After this, you may delete [color=#A0522D]Knights - Revelation Uninstaller.esp[/color].\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359469090.jpg[/img]\n<br />\n<br />[color=#E3A853][b]Does this mod overwrite the Knights of the Nine DLC? Does it change anything?[/b][/color]\n<br />\n<br />This mod is an add-on to Knights of the Nine and does not overwrite anything in your data directory. The original quest line is untouched with one minor exception:\n<br />\n<br />The eight original Knights of the Nine followers are used for a lot of dialogue in KOTN:R so it is necessary for them to be alive. The mod will resurrect them if they are dead, or keep them essential if they are alive.\n<br />\n<br />[color=#E3A853][b]Do I need to finish Knights of the Nine before installing this mod?[/b][/color]\n<br />\n<br />No. If installed beforehand, it will sit there quietly until you finish the Knights of the Nine main quest. Its only effect is that it will prevent your Knights from dying.\n<br />\n<br />[color=#E3A853][b]Can I play this mod without Knights of the Nine?[/b][/color]\n<br />\n<br />No. The game will crash if you try. If you don't already have Knights of the Nine, the best legal ways to obtain it are the Oblivion Game of the Year Edition from Steam (discounts frequently occur) or the boxed set from places like eBay and Amazon. Hopefully Bethesda will remedy the availability of the DLCs soon.\n<br />\n<br />[color=#E3A853][b]Can I play this mod without OBSE?[/b][/color]\n<br />\n<br />No. Many of the quests will not work. A fail-safe at the beginning of the quest-line and every subsequent game load detects your OBSE version and warns you if you don't meet the requirements. You can obtain the latest version of OBSE from [url=http://obse.silverlock.org]http://obse.silverlock.org[/url].\n<br />\n<br />[color=#E3A853][b]Can evil characters play this mod?[/b][/color]\n<br />\n<br />Yes! While the mod is themed around playing a \"good\" knight, there are numerous benefits for evil characters:\n<br />[list]\n<br />[*]You'll be able to use the Crusader's Relics regardless of your infamy.\n<br />[*]Your character will still want to complete this quest - for self preservation and also to send a clear message to the bad guy not to mess with your character...\n<br />[*]The biggest quest rewards are alignment-neutral and can be used by anyone.\n<br />[/list]\n<br />[color=#E3A853][b]Can mages, rogues or other non-warrior classes play this mod?[/b][/color]\n<br />\n<br />While warriors fit in best thematically, mages and rogues aren't completely left out. You can complete the questline using magic or stealth as you prefer. Some of the quest rewards are incredibly beneficial to mages. The Crusader's Relics's powers can be switched between \"stealthy\" and \"damaging\" modes at any time.\n<br />\n<br />[color=#E3A853][b]Is this mod lore friendly?[/b][/color]\n<br />\n<br />This mod takes established Elder Scrolls lore, especially the Song of Pelinal and the Adabal-a, and recreates it as faithfully as possible. All events portrayed in the mod are consistent with what is written in the books.\n<br />\n<br />[color=#E3A853][b]I have a pirated copy of Oblivion and...[/b][/color]\n<br />\n<br />If your copy of Oblivion is pirated, please don't ask for help if the mod isn't working. Cracked versions are notorious for having hidden bugs, practically guaranteeing that mods as complex as this one won't work.\n<br />\n<br />If you wait for a Steam sale, the Oblivion Game of the Year Edition can be obtained for under USD $10. Not only is this incredible value for the hundreds of hours of gameplay that you'll get out of it, you'll know that by buying the game you've done the right thing and you'll be able to post in various forums without risking a ban for piracy.\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359469178.jpg[/img]\n<br />\n<br />[color=#E3A853][b]What should I do at Vanua?[/b][/color]\n<br />\n<br />Maybe you have reached a dead end. Head back out and see if further clues present themselves.\n<br />\n<br />[color=#E3A853][b]Where am I supposed to get a shovel from?[/b][/color]\n<br />\n<br />Naomi tells you that she has one propped up next to her door. Shovels are also purchasable from vendors in the Imperial City.\n<br />\n<br />[color=#E3A853][b]I keep dying after Malenir starts his spell-casting. How do I get past this stage?[/b][/color]\n<br />\n<br />You must choose the correct location or you will die. Hint: Early in the questline, you should have completed a certain quest that seemed rather meaningless at the time.\n<br />\n<br />[color=#E3A853][b]How do I defeat the final boss?[/b][/color]\n<br />\n<br />If you are paralysed every time you try to fight the final boss then you are missing a quest item that Naomi wanted to give you. Check your journal carefully!\n<br />\n<br />[color=#E3A853][b]How do I get the horse?[/b][/color]\n<br />\n<br />A few days after you've finished the questline, one of the Knights will approach you saying that they've spotted something in the forest. If you want to start this quest as soon as possible, stay around the barracks where the Knights usually hang out.\n<br />\n<br />[color=#E3A853][b]How do I customise my armour or change its properties?[/b][/color]\n<br />\n<br />After you have purchased all the upgrades for your new home, there will be a book in the Lord's Quarters that will allow you to do this, and other things as well.\n<br />\n<br />[color=#E3A853][b]What is the Armour of Sotha Sil used for?[/b][/color]\n<br />\n<br />When the expansion pack is released, there will be a quest to restore it to full strength.\n<br />\n<br />[color=#E3A853][b]Where can I find Trueflame and all the pieces of the Armour of Sotha Sil?[/b][/color]\n<br />\n<br />Boots - In the water slightly northwest of the statue\n<br />Cuirass - In the water slightly southeast of the statue\n<br />Gauntlets - On the beach, slightly north of Fanacesecul\n<br />Greaves - In the grass against the wall of the northern cylindrical column that houses the spiral stairs to the entrance.\n<br />Helm - On the stairs to the entrance of Fanacasecul.\n<br />Shield - On the Southeast cylinder, the jetty that juts out to sea.\n<br />Trueflame - On the steps leading up from the beach.\n<br />\n<br />[color=#E3A853][b]Where do I use the Sunhallowed Elven Arrow?[/b][/color]\n<br />\n<br />Use the clues at Trumbe to pinpoint the location.[list]\n<br />[*]An Island southeast of the Imperial City\n<br />[*]There's some sort of dragon where you need to go\n<br />[*]You need to be standing on some sort of platform and shoot at the midday sun.\n<br />[/list]Once you've figured out the location, you'll find that there is nothing there. However, just because there's nothing there now, it doesn't mean that there wasn't something there in the past... If you are [i]still[/i] stuck after reading the above, this [url=http://www.youtube.com/watch?v=Mz1poDqJ0ww]video[/url] will show you what to do to finish the quest.\n<br />[color=#E3A853][b]Will a certain NPC return for future adventures?[/b][/color]\n<br />\n<br />No comment.\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359520696.jpg[/img]\n<br />\n<br />[size=3][b]QUEST[/b][/size]\n<br />\n<br />[list]\n<br />[*]An epic quest spanning 4000 years where YOU are the only one who can stop the slavery of all humankind.\n<br />[*]Meet characters from Elder Scrolls lore including Pelinal, Umaril, Alessia and Morihaus.\n<br />[*]40+ NPCs, 1,500+ lines of dialogue, fully voice acted by a dozen voice actors.\n<br />[*]Original music score by Ronald Van Deurzen.\n<br />[*]Many new dungeons and a strange but familiar world...\n<br />[*]No hand-holding - quest markers are only given for known locations.\n<br />[*]Half a dozen mini side quests for when you need a break from saving the world.\n<br />[*]The biggest, most destructive final battle ever seen in a mod!\n<br />[/list]\n<br />\n<br />[size=3][b]ITEMS[/b][/size]\n<br />\n<br />[list]\n<br />[*]Multiple upgrades for your Crusader relics with stronger enchantments and new powers.\n<br />[*]New armour mesh for female Divine Crusaders.\n<br />[*]Customise your Crusader Relics: heavy or light, polished or antique - your choice!\n<br />[*]The Crusader relics now level all the way to level 40 instead of stopping at level 21.\n<br />[*]Use the Crusader Relics regardless of infamy (with a quest related explanation for the sudden change)\n<br />[*]Dozens of of new armour and weapons including full sets for the various factions you'll encounter.\n<br />[*]Huge castle that functions as a player home and headquarters for the Knights of the Nine.\n<br />[/list]\n<br />\n<br />[size=3][b]FOLLOWERS[/b][/size]\n<br />\n<br />[list]\n<br />[*]The Knights of the Nine are expanded from nine members into a small army.\n<br />[*]Individual Knights of the Nine play important roles in the questline and aren't just window dressing.\n<br />[*]The Knights of the Nine all receive equipment upgrades and will repair their own equipment.\n<br />[*]All followers are either essential or re-spawning.\n<br />[*]Summon a squad of soldiers to be at your beck and command.\n<br />[*]Paladin's Warhorse - as the divine Crusader should not be riding Shadowmere. Armoured version available if you have the Horse Armor DLC.\n<br />[/list]\n<br />\n<br />[size=3][b]EXTRAS[/b][/size]\n<br />\n<br />Certain features were created, but were disabled for performance or realism reasons. But once you've finished the main quest, you can re-enable them if you want to!\n<br />\n<br />[list]\n<br />[*]Revisit areas that are no longer accessible.\n<br />[*]Re-customise your your Crusader Relics if you change your mind about their appearance or weight.\n<br />[*]Roll-back (and roll-forward) upgrades to the Crusader Relics.\n<br />[*]An extension to your new home.\n<br />[*]Summon up to 72(!) followers at once! (Note: I'm not responsible for lagging out your game or causing crashes if you do this!)\n<br />[/list]\n<br />\n<br />[size=3][b]MOD[/b][/size]\n<br />\n<br />[list]\n<br />[*]From the maker of Anduril Reforged.\n<br />[*]Fully compatible with the Unofficial Mods Patch\n<br />[*]Fully compatible with most other mods\n<br />[*]100% clean. Designed for maximum compatibility and cleaned using TES4Edit to reduce crashes and prevent conflicts and save-game corruption.\n<br />[/list]\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359521149.jpg[/img]\n<br />\n<br />[url=JavaScript:loadBox('/ajax/modpermissions/?id=42490')]Click here[/url] or click on the \"P\" button in the Actions bar just beneath the images.\n<br />\n<br />\n<br />[img]https://staticdelivery.nexusmods.com/images/101/1547970-1359521204.jpg[/img]\n<br />\n<br />[url=JavaScript:loadBox('/ajax/modchangelog/?id=42490')]Click here[/url] or click on the Changes tab above."
