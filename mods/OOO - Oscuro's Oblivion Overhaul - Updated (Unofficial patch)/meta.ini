nexusDescription="[b][u]Attention, friends! This patch is only valid for OOO - Updated versions 1.5.xx. Do not use this patch if your OOO version is 1.6.xx or newer, as they are incompatible.[/u]\n<br />\n<br />This patch fixes many \"[url=https://www.nexusmods.com/oblivion/mods/46199]OOO - Oscuro's Oblivion Overhaul - Updated[/url]\" parameters, mostly related to container operation and animation, traps and much more. \n<br />- fixed 165 scripts.\n<br />- fixed 66 main containers\n<br />- fixed 2 showcases\n<br />- and some nif files of animated containers\n<br />Also, the patch adds several new parameters and settings.[/b]\n<br />\n<br />\n<br />[b]Container Traps[/b]\n<br />==============\n<br />Fixed all scripts for containers with traps. Now traps work correctly, either discharging or triggering ([i]1 time per session[/i]). Also fixed the message block \"warning about trap\" and depending on your choice ([i]cancel, or attempt to discharging[/i]) it will do exactly what is required.\n<br />Additionally, the script for initializing traps has been corrected in accordance with the selected value in the ini file ([i]disable, random or always[/i]).\n<br />\n<br />\n<br />[b]Harvest and Containers[/b]\n<br />====================\n<br />Fixed a bug with Ayleid chests disappearing ([i]when trying to close them[/i]), this was related to the glow add feature, but this feature has a hard limit of 10 glow source placements and all subsequent openings/closings resulted in the bug.\n<br />I decided to go back to the original code using PlaceAtMe because I really like Ayleid glow.\n<br />Also added a separate setting to disable animation for Ayleid chests in the ini file.\n<br />\n<br />\n<br />Fixed animation of closing some containers ([i]Ayleid chests, coffins[/i]), which had different variants of opening animation, when the animation of closing jumped from one variant to another. Now closing occurs correctly, from the position of the animation in which the opening was initialized\n<br />\n<br />Fixed scripts for ore veins. Now you can mine more diverse nuggets of gold, silver, platinum and copper ([i]added by OOO[/i]). Also added a setting to enable/disable the respawn of ore veins in the ini file.\n<br />\n<br />Fixed the \"Pearl mining\" script from shellfish. After mining, the shells disappear. Also added a setting to enable/disable shellfish respawning in the ini file.\n<br />\n<br />For the RoastRat01 container, the script has been corrected and a respawn setting has been added - it can be configured in the ini file.\n<br />([i]In the vanilla game, the meat of rats roasted on a fire does not respawn, and with the animation function, \"empty sticks over a fire\" remain until the end of the game, which is not entirely logical, with a common respawn in dungeons[/i]).\n<br />\n<br />Added and changed scripts for some containers that were bound to scripts with the wrong animation function.\n<br />\n<br />Added animation script for DarkSecretSafe container ([i]picture[/i]).\n<br />\n<br />Fixed ([i]rewritten[/i]) scripts for quest containers MS11Chest and MS51PaintSuppliesClue - now containers cannot be opened just like that, but only in accordance with the stage and requirements of the quests.\n<br />\n<br />Fixed the script ([i]trap[/i]) for the showcases in the Umbacano house. Since different showcases use their own key (2), a similar script was added for the second type of showcases.\n<br />\n<br />Correction of sound effects of animation, - editing of some nif-files.\n<br />\n<br />Fixed script sounds when activating containers with disabled animation. Now previously missing opening/closing sounds will be heard.\n<br />\n<br />Optional: Sacks animation has been changed - new nif files with animation have been added and animation scripts have been changed. Now sacks, when activated, will \"Change in volume\" - and not as before \"Rotate, tip over and fall into textures\".\n<br />\n<br />\n<br />[b]Other changes and edits of  OOO[/b]\n<br />===========================\n<br />A function defining the behavior of NPC Adventurers has been added to the scripts and ini-file settings. Adventurers are a player-friendly faction of NPCs that spawn in dungeons and are engaged in hacking and looting various containers.\n<br />You can choose one of two behavior options:\n<br />- Adventurers loot all items from containers (like in OOO).\n<br />- Adventurers loot only items from the \"misc item\" category (like in vanilla)\n<br />Also, a protection function against looting for non-respawning containers has been added to the scripts.\n<br />\n<br />The following settings have been added to the ini file:\n<br />- enable/disable warning and blocking of container hacking during combat.\n<br />- enable/disable warning and blocking of lock hacking (if your hacking level is 40 points lower than the lock level).\n<br />\n<br />Added some fixes found on OOO forum. Thanks to  [b][url=https://www.nexusmods.com/oblivion/users/1351241]HautdenLukas[/url][/b] for providing bug reports.\n<br /> \n<br />Added missing textures and fixed nif files for gems - garnet and tourmaline.\n<br />\n<br />Added full support for OOO settings for  [url=https://www.nexusmods.com/oblivion/mods/50144]LINK[/url] - configure and change the necessary parameters directly in the game.\n<br /> Thanks to [url=https://www.nexusmods.com/oblivion/users/1006768]Maskar[/url] for making this possible.\n<br />\n<br />\n<br />[b]Notes:[/b]\n<br />======\n<br />After installing and connecting the patch, it is recommended to start a new game - this ensures that there are no conflicts with previous script parameters (remaining in the saves).\n<br />However, you can continue playing with old saves, but with some limitations.\n<br />- If you have enabled sacks animation, it is recommended to install the corresponding version of the patch \"Without new sacks animation\", - since changes to the old animation cannot be rolled back.\n<br />- For Ayleid chests, a one-time check has been added to the initialization script, and a rollback of changes for open Ayleid chests, this should fix compatibility with the new script parameters. - BUT, if some containers have already disappeared in this game, then there is no way to return them.\n<br />\n<br />\n<br />[b]Installation:[/b]\n<br />==========\n<br />Warning! This patch requires [url=https://www.nexusmods.com/oblivion/mods/46199]OOO - Oscuro's Oblivion Overhaul - Updated[/url] mod to be installed.\n<br />\n<br />There are two versions of the patch available for download and connection,\n<br />- the full version, including all fixes and the new sacks animation.\n<br />- the compatible version contains all fixes (but without the new sacks animation).\n<br />Connect what you need (see Notes).\n<br />\n<br />[u]Additionally:[/u] in the Miscellaneous files section\n<br />- The patch was created by separate mini-patches for each type of container and scripts attached to them. These files are collected in the archive [b][i]SourceFilesOOOPatch[/i][/b].\n<br />- For testing containers, I made a test hall, which includes all types of containers and script variations. This file is in the [i][b]TestingHall-OOO[/b][/i] archive. To access the test hall, use the console command [ coc OOOTest ]\n<br />\n<br />\n<br />[b]Thanks!\n<br />=======\n<br />[url=https://www.nexusmods.com/oblivion/users/2153273]park9[/url] [/b]- for creating animated models for sacks[b]\n<br />[url=https://www.nexusmods.com/oblivion/users/57880]dev_akm[/url] [/b]- and to all those who stood at the origins of the creation of the OOO.[b]\n<br />[url=https://www.nexusmods.com/oblivion/users/567666]WalkerInShadows[/url][/b] - for supporting the original project OOO - Updated[b].\n<br />[/b]And to all the rest, modders, testers, and other wonderful people who contributed their efforts to the development of project OOO - Updated[b].\n<br />\n<br />[/b]"
