nexusDescription="[color=#00BFFF][size=4][color=#00BFFF][size=4]xEdit 4.1.5 by ElminsterAU and the xEdit Team[/size][/color][/size][/color]\n<br />\n<br />[size=4][color=#00BFFF]Other xEdit variations:[/color][/size]\n<br />\n<br />xEdit can be used to view, detect conflicts, and edit module files of various Bethesda Games. Other members of the xEdit family include [url=https://www.nexusmods.com/oblivion/mods/11536]TES4Edit[/url], [url=https://www.nexusmods.com/fallout3/mods/637]FO3Edit[/url], [url=https://www.nexusmods.com/newvegas/mods/34703]FNVEdit[/url], [url=https://www.nexusmods.com/skyrim/mods/25859]TES5Edit[/url], [url=https://www.nexusmods.com/enderal/mods/23]EnderalEdit[/url], [url=https://www.nexusmods.com/skyrimspecialedition/mods/164]SSEEdit[/url], [url=https://www.nexusmods.com/enderalspecialedition/mods/78]EnderalSEEdit[/url], [url=https://www.nexusmods.com/fallout4/mods/2737]FO4Edit[/url], [url=https://www.nexusmods.com/fallout76/mods/30]FO76Edit[/url]\n<br />\n<br />[size=4][color=#00BFFF]What's new in xEdit 4.1.5?:[/color][/size]\n<br />\n<br />[url=https://github.com/TES5Edit/TES5Edit/blob/bfabef91fe7f090c4ba81c865570b2e1ceb8f49d/whatsnew.md]What's New[/url]\n<br />\n<br />This version includes significant changes since the last (4.0.4) release of xEdit. Those changes are\n<br />described in What's New (which shows at program start) and a document in rich text format that is included with xEdit for offline viewing.\n<br />\n<br />[size=4][color=#00BFFF]Become a Patreon:[/color][/size]\n<br />\n<br />[url=https://www.patreon.com/ElminsterAU]ElminsterAU's Patreon Page[/url]\n<br />\n<br />ElminsterAU has created a Patreon Page for anyone who wants to support futher development of xEdit.\n<br />\n<br />[size=4][color=#00BFFF]Current Documentation:[/color][/size]\n<br />\n<br />The What's New document shown when starting xEdit is the cannonical documentation of all new and changed functionallity in xEdit.\n<br />\n<br />Beyond that, the Fallout 3 training manual was converted by EpFwip in 2013 to HTML format. This conversion has been updated as the official and current\n<br />documentation for all versions of xEdit.\n<br />\n<br />[url=https://tes5edit.github.io/docs/]Tome of xEdit[/url]\n<br />\n<br />[size=4][color=#00BFFF]Change Log:[/color][/size]\n<br />\n<br />The changes have been moved to the What's New document.\n<br />\n<br />[size=4][color=#FF8C00]FAQ:[/color][/size]\n<br />\n<br />Q: I have the following errors with one of my plugins what do I do?\n<br />\n<br />[00:43] Background Loader: Error: record ARMA contains unexpected (or out of order) subrecord MODL\n<br />[00:43] Background Loader: Errors were found in: ShieldofYsgramorDraugrAA [ARMA:01001001]\n<br />[00:43] Background Loader: Contained subrecords: EDID BODT RNAM DNAM MOD2 MO2T MOD3 MO3T MOD4 MO4T MOD5 MO5T SNDD NAM0 NAM1 NAM2 NAM3 MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL MODL\n<br />\n<br />A: Occurs with plugins made with the ReProccer, NPC Editor or other 3rd party tools. These cannot be corrected with xEdit. You can try using the official Bethesda Editor but the official tool may not be able to correct the errors with loss of data.\n<br />\n<br />Q: The Font is too small, I have a 4K or Hi-Res monitor. I can't read the text how do I increase the size?\n<br />\n<br />A: There is some support for font scaling for Large Size, Hi-Res, or 4K monitors. This will help readability but in some situations there is no control for popup boxes that expect input from the user.\n<br />\n<br />[size=4][color=#00BFFF]xEdit Team Members:[/color][/size]\n<br />\n<br />[url=http://www.nexusmods.com/users/167469/?]ElminsterAU[/url]\n<br />[url=http://www.nexusmods.com/users/1102380/?]Hlp[/url]\n<br />[url=http://www.nexusmods.com/users/156622/?]Zilav[/url]\n<br />[url=http://www.nexusmods.com/users/4147439/?]Sharlikran[/url]\n<br />\n<br />[size=4][color=#00BFFF]Community members who have contributed in some way:[/color][/size]\n<br />\n<br />[i]Listed in alphabetical order[/i]\n<br />\n<br />AndalayBay: Without her help getting me in touch with Elminster we would all still be waiting for confirmed record definitions, and even longer for a working TES5Edit.\n<br />Divstator: for his work on Improved NavMesh Decoding\n<br />fireundubh: for all his record decoding suggestions for FO4Edit\n<br />Jonathan Ostrus: For his significant contributions to the FO76 record definitions\n<br />jonwd7: for his work on Improved NavMesh Decoding\n<br />shad0wshayd3: for his work on Enderal support and a number of UI tweaks"
