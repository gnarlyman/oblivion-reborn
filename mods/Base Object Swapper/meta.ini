nexusDescription="[size=6][b][color=#f1c232]BASE OBJECT SWAPPER[/color][/b]\n<br />[/size][size=4][color=#f1c232](ported from Fallout: New Vegas)[/color]\n<br />[color=#e69138]\n<br />[/color][/size][b][color=#cc4125][size=3]For example configs and various mod integrations check out [url=https://www.nexusmods.com/oblivion/mods/53877]Base Object Swapper Integrations[/url]![/size][/color][/b]\n<br />\n<br />[color=#f1c232][size=4][b]Requirements [/b][/size][/color]\n<br />\n<br />[size=3][url=https://www.nexusmods.com/oblivion/mods/37952]xOBSE\n<br />[/url][url=https://www.nexusmods.com/oblivion/mods/45870]MessageLogger[/url]\n<br />[/size][b]\n<br />[size=4][color=#f1c232]Description (copied from [url=https://www.nexusmods.com/newvegas/mods/83934]Base Object Swapper NV[/url]﻿ with minor changes)[/color][/size][/b]\n<br />\n<br />[size=3][color=#f1c232]OBSE utility plugin that allows mod authors to swap base objects with others, using config files.\n<br />This is a port of [url=https://www.nexusmods.com/skyrimspecialedition/mods/60805]Base Object Swapper[/url] from Skyrim Special Edition.[/color]\n<br />[color=#f1c232]\n<br />With this mod, you could... \n<br />\n<br />[/color][list]\n<br />[*][color=#f1c232][size=3]assign different model variants to misc objects at random[/size][/color]\n<br />[*][color=#f1c232][size=3]replace overused statics with unique variants[/size][/color]\n<br />[*][color=#f1c232][size=3]replace vanilla leveled NPCs with custom leveled NPCs[/size][/color]\n<br />[/list][color=#f1c232]\n<br />and more!\n<br />[/color]\n<br />[/size][color=#f1c232][size=4]How To Use\n<br />\n<br />[/size][size=3][b]NEW AS OF 1.3.0 - [/b]Conditional swaps now support pattern matching for specific cell names (requires [url=https://www.nexusmods.com/oblivion/mods/45870]MessageLogger[/url])! For example, if you want to swap all of a specific item only in Chorrol, you can use:\n<br />[code]﻿[Forms|Chorrol]\n<br />[/code]\n<br />Or if you want to swap in all cells except Bravil:\n<br />[code][Forms|-Bravil]\n<br />[/code]\n<br />Or if you want to swap items only in Houses and Caves you could do something like:\n<br />[code]﻿[Forms|House,Cave]\n<br />[/code]\n<br />Don't worry about capitalization as that is accounted for behind the scenes so both \"chorrol\", \"Chorrol\", \"CHORROL\", will all work.[/size]\n<br />[size=3]\n<br />[/size][/color][size=3][color=#f1c232][b]NEW AS OF 1.2.0 - [/b]NPCs and Creatures can now be form swapped. [b]HOWEVER[/b], there is a caveat with leveled NPCs/creatures. Because the leveled list is resolved after the usual form swaps in this mod, if you want to replace all mudcrab encounters with Daedra, for example, you would instead need to swap the leveled list for a different one:[/color]\n<br />\n<br />[color=#f4f4f4][code]﻿[Forms]\n<br />;Swaps LL0WaterShallow75 with LL1DaedricBeastOlivionGate100, effectively replacing these mudcrab encounters with Daedra\n<br />\n<br />0x343B0~Oblivion.esm|0xBAA3~Oblivion.esm\n<br />[/code][/color]\n<br />[color=#f1c232]Non-leveled actors and creatures work the same as the other examples below.[/color]\n<br />[/size]\n<br />\n<br />[color=#f1c232][size=3]Distributed records should be written to an ini file in Data/BaseObjectSwapper folder (for example, Data/BaseObjectSwapper/MyMod.ini).[/size]\n<br />[size=3]They should follow this general format:[/size][/color]\n<br />\n<br />[size=3][code][Forms]\n<br />origBaseID|swapBaseID|transformOverrides|chance\n<br />origBaseID|swapBaseID,swapBase2ID,swapBase3ID|transformOverrides|chance\n<br />\n<br />[References]\n<br />origRefID|swapBaseID|transformOverrides|chance\n<br />\n<br />[Forms|CellFormID,KeywordString,RegionFormID]\n<br />origBaseID|swapBaseID|transformOverrides|chance\n<br />[/code][/size]\n<br />[size=3][b][color=#ff0000]ID MUST be the object's FormID! [/color][color=#f1c232]The EditorID capabilities require functionality that xOBSE does not currently have[/color][/b]\n<br />\n<br />[code]ObjectFormID~ModName.esp\n<br />[/code]\n<br />[color=#f1c232]origBase is the base object you're trying to replace (eg. a coffee pot).\n<br />origRef is the specific object reference you're trying to replace (eg. a specific coffee pot in Hoover Dam).\n<br />\n<br />[i]swapBase[/i] is the replacement object you're replacing it with (eg. a coffee pot with a new model).\n<br />\n<br />[u]Locational replacements[/u]\n<br />[/color][list]\n<br />[*][color=#f1c232]Location based form swaps[/color]\n<br />[*][color=#f1c232]Requires cell or region editorID[/color]\n<br />[/list]\n<br />[code];this swaps all UpperClassRugRectangle01 static objects inside the Tiber Septim Hotel with Potatoes\n<br />\n<br />[Forms|0x2AEEA~Oblivion.esm]\n<br />0x1C649~Oblivion.esm|0x3368C~Oblivion.esm\n<br />\n<br />[/code][list]\n<br />[/list]\n<br />[color=#f1c232][u]Transform Overrides[/u]\n<br />[/color][/size][list]\n<br />[*][color=#f1c232][size=3]Change the position, rotation and scale of swapped objects[/size][/color]\n<br />[*][color=#f1c232][size=3]pos - position[/size][/color]\n<br />[*][color=#f1c232][size=3]rot - rotation[/size][/color]\n<br />[*][color=#f1c232][size=3]scale - scale[/size][/color]\n<br />[*][color=#f1c232][size=3]units must be in floats (20.0)[/size][/color]\n<br />[*][color=#f1c232][size=3][b](NEW)[/b] disable - sets the object to initially disabled (but [b]ONLY [/b]if the reference is NOT persistent and does NOT have a EnableStateParent flag. This is to prevent crashes)[/size][/color]\n<br />[*][color=#f1c232][size=3][b](NEW)[/b] model(x) - replaces the specified base object's model; no need to swap to a separate object. Put the path to the nif starting inside the mesh folder inside the parentheses.[/size][/color]\n<br />[/list][color=#f1c232][size=3]\n<br />[/size][/color][list]\n<br />[*][color=#f1c232][size=3]A/R suffixes for setting relative vs absolute transform. For position/rotation[/size][/color]\n<br />[*][color=#f1c232][size=3]posR(1.0,5.0,100.0) will set new position relative to reference base position[/size][/color]\n<br />[*][color=#f1c232][size=3]posA(300.0,100.0,200.0) will override reference base position[/size][/color]\n<br />[/list][color=#f1c232][size=3]\n<br />[list]\n<br />[*][size=3]scale is multiplicative. [/size]\n<br />[/list][/size][size=3][list]\n<br />[*][size=3]scale randomization is possible[/size]\n<br />[*][size=3]eg. scale(1.0/2.0) will scale references between 1.0 and 2.0 units[/size]\n<br />[/list]\n<br />[list]\n<br />[*]Leave as NONE if you don't want transform overrides\n<br />[/list][/size][/color]\n<br />[size=3][code];swaps Gold misc items to Varla Stones with relative position + random Z position of 50 to 100, and random scale between 1.0 and 1.50.\n<br />\n<br />[Forms]\n<br />0xF~Oblivion.esm|0x194~Oblivion.esm|posR(10.0,5.0,50.0/100.0),scale(1.0/1.50)\n<br />[/code][/size][size=4]  [/size]\n<br />[list]\n<br />[*][color=#f1c232][size=3]It is also possible to directly set a transform override without swapping objects. Requires [Transforms] section[/size][/color]\n<br />[/list][size=3]\n<br />[/size][size=3][code]﻿[Transforms]\n<br />origBaseID|transformOverrides|chance\n<br />origRefID|transformOverrides|chance\n<br />\n<br />[Transforms|CellFormID,KeywordString,RegionFormID]\n<br />origBaseID|transformOverrides|chance\n<br />[/code]\n<br />[list]\n<br />[*][color=#f1c232][size=3]Affects swapped objects[/size][/color]\n<br />[/list]\n<br />[code][Transforms]\n<br />0x17872~Oblivion.esm|rotR(-90,0,0),scale(2.0) ;ICPalaceTower01\n<br />[/code]\n<br />[/size][color=#f1c232][u][size=4]Chance[/size][/u]\n<br />\n<br />[/color][list]\n<br />[*][color=#f1c232][size=3]Randomly swap between multiple swap objects/percentage chance to not swap at all[/size][/color]\n<br />[/list][color=#f1c232][size=3]\n<br />[/size][/color][list]\n<br />[*][color=#f1c232][size=3]chance (0 - 100)[/size][/color]\n<br />[*][color=#f1c232][size=3]Default is 100[/size][/color]\n<br />[/list][size=3][color=#f1c232]\n<br />[/color][list]\n<br />[*][color=#f1c232]S/R suffixes[/color]\n<br />[*][color=#f1c232]chanceS(50) - [size=3]fixed random chance (persists across game sessions; object refs will be always swapped or not)[/size][/color]\n<br />[*][color=#f1c232][size=3]chanceR(50) - chance is rerolled on each new game session (object ref may or may not be swapped each time you load the game)[/size][/color]\n<br />[*][color=#f1c232]Default is S[/color]\n<br />[/list]\n<br />[/size][size=3][code][Forms]\n<br />﻿;Randomly swaps between Base1, Base2, Base3\n<br />\n<br />Base|Base1,Base2,Base3\n<br />\n<br />;50% chance to swap Quill01 to PaintBrush01\n<br />;25% chance to swap Quill01 to PaintBrush02\n<br />\n<br />0x23D63|0x1BBC5|NONE|chanceS(50)\n<br />0x23D63|0x1BBC6|NONE|chanceS(25)\n<br />\n<br />;50% chance (rerolls each game session)\n<br />\n<br />0x23D63|0x1BBC5|NONE|chanceR(50)\n<br />[/code][/size]\n<br />[color=#f1c232][size=4]Examples[/size][/color]\n<br />\n<br />[size=3][code][Forms]\n<br />\n<br />;swap Repair Hammers with Apples\n<br />0xC~Oblivion.esm|0x3365D~Oblivion.esm\n<br />\n<br />[References]\n<br />\n<br />;swap specific  reference (in The Tiber Septim Hotel lobby) with a Welkynd Stone and scale it 100x\n<br />0x3ADB0~Oblivion.esm|0x191~Oblivion.esm|scale(100)\n<br />\n<br />[Transforms]\n<br />\n<br />;disables specific reference of RockGreatForest050\n<br />0x9451~Oblivion.esm|disable\n<br />\n<br />;sets the gold coin mesh to the paintbrush mesh\n<br />0xF~Oblivion.esm|model(clutter&#92;artsupplies&#92;paintbrush01.nif)\n<br />\n<br />[/code][/size]\n<br />[color=#f1c232][size=3]Check [i]BaseObjectSwapper.log[/i] in Oblivion directory, for more information about the process.[/size][/color]\n<br />\n<br />[color=#f1c232][size=4][b]Installation[/b][/size][/color]\n<br />\n<br />[list]\n<br />[*][color=#f1c232][size=3]Install as normal with a mod manager. [/size][/color]\n<br />[/list]\n<br />[color=#f1c232][size=4][b]Credits[/b][/size][/color]\n<br />\n<br />[size=3][url=https://github.com/googlepox/BaseObjectSwapperOB]Source[/url][/size]\n<br />\n<br />[list]\n<br />[*][color=#f1c232][size=3]xNVSE team[/size][/color]\n<br />[*][color=#f1c232][size=3][url=https://www.nexusmods.com/newvegas/users/2232669]lStewieAl[/url] for some extra REd functions[/size][/color]\n<br />[*][color=#f1c232][size=3]powerofthree for both the SKSE and xNVSE versions[/size][/color]\n<br />[*][color=#f1c232][size=3]llde from xOBSE for helping me figure out Oblivion internals[/size][/color]\n<br />[*][color=#f1c232][size=3]wall_sogb from the xNVSE discord for helping me with FNV internals[/size][/color]\n<br />[/list]"
