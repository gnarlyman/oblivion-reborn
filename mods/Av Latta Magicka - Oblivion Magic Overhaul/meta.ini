nexusDescription="[center][size=4][heading]Technical Information[/heading][/size][/center]\n<br />\n<br />[b]Requirements[/b]\n<br />Check the menu above, it lists everything.\n<br />\n<br />[b]Recommended Mods\n<br />[/b] These mods are not required, but work well together:\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/37717]Fractional Magic Damage[/url]﻿ - makes magic damage calculation more precise. Note: it is not correctly packaged for a mod manager installation - you need to manually place FractionalMagicDamage.dll into Data&#92;OBSE&#92;Plugins folder.\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/53020]De Rerum Dirennis[/url]﻿ - Alchemy overhaul to go with ALM.\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/50462]Enchantment Cost Multiplier[/url]﻿ - allows increasing (or decreasing) the number of uses on all enchanted weapons. Lightweight and compatible.\n<br />[/list]\n<br />﻿[b]Installation/Updating[/b]\n<br />If you install/update the mod on existing save, the following is highly recommended:\n<br />[list]\n<br />[*]Go into interior cell without any actors other than the player.\n<br />[*]Minimize the number of active magic effects on the player: unequip all enchanted gear, wait for all temporary spells to wear off, cure all diseases.\n<br />[*]Save the game and install/update the mod.\n<br />[/list]This is necessary, because if a character has an active spell effect, which is altered by the mod, changes may not work properly. Following these steps will minimize potential issues.\n<br />\n<br />[b]Third Party Tools[/b]\n<br />[list]\n<br />[*]Be sure to use the [url=https://www.nexusmods.com/oblivion/mods/22368]latest version[/url]﻿ of [b]Wrye Bash[/b] (307 or later), as it has support for OBME plugins.\n<br />[*][b]TES4Edit [/b]will show some errors when loading ALM plugins and/or using \"Check For Errors\" function on them (exact error messages depend on what version of TES4Edit you're using). These are [b]false positives[/b] and can safely be ignored.\n<br />[/list]\n<br />[b]Customization[/b]\n<br />[list]\n<br />[*]Features marked as [color=#c9daf8][configurable][/color] in the description below can be customized.\n<br />[*]Using [url=https://www.nexusmods.com/oblivion/mods/50144]LINK[/url]﻿ configuration menu is recommended. Alternatively, \"Av Latta Magicka.ini\" file, located in “Oblivion&#92;Data&#92;ini” folder can be edited directly.\n<br />[/list]\n<br />[b]Compatibility &amp; Cross-Mod Integration[/b]\n<br />﻿Av Latta Magicka is mostly a script-based mod, so chances of a direct conflict with other plugins are small. Known compatibility issues are described [url=https://www.nexusmods.com/oblivion/articles/44402]here[/url]﻿.\n<br />Everything listed below is handled automatically, without the need of compatibility patches:\n<br />[list]\n<br />[*][b]Spell Tomes DLC[/b] - appearance of DLC tomes will match the ones from ALM. Stunted Magicka effect in 'Magicka Vortex' spell will be replaced with \"real\" magic effect, instead of scripted.\n<br />[*][b]Knights of the Nine[/b] - appropriate spells are added to KotN vendors.\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/25023]Elsweyr Anequina[/url]﻿ - ALM will replace scripted summon spells with proper usable magic effects.\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/16513]Better Cities[/url]﻿ - some vendors will sell ALM spells.\n<br />[*][url=https://www.nexusmods.com/oblivion/mods/49614]Custom Potion Naming[/url]﻿ - ALM potions will be included in this mod's naming scheme.\n<br />[/list]\n<br />\n<br />\n<br />\n<br />[center][size=4][heading][color=#76a5af]Introduction[/color][/heading][/size][/center]\n<br />\n<br />[b][color=#a2c4c9]Magic Skills[/color][/b]\n<br />[list]\n<br />[*]New effects for all [b]mastery perks[/b] of 6 magic schools, some influenced by Skyrim skill perks. Details for each school of magic are provided in the respective sections.\n<br />[*][b]Mastery levels[/b] for spells are disabled, allowing any spell to be cast with sufficient Magicka [color=#c9daf8][configurable][/color].\n<br />[*][b]Spell projectile speed[/b] is influenced by skill level in corresponding magic skill [color=#c9daf8][configurable][/color].\n<br />[/list]\n<br />[b][color=#a2c4c9]New Content[/color][/b]\n<br />[list]\n<br />[*]Over 30 new [b]magic effects[/b], most of them available to use in spellmaking and enchanting.\n<br />[*]Over 180 [b]new spells[/b] are distributed to vendors and enemy leveled lists.\n<br />[*]In addition to basic ones, spell merchants offer many [b]unique spells[/b] with interesting effect combinations and often lower Magicka costs, compared to the same spell if created on Spellmaking altar – so, finding different people to learn spells from can now be rewarding.\n<br />[*][b]Trainers[/b] offer some spells for sale as well, however they usually have less spell variety, compared to dedicated spell merchants. [b]Master trainers[/b] each offer unique and powerful spells in their school of magic – you can only buy them after completing the required quest for master training.\n<br />[*]Over 100 [b]spell tomes[/b] can now be found in random loot and sometimes in book stores.\n<br />[*][b]New enchanted items[/b] are added to leveled lists. Certain effects are only found on enchanted gear, some of them can increase the power of spells.\n<br />[*][b]New potions[/b] with various effects (both vanilla and from this mod) are added to leveled lists, so they can be found in dungeons and shops.\n<br />[/list]\n<br />[color=#a2c4c9][b]New Mechanics[/b][/color]\n<br />[list]\n<br />[*][b]Magic Sneak Attacks[/b] with Novice/Apprentice Sneak skill deal 1.5x/2.0x damage for Target spells and 2.0x/3.0x damage for Touch spells [color=#c9daf8][configurable][/color].\n<br />[*][b]Magic Effect Combo[/b] occurs when the same target is hit by 2 interacting effects. The first time that happens, you'll see a tutorial message. I don't want to spoil effect combinations here – discover them by playing and experimenting [color=#c9daf8][configurable][/color].\n<br />[*][b]Projectile Control[/b]: continue holding cast key after releasing a spell to have (limited) control over the projectile during flight [color=#c9daf8][configurable][/color]. This requires a skill of 25 or higher in respective spell school.\n<br />[*][b]Illegal Magic[/b]: Casting Open and Telekinesis spells on owned objects is now considered a crime [color=#c9daf8][configurable][/color].\n<br />[*]New [b]Concentration Spells[/b] will continue their effects as long as Cast key is held or until Magicka runs out.\n<br />[*]A new rare item called [b]Welkynd Essense[/b] can be found  - using it allows creation of one custom spell for free.\n<br />[/list]\n<br />[color=#a2c4c9][b]Visuals and Sound[/b][/color]\n<br />[list]\n<br />[*]Unique icons for vanilla effects that didn't previously have one. All new effects also have their own icons.\n<br />[*]Unique visual and sound effects for some vanilla and new effects.\n<br />[*]Restored cut unique models for potions of different magic schools. These are the same as in [url=https://www.nexusmods.com/oblivion/mods/45909]Oblivion Content Restoration Project[/url]﻿.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][heading][color=#bf9000]Magic Rebalance[/color][/heading][/size][/center]\n<br />\n<br />[b]﻿[color=#ffd966]Buff Stacking Disabled[/color][/b]\n<br />Different spells with the same beneficial effect will no longer stack with each other, instead the total effect power will be no more than the strongest of the spells. For example, let’s say we have 2 different spells, one with 10% Shield effect, another one with 5%\n<br />[list]\n<br />[*][i]Vanilla[/i]: casting both spells will give a total of 15% Shield.\n<br />[*][i]ALM[/i]: casting 10% Shield spell after 5% will decrease it’s magnitude by 5% (for a total of 10% Shield); casting 5% after 10% will have no effect.\n<br />[/list][list]\n<br />[*][b]Feather[/b] is the only exception from this - since it's more of an utility spell, rather than combat buff, no real reason to limit it.\n<br />[/list]\n<br />[b][color=#ffd966]Spells and Magic Effects[/color][/b]\n<br />[list]\n<br />[*]Stats of many vanilla spells were tweaked, usually to make the somewhat stronger while staying within the same mastery level.\n<br />[*]Base costs of magic effects were also changed, some are now cheaper (like Weakness or Resistance effects), others more expensive (like Invisibility).\n<br />[*]There are too many small changes to list them all, but some are mentioned in respective sections for each school of magic.\n<br />[/list]\n<br />[color=#ffd966][b]Potions[/b][/color]\n<br />[list]\n<br />[*]Effects and prices of all vanilla potions are tweaked, they now last significantly longer. Prices are manually set, instead of auto-calculated.\n<br />[*]Healing potions restore Health over time, but for a larger total amount. They are generally slower than Restoration spells.\n<br />[/list]\n<br />[color=#ffd966][b]Enchanted Items[/b][/color]\n<br />[list]\n<br />[*]Most enchanted clothes and jewelry are rebalanced, nerfing many overpowered items. It is now much harder to achieve high levels of resistances from just wearing enchanted items.\n<br />[*]Unique items are [b]unlevelled[/b] and have the same stats no matter what level you acquire them on.\n<br />[*][b]Daedric Artifacts[/b] have unlimited charge [color=#c9daf8][configurable][/color]. This includes: Ebony Blade, Goldbrand, Mace of Molag Bal, Umbra, Volendrung, Sanguine Rose, Skull of Corruption, Staff of Worms, Wabbajack, Staff of Sheogorath, Mehrunes Razor. Fully compatible with mods that change enchantments on any of these items.\n<br />[/list]\n<br />[b][color=#ffd966]Magicka Settings[/color][/b]\n<br />[list]\n<br />[*][b]Total Magicka[/b] pool has two new formulas to choose from:\n<br />[i]Progressive[/i]: a non-linear formula, where higher Intelligence provides more Magicka: it has \"soft caps\" on Intelligence levels 100 and 125, increasing Intelligence beyond which is less effective.[i]Class-Based[/i]: initially one point of Intelligence provides 1 point of Magicka; having a class specialization set to “Magic” will increase this by 1 point; having any of the 6 magic schools as class skills will further increase this by 0.5 points for each.[*][b]Magicka Regeneration[/b] is now dependent on Willpower only, base \"free\" regeneration is removed.\n<br />[*][b]Armor Penalty[/b] now also has two modes:\n<br />[i]Vanilla:[/i] which reduces spell power, but the minimum 5% penalty is removed with high armor skill.[i]\n<br />Alternative:[/i] where wearing armor decreases your Magicka regeneration rate, instead of power.Whichever mode you choose, its effects will be accurately displayed in magic menu.[/list]\n<br />[color=#ffd966][b]Spellmaking and Enchanting[/b]\n<br />[/color][list]\n<br />[*]Custom spells with the duration of 1 second will be converted to instant.\n<br />[*][b]Damage Magicka[/b] can now be used in custom spells.\n<br />[*]Some[b] [/b]effects, for example [b]Charm[/b] and [b]Fortify Skill[/b] now have a minimal duration, as otherwise these effect are too easy to exploit.\n<br />[*]Reflect Damage, Reflect Spell, Resist Magic, Resist Normal Weapons and Spell Absorption can now be used in custom enchantments.\n<br />[*]Increased the upper limit of magnitude, area and duration of custom spells [color=#c9daf8][configurable][/color]. These changes automatically support vanilla, DarNified and NorthernUI.\n<br />[*]Effect list in enchanting menu is less cluttered - negative effects are hidden when enchanting apparel, and positive effects hidden when enchanting weapons.\n<br />[*]Formula for custom constant effect enchantments is tweaked. There is more difference between enchantments made with larger and smaller souls, especially for expensive magic effects.\n<br />[/list]\n<br />\n<br />\n<br />\n<br />\n<br />[center][size=4][heading][color=#f6b26b]College of Alteration[/color][/heading][/size][/center][right][i]﻿Alteration is a magic art that involves the manipulation of parts of the physical world and its natural properties. Spells in this school change the world around the caster so normal physical truths no longer hold.[/i][/right]\n<br />[left][b]\n<br />[color=#f9cb9c]Skill Perks[/color][/b][/left][list]\n<br />[*]Apprentice: Protective Alteration spells you cast are 20% stronger if not wearing any armor.\n<br />[*]Journeyman: All beneficial self-targeted Alteration spells last twice as long when cast outside of combat.\n<br />[*]Expert: Having an Elemental Shield effect active will augment casters Fire/Frost/Shock Damage effects and increase their magnitude.\n<br />[*]Master: Having Slowfall effect active allows hovering in the air using Jump key.\n<br />[/list]\n<br />[left][color=#f9cb9c][b]Defense[/b][/color][/left][list]\n<br />[*][b]Fire, Frost and Shock Shield[/b] effects no longer provide physical armor bonus, instead they will damage all attackers in melee range, as well as provide elemental resistance [color=#c9daf8][configurable][/color].\n<br />[*]Additionally, new [b]Poison Shield[/b] effect is introduced, which follows the same rules as above.\n<br />[/list]\n<br />[left][color=#f9cb9c][b]Utility[/b][/color][/left][list]\n<br />[*]Custom [b]Open [/b]spells can now be made with touch range, so they can be used underwater. This is also the only effect unaffected by Spell Effectiveness so it always properly works on all locks of displayed level.\n<br />[*][b]Light [/b]spells were moved into Alteration school [color=#c9daf8][configurable][/color]. Color of the spell can be customized, by default it has a more neutral white tone, instead of vanilla green. An option to automatically dispel all Light spell when entering sneak mode is available.\n<br />[*]New [b]Slowfall [/b]spells slow down caster’s vertical speed when falling, allowing to take less damage and to travel further when jumping.\n<br />[/list]\n<br />[left][color=#f9cb9c][b]Offense[/b][/color][/left][list]\n<br />[*]All [b]Burden [/b]spells have a chance to cause stagger on hit, based on the spell’s magnitude.\n<br />[*]New [b]Expose [/b]spells make targets more vulnerable to physical attacks.\n<br />[*][b]Petrification [/b]is a new disabling effect, which turns the target into stone for the duration of the spell – unable to move or attack, but at the same time highly resistant to physical damage and unaffected by any other magic. Petrification comes with it’s own resistance value (see Restoration section) – some enemies, like vampires and non-corporeal entities, are immune, others can be resistant.\n<br />[*]New [b]fire, frost and shock weapon buffs[/b] are added – they provide a corresponding elemental damage bonus to caster's weapon attacks, but only on weapons which don’t have an enchantment of their own.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][heading][color=#c27ba0]College of Conjuration[/color][/heading][/size][/center][right][i]﻿Conjuration magic is the art of summoning creatures or item﻿s from another plane. Spells of this school are primarily used to summon a wide range of creatures, weapons and armor, as well as having limited control over the dead.[/i][/right]\n<br />\n<br />[left][color=#d5a6bd][b]﻿Skill Perks[/b][/color][/left][list]\n<br />[*]Apprentice: Bound Armor will change to Heavy&#92;Light type depending on the highest armor skill.\n<br />[*]Journeyman: Every time summoned creature damages an enemy, summoner restores some Magicka.\n<br />[*]Expert: Bound Weapons will soultrap enemies and banish summoned creatures.\n<br />[*]Master: 50% of damage taken by the summoner will instead be transferred to summoned creatures.\n<br />[/list]\n<br />[left][color=#d5a6bd][b]Summoning[/b][/color][/left][list]\n<br />[*]It is now possible to [b]summon more than one minion[/b] at a time, with sufficient Conjuration and Willpower ﻿[color=#c9daf8][configurable][/color]. The number of creatures player can simultaneously summon is calculated by the following formula: [i](Willpower + Conjuration)/60, rounded down[/i] - meaning that you can potentially have up to 3 summoned creatures at high levels. It is displayed in magic menu, below spell list.\n<br />[*]﻿Restored [b]Summon Wraith[/b] and [b]Wabba Summon[/b] magic effects, originally cut from the game.\n<br />[*]Added [b]Summon Imp[/b]/[b]Wolf Familiar[/b] and [b]Summon Spriggan[/b] Conjuration effects.\n<br />[*]Summon a [b]Flaming Familiar[/b], which will explode with AoE fire damage.\n<br />[*]There are new ways to counter creatures summoned by enemy mages: [b]Banish[/b] effect will send summons back to Oblivion, while [b]Unbind Summoned[/b] will turn them against their master.\n<br />[/list]\n<br />[left][color=#d5a6bd][b]﻿Bound Items[/b][/color][/left][list]\n<br />[*]All Bound weapons now have [b]new visual effects[/b], similar to their Skyrim version [color=#c9daf8][configurable][/color].\n<br />[*][b]Bound Sword[/b] is changed to one-handed version.\n<br />[*][b]Bound Battle Axe[/b], [b]Bound Claymore[/b], [b]Bound Shortsword[/b] and [b]Bound Warhammer[/b] are added to complete the full set of bound weapons.\n<br />[*][b]Bound Bow[/b] will produce an infinite supply of arrows to use with it. These arrows are also unaffected by gravity.\n<br />[*]Cost disparity between different types of bound weapons is greatly reduced, higher level spells now have longer duration.\n<br />[*]A new [b]Bound Torch[/b] spells are available, which summon a unique torch glowing with magical fire.\n<br />[/list]\n<br />[left][color=#d5a6bd][b]Reanimation[/b][/color][/left][list]\n<br />[*]Reanimation has been given a big expansion. Instead of being used on only one unique staff, this effect is now available in form of multiple spells, spread throughout the world and can also be used in spellmaking.\n<br />[*]Reanimation spells have a level-based magnitude, so stronger spells are required to reanimate more powerful minions.\n<br />[*]Fixed a potential crash when reanimating NPC with bow equipped.\n<br />[*]Reanimated minions will not fight the player, regardless of their previous faction affiliation.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][b][font=Lucida Sans Unicode][heading][color=#e06666]College of Destruction[/color][/heading][/font][/b][/size][/center][right][i]The School of Destruction is concerned with dealing damage to all forms of matter, both living and non-living, and with making matter more vulnerable to such damage.[/i][/right][left]﻿\n<br />\n<br />[color=#ea9999]﻿[b]Skill Perks[/b][/color][/left][list]\n<br />[*][i]Apprentice[/i]: Fire, Frost and Shock spells can deal up to 20% more damage based an target's missing Health, Fatigue or Magicka percentage.\n<br />[*][i]Journeyman[/i]: ﻿Elemental Destruction spells have a chance to cause recoil on impact.\n<br />[*][i]Expert[/i]: Unlocks special impact effects from elemental Destruction spells.\n<br />[*][i]Master[/i]: Each hit with Destruction spells applies 10 seconds 15% Weakness to Magic effect on target. Stacks up to 3 times.\n<br />[/list]﻿[b]\n<br />[/b][left][color=#ea9999][b]Environmental Effects[/b][/color][/left]Environmental effects such as weather and location will affect elemental Destruction spells [color=#c9daf8][configurable][/color]. All modifiers are multiplicative.\n<br />[list]\n<br />[*][i]Rain:[/i] Fire spells are 25% weaker; Frost spells are 15% stronger; Shock spells are 25% stronger\n<br />[*][i]Snow[/i]: Fire spells are 25% weaker; Frost spells are 25% stronger;\n<br />[*][i]Target is swimming[/i]: Fire spells are 75% weaker; Frost spells are 25% stronger; Shock spells are 35% stronger\n<br />[*][i]Inside Oblivion[/i]: Fire spells are 25% stronger\n<br />[/list]\n<br />[color=#ea9999]﻿[b]Elemental Magic[/b][/color]\n<br />[list]\n<br />[*]At Destruction skill of 50 and 75, elemental magic effects will unlock impact effects. Chance to inflict them scales with Destruction skill and target’s resistance to particular element.\n<br />[*]At Journeyman level all effects have a chance to cause recoil; at Expert level Fire spells can knock back, Frost sometimes freezes the target in place, and Shock may inflict a short paralysis.\n<br />[*]New [b]Poison Damage[/b] effect is introduced. It is slightly cheaper than elemental damage to offset the fact that poison resistance is more common.\n<br />[/list]\n<br />[color=#ea9999]﻿[b]Debuffs[/b][/color]\n<br />[list]\n<br />[*][b]Disintegrate[/b] Weapon/Armor effects no longer have duration setting (it was bugged and didn't actually work).\n<br />[*]﻿[b]Drain Health[/b] effect will no longer kill the target. If effect magnitude is greater than target’s current Health, it will instead be left with 1 HP [color=#c9daf8][configurable][/color].\n<br />[*]New [b]Curse Health Regeneration[/b] effect prevents the target from restoring Health by any means.\n<br />[*][b]Weakness to Magic[/b] is no longer affected by target's magic resistance. This achieves 2 goals: first, it removes the cheesy mechanic where this effect could multiply itself with continuous applications. Second, it becomes significantly more useful against targets with high natural magic resistance.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][b][font=Lucida Sans Unicode][heading][color=#93c47d]College of Illusion[/color][/heading][/font][/b][/size][/center][right][i]The School of Illusion involves manipulating the mind and senses of the enemy. Illusion's reality is only in the mind of the caster and the target.[/i][/right]\n<br />\n<br />[left][color=#b6d7a8]﻿[b]Skill Perks[/b][/color][/left][list]\n<br />[*][i]Apprentice[/i]: ﻿Targets under the effects of Frenzy, Command and Rally deal 15% more damage while targets under the effects of Frenzy, Demoralize and Calm receive 15% more damage.\n<br />[*][i]Journeyman[/i]: Successful sneak attack with any spell will turn caster invisible for 5 seconds.\n<br />[*][i]Expert[/i]: Calm, Command and Frenzy spells work on Undead/Daedra, Demoralize works on Daedra.\n<br />[*][i]Master[/i]: When target under your Frenzy spell is slain, their killer becomes frenzied instead.\n<br />[/list]\n<br />[color=#b6d7a8]﻿[b]Mind Tricks[/b][/color]\n<br />[list]\n<br />[*]﻿Mind-altering spells will no longer work on [b]Undead[/b] and [b]Daedra[/b], unless the caster has Illusion skill of 75 or higher.\n<br />[*][b]Frenzy[/b] effect is expanded to work on all actors (in vanilla it works only on NPCs, not creatures).\n<br />[*]Casting [b]Command[/b], [b]Frenzy[/b] or [b]Demoralize[/b] spells is now considered hostile.\n<br />[*][b]Charm[/b] now uses a dedicated script, which increases target's disposition towards the caster by specified amount (in vanilla Charm actually just increases NPC's Personality, which affects base disposition). Maximum effectiveness of Charm spells can also be limited, depending on caster’s Illusion and Personality and target's Willpower [color=#c9daf8][configurable][/color].\n<br />[/list]\n<br />[b][color=#b6d7a8]Deception[/color][/b]\n<br />[list]\n<br />[*]﻿Maximum total value of [b]Chameleon[/b] is capped at 75%, which is still powerful, but not completely game-breaking [color=#c9daf8][configurable][/color].\n<br />[*]New [b]Project Phantom[/b] effect is added, which creates a random illusory creature, that cannot deal or take damage, but serves as distraction for your opponents. Enemies are more likely to be distracted by phantoms if their Intelligence is low.\n<br />[*]Any active [b]Night Eye[/b] effect can be freely toggled using a customizable key (Default: [b]N[/b]).\n<br />[*]Moving while having [b]Invisibility[/b] effect will stop natural Magicka regeneration [color=#c9daf8][configurable][/color]. Staying still will make Magicka regenerate like normal. \n<br />[/list]\n<br />[color=#b6d7a8]﻿[b]Disabling[/b][/color]\n<br />[list]\n<br />[*]Being affected by [b]Paralysis[/b] will prevent the player from opening inventory or other game menus (except main menu). In order for 'Cure Paralysis' potions not to become totally useless, you will be able to drink them if assigned to a hotkey.\n<br />[*][b]Silence[/b] can now be resisted, similar to Paralysis (see Restoration section). All [b]Greater Powers[/b] are now considered Immune to Silence, without exception.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][b][font=Lucida Sans Unicode][heading][color=#8e7cc3]College of Mysticism[/color][/heading][/font][/b][/size][/center][right][i]﻿Mysticism is the school of sorcery least understood by the magical community and the most difficult to explain to novice mages. It seems to derive power from its conundrums and paradoxes. The act of experimentation, no matter how objectively implemented, can influence magicka by its very existence.[/i][/right]\n<br />\n<br />[left][color=#b4a7d6][b]Skill Perks[/b][/color][/left][list]\n<br />[*][i]Apprentice[/i]: Spells from all Schools cost 15% less to cast.\n<br />[*][i]Journeyman[/i]: You absorb 2.5% of every slain enemy soul to restore some charge to equipped enchanted weapon.\n<br />[*][i]Expert[/i]: Killing an enemy absorbs all its remaining Magicka.\n<br />[*][i]Master[/i]: Any spell you cast has a 25% chance of not consuming Magicka.\n<br />[/list][b]\n<br />[color=#b4a7d6]Protection[/color][/b][list]\n<br />[*]New [b]Ethereal Form[/b] effect makes the caster impervious to damage, but is dispelled on any action.\n<br />[*][b]Spell Absorption[/b] now behaves differently – instead of being chance-based, it always works and absorbs the percentage of incoming spell’s Magicka, but doesn’t protect from the spell itself [color=#c9daf8][configurable][/color]. Additionally, Spell Absorption now only works against hostile effects.\n<br />[*]New [b]Damage Absorption[/b] effect behaves in a similar way, but restores Magicka proportional to physical damage taken.\n<br />[*][b]Reflect Magic[/b] and [b]Reflect Damage[/b] effects are both capped at 80% [color=#c9daf8][configurable][/color].\n<br />[/list]\n<br />[b][color=#b4a7d6]Utility[/color][/b][list]\n<br />[*][b]Detect Life[/b] spells now use different colors depending on actor’s soul level, and actors without a soul will not be detected [color=#c9daf8][configurable][/color]. Optionally, will not detect Undead (disabled by default).\n<br />[*]New [b]Detect Dead[/b] effect is added, which highlights dead bodies and Undead actors.\n<br />[*]2 vanilla bugs with [b]Telekinesis[/b] are fixed: Telekinesis scrolls will now actually work and Telekinesis spells will not erroneously increase their range if\n<br /> cast without a target multiple times. Objects controlled by [b]Telekinesis[/b] are now automatically pulled close to player on initial cast, movement is faster and held objects are more stable.[*][b]Soul Trap[/b] doesn’t work on reanimated targets (this prevents an exploit where it was possible to soul trap them multiple times).\n<br />[/list]\n<br />[b][color=#b4a7d6]Offense[/color][/b][list]\n<br />[*][b]Absorb ﻿Heath/Stamina/Magicka/Attribute/Skill[/b] effects are moved into Mysticism school [color=#c9daf8][configurable][/color].\n<br />[*]New [b]Fortify Spell Power[/b] effect proportionally increases the magnitude or duration of all spells.\n<br />[*][b]Dispel[/b] can deal damage to summoned creatures [color=#c9daf8][configurable][/color].\n<br />[*][b]Dispel[/b] now works on all temporary effects (instead of just spells) - including lesser/greater powers, scrolls and weapon enchantments. Additionally, it is no longer \"all or nothing\" - if an effect cannot be dispelled fully, its duration will still be shortened. To compensate for the these buffs, relative strength of Dispel effect has been reduced from 5x magnitude to 3x.\n<br />[/list]\n<br />\n<br />\n<br />[center][size=4][b][font=Lucida Sans Unicode][heading][color=#6fa8dc]College of Restoration[/color][/heading][/font][/b][/size][/center][right][i]﻿The School of Restoration specializes in magics that ease, heal, and purify. Restoration spells heal wounds, cure ailments, restore and fortify the body's attributes and abilities, and protect it from other malign influences.[/i][/right]\n<br />\n<br />[left][color=#9fc5e8]﻿[b]Skill ﻿Perks[/b][/color][/left][list]\n<br />[*][i]Apprentice[/i]: Magicka regenerates 25% faster.\n<br />[*][i]Journeyman[/i]: Beneficial Restoration effects become progressively more powerful when used on targets with less than half Health.\n<br />[*][i]Expert[/i]: All spells are 25% more powerful against Undead.\n<br />[*][i]Master[/i]: Healing and protective spells from Restoration school now have the ability to dispel continuous damage effects and certain debuffs.\n<br />[/list]\n<br />[left][color=#9fc5e8][b]Offense[/b][/color][/left][list]\n<br />[*][b]Turn Undead[/b] is moved to Restoration school [color=#c9daf8][configurable][/color]. Summoned Undead are banished by this effect, instead of fleeing.\n<br />[*]Additionally, Turn Undead is expanded to work on NPCs, such as vampires and NPC ghosts.\n<br />[*][b]Fortify Attack Damage[/b] adds a static damage bonus to all physical attacks made by the caster.\n<br />[/list]\n<br />[left][color=#9fc5e8][b]Resistances and Buffs[/b][/color][/left][list]\n<br />[*][b]Elemental resistance[/b] effects are cheaper in order to make them worth using as spells. New spells with elemental resistance effects are distributed to vendors.\n<br />[*]All individual resistances to hostile effects are also applied to self-targeted spells.\n<br />[*]New resistances are added: [b]Resist Petrification[/b] and [b]Resist Silence[/b] both add percent chance of avoiding corresponding effects, same way as vanilla Resist Paralysis.\n<br />[*][b]Fortify Health[/b] will no longer decreases health below maximum when it expires, preventing this effect from potentially killing the player.\n<br />[*][b]Resist Magic[/b] is capped at 85% [color=#c9daf8][configurable][/color].\n<br />[/list]\n<br />[left][color=#9fc5e8][b]Healing[/b][/color][/left][list]\n<br />[*]Most [b]Restore Health[/b] spells are now more powerful, but work over time, rather then instantly. ﻿Casting Restore Health on wounded actor will give a minor increase of disposition.\n<br />[*]New [b]Lifeward[/b] effect is introduced – when target is about to die, it automatically restores specified amount of Health.\n<br />[*]New [b]Donate Health[/b] effect allows the caster to heal the target at the expense of his own health. Has very low Magicka cost, but caster can be killed by this effect.\n<br />[/list]\n<br />[left][color=#9fc5e8][b]Cures[/b][/color][/left][list]\n<br />[*]New [b]Cure Silence[/b] effect is introduced, which removes Silence from the target. Available in forms of scrolls and potions.\n<br />[*][b]Cure Poison[/b] will interrupt new Poison Damage from Destruction school, as one would expect.\n<br />[/list]\n<br />\n<br />\n<br />[color=#6aa84f][b]\n<br />[/b][/color]"
