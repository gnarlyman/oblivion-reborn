nexusDescription="The Oblivion Script Extender, or OBSE for short, is a modder's resource that expands the scripting capabilities of Oblivion. It does so without modifying the executable files on disk, so there are no permanent side effects.\n<br />\n<br />Once installed, no additional steps are needed to launch Oblivion with OBSE's added functionality. You can start the game using OBSE from obse_loader.exe\n<br />\n<br />[url=https://discord.gg/fKb6Uj62pK]Join the xOBSE Discord here![/url]\n<br />\n<br />The instructions for installing and running OBSE differ based on whether you are using a retail or Steam version of the game.\n<br />\n<br />[size=4]Install with Vortex[/size]\n<br />[list]\n<br />[*]Click the \"Vortex\" button in the top-right of this page.\n<br />[*]Once installed and enabled, ensure you have deployed it by clicking \"Deploy Mods\" on the Mods toolbar.\n<br />[*]Use the shortcut on the dashboard to start the game with OBSE. \n<br />[/list]\n<br />\n<br />[size=4]Manual Installation for the Retail (Non-Steam) version of Oblivion[/size]\n<br />[list=1]\n<br />[*]Copy obse_1_2_416.dll, obse_editor_1_2.dll, obse_loader.exe and the Data folder to your Oblivion directory. This is usually in your Program Files folder, and should contain files called \"Oblivion.exe\" and \"OblivionLauncher.exe\".\n<br />[*]Run oblivion by running obse_loader.exe from the Oblivion directory.\n<br />[/list]If you use a desktop shortcut to launch Oblivion normally, just update the shortcut to point to obse_loader.exe instead of oblivion.exe.\n<br />\n<br />\n<br />[size=4]Manual Installation for the Steam version of Oblivion[/size]\n<br />[list=1]\n<br />[*]Copy obse_1_2_416.dll, obse_editor_1_2.dll, obse_steam_loader.dll and the Data folder to your Oblivion directory. This is usually \"C:&#92;Program Files&#92;Valve&#92;Steam&#92;SteamApps&#92;common&#92;oblivion\".\n<br />[*]Launch Oblivion via Steam or by running Oblivion.exe. OBSE will automatically be run along with Oblivion when launched. To disable this, rename or move obse_steam_loader.dll. You do not need to use obse_loader.exe unless you are running the editor.\n<br />[/list]\n<br />\n<br />[size=4]Manual Installation for the Steam Proton on Linux[/size]\n<br />(replace Point 2. from the previous paragraph):\n<br />[list=1]\n<br />[*]Backup OblivionLauncher.exe and rename obse_loader.exe to OblivionLauncher.exe\n<br />[*]Start the game from inside Steam Note this is needed only when using a Linux Steam and Proton. Using Windows Steam inside Wine should work out of the box,\n<br />[/list]\n<br />\n<br />[size=4]Installation for Mod Organizer 2\n<br />[/size]Mod organizer users need to use special instructions to allow OBSE to function properly. Follow the instruction on this page: [url=https://github.com/ModOrganizer2/modorganizer/wiki/Running-Oblivion-OBSE-with-MO2]https://github.com/ModOrganizer2/modorganizer/wiki/Running-Oblivion-OBSE-with-MO2[/url]\n<br />\n<br />[line]\n<br />\n<br />[size=4]Running TES: Construction Set with OBSE[/size]\n<br />Scripts written with these new commands must be written via the TESConstructionSet launched with obse_loader. Open a command prompt window, navigate to your oblivion install folder, and type \"obse_loader -editor\". The normal editor can open plugins with these extended scripts fine, it just can't recompile them and will give errors if you try.\n<br />\n<br />[b]WARNING: It's unadvised to install Oblivion to Program Files\n<br />\n<br />[/b][line]\n<br />\n<br />\n<br />[size=5][b]Having problems? Check the [url=https://www.nexusmods.com/oblivion/articles/44541]Frequently Asked Questions[/url].[/b][/size]\n<br />\n<br />[line]\n<br />\n<br />\n<br />[url=https://github.com/llde/xOBSE]The source code is available here (GitHub)![/url]﻿\n<br />Releases are also available on GitHub; they're the same files as what's available here."
